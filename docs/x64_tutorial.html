{
  id: 18, phase: 5,
  title: "Long-Mode Interrupts and IRETQ",
  subtitle: "Why the IDT got 50% bigger in 64-bit mode",
  content: `
<h2>Three delivery paths, one entry point</h2>
<p><code>cpu/x86_64/intr.go</code>'s <code>deliverInterrupt</code> dispatches on the current mode:</p>
<pre><span class="kw">func</span> (c *<span class="kw">CPU</span>) <span class="fn">deliverInterrupt</span>(vec <span class="kw">uint8</span>, hasErr <span class="kw">bool</span>, errorCode <span class="kw">uint32</span>) <span class="kw">error</span> {
    <span class="kw">if</span> c.mode != ModeLong64 {
        <span class="kw">return</span> c.<span class="fn">deliverInterruptLegacy</span>(vec, hasErr, errorCode)
    }
    <span class="cm">// long-mode path: 16-byte gate, full IRETQ frame, optional IST</span>
    ...
}<span class="lang-tag">go</span></pre>
<p>The legacy helper splits real mode (4-byte IVT, 16-bit IP+CS+FLAGS push) from protected mode (8-byte IDT gate, configurable operand width). Long mode is its own path because the gate format and the saved frame both change.</p>

<h2>The 16-byte gate</h2>
<p>Long mode doubles the IDT gate size to hold a 64-bit handler RIP plus the IST index:</p>
<table class="corr-table">
  <tr><th>Offset</th><th>Field</th><th>Size</th></tr>
  <tr><td>0x00</td><td>Offset bits 0..15</td><td>2 bytes</td></tr>
  <tr><td>0x02</td><td>Segment selector</td><td>2 bytes</td></tr>
  <tr><td>0x04</td><td>IST index (low 3 bits), reserved</td><td>1 byte</td></tr>
  <tr><td>0x05</td><td>Type / DPL / P (the same access byte as i386)</td><td>1 byte</td></tr>
  <tr><td>0x06</td><td>Offset bits 16..31</td><td>2 bytes</td></tr>
  <tr><td>0x08</td><td>Offset bits 32..63</td><td>4 bytes</td></tr>
  <tr><td>0x0C</td><td>Reserved</td><td>4 bytes</td></tr>
</table>
<p>So the lookup is <code>IDTR.base + vec*16</code>, not <code>vec*8</code> like i386. Our delivery code reads the 16 bytes, validates the P bit, splits the offset, and loads CS:RIP from the gate. Anything malformed surfaces as a hard error rather than a recursive #GP — we don't have double-fault delivery yet, and a guest-induced infinite #GP loop is a worse failure mode than a clear emulator error.</p>

<pre><span class="cm">// cpu/x86_64/intr.go</span>
<span class="kw">if</span> typeAttr&amp;0x80 == 0 {
    <span class="kw">return</span> fmt.<span class="fn">Errorf</span>(<span class="st">"prot-mode interrupt: gate %d not present "</span> +
        <span class="st">"(typeAttr=%#x RIP=%#x CS=%#x)"</span>,
        vec, typeAttr, c.rip, c.seg[CS])
}<span class="lang-tag">go</span></pre>
<p>The RIP+CS in the error message look like noise until you're chasing a "page fault before the IDT is installed" bug — at which point they're the single most useful line in the log. That commit (<code>d06885e</code>) was what told us the TinyCore #PF came from <code>0x235c07a</code>, which we then disassembled to find the bad addressing-mode decode.</p>

<h2>The frame IRETQ expects</h2>
<p>i386 IRET pops 3 doublewords (EIP, CS, EFLAGS) within the same privilege level, or 5 (adds ESP, SS) across rings. Long-mode IRETQ <em>always</em> pops 5 qwords:</p>
<pre>RSP →  [RIP]      <span class="cm">// 8 bytes</span>
       [CS]       <span class="cm">// 8 bytes — only the low 16 bits matter</span>
       [RFLAGS]   <span class="cm">// 8 bytes</span>
       [RSP_new]  <span class="cm">// 8 bytes</span>
       [SS]       <span class="cm">// 8 bytes — only the low 16 bits matter</span><span class="lang-tag">stack</span></pre>
<p>Always five, regardless of privilege change. That's because long mode dropped the i386 "if same ring, no SS/RSP" optimisation — the silicon needed to know <em>before</em> it pops whether to expect 3 or 5, and reading the saved CS to decide was a serialisation point nobody wanted. Always 5 is simpler.</p>
<p>The flip side: kernel exception handlers <em>always</em> push to a known stack, even on intra-ring faults. The handler's prologue can rely on RSP being aligned and RFLAGS being its previous value, no special casing.</p>

<h2>The CPL update — the bug we hit on Alpine</h2>
<p>IRETQ to user (CS RPL = 3) must synchronise <code>c.cpl = 3</code> alongside loading the new CS. Without that, the emulator stays "in the kernel" while the architectural CS says "userspace." The next page fault then builds a <code>#PF</code> error code with X86_PF_USER cleared, Linux's <code>do_user_addr_fault</code> takes the <code>no_context</code> branch, and init dies with "BUG: unable to handle page fault." Our IRETQ derives the new CPL from CS[1:0] and synthesises a matching descriptor cache:</p>
<pre>newCPL := <span class="kw">int</span>(newCS &amp; 3)
c.cpl = newCPL
<span class="kw">if</span> newCPL == 3 {
    c.segAccess[CS] = csLBit | 0xFA   <span class="cm">// DPL=3</span>
} <span class="kw">else</span> {
    c.segAccess[CS] = csLBit | 0x9A   <span class="cm">// DPL=0</span>
}<span class="lang-tag">go</span></pre>

<h2>IST — the per-vector stack switch</h2>
<p>The TSS in long mode carries seven alternate kernel stacks (<code>ist1</code>..<code>ist7</code>). An IDT gate's IST index (1..7) tells the CPU "regardless of whether we're crossing rings, switch RSP to <code>TSS.ist[N]</code> before pushing the frame." Linux uses this for NMI, #DF, #MC, and the debug stack — anything that must run on a guaranteed-good stack even if the kernel's RSP was poisoned.</p>
<p>Our emulator reads the IST nibble during the gate-lookup and routes through the TSS when non-zero. The simpler "same RSP for everything" path was fine for early bring-up but breaks the first time Linux loads a kernel that puts NMI on IST 1.</p>

<div class="box box-key">
<strong>Why the error message format matters</strong>
Interrupt-delivery errors are some of the only places you'd otherwise see no context at all — by the time delivery fails, the original fault has been swallowed and the emulator is just panicking. Carrying RIP+CS into the error string costs nothing and turns "page fault at X" into "page fault at X while RIP was Y in CS Z" — three orders of magnitude more debugging signal for one extra Sprintf arg.
</div>
`,

    "Read the AMD APM Vol 2, Chapter 8 (Exceptions and Interrupts) — specifically the IDT gate format and IST mechanism. Note what differs from the i386 chapter.",

  ]

{
  id: 19, phase: 5,
  title: "SYSCALL, SWAPGS, and FSGSBASE (Planned)",
  subtitle: "The fast path between user and kernel",
  content: `
<h2>What this lesson will cover</h2>
<ul>
  <li><strong>SYSCALL</strong>: a single-instruction kernel entry. Replaces SYSENTER/SYSEXIT. Loads RIP from MSR LSTAR, CS from STAR, masks RFLAGS by MSR SFMASK. About 3× faster than INT 80h on a modern CPU.</li>
  <li><strong>SYSRET</strong>: the return. Loads RIP from RCX, RFLAGS from R11.</li>
  <li><strong>SWAPGS</strong>: atomic swap of the current GS.base and KernelGSBase MSRs. Used at every kernel entry/exit to flip from per-CPU kernel data to the user's TLS pointer.</li>
  <li><strong>FSGSBASE</strong>: an instruction family (RDFSBASE, RDGSBASE, WRFSBASE, WRGSBASE) that lets userspace read/write its own FS/GS base without going through a system call. CR4.FSGSBASE gates this.</li>
</ul>

<h2>Why this is on the critical path</h2>
<p>Every Linux system call goes through SYSCALL. Linking up the SYSCALL fast path is what makes the difference between an emulator that loads init and one that gets to a shell prompt. Per-CPU data (current task pointer, scheduler state, percpu variables) lives off GS — so SWAPGS is on the literal hot path of every interrupt and system call entry.</p>

<h2>The MSRs we need to model</h2>
<pre><span class="cm">// cpu/x86_64/cpu.go — already declared</span>
msrStar   <span class="kw">uint64</span>   <span class="cm">// SYSCALL target CS/SS + 32-bit entry RIP</span>
msrLstar  <span class="kw">uint64</span>   <span class="cm">// SYSCALL 64-bit entry RIP</span>
msrCstar  <span class="kw">uint64</span>   <span class="cm">// SYSCALL compat-mode RIP</span>
msrSFMask <span class="kw">uint64</span>   <span class="cm">// RFLAGS clear-mask on SYSCALL entry</span>
msrFSBase       <span class="kw">uint64</span>
msrGSBase       <span class="kw">uint64</span>
msrKernelGSBase <span class="kw">uint64</span>   <span class="cm">// what SWAPGS swaps in/out</span><span class="lang-tag">go</span></pre>

<h2>The SYSCALL semantics</h2>
<p>On SYSCALL:</p>
<ol>
  <li>RCX ← RIP (save return)</li>
  <li>R11 ← RFLAGS (save flags)</li>
  <li>RIP ← LSTAR (jump to entry point)</li>
  <li>CS, SS ← STAR[47:32] | 0/8 (load kernel selectors)</li>
  <li>RFLAGS &amp;= ~SFMASK (mask interrupt-unsafe bits)</li>
</ol>
<p>The interesting wrinkle: SYSCALL does <em>not</em> switch stacks. The kernel must do that itself via SWAPGS + RSP-load-from-GS, or — on PTI-enabled kernels — a more involved trampoline.</p>

<h2>Status: SYSCALL works, FSGSBASE works, SWAPGS works</h2>
<p>All three are implemented. The MSR slots (<code>msrStar</code>, <code>msrLstar</code>, <code>msrCstar</code>, <code>msrSFMask</code>, <code>msrFSBase</code>, <code>msrGSBase</code>, <code>msrKernelGSBase</code>) live in <code>cpu/x86_64/cpu.go</code>'s CPU struct and are read/written through <code>opRDMSR</code> / <code>opWRMSR</code> in <code>opcodes.go</code>. <code>opSWAPGS</code> atomically swaps <code>c.msrGSBase</code> and <code>c.msrKernelGSBase</code> (and updates <code>c.segBase[GS]</code> to match the new active base) — that's the entire instruction.</p>

<h2>The Alpine boot trap that taught us about CPL drift</h2>
<p>SYSCALL/SYSRET aren't the only entry/exit pair; IRETQ also returns to user. The hidden coupling: the architectural CPL is implied by <code>CS[1:0]</code> (the RPL), but our emulator caches it explicitly in <code>c.cpl</code> for paging-permission decisions. If IRETQ loads a new CS without updating c.cpl, the next page-fault delivery builds an error code with X86_PF_USER cleared, Linux's <code>do_user_addr_fault</code> takes the no-context branch, and init dies before <code>/sbin/init</code> ever runs.</p>
<p>The fix in <code>opIRETQ</code> derives the new CPL from <code>newCS &amp; 3</code> and synthesises a matching descriptor cache. Same shape as the RETF descriptor reload from Lesson 20 — a fault-delivery instruction that loads CS must update <em>everything</em> the cache covers (base, limit, access bits, AND the cached CPL), not just the selector word.</p>

<div class="box box-note">
<strong>What we still need for full userspace</strong>
SYSCALL works for the kernel→user→kernel round-trip Linux uses; <code>VDSO</code>-style optimised paths (FSGSBASE + gettimeofday-from-userspace) work because RDFSBASE / WRGSBASE are implemented. The piece we still skip is the IST mechanism for #DF / NMI on a guaranteed-good stack — fine for the single-CPU configs we boot, but a real multi-CPU kernel under heavy NMI load would hit it.
</div>
`,
  exercises: [
    "Read Linux's <code>arch/x86/entry/entry_64.S</code> — specifically <code>entry_SYSCALL_64</code>. Count the instructions executed between the SYSCALL and the C-level system-call dispatcher.",
    "Why does SYSCALL save RIP to RCX and RFLAGS to R11 (rather than a kernel stack)?",
    "If a user process executes SWAPGS directly (not via SYSCALL), what happens? (Hint: SWAPGS is privileged; #GP on CPL=3.)",
    "The IRETQ CPL-derivation fix is one line. Sketch a regression test that would have caught the original Alpine bug — what state do you set up, what do you assert?"
  ]
},

{
  id: 20, phase: 5,
  title: "Booting a 64-bit Linux Kernel",
  subtitle: "Three loaders, one bug, and the full path to a login prompt",
  content: `
<h2>Three loader paths for three kinds of "kernel"</h2>
<p><code>./bin/temu -machine x86_64 -kernel &lt;file&gt;</code> doesn't know in advance what kind of binary you handed it. It probes, in order:</p>
<ol>
  <li><strong>PVH</strong> (<code>machine/pc/pvh64.go</code>) — does the ELF carry an <code>XEN_ELFNOTE_PHYS32_ENTRY</code> note? If yes, this is a PVH-aware kernel and we enter at the PHYS32_ENTRY in 32-bit protected mode per the PVH spec.</li>
  <li><strong>vmlinux64</strong> (<code>machine/pc/vmlinux64.go</code>) — plain x86_64 ELF, no PVH note. We synthesize a minimal long-mode environment ourselves: identity-mapped 1 GiB pages, a tiny GDT, EFER.LMA latched, and jump straight to <code>f.Entry</code> in 64-bit code.</li>
  <li><strong>bzImage64</strong> (<code>machine/pc/bzimage64.go</code>) — a compressed Linux bzImage. Parses the setup header, finds the protected-mode payload past the real-mode stub, and enters in 32-bit code at the bzImage's <code>protected_mode_start + 0x200</code> (the <code>startup_64</code> conventional entry).</li>
</ol>
<p>The PVH path is the most interesting one and the one TinyCorePure64 + OSv use. Walk through it carefully — it touches almost every Phase IV feature we built.</p>

<h2>What the PVH loader sets up</h2>
<p>PVH boot is the QEMU / Xen DomU spec for "you've been loaded into RAM, here's where state lives, go." <code>loadPVH64</code> places exactly four artefacts:</p>
<ul>
  <li>The kernel's PT_LOAD segments at their physical addresses (vaddrs are high-half kernel-VAs but the kernel runs through its own paging once it sets it up; we land it where the linker put the paddrs).</li>
  <li>An <code>hvm_start_info</code> struct at <code>0x9000</code> (magic <code>0x336EC578 = "xEn3"</code>, version 1, cmdline_paddr, memmap_paddr, modlist_paddr, nr_modules).</li>
  <li>An e820-style memmap (24-byte entries, type 1 = RAM) at <code>0x9100</code>. Linux's <code>pvh_start_xen</code> walks these to build its early page tables.</li>
  <li>A tiny GDT at <code>0x80000</code> with a single 32-bit code segment (D=1, L=0) and a flat data segment.</li>
</ul>
<p>State at entry — exactly per the PVH spec:</p>
<table class="corr-table">
  <tr><th>Register / bit</th><th>Value</th><th>Why</th></tr>
  <tr><td>CR0</td><td>PE=1, PG=0</td><td>32-bit protected mode, paging off</td></tr>
  <tr><td>CR4 / CR3 / EFER</td><td>all zero</td><td>Kernel sets up its own paging + long-mode state</td></tr>
  <tr><td>CS</td><td>0x08, base 0, limit 4 GiB, D=1, L=0</td><td>Flat 32-bit code segment</td></tr>
  <tr><td>EBX</td><td>0x9000</td><td>Pointer to hvm_start_info</td></tr>
  <tr><td>RIP</td><td>PHYS32_ENTRY note value</td><td>Linux/OSv's hand-written PVH stub</td></tr>
</table>

<h2>What the PVH stub does next — and where it breaks</h2>
<p>The kernel's PVH stub runs entirely in 32-bit pm:</p>
<ol>
  <li>Sets up minimal page tables (PML4, PDPT, PD) covering the kernel's load region.</li>
  <li>Enables CR4.PAE, loads CR3, sets EFER.LME via WRMSR.</li>
  <li>Enables CR0.PG. This latches EFER.LMA — we're now in <strong>long mode active</strong>. But CS still has L=0, so the CPU is in <strong>ModeCompat32</strong>, not ModeLong64.</li>
  <li>Builds a new GDT in RAM and <code>lgdt</code>s it. The new GDT has a CS slot with L=1.</li>
  <li>Pushes the new CS selector + a 64-bit RIP onto the stack and runs <code>retf</code>. Real silicon reloads CS via the GDT, the L=1 bit reaches the segAccess cache, and the CPU transitions to ModeLong64.</li>
</ol>
<p>That last step is where TinyCorePure64 broke our emulator until the day this lesson was written. The symptom: <code>vec=14 addr=0xffee1f90</code> page fault about 50 instructions into the kernel, on an IDT that didn't exist yet, with no way to deliver. The fault's RIP was <code>0x235c07a</code>; disassembling the seven bytes there showed <code>2B 05 90 1F EE FF</code> — which in <em>long mode</em> is <code>SUB EAX, [RIP + 0xFFEE1F90]</code> (RIP-relative). The kernel was assembled for long mode but our CPU was decoding it as compat32, where the same bytes mean <code>SUB EAX, [0xFFEE1F90]</code> absolute. The absolute address was unmapped — fault.</p>

<h2>The bug: RETF must reload the descriptor cache</h2>
<p>The non-long-mode path of <code>opRETF</code> was loading the new selector into <code>c.seg[CS]</code> but only rebuilding <code>c.segBase[CS]</code> for real mode (sel&lt;&lt;4). In protected/compat32 it skipped the descriptor walk entirely; <code>recomputeMode</code> then used the <em>previous</em> selector's cached <code>segAccess[CS]</code>, where L was still 0, and we stayed stuck in compat32.</p>
<pre><span class="cm">// cpu/x86_64/intr.go — the fix</span>
<span class="kw">if</span> c.mode != ModeLong64 {
    newRIP := c.<span class="fn">popStack</span>(slotSize)
    newCS  := <span class="kw">uint16</span>(c.<span class="fn">popStack</span>(slotSize))
    c.rip = newRIP
    c.seg[CS] = newCS
    <span class="kw">if</span> c.cr[0]&amp;CR0_PE == 0 {
        c.segBase[CS] = <span class="kw">uint64</span>(newCS) &lt;&lt; 4   <span class="cm">// real mode</span>
    } <span class="kw">else</span> {
        <span class="cm">// pm16 / pm32 / compat32: walk the GDT/LDT and</span>
        <span class="cm">// refresh base/limit/access from the new descriptor.</span>
        <span class="cm">// Skipping this leaves the L bit frozen at the old</span>
        <span class="cm">// selector's value — a compat32→long64 retf silently</span>
        <span class="cm">// stays in compat32 and every kernel instruction</span>
        <span class="cm">// after it mis-decodes.</span>
        c.<span class="fn">loadProtSegment</span>(CS, newCS)
    }
    c.cpl = <span class="kw">int</span>(newCS &amp; 3)
    c.<span class="fn">recomputeMode</span>()
    <span class="kw">return</span> <span class="kw">nil</span>
}<span class="lang-tag">go</span></pre>
<p>The same pattern applies to far call, far jmp, and IRET in non-long modes. <code>opMOVtoSreg</code> always did it correctly — we just hadn't propagated the call site to RETF.</p>

<div class="box box-warn">
<strong>Pitfall</strong>
Big-real-mode (real mode with CS.D=1 from a brief pm32 excursion) requires the <em>opposite</em> behaviour: on a real-mode RETF the cached limit/access must <em>survive</em> the selector reload. SeaBIOS's 16↔32-bit transition thunks depend on this. <code>TestRETF_RealModePreservesBigRealAccess</code> in <code>cpu/x86_64/retf_descriptor_test.go</code> pins the invariant.
</div>

<h2>From kernel-banner to /init</h2>
<p>Past the RETF fix, the kernel ran through everything: device init, ACPI parsing (we provide tables via fw_cfg — see Lesson 18), driver probes, then a clean panic:</p>
<pre>Kernel panic - not syncing: VFS: Unable to mount root fs on unknown-block(0,0)<span class="lang-tag">log</span></pre>
<p>No initrd. The PVH spec says auxiliary blobs (initrd, microcode, modules) live in the <strong>module list</strong> — an array of <code>hvm_modlist_entry</code> { paddr, size, cmdline_paddr, reserved } records pointed at by <code>hvm_start_info.modlist_paddr</code>, with <code>nr_modules</code> giving the count. Linux's <code>pvh_start_xen</code> walks the list and treats the first entry it finds as the initramfs blob, copying its paddr/size into <code>boot_params.hdr.ramdisk_image</code> / <code>ramdisk_size</code> before invoking the regular bzImage bring-up.</p>
<p>Our loader had a TODO where module wiring should have been:</p>
<pre>_ = initrdData   <span class="cm">// TODO: PVH modules via modlist_paddr if/when we need it</span><span class="lang-tag">go</span></pre>
<p>Filling it in: copy initrd bytes just below the top of guest RAM (page-aligned down), stamp one 32-byte modlist entry at <code>0x9300</code> describing it, set <code>hvm_start_info.nr_modules = 1</code> and <code>modlist_paddr = 0x9300</code>. That's all Linux needs to find the initramfs.</p>

<h2>The end state</h2>
<pre>$ ./run64_iso.sh tinycore
...
[    0.000000] Linux version 6.18.2-tinycore64 (gcc 15.2.0)
...
Freeing initrd memory: 17560K
Freeing unused kernel image (initmem) memory: 2640K
Run /init as init process
init started: BusyBox v1.36.1
Booting Core 17.0
...
login[290]: root login on 'ttyS0'
tc@box:~$ _<span class="lang-tag">log</span></pre>
<p>Three commits got us from "Unable to mount root fs" to that prompt: the RETF descriptor fix (<code>cpu/x86_64/intr.go</code>), the PVH module wiring (<code>machine/pc/pvh64.go</code>), and a 600-byte cpio overlay (<code>scripts/extract_tinycore64.sh</code>) that adds a ttyS0 getty so the shell lands on the serial console we can talk to. <code>./run64_iso.sh tinycore</code> wraps all of it; no flags needed.</p>

<h2>The two helper boot paths we didn't take</h2>
<p>If a kernel has no PVH note, the loader falls through:</p>
<ul>
  <li><strong>vmlinux64.go</strong> — plain ELF64. We set up paging ourselves (1 GiB identity map at <code>0x70000</code>, kernel-VA high-half at PML4[511], Linux direct-map at PML4[0x111]), load EFER.LMA before the jump, and enter directly in long64. Used by tests and by any pre-decompressed Linux vmlinux that doesn't carry the Xen note. RSI is set to the boot_params paddr (Linux's documented x86_64 ABI).</li>
  <li><strong>bzImage64.go</strong> — full bzImage with the legacy real-mode setup header. We parse the header, locate the protected-mode kernel past <code>setup_size * 512</code>, and enter at <code>0x100000 + 0x200</code> (the conventional <code>startup_64</code> offset). Inside the kernel it's the same long-mode bring-up as the ELF path.</li>
</ul>
<p>All three converge once the kernel reaches its own <code>startup_64</code>. From there it's a normal Linux boot — just running on our CPU instead of QEMU's TCG.</p>

<div class="box box-key">
<strong>What "real" boot debugging looks like</strong>
The TinyCore RETF bug is a textbook example of how emulator boot bugs surface: not as a panic message but as a wrong opcode decoded a few instructions later. The fault address (0xFFEE1F90), the bytes at the faulting RIP, and the kernel's intended addressing mode (long64 RIP-relative vs compat32 absolute disp32) gave away the root cause once you decoded the instruction by hand. The mode field is the single load-bearing variable; mis-update it once and every subsequent instruction lies.
</div>
`,
  exercises: [

// ============================================================
// APP STATE
// ============================================================
let currentLesson = null;
let completed = JSON.parse(localStorage.getItem('x64tut_done') || '[]');

function isComplete(id) { return completed.includes(id); }
function markComplete(id) {
  if (!completed.includes(id)) completed.push(id);
  localStorage.setItem('x64tut_done', JSON.stringify(completed));
  updateProgress(); renderNav();
}
function unmarkComplete(id) {
  completed = completed.filter(x => x !== id);
  localStorage.setItem('x64tut_done', JSON.stringify(completed));
  updateProgress(); renderNav();
}
function updateProgress() {
  const pct = LESSONS.length ? Math.round(completed.length / LESSONS.length * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${completed.length} / ${LESSONS.length}`;
}

let collapsedPhases = new Set(JSON.parse(localStorage.getItem('x64tut_collapsed') || '[]'));

function renderNav(filter = '') {
  const nav = document.getElementById('lesson-nav');
  nav.innerHTML = '';
  const f = filter.toLowerCase();
  for (let ph = 1; ph <= 5; ph++) {
    const meta = PHASE_META[ph];
    const lessons = LESSONS.filter(l => l.phase === ph && (
      !f || l.title.toLowerCase().includes(f) || l.subtitle.toLowerCase().includes(f)
    ));
    if (lessons.length === 0) continue;
    const collapsed = collapsedPhases.has(ph);
    const group = document.createElement('div');
    group.className = 'phase-group';
    group.innerHTML = `
      <div class="phase-header ${collapsed ? 'collapsed' : ''}" data-phase="${ph}"
           style="color:${meta.color}">
        <span class="phase-dot" style="background:${meta.color}"></span>
        ${meta.short}: ${meta.name}
        <span class="phase-toggle">▾</span>
      </div>
      <div class="phase-lessons" ${collapsed ? 'style="display:none"' : ''}>
        ${lessons.map(l => `
          <div class="nav-item ${currentLesson === l.id ? 'active' : ''} ${isComplete(l.id) ? 'done' : ''}"
               data-id="${l.id}"
               style="${currentLesson === l.id ? `border-left-color:${meta.color}` : ''}">
            <span class="nav-check">${isComplete(l.id) ? '✓' : ''}</span>
            <span class="nav-num">${l.id}</span>
            ${l.title}
          </div>
        `).join('')}
      </div>
    `;
    nav.appendChild(group);
  }
  nav.querySelectorAll('.phase-header').forEach(h => {
    h.addEventListener('click', () => {
      const ph = parseInt(h.dataset.phase);
      const lessons = h.nextElementSibling;
      if (collapsedPhases.has(ph)) {
        collapsedPhases.delete(ph);
        h.classList.remove('collapsed');
        lessons.style.display = '';
      } else {
        collapsedPhases.add(ph);
        h.classList.add('collapsed');
        lessons.style.display = 'none';
      }
      localStorage.setItem('x64tut_collapsed', JSON.stringify([...collapsedPhases]));
    });
  });
  nav.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => showLesson(parseInt(item.dataset.id)));
  });
}

function showLesson(id) {
  const lesson = LESSONS.find(l => l.id === id);
  if (!lesson) return;
  currentLesson = id;
  const phase = PHASE_META[lesson.phase];
  const prev = LESSONS.find(l => l.id === id - 1);
  const next = LESSONS.find(l => l.id === id + 1);

  document.getElementById('topbar-phase').textContent = `${phase.short} — ${phase.name}`;
  const prevBtn = document.getElementById('btn-prev');
  const nextBtn = document.getElementById('btn-next-top');
  prevBtn.disabled = !prev;
  nextBtn.disabled = !next;
  prevBtn.onclick = () => prev && showLesson(prev.id);
  nextBtn.onclick = () => next && showLesson(next.id);

  const done = isComplete(id);
  document.getElementById('content-area').innerHTML = `
    <div id="lesson-content">
      <div class="lesson-eyebrow">
        <span class="phase-badge" style="background:${phase.color}22;color:${phase.color}">${phase.short}</span>
        <span class="lesson-number">Lesson ${lesson.id} of ${LESSONS.length}</span>
      </div>
      <h1 class="lesson-title">${lesson.title}</h1>
      <p class="lesson-subtitle">${lesson.subtitle}</p>
      <div class="lesson-divider"></div>
      <div class="lesson-body">${lesson.content}</div>
      <div class="exercises">
        <h2>Exercises</h2>
        ${lesson.exercises.map((ex, i) => `
          <div class="exercise">
            <div class="exercise-num">Exercise ${i + 1}</div>
            <p>${ex}</p>
          </div>
        `).join('')}
      </div>
      <div class="complete-wrap">
        <button class="btn-complete ${done ? 'done' : ''}" id="btn-done">
          ${done ? '✓ Completed' : 'Mark Complete'}
        </button>
        ${next ? `<button class="btn-next" id="btn-next-lesson">Next: ${next.title} →</button>` : ''}
      </div>
    </div>
  `;
  document.getElementById('btn-done').onclick = () => {
    if (isComplete(id)) unmarkComplete(id); else markComplete(id);
    renderNav();
    document.getElementById('btn-done').className = `btn-complete ${isComplete(id) ? 'done' : ''}`;
    document.getElementById('btn-done').textContent = isComplete(id) ? '✓ Completed' : 'Mark Complete';
  };
  const nl = document.getElementById('btn-next-lesson');
  if (nl) nl.onclick = () => showLesson(next.id);
  renderNav();
  document.getElementById('main').scrollTo(0, 0);
  if (window.innerWidth < 900) document.getElementById('sidebar').classList.remove('open');
}

function showWelcome() {
  currentLesson = null;
  document.getElementById('topbar-phase').textContent = 'Overview';
  document.getElementById('btn-prev').disabled = true;
  document.getElementById('btn-next-top').disabled = false;
  document.getElementById('btn-next-top').onclick = () => showLesson(1);
  document.getElementById('content-area').innerHTML = `
    <div id="welcome">
      <h1>The <em>x86_64 CPU</em></h1>
      <p class="tagline">From i386 to long mode — a working emulator's field guide.</p>
      <div class="welcome-body">
        <p>This course walks you through the architectural changes x86_64 (also written x64 or amd64) brought to the i386 baseline you may already know: the 64-bit register file, the REX prefix, RIP-relative addressing, 4-level paging, the NX bit, and the new fast system-call path.</p>
        <p>Every lesson points back at a real, working emulator in this repository — <code>cpu/x86_64/</code> alongside the existing <code>cpu/x86/</code> backend — that is being built up incrementally. The first four phases document what has already landed (the M1 milestone: REX decode + 4-level paging + a minimal opcode set). The fifth phase previews what comes next: long-mode interrupts, SYSCALL/SYSRET, and finally booting a 64-bit Linux kernel.</p>
        <p>If you have not already read the <a href="x86_tutorial.html">x86 (i386) tutorial</a>, that one is a strict prerequisite. This course builds on top of it — what changes, what stays, and why.</p>
        <p>Two companion courses complete the picture: <a href="bios_tutorial.html">bios_tutorial.html</a> covers what runs before the kernel (SeaBIOS, mode transitions, the boot device handoff — including the <code>0xEA ljmp</code> from compat mode into 64-bit that broke every Linux boot when we gated it on EFER.LMA instead of CS.L), and <a href="osdev_tutorial.html">osdev_tutorial.html</a> covers what kernels do on top of long mode. For diagnostic technique — sampling, watchpoints, cycle-window traces — see <a href="DEBUG.md">DEBUG.md</a>.</p>
        <p>20 lessons across five phases. Progress is saved automatically in your browser.</p>
        <div class="phase-overview">
          ${[1,2,3,4,5].map(ph => {
            const m = PHASE_META[ph];
            const done = LESSONS.filter(l => l.phase === ph && isComplete(l.id)).length;
            const total = LESSONS.filter(l => l.phase === ph).length;
            return `
              <div class="phase-card" onclick="showLesson(${(LESSONS.find(l=>l.phase===ph)||{id:1}).id})">
                <div class="phase-card-num" style="color:${m.color}">${m.short} — Lessons ${m.lessons}</div>
                <h3>${m.name}</h3>
                <p>${done}/${total} complete</p>
              </div>
            `;
          }).join('')}
        </div>
        <button class="btn-start" onclick="showLesson(${completed.length > 0 ? Math.max(...completed) + 1 : 1})">
          ${completed.length > 0 ? 'Continue →' : 'Start from Lesson 1 →'}
        </button>
      </div>
    </div>
  `;
  renderNav();
}

document.getElementById('search').addEventListener('input', e => renderNav(e.target.value));

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'j') {
    const next = currentLesson && LESSONS.find(l => l.id === currentLesson + 1);
    if (next) showLesson(next.id);
  }
  if (e.key === 'ArrowLeft' || e.key === 'k') {
    const prev = currentLesson && LESSONS.find(l => l.id === currentLesson - 1);
    if (prev) showLesson(prev.id);
  }
  if (e.key === 'h') showWelcome();
});

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
document.getElementById('sidebar-header').style.cursor = 'pointer';
document.getElementById('sidebar-header').onclick = showWelcome;

updateProgress();
showWelcome();
</script>
