const LESSONS = [

// ============================================================
// PHASE 1 — From i386 to Long Mode
// ============================================================
{
  id: 1, phase: 1,
  title: "Why x86_64?",
  subtitle: "Sixteen years of backwards-compatible CPU evolution",
  content: `
<h2>The setup</h2>
<p>You already know i386 — 32-bit registers, segmented memory, the protected-mode tour the <a href="x86_tutorial.html">x86 tutorial</a> walks through. That architecture shipped in 1985 with the 80386 and was the dominant desktop ISA for two decades. By the year 2000 it had a problem: a 32-bit virtual address space caps you at 4 GiB per process, and PCs were already shipping with more than 2 GiB of RAM.</p>
<p>Intel's answer was Itanium — a brand-new ISA, incompatible with x86. It flopped. AMD's answer, in 2003, was AMD64 — extend x86 to 64 bits while keeping all the old code working. Intel adopted AMD's design under the name Intel 64 (also written EM64T). The combined ISA is now universally called <strong>x86_64</strong>, <strong>x64</strong>, or just <strong>amd64</strong>. They all refer to the same architecture.</p>

<h2>What x86_64 adds</h2>
<ul>
  <li><strong>Eight more general-purpose registers</strong> (R8..R15), all 64 bits wide. The old eight (RAX..RDI) keep their names but extend to 64 bits.</li>
  <li><strong>A new instruction-pointer-relative addressing mode</strong> (RIP-relative). Position-independent code no longer needs the GOT shenanigans of i386.</li>
  <li><strong>Four-level paging</strong> with 48-bit virtual addresses (256 TiB per process). Linear addresses must be <em>canonical</em> — bits 63..47 must all match bit 47.</li>
  <li><strong>SYSCALL/SYSRET</strong> — a single-instruction kernel entry that replaces the slower SYSENTER/SYSEXIT pair.</li>
  <li><strong>An NX bit</strong> in every page-table entry. Data pages can be marked non-executable.</li>
  <li><strong>SSE2 in the baseline</strong>. Every x86_64 CPU is guaranteed to have it, so compilers don't need fallback code paths.</li>
</ul>

<h2>What x86_64 takes away</h2>
<ul>
  <li><strong>Segmentation almost disappears.</strong> CS/DS/ES/SS bases are forced to zero. Limits are ignored. The only segment registers that still hold information are FS and GS, whose 64-bit bases are programmed via MSRs (FSBASE, GSBASE) — used by thread-local storage and per-CPU data.</li>
  <li><strong>Many legacy instructions are gone.</strong> AAA, AAD, AAM, AAS (BCD adjust), BOUND, INTO, LDS/LES/LFS/LGS/LSS (loads of far pointers), PUSHA/POPA — all illegal in long mode.</li>
  <li><strong>Real-mode addressing within long mode is impossible.</strong> Once you enter long mode you stay there until you actively disable it.</li>
</ul>

<h2>Three sub-modes inside long mode</h2>
<p>When EFER.LMA (Long Mode Active) is set, the CPU is in long mode, but there are still <em>three</em> ways code can be running:</p>
<ul>
  <li><strong>64-bit mode</strong>: CS.L=1. The native AMD64 runtime. 64-bit registers, RIP-relative, REX prefix, the works.</li>
  <li><strong>Compatibility mode</strong>: CS.L=0, CS.D=1. 32-bit code running underneath a 64-bit kernel — lets a 64-bit OS run unmodified 32-bit binaries without a "thunk" layer.</li>
  <li><strong>(16-bit compat)</strong>: CS.L=0, CS.D=0. Rare. Some firmware uses it.</li>
</ul>
<p>The emulator we're building uses these distinctions all over the decoder. See <code>cpu/x86_64/mode.go</code> for the Mode enum.</p>

<div class="box box-key">
<strong>Key Insight</strong>
The x86_64 instruction encoding is the i386 encoding plus a single optional prefix byte (REX). That one prefix unlocks 64-bit operands, the extra registers, and the new sign-extension rules. Everything that worked in i386 still works — except the cut list above. This is why operating systems were able to add 64-bit support over the course of a year or two rather than ten.
</div>
`,

    "Inspect any 64-bit binary on your system: <code>objdump -d /bin/ls | head -50</code>. Find the first line beginning with <code>4</code> (a REX prefix). That single byte is the entire syntactic difference between x86 and x86_64."
  ]

  content: `
<h2>Every x86 CPU is five CPUs in a trench coat</h2>
<p>From power-on to running a 64-bit kernel, the same silicon executes in five distinct architectural modes. The decoder, ALU, MMU, and exception machinery all behave differently in each. Our emulator names them explicitly:</p>
<pre><span class="cm">// cpu/x86_64/mode.go</span>
<span class="kw">const</span> (
    ModeReal16      <span class="kw">Mode</span> = <span class="kw">iota</span>  <span class="cm">// CR0.PE=0</span>
    ModeProtected16                  <span class="cm">// PE=1, CS.D=0</span>
    ModeProtected32                  <span class="cm">// PE=1, CS.D=1 — what i386 Linux runs in</span>
    ModeCompat32                     <span class="cm">// LMA=1, CS.L=0 — 32-bit code under 64-bit kernel</span>
    ModeLong64                       <span class="cm">// LMA=1, CS.L=1 — native AMD64</span>
)<span class="lang-tag">go</span></pre>

<h2>What changes between modes</h2>
<table class="corr-table">
<tr><th>Mode</th><th>Default operand</th><th>Default address</th><th>Segments</th><th>Paging</th></tr>
<tr><td>real16</td><td>16-bit</td><td>16-bit</td><td>seg×16 + offset</td><td>none</td></tr>
<tr><td>pm16</td><td>16-bit</td><td>16-bit</td><td>descriptor table</td><td>32-bit, 2-level</td></tr>
<tr><td>pm32</td><td>32-bit</td><td>32-bit</td><td>descriptor table</td><td>32-bit, 2 or 3-level</td></tr>
<tr><td>compat32</td><td>32-bit</td><td>32-bit</td><td>CS/DS/ES/SS base = 0</td><td>4-level (long-mode)</td></tr>
<tr><td>long64</td><td>32-bit (REX.W → 64)</td><td>64-bit</td><td>CS/DS/ES/SS base = 0; FS/GS via MSR</td><td>4-level (long-mode)</td></tr>
</table>
<p>The single most useful row is the last one. Notice that in 64-bit mode the <em>default</em> operand size is still 32 bits — you need a REX.W prefix to get 64-bit arithmetic. That's a compromise the architects made because 32-bit ops are common and they didn't want every instruction to grow a byte. We'll cover REX in detail in Lesson 7.</p>

<h2>Deriving the mode from architectural state</h2>
<p>The mode is not stored anywhere directly on real hardware — it is computed every cycle from a few bits scattered across <code>CR0</code>, <code>EFER</code>, and the CS-descriptor cache:</p>
<pre><span class="cm">// cpu/x86_64/mode.go — recomputeMode</span>
<span class="kw">if</span> c.efer&amp;EFER_LMA != 0 {
    <span class="kw">if</span> c.segAccess[CS]&amp;csLBit != 0 {
        c.mode = ModeLong64
    } <span class="kw">else</span> {
        c.mode = ModeCompat32
    }
    <span class="kw">return</span>
}
<span class="kw">if</span> c.cr[0]&amp;CR0_PE == 0 {
    c.mode = ModeReal16
    <span class="kw">return</span>
}
<span class="kw">if</span> c.segAccess[CS]&amp;csDBit != 0 {
    c.mode = ModeProtected32
} <span class="kw">else</span> {
    c.mode = ModeProtected16
}<span class="lang-tag">go</span></pre>
<p>We materialise this into a stored field so the hot path in <code>Step</code> can switch on a single byte instead of re-evaluating five bits each cycle. The catch: any code that mutates one of those input bits must call <code>recomputeMode</code>.</p>

<div class="box box-note">
<strong>Note</strong>
EFER.LMA (Long Mode Active) is read-only from the guest's perspective — it is set by the CPU when paging is enabled with EFER.LME set, and cleared when paging turns off. The guest writes LME (Long Mode Enable, the request); LMA is the latched answer.
</div>
`,

  ]

{
  id: 3, phase: 1,
  title: "Entering Long Mode",
  subtitle: "The four-instruction sequence the kernel runs to flip the switch",
  content: `
<h2>You cannot enter long mode directly</h2>
<p>A reset CPU starts in real mode. To get to long mode you must first walk through protected mode. The whole sequence — what AMD calls the "long-mode activation" path — is on every 64-bit kernel's hot path during boot.</p>

<h2>The canonical sequence</h2>
<pre><span class="cm">; 1. Disable paging temporarily (if it was on)</span>
mov  eax, cr0
and  eax, ~CR0_PG          <span class="cm">; bit 31 clear</span>
mov  cr0, eax

<span class="cm">; 2. Enable PAE (Physical Address Extension) — long mode requires it</span>
mov  eax, cr4
or   eax, CR4_PAE          <span class="cm">; bit 5</span>
mov  cr4, eax

<span class="cm">; 3. Load CR3 with the physical address of the freshly-built PML4 table</span>
mov  cr3, edi              <span class="cm">; EDI = phys(pml4)</span>

<span class="cm">; 4. Set EFER.LME (Long Mode Enable) via MSR 0xC0000080</span>
mov  ecx, 0xC0000080
rdmsr
or   eax, EFER_LME         <span class="cm">; bit 8</span>
wrmsr

<span class="cm">; 5. Enable paging — this is the latch. Now LMA flips on.</span>
mov  eax, cr0
or   eax, CR0_PG           <span class="cm">; bit 31</span>
mov  cr0, eax<span class="lang-tag">x86 asm</span></pre>

<p>After step 5, the CPU is in long mode — but specifically in <em>compatibility</em> mode (CS.L=0), because the CS descriptor you loaded back in protected mode had L=0. To enter 64-bit mode you do one more thing:</p>

<pre><span class="cm">; 6. Far jump through a code segment whose descriptor has L=1.</span>
jmp far [code64_descriptor]
<span class="cm">; The fetcher reloads CS, sees L=1 ⇒ mode becomes ModeLong64.</span><span class="lang-tag">x86 asm</span></pre>

<h2>Why so many steps</h2>
<p>Each precondition exists for a reason:</p>
<ul>
  <li><strong>PAE must be on</strong> because long-mode page-table entries are 64 bits — the old 32-bit 2-level walker (PD → PT) cannot represent them.</li>
  <li><strong>CR3 must already point at a valid PML4</strong> when paging turns on. Otherwise the very first instruction fetch faults — and there is nowhere to deliver the fault.</li>
  <li><strong>LME is set before PG</strong>. If you set PG with LME=0 you would get plain 32-bit PAE paging, not long mode. The combination latches LMA.</li>
  <li><strong>The far jump is needed</strong> because CS is the only descriptor that distinguishes long from compat mode, and you cannot rewrite CS without a far jump (or syscall, or IRET).</li>
</ul>

<h2>In the emulator</h2>
<p>Our emulator does not yet boot a real kernel through this sequence — that arrives in Phase 5 of the implementation roadmap. For M1 testing, the harness in <code>cpu/x86_64/decoder_test.go</code>'s <code>longModeFlat</code> helper preloads the post-sequence state directly:</p>
<pre><span class="cm">// cpu/x86_64/decoder_test.go</span>
c.SetCR64(0, CR0_PE)
c.SetCR64(4, CR4_PAE)
c.SetEFER(EFER_LME | EFER_LMA)
c.SetSegAccess(CS, csLBit)   <span class="cm">// CS.L=1 ⇒ 64-bit code</span>
c.recomputeMode()
<span class="cm">// CR0.PG is left clear — paging off for decode-only tests.</span><span class="lang-tag">go</span></pre>

<div class="box box-warn">
<strong>Edge case</strong>
On real hardware, executing instruction sequences <em>after</em> step 5 but <em>before</em> step 6 happens in compatibility mode — 32-bit code with long-mode paging underneath it. This is the briefest window in the boot path. Linux carefully arranges the code so the very next instruction after enabling paging is the far jump.
</div>
`,
  exercises: [
    "If you skip step 2 (PAE) and try to set CR0.PG with LME=1, what should happen on real hardware? (Look up #GP delivery conditions in the AMD APM.)",
    "Why does CR3 need to be loaded with PAE on, given that the OS could load CR3 once paging is already enabled? Hint: think about whether CR3 writes are themselves cached.",
    "Read the Linux kernel's <code>arch/x86/boot/compressed/head_64.S</code>. Locate the equivalents of steps 1–6 above. How does it actually arrange for the post-PG instruction to be the far jump?"
  ]
},

{
  id: 4, phase: 1,
  title: "The Mode Field — Our Emulator's Cheat Sheet",
  subtitle: "Why we cache what the hardware recomputes",
  content: `
<h2>Real hardware does not have a mode field</h2>
<p>Inside a real x86_64 CPU there is no register called "current mode." Each cycle, the decoder evaluates a fixed expression over the architectural bits — CR0.PE, EFER.LMA, CS.L, CS.D, EFLAGS.VM — and that determines what the next instruction means. Modes are a useful conceptual lens, not a state variable.</p>
<p>Our emulator <em>caches</em> the mode in <code>c.mode</code>. The trade-off:</p>
<ul>
  <li><strong>Win:</strong> hot-path lookups in Step (lip(), fetch, dispatch) become a single byte comparison instead of five-bit field tests.</li>
  <li><strong>Cost:</strong> every code path that mutates one of the input bits must call <code>recomputeMode</code>. Forgetting that call is a category of bug that real hardware cannot have.</li>
</ul>

<h2>Where the mode field reads</h2>
<p>Three places, all on the hot path:</p>
<ol>
  <li><strong>lip()</strong> (cpu/x86_64/mem.go) — In long modes, CS.base is forced zero regardless of the descriptor cache. lip just returns RIP. Outside long mode, lip = segBase[CS] + RIP.</li>
  <li><strong>parseModRM64</strong> (cpu/x86_64/modrm.go) — RIP-relative addressing only exists in long mode. The mod=00, rm=101 encoding switches meaning based on whether we are in 64-bit mode.</li>
  <li><strong>Operand-size defaulting</strong> (cpu/x86_64/exec.go's Step) — Default operand size is 32 in long mode; 16 in real mode; descriptor-dependent in protected mode.</li>
</ol>

<h2>Where it is mutated</h2>
<p>Any time guest code (or test setup) changes one of the architectural bits:</p>
<ul>
  <li>MOV CR0, ... → recompute (PE bit changed)</li>
  <li>WRMSR to EFER → recompute (LMA latch may have flipped)</li>
  <li>Far jump / far call / IRET that loads CS → recompute (L/D may have changed)</li>
  <li>SYSCALL/SYSRET → recompute (CS implicitly reloaded)</li>
</ul>
<p>In M1, only the test helpers and Reset poke these bits — guest code can't yet (the decoder doesn't implement MOV-to-CR or WRMSR). So <code>recomputeMode</code> is called explicitly from Reset and from tests. As more system instructions land, every CR0/EFER/CS write will route through a helper that calls <code>recomputeMode</code> automatically.</p>

<h2>The two CS bits — L and D</h2>
<pre><span class="cm">// cpu/x86_64/mode.go</span>
<span class="cm">// Bit positions inside the segAccess word. Matches cpu/x86's encoding:</span>
<span class="cm">//   bit 9  (0x0200) — L   (long-mode code segment). 1 = 64-bit code.</span>
<span class="cm">//   bit 10 (0x0400) — D/B (default operand size).   1 = 32-bit.</span>
<span class="kw">const</span> (
    csLBit = 1 &lt;&lt; 9
    csDBit = 1 &lt;&lt; 10
)<span class="lang-tag">go</span></pre>

<h2>pm32 vs compat32 — the trap that bit us</h2>
<p>Two of the five mode values look almost identical from the outside: both run 32-bit code on a flat segment, both pop EBX = some pointer, both call <code>WRMSR</code>. The bit that separates them is <strong>EFER.LMA</strong>:</p>
<table class="corr-table">
  <tr><th>State</th><th>ModeProtected32</th><th>ModeCompat32</th></tr>
  <tr><td>CR0.PE</td><td>1</td><td>1</td></tr>
  <tr><td>CR0.PG</td><td>0 or 1</td><td>1 (paging required)</td></tr>
  <tr><td>EFER.LMA</td><td>0</td><td>1 (long mode active)</td></tr>
  <tr><td>CS.L</td><td>0</td><td>0</td></tr>
  <tr><td>CS.D</td><td>1</td><td>1</td></tr>
  <tr><td>Paging walker</td><td>32-bit PAE or non-PAE</td><td>4-level (PML4/PDPT/PD/PT)</td></tr>
  <tr><td>0x40..0x4F bytes</td><td>INC/DEC reg</td><td>INC/DEC reg (still — REX needs CS.L=1)</td></tr>
  <tr><td><code>mod=00, r/m=5</code></td><td>disp32 absolute</td><td>disp32 absolute</td></tr>
</table>
<p>Compat32 is the mode Linux's PVH stub uses to do its long-mode bring-up: it sets up paging in pm32, enables PG → LMA latches and we become compat32, then it pushes a long-mode CS selector + 64-bit RIP and <code>retf</code>s into ModeLong64. The same byte stream <code>2B 05 90 1F EE FF</code> means <code>SUB EAX, [0xFFEE1F90]</code> in compat32 (absolute disp32) and <code>SUB EAX, [RIP + 0xFFEE1F90]</code> in long64 (RIP-relative). Get stuck in compat32 when the kernel expects long64 and every instruction past that point lies about where it's reading from.</p>
<p>The bug that taught us this lived in <code>opRETF</code>: the non-long-mode path was loading the new CS selector but not walking the GDT to refresh <code>c.segAccess[CS]</code>. <code>recomputeMode</code> then saw L=0 from the <em>old</em> selector and we silently stayed in compat32 even though the kernel's new GDT had L=1 in the slot it just selected. Lesson 20 has the full war story.</p>

<div class="box box-think">
<strong>Design rule</strong>
Any time you find yourself reading <code>c.cr</code>, <code>c.efer</code>, and <code>c.segAccess[CS]</code> together to compute behaviour, ask: is this on the hot path, or once-per-instruction? If on the hot path, cache it. If once-per-event (e.g. only when delivering an interrupt), don't bother — the cache invalidation cost outweighs the lookup savings.
</div>

<div class="box box-warn">
<strong>The recomputeMode call-site audit</strong>
Every state mutation that changes the mode-derived bits must call <code>recomputeMode</code>. The current call sites are: <code>SetCR(0, ...)</code> on a PE/PG transition (writeCR), <code>SetEFER</code>, <code>opMOVtoSreg</code> on CS, <code>opRETF</code> on any mode, <code>opIRETQ</code> + <code>opIRETlegacy</code>. If you grep for <code>recomputeMode</code> and find a write to one of the listed bits without a paired call, that's a latent mode-drift bug — exactly the shape of the TinyCore RETF regression before we found it.
</div>
`,
  exercises: [
    "Add a regression test that proves <code>recomputeMode</code> is idempotent: calling it twice in a row with no state changes should leave c.mode unchanged.",
    "Imagine a bug where a hypothetical SetCR0 forgot to call recomputeMode. Predict what would go wrong on the very next instruction. (Hint: lip() and parseModRM64 still see the old mode.)",
    "Write a test that puts the CPU in compat32, executes a single <code>retf</code> that loads a CS with L=1, and asserts the mode transitions to long64. (Hint: this is <code>TestRETF_Compat32To64Long</code> in cpu/x86_64.)",
    "Real hardware re-evaluates the mode every cycle. The emulator caches it. Suppose we removed the cache and rebuilt the mode on every call. By how much would performance drop, roughly? Use cpu/x86's prefetch-buffer measurements as a baseline reference point."
  ]
},

  id: 5, phase: 1,
  title: "Why cpu/x86_64 is a Separate Package",
  subtitle: "Isolation, duplication, and the cpu.X86Core interface",
  content: `
<h2>The choice in front of us</h2>
<p>When we decided to add x86_64 support, we had three options:</p>
<ol>
  <li><strong>Make cpu/x86 dual-mode.</strong> Add a long-mode branch inside every hot path of the existing emulator.</li>
  <li><strong>Extract cpu/x86common up front.</strong> Refactor cpu/x86 to move shared helpers (ALU, flag math, SSE, descriptor parsing) into a new package both backends import.</li>
  <li><strong>Build cpu/x86_64 as a separate package, duplicate as needed.</strong> Isolated; pay duplication cost; extract shared code later once x86_64 stabilises.</li>
</ol>
<p>We picked option 3. The reasons:</p>
<ul>
  <li>cpu/x86 boots Alpine end-to-end. We want zero regression risk on the working i386 path while x86_64 is in flux.</li>
  <li>The genuinely shareable code is hard to identify before we have written the new backend. Premature extraction is a worse bug source than duplication.</li>
  <li>Two packages with parallel structure are easy for a reader to compare. One dual-mode package would conceal the long-mode behaviour inside i386 paths.</li>
</ul>

<h2>The shared chassis</h2>
<p>Even with two CPU packages, the PC machine board has to drive whichever one is wired up. We solved this by extracting the CPU surface area machine/pc actually uses into a small interface — <code>cpu.X86Core</code>:</p>
<pre><span class="cm">// cpu/core.go</span>
<span class="kw">type</span> X86Core <span class="kw">interface</span> {
    Core   <span class="cm">// generic CPU: Run, Step, Reset, cycles, powerdown, ...</span>

    AddCycles(uint64)
    SetINTR(level int)
    GetINTR() int

    SetIOHandlers(...)
    SetInterruptAckHandler(fn func() (uint8, bool))

    SetSeg(sel int, v uint16)
    SetSegBase(sel int, v uint32)
    SetSegLimit(sel int, v uint32)
    SetSegAccess(sel int, v uint32)
    SetEIP(v uint32)
    SetReg32(r int, v uint32)
    SetCR(n int, v uint32)
    GetCR(n int) uint32
}<span class="lang-tag">go</span></pre>
<p>Both <code>*x86.CPU</code> and <code>*x86_64.CPU</code> implement this interface — verified by a compile-time assertion in <code>machine/pc/pc.go</code>:</p>
<pre><span class="kw">var</span> _ cpu.X86Core = (*x86.CPU)(<span class="kw">nil</span>)<span class="lang-tag">go</span></pre>

<h2>What is duplicated, what is shared</h2>
<table class="corr-table">
<tr><th>Component</th><th>Strategy</th></tr>
<tr><td>Devices (PIT, PIC, UART, virtio, slirp, ATA, VGA)</td><td><strong>Direct reuse</strong> — no changes</td></tr>
<tr><td>mem.PhysMemoryMap, mem.PhysMemoryRange</td><td><strong>Direct reuse</strong> — already uint64-addressed</td></tr>
<tr><td>cpu.Core interface</td><td><strong>Direct reuse</strong></td></tr>
<tr><td>SegmentDescriptor parsing, CR/EFLAGS bit constants</td><td><strong>Duplicated</strong>; extract later if patterns stabilise</td></tr>
<tr><td>ALU helpers (add, sub, shift, flags)</td><td><strong>Duplicated</strong>; M1 uses eager flags vs i386's lazy</td></tr>
<tr><td>Decoder (Step, ModR/M, opcodes)</td><td><strong>Rewritten</strong> for REX + RIP-rel + 4-level paging</td></tr>
<tr><td>MMU walk</td><td><strong>Rewritten</strong> for PML4 → PDPT → PD → PT</td></tr>
</table>

<div class="box box-key">
<strong>Key Insight</strong>
"Reuse" is not always the goal. Reuse forces a coupling that you must maintain forever. The right question is: what coupling reduces my <em>future</em> maintenance burden? For peripherals that have no architecture-specific behaviour, reuse is pure win. For CPU internals that differ in subtle ways across modes, duplication may be cheaper — at least until you have written both versions and can see what really overlaps.
</div>
`,

{
  id: 6, phase: 2,
  title: "Sixteen GPRs and the Partial-Write Rules",
  subtitle: "RAX..R15, and three ways an 8-bit write differs from a 64-bit one",
  content: `
<h2>The new register names</h2>
<p>i386 has eight 32-bit GPRs: EAX, ECX, EDX, EBX, ESP, EBP, ESI, EDI. x86_64 extends each to 64 bits (RAX, RCX, ..., RDI) and adds eight more (R8..R15). All sixteen are addressable as 64, 32, 16, or 8 bits via different operand-size encodings and the REX prefix.</p>
<table class="corr-table">
<tr><th>64-bit</th><th>32-bit</th><th>16-bit</th><th>8-bit hi</th><th>8-bit lo (no REX)</th><th>8-bit lo (REX)</th></tr>
<tr><td>RAX</td><td>EAX</td><td>AX</td><td>AH</td><td>AL</td><td>AL</td></tr>
<tr><td>RCX</td><td>ECX</td><td>CX</td><td>CH</td><td>CL</td><td>CL</td></tr>
<tr><td>RDX</td><td>EDX</td><td>DX</td><td>DH</td><td>DL</td><td>DL</td></tr>
<tr><td>RBX</td><td>EBX</td><td>BX</td><td>BH</td><td>BL</td><td>BL</td></tr>
<tr><td>RSP</td><td>ESP</td><td>SP</td><td>—</td><td>—</td><td>SPL</td></tr>
<tr><td>RBP</td><td>EBP</td><td>BP</td><td>—</td><td>—</td><td>BPL</td></tr>
<tr><td>RSI</td><td>ESI</td><td>SI</td><td>—</td><td>—</td><td>SIL</td></tr>
<tr><td>RDI</td><td>EDI</td><td>DI</td><td>—</td><td>—</td><td>DIL</td></tr>
<tr><td>R8..R15</td><td>R8D..R15D</td><td>R8W..R15W</td><td>—</td><td>—</td><td>R8B..R15B</td></tr>
</table>
<p>Notice that <code>AH/CH/DH/BH</code> (the "high byte" registers, AL+1, etc.) are <em>only</em> accessible without a REX prefix. The instant any REX byte appears, the encoding for those four 8-bit names is rerouted to <code>SPL/BPL/SIL/DIL</code>. This is the encoding price for getting access to the new R8B..R15B registers.</p>

<h2>The three partial-write rules</h2>
<p>The width of a write to a register changes what happens to the bits you didn't touch:</p>
<ol>
  <li><strong>64-bit write</strong> (operand size 8, REX.W=1): all 64 bits replaced.</li>
  <li><strong>32-bit write</strong>: low 32 bits replaced, <strong>upper 32 zero-extended</strong>. <em>This is unique to long mode.</em></li>
  <li><strong>16-bit write</strong>: low 16 replaced, upper 48 preserved.</li>
  <li><strong>8-bit write</strong>: low 8 replaced, upper 56 preserved.</li>
</ol>
<p>The 32-bit-write rule is the one that catches people. In i386 there is no "upper 32" — but in long mode there is, and it gets zeroed on every 32-bit operation. That changes how compilers emit code:</p>
<pre><span class="kw">mov</span> <span class="rg">eax</span>, <span class="rg">ebx</span>     <span class="cm">; in long mode: also clears top 32 of RAX</span>
<span class="kw">xor</span> <span class="rg">eax</span>, <span class="rg">eax</span>     <span class="cm">; idiomatic "zero RAX" — shorter than xor rax, rax</span><span class="lang-tag">x86_64 asm</span></pre>

<h2>In the emulator</h2>
<p>Our register file is one 16-element array of uint64. The accessors enforce the partial-write rules:</p>
<pre><span class="cm">// cpu/x86_64/cpu.go</span>
<span class="kw">func</span> (c *<span class="kw">CPU</span>) <span class="fn">SetReg64</span>(r <span class="kw">int</span>, v <span class="kw">uint64</span>) { c.reg64[r&amp;0xF] = v }

<span class="kw">func</span> (c *<span class="kw">CPU</span>) <span class="fn">SetReg32</span>(r <span class="kw">int</span>, v <span class="kw">uint32</span>) {
    c.reg64[r&amp;0xF] = <span class="kw">uint64</span>(v)   <span class="cm">// zero-extend</span>
}

<span class="kw">func</span> (c *<span class="kw">CPU</span>) <span class="fn">SetReg16</span>(r <span class="kw">int</span>, v <span class="kw">uint16</span>) {
    idx := (r &gt;&gt; 1) &amp; 0xF
    c.reg64[idx] = (c.reg64[idx] &amp; ^<span class="kw">uint64</span>(0xFFFF)) | <span class="kw">uint64</span>(v)
}<span class="lang-tag">go</span></pre>

<div class="box box-note">
<strong>Why this matters for emulation</strong>
A bug we don't have to write: forgetting to zero-extend on a 32-bit write in long mode. Every code path that writes to a register through SetReg32 (including the boot-time setup from machine/pc) is automatically correct. The dedicated test <code>TestReg32_ZeroExtends</code> pins this contract.
</div>
`,

{
  id: 7, phase: 2,
  title: "The REX Prefix",
  subtitle: "One byte to rule them all",
  content: `
<h2>The whole syntactic difference</h2>
<p>An instruction that exists in i386 has the same encoding in x86_64 — unless a REX prefix is needed. REX is a single byte in the range <code>0x40</code> through <code>0x4F</code>. The low four bits are four independent flags:</p>
<pre>     7 6 5 4   3   2   1   0
    +--+--+--+--+---+---+---+---+
    | 0  1  0  0|<span class="ct">W</span>|<span class="ct">R</span>|<span class="ct">X</span>|<span class="ct">B</span>|
    +--+--+--+--+---+---+---+---+
                |     |
                |     ↳ extends ModRM.reg (R), SIB.index (X), ModRM.rm/SIB.base (B)
                ↳ promotes default operand size to 64 bits<span class="lang-tag">encoding</span></pre>

<table class="corr-table">
<tr><th>Bit</th><th>Mask</th><th>Effect</th></tr>
<tr><td>REX.W</td><td>0x08</td><td>Operand size = 64 bits (overrides 0x66 prefix)</td></tr>
<tr><td>REX.R</td><td>0x04</td><td>ModR/M.reg gains a 4th bit, indexing R8..R15 as destinations</td></tr>
<tr><td>REX.X</td><td>0x02</td><td>SIB.index gains a 4th bit, allowing R8..R15 as index registers</td></tr>
<tr><td>REX.B</td><td>0x01</td><td>ModR/M.rm or SIB.base gains a 4th bit, allowing R8..R15 as base/rm</td></tr>
</table>

<h2>Worked example: MOV R15, R8</h2>
<p>Encoding: <code>4D 89 C7</code></p>
<ul>
  <li><code>4D</code> = 0100 1101 = REX with W=1, R=1, X=0, B=1.</li>
  <li><code>89</code> = MOV r/m, r (Ev, Gv).</li>
  <li><code>C7</code> = ModR/M: mod=11 (register), reg=000, rm=111. With REX.R=1 the reg becomes 1000 = R8 (the source). With REX.B=1 the rm becomes 1111 = R15 (the destination).</li>
  <li>REX.W=1 makes the operand size 64-bit, so all 64 bits of R15 get the value of R8.</li>
</ul>

<h2>The prefix loop</h2>
<p>Our decoder scans prefixes one byte at a time. REX is just one more case — and it must come <em>last</em> before the opcode (Intel SDM rule that our M1 decoder accepts laxly):</p>
<pre><span class="cm">// cpu/x86_64/exec.go — Step</span>
<span class="kw">for</span> {
    b := c.<span class="fn">fetch8</span>()
    <span class="kw">switch</span> {
    <span class="kw">case</span> b == 0x66: operandOverride = <span class="kw">true</span>
    <span class="kw">case</span> b == 0x67: addressSize = 4
    <span class="kw">case</span> b == 0xF0, b == 0xF2, b == 0xF3: <span class="cm">// LOCK / REPNE / REPE</span>
    <span class="kw">case</span> b &gt;= 0x40 &amp;&amp; b &lt;= 0x4F:
        rex = b
    <span class="kw">default</span>:
        <span class="kw">if</span> rex&amp;rexW != 0 { operandSize = 8 }
        <span class="kw">else if</span> operandOverride { operandSize = 2 }
        <span class="kw">return</span> c.<span class="fn">executeOpcode</span>(b, rex, operandSize, addressSize, segOverride)
    }
}<span class="lang-tag">go</span></pre>

<h2>The encoding price</h2>
<p>Every instruction that touches R8..R15 or uses 64-bit operands grows by one byte. That is the entire encoding overhead of x86_64 over i386 — about a 5% increase in code size for typical compiled programs. AVX later widened this to two- and three-byte VEX/EVEX prefixes that pack more information per byte.</p>

<div class="box box-think">
<strong>Trade-off</strong>
REX is a clever piece of encoding archaeology. AMD spent zero bits in the legacy opcode space — every existing instruction kept its meaning — by stealing 16 opcodes (the old INC/DEC short forms 0x40-0x4F, which were redundant with the longer modr/m forms). In long mode the short forms went away and the 16-byte block became the REX prefix.
</div>
`,

  content: `
<h2>Immediate sizes by operand size</h2>
<p>For most instructions, the immediate operand size matches the operand size:</p>
<table class="corr-table">
<tr><th>Operand size</th><th>Immediate size</th></tr>
<tr><td>8 bits</td><td>8 bits</td></tr>
<tr><td>16 bits</td><td>16 bits</td></tr>
<tr><td>32 bits</td><td>32 bits</td></tr>
<tr><td>64 bits (REX.W=1)</td><td><strong>32 bits, sign-extended to 64</strong></td></tr>

<p>That last row is unusual. For nearly every instruction with REX.W=1, the immediate is still only 32 bits in the encoding — it gets sign-extended to 64 at execution time. The reason: code size. A 64-bit immediate in every <code>ADD RAX, 5</code> would bloat the binary enormously. Sign-extension covers the common case where the immediate is "small."</p>

<h2>The one exception — MOV r64, imm64</h2>
<p>The opcode range <code>B8..BF</code> (with REX.W=1) is the <em>only</em> place you'll find a true 64-bit immediate in the instruction stream. It is used when you actually need a 64-bit constant — typically a pointer literal.</p>
<pre><span class="kw">mov</span> <span class="rg">rax</span>, <span class="nm">0x123456789ABCDEF0</span>     <span class="cm">; 48 B8 F0 DE BC 9A 78 56 34 12</span><span class="lang-tag">x86_64 asm</span></pre>

<h2>Why <code>MOV EAX, imm32</code> zero-extends</h2>
<p>This trips people up. The plain (non-REX.W) form of MOV imm-to-reg writes 32 bits — but in long mode, every 32-bit write zero-extends to 64. So:</p>
<pre><span class="kw">mov</span> <span class="rg">rax</span>, <span class="nm">-1</span>          <span class="cm">; 48 C7 C0 FF FF FF FF</span>
                          <span class="cm">; 7 bytes; sign-extended imm32</span>

<span class="kw">mov</span> <span class="rg">eax</span>, <span class="nm">0xFFFFFFFF</span>  <span class="cm">; B8 FF FF FF FF</span>
                          <span class="cm">; 5 bytes; result is 0x00000000_FFFFFFFF (zero-extended)</span><span class="lang-tag">x86_64 asm</span></pre>

<h2>In the emulator</h2>

<pre><span class="cm">// cpu/x86_64/opcodes.go — opMOVImmToReg</span>

<span class="kw">case</span> 4:

<span class="kw">case</span> 2:

<p>And the test pins the contract:</p>

    c.<span class="fn">SetReg64</span>(<span class="ct">RAX</span>, 0xFFFFFFFF_FFFFFFFF)

{
  id: 9, phase: 2,
  title: "RIP-Relative Addressing",
  subtitle: "The single most useful new addressing mode in x86_64",
  content: `
<h2>The PIC problem in i386</h2>
<p>Position-independent code on i386 is awkward. To read a variable from another part of the same shared library you need to know the variable's address relative to wherever your library was loaded — which you don't know at compile time. The standard workaround is the GOT (Global Offset Table): the linker plants a per-shared-library table whose address gets discovered at runtime via a special prologue, and every load goes through that table.</p>
<p>x86_64 fixes this with a single new addressing mode: <strong>RIP-relative</strong>.</p>

<h2>The encoding</h2>
<p>In long mode, the ModR/M combination <code>mod=00, rm=101</code> means "RIP + signed 32-bit displacement." This is the same encoding that in i386 meant "absolute 32-bit displacement" (raw disp32 with no register). AMD repurposed it because absolute addressing in 64-bit mode is much less useful — you'd need a 64-bit displacement to cover the whole address space.</p>
<pre><span class="kw">lea</span>  <span class="rg">rax</span>, [<span class="rg">rip</span> + msg]    <span class="cm">; 48 8D 05 xx xx xx xx</span><span class="lang-tag">x86_64 asm</span></pre>

<h2>What "RIP" means here</h2>
<p>RIP-relative <em>does not</em> use the value of RIP at the start of the instruction. It uses the value RIP <em>would have</em> after the instruction completes — i.e. RIP after the disp32 has been consumed. This gives intuitive offsets in disassembly: "lea rax, [rip+0]" really does load the address of the next instruction.</p>

<h2>The emulator's decode</h2>
<p>parseModRM64 handles this in a dedicated case:</p>
<pre><span class="cm">// cpu/x86_64/modrm.go</span>
<span class="kw">case</span> mod == 0 &amp;&amp; rm == 5:
    <span class="cm">// RIP-relative + disp32 in long mode.</span>
    disp := int64(int32(c.<span class="fn">fetch32</span>()))
    ea = c.rip + <span class="kw">uint64</span>(disp)
    r.ripRelative = <span class="kw">true</span><span class="lang-tag">go</span></pre>
<p>By the time we compute <code>c.rip + disp</code>, the four bytes of disp32 have been consumed by <code>fetch32</code> and <code>c.rip</code> has advanced past them — so it correctly points at the next instruction, matching the SDM semantics.</p>

<h2>Watch out — REX.B doesn't change this case</h2>
<p>In every other ModR/M encoding where <code>rm=5</code>, you'd expect REX.B to promote it to R13. Not for the RIP-relative case. Mod=00, rm=101 stays RIP-relative regardless of REX.B. To use [R13] as a base register you must use the encoding mod=01, rm=101, disp8=0 (a one-byte-larger encoding). The decoder reflects this by checking mod and rm together before looking at REX.B.</p>

<h2>The two tests we pin this with</h2>
<pre><span class="cm">// TestDecode_LEA_RIPRelative — positive displacement</span>
<span class="cm">// 48 8D 05 10 00 00 00   lea rax, [rip+0x10]</span>
<span class="kw">const</span> base = <span class="kw">uint64</span>(0x100)
<span class="fn">loadCode</span>(t, c, mm, base, []<span class="kw">byte</span>{0x48, 0x8D, 0x05, 0x10, 0, 0, 0})
<span class="fn">stepN</span>(t, c, 1)
want := base + 7 + 0x10   <span class="cm">// 7 = instruction length</span>

<span class="cm">// TestDecode_LEA_RIPRelative_Negative — negative displacement</span>
<span class="cm">// 48 8D 05 F0 FF FF FF   lea rax, [rip-0x10]</span>
disp32 = 0xFFFFFFF0       <span class="cm">// sign-extends to -16</span><span class="lang-tag">go</span></pre>

<div class="box box-key">
<strong>The big win</strong>
RIP-relative addressing eliminates a whole class of relocations in shared libraries. The linker can leave the disp32 in the binary as-is, since "next instruction + 16" is the same no matter where the library lands in memory. The compiler emits about 30% less indirection in PIC code on x86_64 versus i386 because of this one feature.
</div>
`,

    "Why did AMD reuse mod=00, rm=101 for RIP-relative rather than picking a new ModR/M encoding? (Hint: backward-compat economy of encoding space.)"

{
  id: 10, phase: 3,
  title: "The 48-bit Canonical Address",
  subtitle: "Why bits 63..47 of every virtual address must agree",
  content: `
<h2>64-bit addresses, but not really</h2>
<p>x86_64 has 64-bit pointers, but the hardware does not actually wire up 64 bits of virtual address space. Why?</p>
<ul>
  <li>A full 64-bit virtual space is 16 exabytes. No one wants to pay for a four-level walker covering all of it.</li>
  <li>Mapping every address requires page-table entries. At full coverage the page tables alone would exceed the address space.</li>
  <li>OS designers wanted room to grow without recompiling. Reserve some bits now; we can use them later.</li>
</ul>
<p>The compromise: x86_64 uses 48-bit virtual addresses. (The CR4.LA57 extension lifts this to 57 bits with a 5-level paging walker; not yet modeled in the emulator.) The remaining 16 high bits (63..48) must equal bit 47 — what the architecture calls a <strong>canonical address</strong>.</p>

<h2>The canonical rule, in one expression</h2>
<pre><span class="cm">// cpu/x86_64/mmu.go</span>
<span class="kw">func</span> <span class="fn">IsCanonicalAddr</span>(addr <span class="kw">uint64</span>) <span class="kw">bool</span> {
    top := addr &gt;&gt; 47
    <span class="kw">return</span> top == 0 || top == 0x1FFFF
}<span class="lang-tag">go</span></pre>
<p>If you sign-extend bit 47 into bits 63..48, the value is canonical. Otherwise it is not.</p>

<h2>The two halves of virtual address space</h2>
<p>With this rule, virtual addresses naturally divide into two regions:</p>
<table class="corr-table">
<tr><th>Range</th><th>Use</th></tr>
<tr><td>0x00000000_00000000 .. 0x00007FFF_FFFFFFFF</td><td>User space (128 TiB)</td></tr>
<tr><td>0xFFFF8000_00000000 .. 0xFFFFFFFF_FFFFFFFF</td><td>Kernel space (128 TiB)</td></tr>
</table>
<p>Everything in between is non-canonical and triggers a fault on any access. Operating systems exploit this for free guard pages — the entire 16-EB hole between user and kernel space is unreachable without any page-table entries.</p>

<h2>What happens on a non-canonical access</h2>
<p>Real hardware raises <strong>#GP (General Protection)</strong>, not #PF. The reasoning: a non-canonical address never even gets to the page walker — it's filtered out at the input stage.</p>
<p>Our emulator currently reports non-canonical faults through the page-fault path with errorCode=0, because the #PF delivery infrastructure is the only fault path wired up in M1. Phase 4 will route this through proper #GP delivery.</p>
<pre><span class="cm">// cpu/x86_64/mmu.go — Translate</span>
<span class="kw">if</span> !<span class="fn">IsCanonicalAddr</span>(linAddr) {
    <span class="cm">// Non-canonical addresses raise #GP, not #PF, in real hardware</span>
    <span class="cm">// — but #PF is what M1's only caller (the data-path memory</span>
    <span class="cm">// accessors) reports today. Phase 4 (long-mode entry / fault</span>
    <span class="cm">// delivery) re-routes this to #GP.</span>
    <span class="kw">return</span> 0, &amp;<span class="kw">PageFaultError</span>{Addr: linAddr}
}<span class="lang-tag">go</span></pre>

<h2>Why bit 47 specifically</h2>
<p>The PML4 (Page-Map Level 4) has 512 entries — 9 bits of index. Four levels × 9 bits = 36 bits of table indexing. Plus 12 bits of page offset. 36 + 12 = 48. That's exactly the number of bits in a canonical address. Bit 47 is the sign bit of the canonical region; everything above must match.</p>

<div class="box box-warn">
<strong>Common bug</strong>
A common emulator bug is to forget the canonical check and let non-canonical addresses run through the page walker. The walk may "succeed" (because the high bits never get inspected by the masks) and return a phantom physical address. Then guest writes silently corrupt unrelated memory. Our test <code>TestTranslate_NonCanonical</code> pins this.
</div>
`,
  exercises: [
    "Compute whether <code>0xDEAD_BEEF_CAFE_F00D</code> is canonical. Show your work.",
    "Why doesn't the hardware just ignore the high bits silently? (Hint: forward compatibility — if a future CPU widens to 57 bits, code that 'reused' the high bits for tagging would break.)",
    "Some software stores tag bits in the upper portion of pointers anyway (e.g. ARM has TBI — Top-Byte Ignore — which actually lets you do this). What's the equivalent x86_64 feature, and how recently did it land in production CPUs?"
  ]
},

  subtitle: "PML4 → PDPT → PD → PT, one byte at a time",
  content: `
<h2>The shape of a long-mode virtual address</h2>
<pre> 63      48 47      39 38     30 29      21 20      12 11        0
+----------+-----------+----------+-----------+----------+-----------+

+----------+-----------+----------+-----------+----------+-----------+

<h2>The walk</h2>
<p>CR3 holds the physical address of the PML4. We extract each 9-bit slice, multiply by 8 (entry size), add to the table base, read the entry, mask its physical-address bits, and repeat for the next level.</p>

e := <span class="fn">readWalkEntry</span>(pml4Addr, ...)

pdptAddr := (e &amp; pte4KMask) + ((linAddr&gt;&gt;30)&amp;0x1FF)*8
e = <span class="fn">readWalkEntry</span>(pdptAddr, ...)
<span class="kw">if</span> e&amp;ptePS != 0 {
    <span class="cm">// 1 GiB huge page leaf at PDPT level</span>
    <span class="kw">return</span> (e &amp; pte1GMask) | (linAddr &amp; 0x3FFF_FFFF), <span class="kw">nil</span>

<span class="cm">// PD</span>
pdAddr := (e &amp; pte4KMask) + ((linAddr&gt;&gt;21)&amp;0x1FF)*8
e = <span class="fn">readWalkEntry</span>(pdAddr, ...)
<span class="kw">if</span> e&amp;ptePS != 0 {
    <span class="cm">// 2 MiB huge page leaf at PD level</span>
    <span class="kw">return</span> (e &amp; pte2MMask) | (linAddr &amp; 0x1F_FFFF), <span class="kw">nil</span>

<span class="cm">// PT</span>
ptAddr := (e &amp; pte4KMask) + ((linAddr&gt;&gt;12)&amp;0x1FF)*8
e = <span class="fn">readWalkEntry</span>(ptAddr, ...)
<span class="kw">return</span> (e &amp; pte4KMask) | (linAddr &amp; 0xFFF), <span class="kw">nil</span><span class="lang-tag">go</span></pre>

<h2>The entry format</h2>
<p>Every entry — PML4E, PDPTE, PDE, PTE — has the same 64-bit layout:</p>
<table class="corr-table">
<tr><th>Bit</th><th>Name</th><th>Meaning</th></tr>
<tr><td>0</td><td>P</td><td>Present</td></tr>
<tr><td>1</td><td>R/W</td><td>1 = writable</td></tr>
<tr><td>2</td><td>U/S</td><td>1 = userland-accessible</td></tr>
<tr><td>3,4</td><td>PWT, PCD</td><td>caching policy</td></tr>
<tr><td>5</td><td>A</td><td>Accessed (set by CPU on first ref)</td></tr>
<tr><td>6</td><td>D</td><td>Dirty (set by CPU on first write to leaf)</td></tr>

<tr><td>8</td><td>G</td><td>Global (leaf only)</td></tr>
<tr><td>12..51</td><td>—</td><td>Physical address (40 bits)</td></tr>
<tr><td>52..62</td><td>—</td><td>Reserved / protection key</td></tr>
<tr><td>63</td><td>NX</td><td>No-Execute (honoured only when EFER.NXE=1)</td></tr>

<p>The interior-vs-leaf distinction is encoded entirely in the PS bit at the non-leaf levels. A PDPT entry with PS=1 is a 1 GiB leaf; PS=0 means it points at a PD.</p>

<h2>Where the walker lives</h2>
<p>The whole implementation is in <code>cpu/x86_64/mmu.go</code>, around 200 lines including comments. The tests in <code>cpu/x86_64/mmu_test.go</code> cover every fault case: not-present at each level, write-to-readonly, user-to-supervisor, NX, reserved bits, non-canonical, huge pages with leftover bits in the page-frame field, A/D bit setting.</p>

<div class="box box-key">
<strong>The shape that matters</strong>
Every page table you'll ever encounter on x86_64 is a 4 KiB block of 512 little-endian 64-bit entries with that same bit layout. PML4, PDPT, PD, PT — interchangeable structurally. The only thing that varies between levels is what you do with the result.
</div>

  content: `
<h2>Why huge pages exist</h2>
<p>If every page in a system is 4 KiB, the kernel needs about 256 page-table entries for every megabyte mapped. For a 16 GiB process, that's millions of entries and thousands of page-table pages — a TLB-thrashing nightmare. The fix: bigger pages.</p>

<h2>How the PS bit works</h2>
<p>At the PD level, setting bit 7 (PS) turns the entry into a 2 MiB leaf instead of a pointer to a PT. The address field at this level holds a 2 MiB-aligned physical frame instead of a 4 KiB-aligned table pointer.</p>
<p>At the PDPT level, setting bit 7 turns the entry into a 1 GiB leaf. The address field holds a 1 GiB-aligned physical frame. (1 GiB pages are an AMD64v2 feature; not every CPU supports them. Modern ones do.)</p>

<h2>The address masks at each level</h2>
<pre><span class="cm">// cpu/x86_64/mmu.go</span>
<span class="kw">const</span> (
    pte4KMask <span class="kw">uint64</span> = 0x000F_FFFF_FFFF_F000   <span class="cm">// bits 12..51</span>
    pte2MMask <span class="kw">uint64</span> = 0x000F_FFFF_FFE0_0000   <span class="cm">// bits 21..51</span>
    pte1GMask <span class="kw">uint64</span> = 0x000F_FFFF_C000_0000   <span class="cm">// bits 30..51</span>
)<span class="lang-tag">go</span></pre>
<p>A 2 MiB-aligned address has bits 0..20 = 0. A 1 GiB-aligned address has bits 0..29 = 0. The masks reflect this — they zero out the unused bits and combine with the offset-within-page on lookup.</p>

<h2>The reserved-bits trap</h2>
<p>If software sets the PS bit but leaves non-zero values in the bits that should be page-aligned-zero, that's a reserved-bit violation and the CPU raises #PF with the RSVD error-code bit set. Our walker checks this:</p>
<pre><span class="cm">// 1 GiB huge page leaf at PDPT level</span>
<span class="kw">if</span> e&amp;ptePS != 0 {
    <span class="cm">// Verify bits 21..29 (which would otherwise index into PD/PT)</span>
    <span class="cm">// are zero — non-zero bits there are reserved-bit violations.</span>
    <span class="kw">if</span> e&amp;0x3FFF_E000 != 0 {
        <span class="kw">return</span> 0, &amp;<span class="kw">PageFaultError</span>{
            Addr: linAddr,
            ErrorCode: <span class="fn">faultCode</span>(<span class="kw">true</span>, isWrite, isUser, isFetch, <span class="kw">true</span>),
        }
    }
    <span class="kw">return</span> (e &amp; pte1GMask) | (linAddr &amp; 0x3FFF_FFFF), <span class="kw">nil</span>
}<span class="lang-tag">go</span></pre>
<p>The same pattern applies at the 2 MiB level with bits 12..20.</p>

<h2>TLB pressure savings</h2>
<p>A 4 KiB page covers ... 4 KiB. A 2 MiB page covers 2 MiB — 512× more. A 1 GiB page covers ... 1 GiB — 262144× more than the 4 KiB baseline. The TLB only has a few hundred entries; using huge pages lets the same TLB cover hundreds of GiB of working set.</p>
<p>This matters most for two scenarios:</p>
<ul>
  <li><strong>The kernel direct map</strong>: Linux maps all of physical RAM into kernel virtual addresses, almost always using 2 MiB or 1 GiB pages.</li>
  <li><strong>Large database working sets</strong>: PostgreSQL, MySQL, etc., have configuration options to allocate their buffer pool out of huge pages.</li>
</ul>

<h2>The tests pinning huge-page semantics</h2>
<ul>
  <li><code>TestTranslate_2MHugePage</code> — leaf at PD with several offsets verifies offset-in-page works.</li>
  <li><code>TestTranslate_1GHugePage</code> — leaf at PDPT.</li>
  <li><code>TestTranslate_2M_ReservedAddrBits</code> — a non-zero bit in [12..20] of a 2 MiB leaf faults with RSVD.</li>
  <li><code>TestTranslate_1G_ReservedAddrBits</code> — same for [21..29] in a 1 GiB leaf.</li>
  <li><code>TestTranslate_2M_PermissionsAtLeaf</code> — leaf permission bits (RW etc.) apply just like for 4 KiB pages.</li>
</ul>

<div class="box box-note">
<strong>Note</strong>
The page walker we wrote does not implement a TLB cache — every translate walks the tables from scratch. Real hardware caches walks aggressively. Our hot-path optimisation will likely be a TLB at the cpu/x86_64 level mirroring what cpu/x86's tlb.go provides for i386.
</div>
`,
  exercises: [
    "Manually compute the entry layout for: PDPT entry at physical 0x10000, mapping virtual 0x40000000 (1 GiB-aligned) to physical 0x80000000 (1 GiB-aligned), writable, kernel-only. Verify bits 21..29 are zero in your encoding.",
    "Read the Linux kernel boot code for the direct map. It uses 1 GiB pages where possible. Find the function that decides between 4 KiB, 2 MiB, and 1 GiB.",
    "Add a test (don't write it yet — just specify it) for the case where a 2 MiB leaf has PS bit clear but everything else looks like a 2 MiB leaf. What should happen?"
  ]
},

{
  id: 13, phase: 3,
  title: "The Page-Fault Error Code",
  subtitle: "Five bits that tell the OS exactly what went wrong",
  content: `
<h2>The pushed-on-stack value</h2>
<p>When the CPU delivers a #PF (interrupt vector 14), it pushes a 32-bit error code onto the kernel stack. Five bits in that code describe the failure:</p>
<table class="corr-table">
<tr><th>Bit</th><th>Name</th><th>Meaning</th></tr>
<tr><td>0</td><td>P</td><td>0 = page not present; 1 = protection violation</td></tr>
<tr><td>1</td><td>W</td><td>1 = the access was a write</td></tr>
<tr><td>2</td><td>U</td><td>1 = the access was from user mode (CPL=3)</td></tr>
<tr><td>3</td><td>RSVD</td><td>1 = a reserved bit in a page-table entry was set</td></tr>
<tr><td>4</td><td>I/F</td><td>1 = the access was an instruction fetch (with NX violation)</td></tr>
</table>

<h2>How the OS uses this</h2>
<p>The error code is a complete summary of the kernel's response policy:</p>
<ul>
  <li><strong>P=0:</strong> "Page is just missing" — Linux pages in the file-backed mapping, COW, or grows the stack. Common, fast path.</li>
  <li><strong>P=1, W=1, RSVD=0:</strong> "Page is present but the access was a write to read-only" — Linux's COW path: if this is a writable PTE turned read-only for COW, duplicate the page; otherwise SIGSEGV the process.</li>
  <li><strong>P=1, U=1, U/S in PTE was 0:</strong> A user process tried to access kernel memory. SIGSEGV.</li>
  <li><strong>RSVD=1:</strong> Reserved-bit violation. Almost always a kernel bug — userspace can't directly write PTEs.</li>
  <li><strong>I/F=1:</strong> The instruction at RIP can't execute because the page is NX. Often a sign of a stack-smashing attack hitting a guard page that data ended up on, or W^X violation.</li>
</ul>

<h2>The emulator's representation</h2>
<pre><span class="cm">// cpu/x86_64/mmu.go</span>
<span class="kw">type</span> PageFaultError <span class="kw">struct</span> {
    Addr      <span class="kw">uint64</span>   <span class="cm">// goes into CR2</span>
    ErrorCode <span class="kw">uint32</span>   <span class="cm">// pushed on stack in Phase 4</span>
}

<span class="kw">const</span> (
    PFErrP     <span class="kw">uint32</span> = 1 &lt;&lt; 0
    PFErrWrite <span class="kw">uint32</span> = 1 &lt;&lt; 1
    PFErrUser  <span class="kw">uint32</span> = 1 &lt;&lt; 2
    PFErrRsvd  <span class="kw">uint32</span> = 1 &lt;&lt; 3
    PFErrFetch <span class="kw">uint32</span> = 1 &lt;&lt; 4
)<span class="lang-tag">go</span></pre>
<p>For now, faults are returned through Step as a typed error. Phase 4 of the implementation will deliver them through the IDT — at that point the kernel's #PF handler reads the same struct, CR2 gets <code>Addr</code>, and ErrorCode lands on the stack.</p>

<h2>The faultCode builder</h2>
<pre><span class="kw">func</span> <span class="fn">faultCode</span>(present, isWrite, isUser, isFetch, rsvd <span class="kw">bool</span>) <span class="kw">uint32</span> {
    <span class="kw">var</span> ec <span class="kw">uint32</span>
    <span class="kw">if</span> present { ec |= PFErrP }
    <span class="kw">if</span> isWrite { ec |= PFErrWrite }
    <span class="kw">if</span> isUser  { ec |= PFErrUser }
    <span class="kw">if</span> rsvd    { ec |= PFErrRsvd }
    <span class="kw">if</span> isFetch { ec |= PFErrFetch }
    <span class="kw">return</span> ec
}<span class="lang-tag">go</span></pre>
<p>This makes the fault sites in Translate easy to read — at each point of failure we say "is this a present-fault or not-present? was it a write? a user access? an instruction fetch? a reserved-bit violation?" and the bits assemble themselves.</p>

<div class="box box-key">
<strong>Why this matters</strong>
The kernel makes hundreds of millions of decisions per second based on these five bits. The accuracy of an emulator's error-code reporting is critical: a kernel that gets the wrong code will SIGSEGV programs that should keep running, or COW pages it shouldn't, or fail to deliver demand-paged file contents.
</div>
`,
  exercises: [
    "Write the error code you'd expect when a userspace program writes to a kernel-only page in a non-canonical address. (Trick: non-canonical doesn't even reach the page walker; the answer is from a different fault.)",
    "Linux's <code>do_page_fault</code> is the kernel function that consumes this error code. Read its top of file (arch/x86/mm/fault.c) and identify how each of the five bits steers the fault path.",
    "If you wanted to detect rowhammer-style RSVD-bit attacks, what would you watch for? (Hint: a guest setting RSVD bits is suspect; emulators should log it.)"
  ]

{
  id: 14, phase: 4,
  title: "Step and the Prefix Scan",
  subtitle: "How a single byte decides what the rest of the instruction means",
  content: `
<h2>The shape of every Step call</h2>
<p>Step does five things in order:</p>
<ol>
  <li>Save RIP in case we need to back out on a fault.</li>
  <li>Set up a deferred recover for panics raised by the memory subsystem.</li>
  <li>Loop over prefix bytes until we see a non-prefix.</li>
  <li>Dispatch the opcode through <code>executeOpcode</code>.</li>
  <li>Let the deferred recover convert any pageFaultPanic back into a returned error.</li>
</ol>

<h2>The deferred recover pattern</h2>
<pre><span class="cm">// cpu/x86_64/exec.go</span>
<span class="kw">func</span> (c *<span class="kw">CPU</span>) <span class="fn">Step</span>() (err <span class="kw">error</span>) {
    origRIP := c.rip
    <span class="kw">defer</span> <span class="kw">func</span>() {
        <span class="kw">if</span> r := <span class="fn">recover</span>(); r != <span class="kw">nil</span> {
            <span class="kw">switch</span> ex := r.(<span class="kw">type</span>) {
            <span class="kw">case</span> pageFaultPanic:
                c.rip = origRIP    <span class="cm">// rewind so the handler restarts cleanly</span>
                err = ex.Err
            <span class="kw">default</span>:
                <span class="kw">panic</span>(r)
            }
        }
    }()
    ...
}<span class="lang-tag">go</span></pre>
<p>Why panic-and-recover instead of error returns everywhere? The memory accessors are called from dozens of places in the decoder. Threading <code>error</code> through every read and write would clutter the call sites and create dozens of opportunities for a forgotten check. Panic gives us "fault unwinding" cleanly — every accessor either succeeds or longjmps to Step's recover.</p>

<h2>The prefix loop — and the load-bearing REX gate</h2>
<p>The seven valid prefix bytes (excluding REX) are encoded as a switch. REX needs special handling because bytes <code>0x40..0x4F</code> are a prefix <em>only</em> in long mode (CS.L=1). In real, pm16, pm32, and compat32 the same bytes are <code>INC reg</code> (0x40..0x47) and <code>DEC reg</code> (0x48..0x4F) — real instructions, not prefixes:</p>
<pre><span class="kw">for</span> {
    b := c.<span class="fn">fetch8</span>()
    <span class="kw">switch</span> {
    <span class="kw">case</span> b == 0x66: operandOverride = <span class="kw">true</span>
    <span class="kw">case</span> b == 0x67: addressOverride = <span class="kw">true</span>
    <span class="kw">case</span> b == 0xF0: <span class="cm">// LOCK — no-op for single-threaded emulation</span>
    <span class="kw">case</span> b == 0xF2: repPrefix = 2
    <span class="kw">case</span> b == 0xF3: repPrefix = 1
    <span class="kw">case</span> b == 0x2E: segOverride = CS
    <span class="kw">case</span> b == 0x36: segOverride = SS
    <span class="kw">case</span> b == 0x3E: segOverride = DS
    <span class="kw">case</span> b == 0x26: segOverride = ES
    <span class="kw">case</span> b == 0x64: segOverride = FS
    <span class="kw">case</span> b == 0x65: segOverride = GS
    <span class="kw">case</span> b &gt;= 0x40 &amp;&amp; b &lt;= 0x4F &amp;&amp; c.mode == ModeLong64:
        rex = b   <span class="cm">// ← the mode gate that distinguishes prefix from opcode</span>
    <span class="kw">default</span>:
        <span class="cm">// resolve operand / address size against mode + prefixes, then dispatch</span>
        ...
        <span class="kw">return</span> c.<span class="fn">executeOpcode</span>(b, rex, operandSize, addressSize, segOverride, repPrefix, operandOverride)
    }
}<span class="lang-tag">go</span></pre>
<p>Drop the <code>&amp;&amp; c.mode == ModeLong64</code> and every 32-bit BIOS or kernel breaks silently: SeaBIOS's POST loop has dozens of <code>INC EBX</code>'s in its byte-count walkers; treat one as a REX prefix and the loop never advances. The very-early symptom is a printk like "SeaBIOS (version rrrrrrrr..." because EBX never indexed past the version-string's <code>r</code>.</p>

<h2>0x48 in compat32: DEC, not REX</h2>
<p>Compat32 is the trap. We're in long mode (EFER.LMA=1) so the dispatcher would happily accept REX — but CS.L is 0, so 0x48 must still mean <code>DEC EAX</code>. The mode-aware gate above handles this; <code>TestCompat32_0x48IsDecNotREX</code> in <code>cpu/x86_64/compat32_rex_test.go</code> pins it. The test setup deliberately leaves CR0.PG off and pokes EFER directly to skip the LMA-latch guard — it's exercising the decoder, not the page walker.</p>
<p>The bug shape if the gate ever regresses: a kernel's compat32 stub does <code>48 8D 05 disp32</code>. In long mode that decodes as <code>LEA RAX, [RIP + disp32]</code> (REX.W LEA, 7 bytes). In compat32 it's <code>DEC EAX</code> (1 byte) followed by <code>8D 05 disp32</code> = <code>LEA EAX, [disp32]</code> (6 bytes). Identical bytes, completely different meaning; the symptom is the kernel crashing one or two instructions later with state nobody recognises. That family of bugs is why the prefix loop gates REX on mode, and why the gate has a regression test.</p>

<h2>Prefix interactions</h2>
<p>Most prefixes can stack — you can have <code>67 65 48 8B</code> (address-override + GS-override + REX.W + MOV r,r/m). Some can't:</p>
<ul>
  <li>REP/REPE/REPNE are valid only on string instructions; on others they may have alternate meanings (e.g. <code>F3 0F BD</code> = LZCNT vs plain <code>0F BD</code> = BSR). Our dispatcher silently drops the prefix on non-string opcodes — accepted risk until it bites.</li>
  <li>0x66 and REX.W both target operand size; REX.W wins.</li>
  <li>Segment override prefixes ignore CS/DS in 64-bit mode for memory operands (the segments are forced to base=0). FS and GS still work via their MSR-set bases.</li>
</ul>

<h2>Address size handling — across modes</h2>
<table class="corr-table">
  <tr><th>Mode</th><th>Default operand</th><th>Default address</th><th>67 flips to</th></tr>
  <tr><td>Real / pm16</td><td>16</td><td>16</td><td>32</td></tr>
  <tr><td>pm32 / compat32</td><td>32</td><td>32</td><td>16</td></tr>
  <tr><td>long64</td><td>32 (REX.W → 64)</td><td>64</td><td>32 — no 16-bit form exists</td></tr>
</table>
<p>The dispatcher resolves these to <code>operandSize</code> / <code>addressSize</code> bytes (1, 2, 4, 8) once and passes them through — every opcode handler picks up the right width without re-evaluating mode.</p>

<div class="box box-note">
<strong>Tip</strong>
The prefix loop is also a great instrumentation point. Adding a <code>fmt.Fprintf(os.Stderr, ...)</code> at the dispatch site, gated on a RIP range, has caught more bugs in this emulator than any other single technique — half the war stories in this tutorial start with a tactical printk at the top of Step.
</div>
`,
  exercises: [
    "Decode the instruction bytes <code>F0 48 89 01</code>. The first byte is LOCK. The second is REX.W. The third is MOV Ev,Gv. The fourth is ModR/M. What does it do?",

{
  id: 15, phase: 4,
  title: "ModR/M with REX",
  subtitle: "Two bytes, sometimes three, that say where the operands live",
  content: `
<h2>The same ModR/M as i386, plus three bits</h2>
<p>The ModR/M byte is structurally identical to i386: mod (2 bits) + reg (3) + rm (3). The REX prefix adds:</p>
<ul>
  <li><strong>REX.R</strong> extends ModR/M.reg from 3 to 4 bits, allowing R8..R15 as the "other" operand of an instruction.</li>
  <li><strong>REX.X</strong> extends SIB.index from 3 to 4 bits.</li>
  <li><strong>REX.B</strong> extends ModR/M.rm (or SIB.base, depending on encoding) from 3 to 4 bits.</li>
</ul>
<p>If no REX prefix is present, all three bits are implicitly zero. So an instruction that uses RAX..RDI doesn't need a REX byte unless it wants the 64-bit operand size (REX.W).</p>

<h2>The decode function</h2>
<p>Our <code>parseModRM64</code> is around 90 lines in <code>cpu/x86_64/modrm.go</code>. The structure mirrors i386's <code>parseModRM32</code> but with three new branches:</p>
<ol>
  <li>Apply REX.R to the reg field after the byte is split.</li>
  <li>For register operands (mod=3), apply REX.B to the rm field.</li>
  <li>For SIB byte parsing, apply REX.X to index and REX.B to base.</li>
  <li>For the special mod=00, rm=101 case, do <em>not</em> apply REX.B — that encoding is RIP-relative in long mode and REX.B is ignored there.</li>
</ol>

<h2>The SIB byte's special cases</h2>
<p>SIB itself has two ugly corners that pre-date REX:</p>
<table class="corr-table">
<tr><th>Encoding</th><th>Meaning</th></tr>
<tr><td>SIB.index = 100 with REX.X=0</td><td>"No index" — RSP cannot be an index register</td></tr>
<tr><td>SIB.index = 100 with REX.X=1</td><td>R12 <em>is</em> a valid index — REX.X reclaims the encoding</td></tr>
<tr><td>SIB.base = 101 with mod=00</td><td>"No base register" — a disp32 follows instead</td></tr>
<tr><td>SIB.base = 101 with mod≠0</td><td>RBP+disp; default segment SS</td></tr>
</table>
<p>The decoder honours all four:</p>
<pre><span class="cm">// cpu/x86_64/modrm.go — SIB branch</span>
<span class="kw">if</span> !(idx == 4 &amp;&amp; rex&amp;rexX == 0) {
    idxReg := idx
    <span class="kw">if</span> rex&amp;rexX != 0 { idxReg |= 0x8 }
    indexContrib = c.reg64[idxReg] * scale
}

<span class="kw">if</span> base == 5 &amp;&amp; mod == 0 {
    <span class="cm">// SIB with base==5, mod==00: disp32 instead of base register.</span>
    baseContrib = <span class="kw">uint64</span>(int64(int32(c.<span class="fn">fetch32</span>())))
} <span class="kw">else</span> {
    baseReg := base
    <span class="kw">if</span> rex&amp;rexB != 0 { baseReg |= 0x8 }
    baseContrib = c.reg64[baseReg]
    <span class="kw">if</span> base == 4 || base == 5 {
        r.defaultSeg = SS
    }
}<span class="lang-tag">go</span></pre>

<h2>The default segment rule</h2>
<p>Each addressing mode has an implicit segment register — typically DS, but SS when the encoding uses RSP or RBP as a base. In 64-bit mode the segment bases for CS/DS/ES/SS are all zero, so the segment selection only matters for FS/GS overrides. We still track it so future segment-override code paths can route correctly without re-parsing the ModR/M.</p>

<div class="box box-key">
<strong>What this lets us encode</strong>
With ModR/M + SIB + REX, x86_64 instructions can address:
<ul>
  <li>Any of 16 GPRs as source/destination (REX.R/B)</li>
  <li>Memory with any of 16 base + 16 index registers, scale 1/2/4/8 (REX.B + REX.X)</li>
  <li>Memory with a 32-bit immediate displacement (SIB no-base)</li>
  <li>RIP + disp32 (the long-mode-only encoding)</li>
</ul>
About 1.4 million distinct effective addresses are encodable per opcode — and the encoding is variable-length, only as wide as it needs to be.
</div>
`,
  exercises: [
    "Decode <code>4C 03 24 06</code>. (REX.WR, ADD Gv Ev, ModR/M=00 100 100 with SIB=00 000 110.) What is the destination? What's the effective address?",
    "Why does the encoding <code>mod=00, rm=100, SIB.base=101</code> exist? (Hint: you might want disp32+index*scale without any base.)",

  ]

{
  id: 16, phase: 4,
  title: "Memory Access and Fault Recovery",
  subtitle: "The plumbing between the decoder and the page walker",
  content: `
<h2>The shape of an access</h2>
<p>The decoder asks for read/write of 1, 2, 4, or 8 bytes at a virtual address. The memory layer:</p>
<ol>
  <li>Translates the virtual address through the page walker (if paging is on).</li>
  <li>Reads/writes the physical address through the memMap.</li>
  <li>Panics with <code>pageFaultPanic</code> on any failure.</li>
</ol>
<p>The single-byte version is the primitive; wider accesses byte-at-a-time. That's slow (each byte gets its own page-walk) but correct against cross-page reads. Optimisation arrives later.</p>

<pre><span class="cm">// cpu/x86_64/mem.go</span>
<span class="kw">func</span> (c *<span class="kw">CPU</span>) <span class="fn">readMem8</span>(addr <span class="kw">uint64</span>) <span class="kw">uint8</span> {
    phys, perr := c.<span class="fn">translateForData</span>(addr, <span class="kw">false</span>)
    <span class="kw">if</span> perr != <span class="kw">nil</span> {
        <span class="kw">panic</span>(pageFaultPanic{Err: perr})
    }
    v, err := c.memMap.<span class="fn">Read8</span>(phys)
    <span class="kw">if</span> err != <span class="kw">nil</span> {
        <span class="kw">panic</span>(pageFaultPanic{Err: &amp;<span class="kw">PageFaultError</span>{Addr: addr}})
    }
    <span class="kw">return</span> v
}<span class="lang-tag">go</span></pre>

<h2>Why panic and not return error</h2>
<p>Every accessor returns a value (the byte/halfword/word/qword). Adding a second return for error would force the decoder to check 30+ call sites for every instruction. With panic-and-recover:</p>
<ul>
  <li>Accessors stay one-return signatures: <code>readMem8(addr) uint8</code>.</li>
  <li>Step's deferred recover catches any fault and rewinds RIP.</li>
  <li>No risk of "forgot to check error" — the panic propagates automatically.</li>
</ul>
<p>The cost is a small performance hit from the deferred function. The alternative — explicit error returns everywhere — is more expensive in maintenance burden than the runtime cost.</p>

<h2>The translate split</h2>
<p>Two helpers wrap <code>Translate</code> for the two access flavours:</p>
<pre><span class="kw">func</span> (c *<span class="kw">CPU</span>) <span class="fn">translateForData</span>(addr <span class="kw">uint64</span>, isWrite <span class="kw">bool</span>) (<span class="kw">uint64</span>, *<span class="kw">PageFaultError</span>) {
    <span class="kw">if</span> c.cr[0]&amp;CR0_PG == 0 {
        <span class="kw">return</span> addr, <span class="kw">nil</span>          <span class="cm">// paging off ⇒ identity</span>
    }
    <span class="kw">return</span> c.<span class="fn">Translate</span>(addr, isWrite, c.cpl == 3, <span class="kw">false</span>)
}

<span class="kw">func</span> (c *<span class="kw">CPU</span>) <span class="fn">translateForFetch</span>(addr <span class="kw">uint64</span>) (<span class="kw">uint64</span>, *<span class="kw">PageFaultError</span>) {
    <span class="kw">if</span> c.cr[0]&amp;CR0_PG == 0 {
        <span class="kw">return</span> addr, <span class="kw">nil</span>
    }
    <span class="kw">return</span> c.<span class="fn">Translate</span>(addr, <span class="kw">false</span>, c.cpl == 3, <span class="kw">true</span>)
}<span class="lang-tag">go</span></pre>
<p>The fetch path passes <code>isFetch=true</code> so an NX page faults with the I/F bit set. The data path passes the actual W/R direction so the walker enforces RW permissions.</p>

<h2>lip() — the linear instruction pointer</h2>
<p>What is "the linear address of the next instruction"? It depends on the mode:</p>
<pre><span class="kw">func</span> (c *<span class="kw">CPU</span>) <span class="fn">lip</span>() <span class="kw">uint64</span> {
    <span class="kw">if</span> c.mode == ModeLong64 || c.mode == ModeCompat32 {
        <span class="kw">return</span> c.rip   <span class="cm">// CS.base is forced zero in long mode</span>
    }
    <span class="kw">return</span> c.segBase[CS] + c.rip
}<span class="lang-tag">go</span></pre>
<p>This is the one place outside the dispatcher that the mode field is consulted on every instruction. Hot path.</p>

<h2>The fault-restart contract</h2>
<p>When Step catches a pageFaultPanic, it rewinds RIP to its value at the start of the instruction. That means:</p>
<ul>
  <li>The kernel's #PF handler can fix the underlying issue (page in the data, set up COW, grow the stack) and IRETQ back. Execution restarts at the same instruction.</li>
  <li>Half-completed instructions (e.g. the first push of a multi-push sequence) leave a defined state — RSP changes get rolled back implicitly because they only become visible after the instruction commits.</li>
</ul>
<p>The "implicit rollback" works in M1 because most instructions modify register state at the end of their execute path. Multi-step instructions like REP MOVS would need explicit rollback strategies; those arrive when we implement string ops.</p>

<div class="box box-warn">
<strong>Gotcha</strong>
RIP rewind alone isn't always enough. If an instruction has already written one byte of a 4-byte store and faults on a later byte, partial writes are visible. Real hardware spec says page-fault delivery is "as if the instruction had not started" — but the bus has already moved bytes. We confine this to the rare case that actually needs it: a store crossing a page boundary (see the next section).
</div>

<h2>Multi-byte access: one page fast, two pages careful</h2>
<p>A 16/32/64-bit load or store has to do two things that pull in opposite directions. It must translate <em>every</em> byte it touches, because the two halves of a page-straddling access can map to different (or differently-permissioned) physical pages — that was a real bug, fixed 2026-05-15, where translating only the start address sent the cross-page bytes to the wrong physical page. But it must <em>also</em> deliver a single access of the program-visible width to memory-mapped devices.</p>
<p>The resolution is a same-page fast path with a byte-at-a-time fallback:</p>
<pre><span class="kw">func</span> (c *<span class="kw">CPU</span>) <span class="fn">writeMem32</span>(addr <span class="kw">uint64</span>, v <span class="kw">uint32</span>) {
    <span class="kw">if</span> addr&amp;0xFFF &lt;= 0xFFC &amp;&amp; !vaWatchEnabled &amp;&amp; !physWatchEnabled {
        phys, perr := c.<span class="fn">translateForData</span>(addr, <span class="kw">true</span>)   <span class="cm">// all 4 bytes share one page</span>
        <span class="kw">if</span> perr != <span class="kw">nil</span> { <span class="kw">panic</span>(pageFaultPanic{Err: perr}) }
        <span class="kw">if</span> err := c.memMap.<span class="fn">Write32</span>(phys, v); err != <span class="kw">nil</span> { ... }
        <span class="kw">return</span>
    }
    c.<span class="fn">writeMem8</span>(addr, <span class="kw">uint8</span>(v))         <span class="cm">// straddles a page: per-byte translate</span>
    c.<span class="fn">writeMem8</span>(addr+1, <span class="kw">uint8</span>(v&gt;&gt;8))
    c.<span class="fn">writeMem8</span>(addr+2, <span class="kw">uint8</span>(v&gt;&gt;16))
    c.<span class="fn">writeMem8</span>(addr+3, <span class="kw">uint8</span>(v&gt;&gt;24))
}<span class="lang-tag">go</span></pre>
<p>The <code>addr&amp;0xFFF &lt;= 0xFFC</code> test is "do all four bytes lie in one 4&nbsp;KiB page?" When yes — the overwhelmingly common, naturally-aligned case — we translate once and issue one <code>Write32</code>, which <code>physmem</code> forwards to the device as a single 32-bit access. When no, we fall back to the per-byte path so each byte faults on its own page. (The watch-flag checks just keep the byte-granular debug logging working when a watchpoint is armed.)</p>

<div class="box box-note">
<strong>Why the device half matters</strong>
This isn't only an optimization. xAPIC registers are 32-bit, and OVMF software-enables the local APIC with a single 32-bit write of the spurious-interrupt-vector register (SVR = 0x10F: vector 0xF + the enable bit, bit 8). With the old byte-decomposing store, the device received four 1-byte writes; a register file that only recognises its aligned dword offset kept the low byte (0x0F) and silently dropped bit 8. Firmware then asserted <code>(ReadLocalApicReg(0xF0) &amp; 0x100) != 0</code> and halted. A device must see one access of the width the program used — so reads and writes both take this fast path. The regression is pinned by <code>TestMMIO32AtomicAccess</code> in <code>cpu/x86_64</code>.
</div>
`,

    "Why does <code>translateForData</code> short-circuit when CR0.PG=0? Read the Intel SDM: is it valid for long mode to have paging off?",
    "Trace the call stack when a kernel-mode write to a read-only page happens. Start at <code>writeMem8</code>, follow the panic, and end at Step's recover.",

  ]

{
  id: 17, phase: 4,
  title: "ALU and RFLAGS",
  subtitle: "Carry, sign, overflow — the side-effects that matter",
  content: `
<h2>What RFLAGS is</h2>
<p>RFLAGS is a 64-bit register, but only the low 32 bits — identical to i386's EFLAGS — carry meaningful information. The upper 32 are reserved and read back as zero. Every arithmetic and logical instruction updates a subset of these flags.</p>
<p>The flags relevant to M1's ADD/SUB:</p>
<table class="corr-table">
<tr><th>Bit</th><th>Name</th><th>Set when</th></tr>
<tr><td>0</td><td>CF</td><td>Unsigned overflow (carry-out of the high bit)</td></tr>
<tr><td>2</td><td>PF</td><td>Low byte of the result has even parity</td></tr>
<tr><td>4</td><td>AF</td><td>Carry from bit 3 to bit 4 (BCD aid)</td></tr>
<tr><td>6</td><td>ZF</td><td>Result is zero</td></tr>
<tr><td>7</td><td>SF</td><td>Result's high bit (treated as a sign bit) is 1</td></tr>
<tr><td>11</td><td>OF</td><td>Signed overflow</td></tr>
</table>

<h2>Eager vs lazy flags</h2>
<p>The i386 backend uses a <em>lazy</em> flag scheme — it stores the operation type and operands, computing each flag only when the next instruction reads it. That's a 5-10% speedup on hot loops because most flag values are never read.</p>
<p>The M1 long-mode backend uses <em>eager</em> flags — every ADD/SUB writes all six bits directly. Simpler to read, simpler to test, slower in theory. We'll switch to lazy flags after the decoder is feature-complete and we have profile data showing it actually matters.</p>

<h2>The math</h2>
<pre><span class="cm">// cpu/x86_64/opcodes.go — add</span>
<span class="kw">func</span> <span class="fn">add</span>(a, b <span class="kw">uint64</span>, size <span class="kw">uint8</span>) (<span class="kw">uint64</span>, flagBits) {
    m := <span class="fn">mask</span>(size)
    a &amp;= m
    b &amp;= m
    r := (a + b) &amp; m
    <span class="kw">var</span> fl flagBits
    fl.cf = (a + b) &lt; a              <span class="cm">// unsigned overflow on full 64-bit add</span>
    <span class="kw">if</span> size != 8 {
        fl.cf = (a+b)&amp;(m+1) != 0     <span class="cm">// narrower widths: carry out of bit size*8</span>
    }
    fl.af = ((a ^ b ^ r) &amp; 0x10) != 0
    fl.zf = r == 0
    fl.sf = r&amp;<span class="fn">signBit</span>(size) != 0
    fl.of = ((^(a ^ b)) &amp; (a ^ r) &amp; <span class="fn">signBit</span>(size)) != 0
    fl.pf = <span class="fn">parity8</span>(<span class="kw">uint8</span>(r))
    <span class="kw">return</span> r, fl
}<span class="lang-tag">go</span></pre>
<p>The two-line OF formula is worth memorising:</p>
<ul>
  <li>For addition: OF = (~(a^b) &amp; (a^r) &amp; signBit). Translation: the inputs have the same sign, but the result has a different sign — signed overflow.</li>
  <li>For subtraction: OF = ((a^b) &amp; (a^r) &amp; signBit). Translation: the inputs have different signs, and the result's sign differs from a's.</li>
</ul>

<h2>The setArithFlags writeback</h2>
<pre><span class="kw">func</span> (c *<span class="kw">CPU</span>) <span class="fn">setArithFlags</span>(fl flagBits) {
    f := c.rflags
    f &amp;^= RFLAGS_CF | RFLAGS_PF | RFLAGS_AF | RFLAGS_ZF | RFLAGS_SF | RFLAGS_OF
    <span class="kw">if</span> fl.cf { f |= RFLAGS_CF }
    ...
    c.rflags = f | 2   <span class="cm">// preserve bit 1 reserved-always-set</span>
}<span class="lang-tag">go</span></pre>
<p>Bit 1 of RFLAGS is reserved and reads as 1 on real hardware. We preserve it explicitly so any code that pushes flags onto the stack and inspects them sees the correct value.</p>

<h2>The 64-bit tests pin this</h2>
<pre><span class="kw">func</span> <span class="fn">TestDecode_ADD_64_Flags</span>(t *<span class="kw">testing</span>.<span class="kw">T</span>) {
    c.<span class="fn">SetReg64</span>(<span class="ct">RAX</span>, 0xFFFFFFFF_FFFFFFFE)
    c.<span class="fn">SetReg64</span>(<span class="ct">RBX</span>, 2)
    <span class="cm">// 48 01 D8   add rax, rbx</span>
    <span class="fn">stepN</span>(t, c, 1)
    <span class="cm">// RAX = 0; CF set (unsigned overflow); ZF set; SF clear</span>
}<span class="lang-tag">go</span></pre>

<div class="box box-think">
<strong>Why both CF and OF exist</strong>
A CPU doesn't know whether you're using a register as a signed or an unsigned number. So it computes <em>both</em> overflow indicators on every arithmetic op. The branch instructions then pick which one matters: <code>JC</code> tests CF (unsigned), <code>JO</code> tests OF (signed). The same instruction with two flag readings supports two universes of branch conditions.
</div>
`,
  exercises: [
    "Trace the flags for <code>SUB AL, AL</code> starting from AL=0x80. (Expected: result=0, ZF=1, all others 0.) Now <code>SUB AL, AL</code> starting from AL=0xFF — same flags?",
    "Why is parity computed on only the low byte of the result, regardless of operand width? (Hint: legacy from 8088 days when PF mattered for serial-line correctness.)",
    "Add a test for SUB triggering OF (signed overflow): subtract -128 from 0 in 8-bit operands. Verify OF=1, CF=0."
  ]
},
