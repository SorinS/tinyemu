// ============================================================

{
  id: 1, phase: 1,
  title: "The CPU as a State Machine",
  subtitle: "What is actually happening inside that chip on your desk",
  content: `
<h2>The big picture</h2>
<p>You've used CPUs your entire programming life. You know the names — x86, ARM, RISC-V — and you know they "execute instructions." But what does that actually mean physically? At its core, a CPU is astonishingly simple:</p>
<ul>
  <li>It holds a small amount of state — a few dozen <strong>registers</strong>.</li>
  <li>It can read from and write to a much larger array of state — <strong>main memory</strong> (RAM).</li>
  <li>On every clock tick (billions per second), it reads one number called the <strong>program counter</strong>, fetches a few bytes from memory at that address, interprets them as an instruction, and updates its state accordingly.</li>
</ul>
<p>That's it. There's no magic. The CPU is a state machine whose transition function is "look up the next instruction in memory and apply it." Everything that ever runs on your computer — kernels, browsers, video games, databases — is built on top of that loop.</p>

<h2>Three things you need to track in your head</h2>
<p>To reason about a CPU, you need to keep three pieces of state in mind:</p>
<table class="corr-table">
  <tr><th>Name</th><th>What it is</th><th>Typical size</th></tr>
  <tr><td>Registers</td><td>The CPU's scratch memory — fast, named, very few</td><td>~16 general-purpose, each 32 or 64 bits</td></tr>
  <tr><td>Memory</td><td>An enormous flat array of bytes, addressed by number</td><td>Gigabytes</td></tr>
  <tr><td>Program counter (PC)</td><td>One register that says "where in memory the next instruction is"</td><td>32 or 64 bits</td></tr>
</table>
<p>On x86 the program counter is called <strong>EIP</strong> in 32-bit mode (Extended Instruction Pointer) or <strong>RIP</strong> in 64-bit mode. Most other architectures call it PC. It does the same job.</p>

<h2>The fetch-decode-execute loop</h2>
<p>Stripped of every optimisation, what a CPU does is:</p>
<pre><span class="cm">// Forever:</span>
<span class="kw">while</span> (running) {
    <span class="cm">// 1. FETCH: read the next instruction from memory</span>
    instruction_bytes = memory[EIP <span class="op">...</span> EIP+15];

    <span class="cm">// 2. DECODE: figure out what kind of operation this is</span>
    op = decode(instruction_bytes);

    <span class="cm">// 3. EXECUTE: apply that operation to registers/memory</span>
    EIP = EIP + op.length;  <span class="cm">// advance past this instruction</span>
    op.run();               <span class="cm">// may modify registers and/or memory</span>
}<span class="lang-tag">pseudocode</span></pre>
<p>Real CPUs pipeline, speculate, reorder, and parallelise this loop — but the observable behaviour is identical to running it one step at a time. That is the meaning of "instruction execution."</p>

<div class="box box-key">
<strong>Key Insight</strong>
A CPU has no understanding of files, processes, network connections, or windows. It only understands its registers, memory, and the next instruction. Every higher-level concept is built by code running on top of the loop above.
</div>

<h2>Why x86 specifically</h2>
<p>The x86 architecture started in 1978 with the Intel 8086 — a 16-bit chip that could address 1 MB of memory. Every CPU Intel and AMD have shipped since has been a strict superset: the 80386 added 32-bit mode (IA-32) in 1985, and the AMD64 architecture extended it to 64 bits in 2003. All three modes are still in your laptop's processor right now. This staggering backward-compatibility is the single biggest force shaping the x86 instruction set — and the source of most of its quirks.</p>
<p>This course focuses primarily on <strong>32-bit protected mode</strong> (IA-32). It is simpler than 64-bit mode, complete enough to run real operating systems (Linux, Windows up through XP, every BSD), and it is what most low-level introductions use. Everything you learn here transfers directly to 64-bit; the differences are mostly "double the register width and add eight more of them."</p>

<h2>The emulator next to you</h2>
<p>This tutorial draws its examples from a real x86 emulator (the <code>tinyemu-go</code> project, in the same repository as this file) that boots an actual Linux kernel and a busybox shell. Every concept you'll meet has a concrete realisation in a few hundred lines of Go. When something is fuzzy, you can step into the emulator code and watch the CPU do that exact thing.</p>

<div class="box box-note">
<strong>Note</strong>
You don't need to read the emulator code to follow the course. But it is there — in <code>cpu/x86/</code> — and references like "see <code>exec.go:712</code>" are signposts you can take or ignore.
</div>
`,

  content: `
<h2>What a register actually is</h2>
<p>A register is just a tiny piece of memory <em>inside</em> the CPU itself — not in RAM, not in cache, but on the same silicon as the execution unit. Reading or writing one takes effectively zero time (one cycle, vs. dozens for cache, hundreds for RAM). The price is that there are very few of them.</p>
<p>x86 in 32-bit mode has eight <strong>general-purpose registers (GPRs)</strong>, each 32 bits wide. Their names were chosen in the late 1970s for the 16-bit 8086 and never changed:</p>
<table class="corr-table">
  <tr><th>32-bit</th><th>Historical meaning</th><th>Typical modern use</th></tr>
  <tr><td>EAX</td><td>Accumulator</td><td>Function return value; first arg to many instructions</td></tr>
  <tr><td>EBX</td><td>Base</td><td>PIC base pointer; callee-saved</td></tr>
  <tr><td>ECX</td><td>Counter</td><td>Loop counter; <code>REP</code> repeat count; shift count</td></tr>
  <tr><td>EDX</td><td>Data</td><td>I/O port number; second half of <code>MUL</code>/<code>DIV</code></td></tr>
  <tr><td>ESI</td><td>Source Index</td><td>Source pointer for <code>MOVS</code>, <code>CMPS</code></td></tr>
  <tr><td>EDI</td><td>Destination Index</td><td>Destination pointer for <code>MOVS</code>, <code>STOS</code></td></tr>
  <tr><td>ESP</td><td>Stack Pointer</td><td>Always points to the top of the stack — never touch it directly</td></tr>
  <tr><td>EBP</td><td>Base Pointer</td><td>Frame pointer for the current function</td></tr>
</table>

<h2>The nested-name trick</h2>
<p>Because x86 grew incrementally, each general-purpose register has overlapping names for its sub-parts. They all refer to the <em>same</em> physical storage:</p>
<pre>┌──────────────── EAX (32 bits) ──────────────┐
                  ┌──── AX (16 bits) ────┐
                  ┌── AH ──┐┌── AL ──┐
  bit 31    16    15      8 7        0
<span class="lang-tag">register layout</span></pre>
<p>So <code>AL</code> is the low byte of <code>AX</code>, which is the low word of <code>EAX</code>. Writing <code>AL = 0xFF</code> leaves the rest of <code>EAX</code> untouched. Writing <code>AX = 0</code> leaves the upper 16 bits of <code>EAX</code> untouched. <strong>This last fact is the source of a real emulator bug we'll come back to in Lesson 12.</strong></p>
<p>Only the first four registers (EAX/EBX/ECX/EDX) have AH/AL halves. ESI/EDI/ESP/EBP each have a 16-bit "half" (SI/DI/SP/BP) but no 8-bit halves.</p>

<h2>Special-purpose registers</h2>
<p>Beyond the eight GPRs, the 32-bit x86 also has:</p>
<ul>
  <li><strong>EIP</strong> — the instruction pointer. You can read it (sort of, via tricks) but you can't write it directly with a <code>MOV</code>. Jumps and calls are the way to change it.</li>
  <li><strong>EFLAGS</strong> — the status register. 32 individual bits that record the outcome of the last arithmetic operation (carry, zero, sign, overflow, …) plus control bits (direction flag, interrupt enable). See Lesson 9.</li>
  <li><strong>Segment registers</strong> — <code>CS</code>, <code>DS</code>, <code>ES</code>, <code>FS</code>, <code>GS</code>, <code>SS</code>. Each 16 bits. We'll meet them in Lessons 16–17; for now think of them as ancient memory-region selectors that mostly contain zero and stay out of your way.</li>
  <li><strong>Control registers</strong> — <code>CR0</code> through <code>CR4</code>. These control paging, protection, and various CPU features. Lessons 18–21.</li>
  <li><strong>Debug registers</strong>, <strong>MSRs</strong>, the <strong>FPU/SSE register file</strong> — covered as needed, but not core to understanding the basics.</li>
</ul>

<h2>Reading a register dump</h2>
<p>When something goes wrong, Linux prints something like:</p>
<pre>EAX: 00000000  EBX: 0000b780  ECX: fefefeff  EDX: 0000b780
ESI: b7f3c100  EDI: 00000009  EBP: 00000000  ESP: bfd71130
DS: 007b  ES: 007b  FS: 0000  GS: 0000  SS: 007b  EFLAGS: 00010002
EIP: 0xb7f16294<span class="lang-tag">/proc/cpuinfo? no — kernel oops</span></pre>
<p>That is a complete snapshot of the CPU's user-visible state at the moment of a crash. By the end of this course you will be able to read such a dump and reconstruct what the program was about to do.</p>

<div class="box box-think">
<strong>Worth Thinking About</strong>
Compared to a 64-bit register file (16 GPRs of 64 bits each plus floating-point and vector), 32-bit x86 is brutally cramped: 8 registers × 4 bytes = 32 bytes of fast storage. Compilers spend a non-trivial chunk of their effort just deciding which variable lives in which register at any moment. This is "register allocation," and it dwarfs most other optimisation passes in importance.
</div>

<h2>Where this lives in the emulator</h2>
<p>In <code>cpu/x86/cpu.go</code>, the CPU's register file is a <code>[8]uint32</code> array indexed by the same numbers x86 itself uses (EAX=0, ECX=1, EDX=2, EBX=3, ESP=4, EBP=5, ESI=6, EDI=7 — note the slightly strange order). Helpers like <code>GetReg32</code>/<code>SetReg32</code>/<code>GetReg16</code>/<code>SetReg8</code> handle the nested-name overlaps; <code>SetReg16(AX, …)</code> only touches the low 16 bits of <code>EAX</code>.</p>
`,
  exercises: [
    "If <code>EAX = 0xDEADBEEF</code>, what are <code>AX</code>, <code>AH</code>, and <code>AL</code>? Now perform <code>AL = 0x00</code>. What is the new value of <code>EAX</code>?",
    "Suppose you want to use a register as a loop counter. Which one would a hand-written assembly programmer reach for first, and why? (Hint: look at the instruction families that have a specific register in mind.)",
    "Why does ESP get its own name (Stack Pointer) instead of just being 'one of the GPRs'? What would go wrong if a compiler casually used ESP as a scratch register the way it uses EAX?"
  ]
},

{
  id: 3, phase: 1,
  title: "Memory and Addresses",
  subtitle: "How the CPU sees those gigabytes of RAM",
  content: `
<h2>Memory as a flat array</h2>
<p>From the CPU's point of view, RAM is one enormous one-dimensional array of bytes. Each byte has a numeric <strong>address</strong> — its index. On 32-bit x86 the address space is 32 bits wide, which means addresses run from 0 to 2³²−1 = 4 GiB. The CPU doesn't care what's in those bytes; they're just numbers, and the same address might hold an instruction now and a piece of data five seconds later.</p>
<pre>address (hex)     content (hex)
0x00000000        ??
0x00000001        ??
...
0x00007FF0        12
0x00007FF1        34
0x00007FF2        56
0x00007FF3        78<span class="lang-tag">memory model</span></pre>

<h2>Reading more than a byte at a time</h2>
<p>x86 lets the CPU read or write 1, 2, 4, or 8 bytes in a single instruction. The address always identifies the lowest-addressed byte; the rest follow consecutively. So a 4-byte read at address 0x7FF0 returns the bytes <code>12 34 56 78</code> from the example above.</p>
<p>The terminology you will see everywhere:</p>
<table class="corr-table">
  <tr><th>Width</th><th>x86 term</th><th>Bytes</th><th>Range (unsigned)</th></tr>
  <tr><td>8 bits</td><td>byte</td><td>1</td><td>0 … 255</td></tr>
  <tr><td>16 bits</td><td>word</td><td>2</td><td>0 … 65,535</td></tr>
  <tr><td>32 bits</td><td>dword (double word)</td><td>4</td><td>0 … 4 billion</td></tr>
  <tr><td>64 bits</td><td>qword (quad word)</td><td>8</td><td>0 … 18 quintillion</td></tr>
</table>

<h2>Endianness — the byte order trap</h2>
<p>If the CPU writes the 4-byte value <code>0x12345678</code> to address <code>0x7FF0</code>, in which order do the bytes go?</p>
<ul>
  <li><strong>Little-endian:</strong> least significant byte first. <code>0x7FF0 = 0x78, 0x7FF1 = 0x56, 0x7FF2 = 0x34, 0x7FF3 = 0x12</code>.</li>
  <li><strong>Big-endian:</strong> most significant byte first. <code>0x7FF0 = 0x12, 0x7FF1 = 0x34, 0x7FF2 = 0x56, 0x7FF3 = 0x78</code>.</li>
</ul>
<p><strong>x86 is little-endian.</strong> Always. This rarely matters for normal programming, but it bites you the moment you look at a memory dump in a debugger and try to read multi-byte values. The "natural reading order" looks backwards.</p>

<div class="box box-warn">
<strong>Gotcha</strong>
Network protocols are usually big-endian ("network byte order"). When you do <code>htonl(x)</code> on x86, you are swapping bytes. When you read a binary file written on an ARM-big-endian system, you are swapping bytes. Endian confusion is a perennial source of subtle, intermittent bugs.
</div>

<h2>Alignment</h2>
<p>x86 lets you read a 4-byte value from <em>any</em> address — even an odd one like <code>0x7FF1</code>. This is unusual. Many other architectures (older ARM, MIPS, SPARC) require addresses to be a multiple of the access width — a 4-byte access must be at an address divisible by 4. x86 is more forgiving but pays a performance cost: an unaligned access that crosses a cache line takes two memory operations.</p>
<p>So while you <em>can</em> get away with <code>movl 0x7FF1, %eax</code>, compilers go out of their way to align data: 4-byte ints at 4-aligned addresses, 8-byte longs at 8-aligned, stack frames at 16-aligned, etc.</p>

<h2>Virtual vs physical addresses</h2>
<p>So far we've talked as if "the address" is a single, real thing. In modern protected-mode operating systems it isn't. Every process sees its own virtual address space, and the CPU's <strong>memory management unit (MMU)</strong> translates virtual addresses to physical ones using page tables (Lessons 19–21). Two processes can both have a "byte at address <code>0x0040_0000</code>" and they will be completely independent.</p>
<p>For the next several lessons we will ignore this and pretend addresses are physical. Once you understand the instruction set and the basics of memory, segmentation and paging will be a natural extension.</p>

<div class="box box-key">
<strong>Key Insight</strong>
Memory is just an array of bytes. Every higher-level concept — types, objects, strings, files mapped into memory — is a convention layered on top by the compiler, OS, and your code. The CPU itself has no idea what a "string" is.
</div>
`,
  exercises: [
    "In a hex editor, write out the four bytes for the 32-bit integer <code>0xCAFEBABE</code> in little-endian order. Now do the same for big-endian. Which one matches what you'd see in a memory dump on your laptop?",
    "Why might a compiler insert padding into a C struct? Give a concrete <code>struct</code> where this would happen, and explain what the padding achieves on x86.",
    "If RAM is just an array of bytes, how does the CPU know whether the bytes at address <code>0x4000</code> are an instruction or a piece of data? Answer carefully — your answer should reveal something important about Von Neumann architecture."
  ]

{
  id: 4, phase: 1,
  title: "The Instruction Cycle",
  subtitle: "Fetch · decode · execute — the rhythm beneath everything",
  content: `
<h2>Three steps, billions of times a second</h2>
<p>We sketched the fetch-decode-execute loop in Lesson 1. Let's slow down and look at each step on a real x86, because the details matter when you start reading assembly.</p>

<h3>1. Fetch</h3>
<p>The CPU reads bytes from memory at the address held in <code>EIP</code>. How many bytes? It doesn't know yet — x86 instructions are <strong>variable-length</strong>, from 1 byte to 15 bytes. So the fetch unit reads a generous chunk (usually 16 bytes) into an internal buffer and lets the decoder figure out where this instruction ends.</p>
<pre><span class="cm">// At EIP = 0x08048000, memory might hold:</span>
89 c3 83 ec 10 e8 7c ff ff ff ...
^^^^^                            <span class="cm">// 89 c3            = MOV EBX, EAX (2 bytes)</span>
      ^^^^^^^^                   <span class="cm">// 83 ec 10         = SUB ESP, 16 (3 bytes)</span>
               ^^^^^^^^^^^^^^^   <span class="cm">// e8 7c ff ff ff   = CALL near (5 bytes)</span>
<span class="lang-tag">memory bytes</span></pre>
<p>You can see the decoder must look at the first byte to know how many more bytes it needs. We'll dissect this in Lesson 11.</p>

<h3>2. Decode</h3>
<p>The decoder turns raw bytes into an internal representation: "this is an <code>ADD</code>, the destination is EBX, the source is the memory location pointed to by ESI plus 4." On modern Intel CPUs, instructions are further broken down into <strong>micro-ops (μops)</strong> — even simpler operations the actual execution units understand. <code>ADD [ESI+4], EBX</code> is one x86 instruction but typically two μops: a load-add-store split into "load value, add, store result."</p>
<p>This detail doesn't matter for correctness — only for performance — but it explains why some "complex" x86 instructions run as fast as simpler ones: the CPU has internally rewritten them.</p>

<h3>3. Execute</h3>
<p>The execute step is what most people picture: ALU does the arithmetic, memory unit does the load/store, branch unit updates EIP if this was a jump. After execution, the CPU advances EIP to point past the instruction it just ran (unless the instruction explicitly set EIP, like a jump or call), and the cycle repeats.</p>

<h2>Pipelining — three things at once</h2>
<p>If each instruction needs three steps, the naive design takes three clock cycles per instruction. Real CPUs do all three steps in parallel, on three different instructions:</p>
<pre>cycle:   1     2     3     4     5     6
        ────  ────  ────  ────  ────  ────
inst A: FETCH DECODE EXEC
inst B:       FETCH DECODE EXEC
inst C:             FETCH DECODE EXEC
inst D:                   FETCH DECODE EXEC
<span class="lang-tag">classic 3-stage pipeline</span></pre>
<p>Steady-state: one instruction completes per cycle, even though each takes 3 cycles to traverse. Modern x86 cores have 15-20 pipeline stages and can complete <em>multiple</em> instructions per cycle (superscalar). But the abstract behaviour is unchanged — you can always pretend it's the simple loop.</p>

<div class="box box-note">
<strong>When the abstraction leaks</strong>
The CPU pretends the simple loop is what's happening. The cases where the leak shows: branch mispredictions (the pipeline guessed wrong; flush 15 cycles' worth of work), cache misses (memory took longer than 3 cycles to answer), and memory ordering (writes from one core appear out of order to another core). For 99% of programs these are performance issues, not correctness ones.
</div>

<h2>Atomicity at the boundaries</h2>
<p>The CPU guarantees that <em>between</em> instructions, the world is in a well-defined state. Half-completed instructions are not observable. This is why exception handlers, when they return, can restart the faulting instruction cleanly — the CPU rolls back to the pre-fetch state of that instruction.</p>
<p>This guarantee is broken inside one instruction. <code>REP MOVSB</code> copying a million bytes is interruptible mid-copy; an interrupt handler can fire after 500,000 bytes have been moved and ECX (the count) and ESI/EDI (the pointers) reflect that partial state. When the interrupt returns, the instruction resumes from where it left off. This is how x86 keeps interrupt latency bounded even with very long instructions.</p>

<h2>What this means for the emulator</h2>
<p>The <code>tinyemu-go</code> emulator does not pipeline. Its <code>Step()</code> function (<code>cpu/x86/exec.go</code>) runs exactly one instruction to completion, then returns. Between calls it checks for pending interrupts. This is the textbook abstraction — and it is enough to boot Linux to a shell, because Linux only ever observes the inter-instruction state.</p>
`,
  exercises: [
    "Without optimisations, a 3 GHz CPU could in principle run 3 billion instructions per second. Estimate how many instructions are in a 'hello world' C program (compiled, statically linked). What fraction of one second does it actually run for?",
    "Why is x86's variable-length encoding considered a hardware design wart? What would a fixed-length encoding (like ARM's 4-byte instructions) trade off?",
    "An interrupt fires while the CPU is executing a 1000-byte <code>REP MOVSB</code>. After the interrupt handler returns, what state must be intact for the copy to resume correctly?"
  ]
},

{
  id: 5, phase: 1,
  title: "Machine Code, Assembly, and the Disassembler",
  subtitle: "Three views of the same thing",
  content: `
<h2>Three layers of the same code</h2>
<p>One instruction can be written three ways. They all describe the same bytes in memory:</p>
<table class="corr-table">
  <tr><th>Layer</th><th>Example</th><th>Audience</th></tr>
  <tr><td>Machine code</td><td><code>83 C0 05</code></td><td>The CPU</td></tr>
  <tr><td>Assembly</td><td><code>add eax, 5</code></td><td>Humans writing low-level code</td></tr>
  <tr><td>Higher-level (C)</td><td><code>x += 5;</code></td><td>Humans writing most code</td></tr>
</table>
<p>The compiler's job is C → assembly. The assembler's job is assembly → machine code. The CPU only reads the bottom row. A <strong>disassembler</strong> goes the other way: given bytes, recover the assembly.</p>

<h2>Two assembly syntaxes — and why GAS still uses AT&T</h2>
<p>x86 has two competing assembly syntaxes:</p>
<table class="corr-table">
  <tr><th>Intel syntax</th><th>AT&amp;T (GNU) syntax</th></tr>
  <tr><td><code>mov eax, ebx</code></td><td><code>movl %ebx, %eax</code></td></tr>
  <tr><td><code>mov eax, [esi+4]</code></td><td><code>movl 4(%esi), %eax</code></td></tr>
  <tr><td><code>mov eax, 5</code></td><td><code>movl $5, %eax</code></td></tr>
  <tr><td>destination is on the left</td><td>destination is on the right</td></tr>
  <tr><td>memory references in square brackets</td><td>memory references with disp(base, index, scale)</td></tr>
  <tr><td>immediates bare</td><td>immediates prefixed with $</td></tr>
  <tr><td>registers bare</td><td>registers prefixed with %</td></tr>
  <tr><td>size deduced from operands</td><td>size suffix (l for long, w for word, b for byte)</td></tr>
</table>
<p>Intel documentation, this tutorial, and most modern tools (NASM, MASM, Windows debuggers) use Intel syntax. The GNU toolchain on Linux historically uses AT&T but every modern <code>objdump</code> supports <code>-M intel</code>. Pick one; learn to read both.</p>

<h2>Following one instruction down all three layers</h2>
<p>Take the C statement <code>x += 5;</code> where <code>x</code> is a local variable.</p>
<pre><span class="cm">// C source</span>
<span class="kw">void</span> <span class="fn">f</span>(<span class="kw">void</span>) {
    <span class="kw">int</span> x = <span class="nm">10</span>;
    x += <span class="nm">5</span>;
}<span class="lang-tag">C</span></pre>
<p>The compiler chooses to keep <code>x</code> in EAX. It emits:</p>
<pre><span class="kw">mov</span>  <span class="rg">eax</span>, <span class="nm">10</span>      <span class="cm">; x = 10</span>
<span class="kw">add</span>  <span class="rg">eax</span>, <span class="nm">5</span>       <span class="cm">; x += 5</span>
<span class="lang-tag">Intel assembly</span></pre>
<p>The assembler turns that into bytes:</p>
<pre>B8 0A 00 00 00     <span class="cm">; mov eax, 10  — opcode B8 = MOV EAX,imm32; imm = 0x0000000A</span>
83 C0 05           <span class="cm">; add eax, 5   — opcode 83 = ALU r/m32,imm8; /0 = ADD; r/m = EAX; imm8 = 5</span>
<span class="lang-tag">machine code</span></pre>
<p>The CPU executes these bytes. Looking up each opcode in the Intel manual you can verify the encoding yourself; this is what Lesson 11 will teach you to do fluently.</p>

<h2>The disassembler in practice</h2>
<p>On any Linux machine:</p>
<pre><span class="cm"># compile a tiny C program</span>
echo <span class="st">'int main(){int x=10; x+=5; return x;}'</span> > t.c
gcc -m32 -O0 -c t.c -o t.o

<span class="cm"># disassemble it (Intel syntax)</span>
objdump -d -M intel t.o<span class="lang-tag">shell</span></pre>
<p>Output looks like:</p>
<pre>00000000 <main>:
   0:   55                      push   ebp
   1:   89 e5                   mov    ebp,esp
   3:   83 ec 10                sub    esp,0x10
   6:   c7 45 fc 0a 00 00 00    mov    DWORD PTR [ebp-0x4],0xa
   d:   83 45 fc 05             add    DWORD PTR [ebp-0x4],0x5
  11:   8b 45 fc                mov    eax,DWORD PTR [ebp-0x4]
  14:   c9                      leave
  15:   c3                      ret
<span class="lang-tag">objdump</span></pre>
<p>The middle column is the raw bytes; the right column is the assembly the disassembler reconstructed. Notice the compiler put <code>x</code> on the stack (<code>[ebp-0x4]</code>) rather than in a register because we built with <code>-O0</code>. With <code>-O2</code> the compiler would have eliminated the variable entirely and returned <code>15</code> directly.</p>

<div class="box box-key">
<strong>Key Insight</strong>
If you can disassemble code and read it back, you can debug any binary — even without source. This is a foundational skill: reverse engineers, kernel hackers, and security researchers spend their lives reading disassembly. You don't need to write assembly fluently to be at home reading it.
</div>

<h2>Where this appears in our emulator</h2>
<p>The decoder in <code>cpu/x86/exec.go</code> is, in essence, a hand-rolled disassembler: <code>fetch8</code> reads the opcode byte, a giant <code>switch</code> dispatches to the right handler, and the handler may read more bytes (ModR/M, displacement, immediates) using <code>fetch8/16/32</code>. The whole CPU is the same shape as a disassembler — one that <em>also</em> applies the side effects of each instruction instead of just printing them.</p>
`,
  exercises: [
    "Run the <code>objdump</code> example above on your own machine. Identify which bytes correspond to the <code>add</code> instruction. What changes if you rebuild with <code>-O2</code>?",
    "In AT&T syntax, what is the order of operands for <code>movl $5, %eax</code>? Convert it to Intel syntax. Now convert the Intel statement <code>mov [esi+ebx*4+8], eax</code> to AT&T.",
    "The byte sequence <code>90</code> is the NOP instruction (no operation). What would happen if a disassembler started decoding in the middle of a <em>previous</em> instruction and hit a stray byte that <em>happened</em> to be 0x90? Why is this a real concern for variable-length encodings?"
  ]
},

{
  id: 6, phase: 1,
  title: "The Stack",
  subtitle: "How functions remember where they came from",
  content: `
<h2>The stack is just a region of memory</h2>
<p>If you've programmed in any language, you've heard of "the stack" — usually as something distinct from "the heap." On x86, the stack is not a special CPU feature. It is just a region of normal memory that the CPU and compiler <em>agree</em> to use in a particular discipline: last in, first out.</p>
<p>The agreement is enforced by one register: <strong>ESP</strong>, the stack pointer. ESP always points to the <em>top</em> of the stack — the most recently pushed item. Two instructions manipulate it:</p>
<pre><span class="kw">PUSH</span> src    <span class="cm">; ESP = ESP − 4 ; memory[ESP] = src</span>
<span class="kw">POP</span> dst     <span class="cm">; dst = memory[ESP] ; ESP = ESP + 4</span>
<span class="lang-tag">conceptual semantics</span></pre>

<h2>The stack grows downward</h2>
<p>On x86 the stack grows toward <em>lower</em> addresses. This is a historical choice that confuses everyone at first. Visualise it like this:</p>
<pre>address (hex)
0xBFFF_FFFC  ← initial ESP    ┐
0xBFFF_FFF8  ↑ free space      │ stack
...                            │ region
0xBFFF_F000  ← current ESP    ┘
0xBFFF_EFFC  → unused
<span class="lang-tag">memory layout</span></pre>
<p>A <code>PUSH</code> moves ESP <em>down</em> by 4. A <code>POP</code> moves it back up. As more functions are called, ESP marches downward; as they return, ESP marches back up.</p>

<h2>The standard use: function calls and locals</h2>
<p>The stack does three jobs:</p>
<ol>
  <li><strong>Saves the return address</strong> when a function is called. <code>CALL</code> pushes EIP automatically; <code>RET</code> pops it.</li>
  <li><strong>Holds the arguments</strong> in calling conventions that pass arguments on the stack (cdecl on 32-bit, the convention used by Linux i386).</li>
  <li><strong>Holds local variables</strong>. Each function decrements ESP at entry to make room, then accesses its locals via fixed offsets from ESP (or from a saved EBP).</li>
</ol>
<p>A complete function call looks like this:</p>
<pre><span class="cm">; --- caller side ---</span>
<span class="kw">push</span>  <span class="nm">42</span>           <span class="cm">; arg2 = 42</span>
<span class="kw">push</span>  <span class="rg">eax</span>          <span class="cm">; arg1 = whatever eax was</span>
<span class="kw">call</span>  <span class="fn">helper</span>       <span class="cm">; pushes return address; jumps to helper</span>
<span class="kw">add</span>   <span class="rg">esp</span>, <span class="nm">8</span>       <span class="cm">; clean up the 2 args we pushed (cdecl convention)</span>

<span class="cm">; --- callee side ---</span>
<span class="fn">helper</span>:
    <span class="kw">push</span>  <span class="rg">ebp</span>            <span class="cm">; save caller's frame pointer</span>
    <span class="kw">mov</span>   <span class="rg">ebp</span>, <span class="rg">esp</span>       <span class="cm">; establish our own frame pointer</span>
    <span class="kw">sub</span>   <span class="rg">esp</span>, <span class="nm">16</span>        <span class="cm">; make room for 16 bytes of locals</span>
    <span class="cm">; ... function body uses [ebp-4], [ebp-8], ... for locals</span>
    <span class="cm">; ... and [ebp+8], [ebp+12], ... for args</span>
    <span class="kw">leave</span>                 <span class="cm">; mov esp, ebp ; pop ebp  (undoes prologue)</span>
    <span class="kw">ret</span>                   <span class="cm">; pops return address into EIP</span>
<span class="lang-tag">x86 cdecl</span></pre>

<h2>The frame pointer (EBP) — useful but optional</h2>
<p>Each function's "stack frame" is the chunk of stack between its entry-time ESP and its current ESP. By copying ESP into EBP at function entry, the function gets a stable reference point: locals are at fixed offsets from EBP, no matter how ESP moves inside the function body. This is what the prologue above does.</p>
<p>Optimised builds often skip the frame-pointer setup (-fomit-frame-pointer) to free up EBP as a general-purpose register and save a few bytes per call. It's a tradeoff: faster code, but stack-walking debuggers struggle.</p>

<h2>Stack overflow</h2>
<p>The stack region has a finite size — typically 1 MB to 8 MB. If you recurse without bound, or allocate a giant array on the stack, ESP eventually walks into unmapped memory and the CPU faults. That's a <strong>stack overflow</strong>: not a magical error, just a page fault on an address below the stack region.</p>

<div class="box box-warn">
<strong>Gotcha</strong>
The stack pointer is the only place where x86 is opinionated about memory layout. If a program corrupts ESP — e.g. forgets to clean up after a function call, or uses ESP as a scratch register — the next <code>RET</code> reads garbage and jumps to a random address. This is the most common cause of "control hijacking" bugs (think buffer overflows that overwrite the return address).
</div>

<h2>Stack switching across privilege levels</h2>
<p>When the CPU transitions from user mode to kernel mode (e.g. via an interrupt or system call), it switches to a different stack — the kernel's. We'll come back to this in Lessons 27 and 41. For now, just know that <em>each privilege level has its own stack pointer</em>, and the CPU swaps between them automatically.</p>

<h2>Where this lives in the emulator</h2>
<p>In <code>cpu/x86/exec.go</code>, look at the helpers <code>push32</code>, <code>pop32</code>, <code>push16</code>, <code>pop16</code>. They are exactly the conceptual semantics above. The actual instructions <code>PUSH r32</code> (opcodes 0x50–0x57) and <code>POP r32</code> (0x58–0x5F) wrap calls to these helpers.</p>
`,

{
  id: 7, phase: 1,
  title: "Numbers: Signed, Unsigned, and Two's Complement",
  subtitle: "How a row of bits becomes a number",
  content: `
<h2>The same bits, two interpretations</h2>
<p>Consider the byte <code>0xFF</code>. Is that the number 255, or is it the number −1? Both, depending on how you look at it. The CPU does not store "signedness" — it stores bits. <em>Instructions</em> choose an interpretation:</p>
<ul>
  <li><code>ADD</code> and <code>SUB</code> work identically on signed and unsigned numbers — the bits come out the same. The CPU sets <em>both</em> the carry flag (CF, useful for unsigned) and the overflow flag (OF, useful for signed) so the program can react to either.</li>
  <li><code>MUL</code> (unsigned) and <code>IMUL</code> (signed) are different instructions because the upper half of the result differs.</li>
  <li><code>DIV</code> and <code>IDIV</code> same story.</li>
  <li><code>JG</code> (signed: jump if greater) and <code>JA</code> (unsigned: jump if above) use different combinations of the flags.</li>
</ul>

<h2>Unsigned: easy</h2>
<p>An n-bit unsigned integer just reads the bits as a base-2 number. Range: 0 to 2ⁿ−1.</p>
<pre>byte  0x00 =  0
byte  0x7F = 127
byte  0x80 = 128
byte  0xFF = 255
<span class="lang-tag">unsigned 8-bit</span></pre>

<h2>Signed: two's complement</h2>
<p>For signed numbers, x86 (and essentially every other modern CPU) uses <strong>two's complement</strong>. The high bit means "subtract 2ⁿ":</p>
<pre>byte  0x00 =    0   (00000000)
byte  0x01 =    1   (00000001)
byte  0x7F =  127   (01111111)
byte  0x80 = −128   (10000000) ← high bit set: 128 − 256 = −128
byte  0xFF =   −1   (11111111) ← 255 − 256 = −1
<span class="lang-tag">signed 8-bit</span></pre>
<p>The genius of two's complement is that addition and subtraction work bit-for-bit identically to unsigned: <code>0xFF + 0x01 = 0x00</code> means "−1 + 1 = 0" or "255 + 1 = 0 with carry". The hardware doesn't need to know which interpretation you intended; both come out right.</p>

<h2>Sign extension vs zero extension</h2>
<p>What happens when you copy a 1-byte signed number into a 4-byte register? You can't just put the byte in the low 8 bits and zero the upper 24 — that turns −1 (0xFF) into 255 (0x000000FF). You need to <em>replicate the sign bit</em>:</p>
<table class="corr-table">
  <tr><th>Instruction</th><th>Behaviour</th><th>Example: byte 0xFF → dword</th></tr>
  <tr><td>MOVZX</td><td>Zero-extend (fill upper bits with 0)</td><td>0x000000FF (= 255)</td></tr>
  <tr><td>MOVSX</td><td>Sign-extend (fill upper bits with the sign bit)</td><td>0xFFFFFFFF (= −1)</td></tr>
</table>
<p>Use MOVZX for unsigned values, MOVSX for signed. Mixing them up is a common bug.</p>

<div class="box box-warn">
<strong>Gotcha</strong>
The flag-bit interpretation is the deepest source of low-level bugs. <code>cmp eax, ebx</code> followed by <code>jg label</code> reads the flags as signed; <code>ja label</code> reads them as unsigned. Comparing arbitrary <code>uint32_t</code> values with <code>jg</code> will give surprising results — for example, 0xFFFFFFFF (= 4 billion unsigned, but = −1 signed) compares <em>less than</em> 0 with JG.
</div>

<h2>Overflow vs carry</h2>
<p>Two flags exist precisely because two interpretations exist:</p>
<ul>
  <li><strong>CF (Carry Flag):</strong> set when an unsigned operation overflowed — the true result is too big to fit. Adding 0xFF + 0x01 produces 0x00 with CF=1.</li>
  <li><strong>OF (Overflow Flag):</strong> set when a signed operation overflowed — the true result has the wrong sign. Adding 0x7F + 0x01 produces 0x80 with OF=1 (because 127 + 1 should be 128, but the result reads as −128).</li>
</ul>
<p>A "carry" and an "overflow" can both happen, or neither, or just one. They are independent.</p>

<h2>The sign bit and the SF flag</h2>
<p>SF (Sign Flag) just copies bit 31 (for 32-bit operations) or bit 15 (16-bit) of the result. It's the "high bit" — which, under two's-complement interpretation, is the sign bit. The flag is meaningless if you're treating the value as unsigned.</p>

<div class="box box-key">
<strong>Key Insight</strong>
Two's complement is one of the most elegant ideas in computing: by reinterpreting the high bit, you get a representation where addition and subtraction don't need to know the sign. Modern CPUs are simpler because of it.
</div>

<h2>In the emulator</h2>
<p>Open <code>cpu/x86/arith.go</code>. The functions <code>add32</code>, <code>sub32</code>, <code>inc32</code>, etc. compute the result and set CF, ZF, SF, OF, PF, AF independently. Sign-extension is one line: <code>int32(int8(byte))</code>; zero-extension is another: <code>uint32(byte)</code>. The <code>setOF</code> logic mirrors the Intel SDM definition: OF is set when the sign of the result is "impossible" given the signs of the operands.</p>
`,
  exercises: [
    "Hand-calculate the result of the byte addition 0x7F + 0x01. What is the unsigned interpretation? The signed interpretation? Which flag (CF or OF) gets set?",
    "Why does subtracting two unsigned numbers like 5 − 3 set CF=0, but 3 − 5 set CF=1? Write out the bit-level subtraction to see.",
    "An old C bug: <code>if (length - 1 &gt;= 0)</code> where length is <code>size_t</code> (unsigned). Why does this loop forever even when length is 0?"
  ]

{
  id: 8, phase: 1,
  title: "Pointers, Arrays, and What \"Address\" Really Means",
  subtitle: "The same trick under three names",
  content: `
<h2>A pointer is just a number</h2>
<p>In C, a pointer looks like a different kind of thing from an integer. At the machine level, it isn't. A pointer is a 32-bit (or 64-bit) integer that the compiler has agreed to interpret as a memory address. The CPU itself has no special "pointer" type — load instructions just take an address from a register and read memory.</p>
<pre><span class="kw">int</span> *p = (<span class="kw">int</span>*)<span class="nm">0x08049000</span>;
<span class="kw">int</span>  x = *p;<span class="lang-tag">C</span></pre>
<p>Compiles (in essence) to:</p>
<pre><span class="kw">mov</span>  <span class="rg">eax</span>, <span class="nm">0x08049000</span>     <span class="cm">; load the pointer value (an integer)</span>
<span class="kw">mov</span>  <span class="rg">eax</span>, [<span class="rg">eax</span>]            <span class="cm">; "follow" it — read 4 bytes from memory[eax]</span>
<span class="lang-tag">x86</span></pre>
<p>The pointer and the integer it points <em>at</em> are both held in EAX at different times. The CPU happily moves them around interchangeably.</p>

<h2>Arrays are pointers plus arithmetic</h2>
<p>An array <code>int a[10]</code> reserves 40 contiguous bytes; the name <code>a</code> in most contexts decays to a pointer at the first byte. Indexing <code>a[i]</code> is:</p>
<pre><span class="cm">// C:  a[i]</span>
<span class="kw">mov</span>  <span class="rg">eax</span>, [a <span class="op">+</span> <span class="rg">esi</span><span class="op">*</span><span class="nm">4</span>]    <span class="cm">; esi = i ; scale 4 = sizeof(int)</span>
<span class="lang-tag">scaled index</span></pre>
<p>x86's <strong>SIB (scale-index-base)</strong> addressing mode literally encodes "base + index×scale + displacement" in one instruction.</p>

<h2>LEA — addresses without loading</h2>
<p><code>LEA</code> ("load effective address") computes a memory address but does <em>not</em> dereference it. It's the perfect arithmetic instruction:</p>
<pre><span class="kw">lea</span>  <span class="rg">eax</span>, [<span class="rg">ebx</span> <span class="op">+</span> <span class="rg">ecx</span><span class="op">*</span><span class="nm">8</span> <span class="op">+</span> <span class="nm">16</span>]
<span class="cm">; eax = ebx + ecx*8 + 16    — no memory access</span>
<span class="lang-tag">x86</span></pre>
<p>Compilers use LEA as a sneaky three-operand "ADD with shift."</p>

<h2>Wide strings — and a real bug</h2>
<p>Some libraries use <strong>wide strings</strong>: arrays of 2-byte characters, zero-terminated. Code that walks one typically looks like:</p>
<pre>scan_loop:
    <span class="kw">mov</span>  <span class="rg">ax</span>, [<span class="rg">esi</span> <span class="op">+</span> <span class="rg">edx</span><span class="op">*</span><span class="nm">2</span>]   <span class="cm">; load one wide char</span>
    <span class="kw">test</span> <span class="rg">ax</span>, <span class="rg">ax</span>             <span class="cm">; is it the terminator?</span>
    <span class="kw">je</span>   done
    <span class="kw">inc</span>  <span class="rg">edx</span>
    <span class="kw">jmp</span>  scan_loop
<span class="lang-tag">wide string scan</span></pre>
<p>This loop is correct on real hardware. <strong>It is the exact sequence that exposed a real bug in <code>tinyemu-go</code>:</strong> our <code>test ax, ax</code> with the 0x66 prefix accidentally tested the full 32-bit EAX. We'll see it in detail in Lesson 19.</p>

<div class="box box-key">
<strong>Key Insight</strong>
A pointer, an array, and an integer are all the same thing in memory: a 32-bit value. C's types tell the compiler how to interpret operations on those values, but the bits don't know.
</div>

<h2>In the emulator</h2>
<p><code>parseModRM</code> in <code>cpu/x86/modrm.go</code> handles all of x86's addressing modes — including the SIB-encoded form. The output is a single <code>uint32</code> effective address; the rest of the handler dereferences it via <code>readMem*</code>/<code>writeMem*</code>.</p>
`,

<h2>Why we use hexadecimal</h2>
<p>Binary is the CPU's native representation, but humans cannot read long binary numbers. <strong>Hexadecimal (base 16)</strong> is the perfect compromise: each hex digit corresponds to exactly 4 binary bits, so converting between binary and hex is mechanical. Every CPU manual, debugger, and memory dump uses hex.</p>

  subtitle: "Prefix · Opcode · ModR/M · SIB · Disp · Imm",
  content: `
<h2>Variable-length, in layers</h2>
<p>Every x86 instruction is a sequence of bytes between 1 and 15 long. The decoder reads them in a fixed order; each component is optional except the opcode. Schematically:</p>
<pre>[prefix(es)] [REX*] OPCODE [ModR/M] [SIB] [displacement] [immediate]
   0-4 bytes          1-3      0-1     0-1     0/1/2/4         0/1/2/4
<span class="lang-tag">x86 instruction layout (*REX only in 64-bit mode)</span></pre>
<p>Knowing this shape lets you decode any instruction you see in the wild. Let's walk each box.</p>

<h2>Prefixes (0-4 bytes)</h2>
<p>A prefix is a byte that <em>modifies</em> the following instruction without being one itself. There are four groups; instructions can have up to one from each:</p>
<table class="corr-table">
  <tr><th>Byte(s)</th><th>Group</th><th>Effect</th></tr>
  <tr><td>F0</td><td>LOCK</td><td>Make the operation atomic across cores</td></tr>
  <tr><td>F2, F3</td><td>REP / REPNE</td><td>Repeat the next instruction (used with MOVS/CMPS/STOS/SCAS)</td></tr>
  <tr><td>26, 2E, 36, 3E, 64, 65</td><td>Segment override</td><td>Use ES, CS, SS, DS, FS, GS instead of the default</td></tr>
  <tr><td>66</td><td>Operand-size</td><td>Switch 32-bit operands ↔ 16-bit (or 16↔32 in real mode)</td></tr>
  <tr><td>67</td><td>Address-size</td><td>Same switch for the address calculation</td></tr>
</table>

<h2>Opcode (1-3 bytes)</h2>
<p>The opcode says <em>which</em> instruction. Most are one byte; a few are two (prefixed with 0x0F); the SSE/AVX extensions add three-byte forms. Some single-byte opcodes are <strong>register-included</strong> — e.g. <code>0x50</code>-<code>0x57</code> is "PUSH r32" where the low 3 bits select which register (0x50=PUSH EAX, 0x51=PUSH ECX, …).</p>

<h2>ModR/M (1 byte, sometimes)</h2>
<p>When an instruction takes two operands, the ModR/M byte tells you what they are. It packs three fields:</p>
<pre>  bit:  7   6   5   4   3   2   1   0
       ┌───────┬───────────┬───────────┐
       │  mod  │    reg    │    r/m    │
       └───────┴───────────┴───────────┘
        2 bits   3 bits      3 bits
<span class="lang-tag">ModR/M byte</span></pre>
<ul>
  <li><strong>mod (2 bits):</strong> selects addressing mode. 00 = no displacement, 01 = 1-byte disp, 10 = 4-byte disp, 11 = r/m is a register (not memory).</li>
  <li><strong>reg (3 bits):</strong> the "register" operand — usually the first/destination. In opcodes that don't need it (like Group instructions: SHIFT, NOT, NEG), reg is reused as an extension of the opcode (called "/0".."/7").</li>
  <li><strong>r/m (3 bits):</strong> the "register or memory" operand — usually the source. Interpretation depends on mod.</li>
</ul>

<h2>SIB (1 byte, sometimes)</h2>
<p>Present only when r/m=100 with mod ≠ 11. SIB encodes <code>base + index*scale</code>:</p>
<pre>  bit:  7   6   5   4   3   2   1   0
       ┌───────┬───────────┬───────────┐
       │ scale │   index   │   base    │
       └───────┴───────────┴───────────┘
        2 bits   3 bits      3 bits
<span class="lang-tag">SIB byte</span></pre>
<ul>
  <li><strong>scale:</strong> 00=×1, 01=×2, 10=×4, 11=×8.</li>
  <li><strong>index:</strong> register to scale. 100 means "no index."</li>
  <li><strong>base:</strong> base register.</li>
</ul>

<h2>Displacement and immediate</h2>
<p><strong>Displacement</strong> is a signed constant added into the effective address. Its size depends on mod (or special cases like mod=00, r/m=101 which means "disp32 only"). <strong>Immediate</strong> is a constant operand of the instruction (the value being added/subtracted/compared, etc.).</p>

<h2>A worked decode</h2>
<p>Bytes: <code>03 04 8A</code></p>
<ol>
  <li>No prefix bytes (none of the values match).</li>
  <li>Opcode <code>03</code> = ADD r32, r/m32.</li>
  <li>ModR/M <code>04</code> = 0b00000100 → mod=00, reg=000 (EAX), r/m=100 (means SIB).</li>
  <li>SIB <code>8A</code> = 0b10001010 → scale=10 (×4), index=001 (ECX), base=010 (EDX).</li>
  <li>mod=00 + base=010 → no displacement.</li>
  <li>No immediate (ADD r/m doesn't take one).</li>
</ol>
<p>Result: <code>ADD EAX, [EDX + ECX*4]</code>. Exactly the instruction from Lesson 10.</p>

<div class="box box-key">
<strong>Key Insight</strong>
With this template internalised, every x86 instruction reduces to bookkeeping. Reach for the Intel SDM Volume 2 (opcode tables) when you forget what an opcode means; the structure of the instruction never changes.
</div>

<h2>The emulator's decoder, in three sentences</h2>
<p><code>cpu/x86/exec.go:Step()</code> reads prefixes in a small loop, then fetches the opcode byte, then dispatches on a giant <code>switch</code>. Each handler optionally calls <code>parseModRM</code> (which itself fetches ModR/M, SIB, displacement). Immediates are pulled with <code>fetch8/16/32</code> at the end. That's the entire decoder.</p>
`,

    "What does the byte sequence <code>F0 0F B1 0E</code> mean? Decode it piece by piece, including the prefix.",
    "Why does x86 reuse the ModR/M reg field as a 'sub-opcode' for some instructions? What does the alternative cost?"
  ]

<h2>The cast of possibilities</h2>
<p>An x86 memory operand looks (after decoding) like:</p>
<pre>segment:[base + index*scale + displacement]<span class="lang-tag">general form</span></pre>
<p>Each component is independently optional. Concretely, in 32-bit mode, the addressing modes you'll meet:</p>
<table class="corr-table">
  <tr><th>Form</th><th>Example assembly</th><th>Effective address</th></tr>
  <tr><td>Absolute</td><td><code>mov eax, [0x08049000]</code></td><td>0x08049000</td></tr>
  <tr><td>Register indirect</td><td><code>mov eax, [esi]</code></td><td>ESI</td></tr>
  <tr><td>Base + disp</td><td><code>mov eax, [ebp - 4]</code></td><td>EBP − 4</td></tr>
  <tr><td>Base + index</td><td><code>mov eax, [ebx + esi]</code></td><td>EBX + ESI</td></tr>
  <tr><td>Base + index*scale</td><td><code>mov eax, [edx + ecx*4]</code></td><td>EDX + ECX·4</td></tr>
  <tr><td>Full SIB</td><td><code>mov eax, [edx + ecx*4 + 16]</code></td><td>EDX + ECX·4 + 16</td></tr>
  <tr><td>Disp only via SIB</td><td><code>mov eax, [ecx*4 + 0x100]</code></td><td>ECX·4 + 256</td></tr>
</table>

<h2>The "no displacement, mod=00, r/m=101" trap</h2>
<p>If you naively read the ModR/M tables you'd expect mod=00 with r/m=101 (EBP) to mean "[EBP]". It doesn't — that encoding is reused for "disp32 only" (absolute address). To get <code>[EBP]</code> with no displacement, the assembler uses mod=01 with a one-byte displacement of zero (<code>[EBP + 0]</code>). The same trick exists with r/m=100 (which is reused for SIB).</p>

<h2>Default segments</h2>
<p>Every memory access has a default segment register, determined by which base register you use:</p>
<table class="corr-table">
  <tr><th>Base register in addressing</th><th>Default segment</th></tr>
  <tr><td>ESP or EBP</td><td>SS (stack)</td></tr>
  <tr><td>Anything else</td><td>DS (data)</td></tr>
</table>
<p>You can override with a segment prefix (FS for thread-local on Linux, GS for percpu).</p>

<h2>What about jumps and calls?</h2>
<p>Jumps and calls have their own little zoo of operand encodings:</p>
<ul>
  <li><strong>Relative</strong> (<code>jmp short label</code>, <code>jmp near label</code>, <code>call label</code>): the operand is a signed offset added to EIP. This is what compilers emit for most branches.</li>
  <li><strong>Indirect</strong> (<code>jmp eax</code>, <code>call [edx]</code>): the operand is an address loaded from a register or memory. Used for function pointers, vtables, jump tables.</li>
  <li><strong>Far</strong> (<code>jmp far CS:EIP</code>): change both CS and EIP. Almost extinct in 32-bit code; the kernel uses one or two for protected-mode mode changes.</li>
</ul>

<h2>Why so many modes?</h2>
<p>The richness of x86 addressing is its defining feature. It lets one instruction express "load array element <code>arr[i]</code> from struct field at offset 16 of the base pointer":</p>
<pre><span class="kw">mov</span> <span class="rg">eax</span>, [<span class="rg">ebx</span> <span class="op">+</span> <span class="rg">esi</span><span class="op">*</span><span class="nm">4</span> <span class="op">+</span> <span class="nm">16</span>]<span class="lang-tag">all in one</span></pre>
<p>RISC architectures (ARM, RISC-V) deliberately restrict themselves to simpler forms and rely on the compiler to materialise complex addresses in extra instructions. x86 trades hardware complexity for code density.</p>

<div class="box box-note">
<strong>Note</strong>
On 64-bit x86 (not covered in detail here) there's also <strong>RIP-relative</strong> addressing: <code>[rip + disp32]</code>. This is the standard way to reference globals in position-independent code on x86-64. 32-bit code uses ad-hoc tricks (the GOT pointer trick — see Lesson 18).
</div>

<h2>In the emulator</h2>
<p><code>parseModRM32</code> in <code>cpu/x86/modrm.go</code> contains the entire mode table, including the two trap cases (r/m=100 means SIB, r/m=101 with mod=00 means disp32). It returns a <code>modRMResult</code> with an effective-address dword and the default segment register; the caller adds segment base and dereferences.</p>
`,

  content: `
<h2>MOV is half of all instructions</h2>
<p>Studies of compiled x86 code consistently find that <code>MOV</code> accounts for 35-50% of all executed instructions. It is the workhorse: copy from register to register, register to memory, memory to register, or an immediate constant into either.</p>
<p>The encoding is more varied than you'd expect because of opcode density:</p>
<table class="corr-table">
  <tr><th>Opcode</th><th>Form</th></tr>
  <tr><td>88 /r</td><td>MOV r/m8, r8</td></tr>
  <tr><td>89 /r</td><td>MOV r/m16/32, r16/32</td></tr>
  <tr><td>8A /r</td><td>MOV r8, r/m8</td></tr>
  <tr><td>8B /r</td><td>MOV r16/32, r/m16/32</td></tr>
  <tr><td>B0+rb ib</td><td>MOV r8, imm8 (register encoded in opcode)</td></tr>
  <tr><td>B8+rd id</td><td>MOV r32, imm32 (register encoded in opcode)</td></tr>
  <tr><td>C6 /0 ib</td><td>MOV r/m8, imm8</td></tr>
  <tr><td>C7 /0 id</td><td>MOV r/m16/32, imm16/32</td></tr>
  <tr><td>A0 / A1</td><td>MOV AL/EAX, moffs (absolute address, 4-byte address-only encoding)</td></tr>
  <tr><td>A2 / A3</td><td>MOV moffs, AL/EAX</td></tr>
</table>
<p>Why so many? Because some are smaller than others, and an aggressive instruction-set designer in 1978 wanted "load EAX from an absolute address" to take 5 bytes (A1 + 4-byte address) instead of 6 (8B + ModR/M + 4-byte address).</p>

<h2>PUSH and POP</h2>
<p>We saw these in Lesson 6. The full list:</p>
<table class="corr-table">
  <tr><th>Opcode</th><th>Form</th></tr>
  <tr><td>50+rd</td><td>PUSH r32 (1 byte! that's the whole instruction)</td></tr>
  <tr><td>58+rd</td><td>POP r32</td></tr>
  <tr><td>68 id</td><td>PUSH imm32</td></tr>
  <tr><td>6A ib</td><td>PUSH imm8 (sign-extended)</td></tr>
  <tr><td>FF /6</td><td>PUSH r/m32 (rare — memory source)</td></tr>
  <tr><td>8F /0</td><td>POP r/m32</td></tr>
  <tr><td>60 / 61</td><td>PUSHAD / POPAD (push/pop all 8 GPRs at once — used in interrupt entry)</td></tr>
</table>

<h2>LEA — load effective address</h2>
<p><code>LEA r32, m</code> (opcode 8D) computes a memory operand but doesn't dereference it. It's the one instruction in x86 that <em>takes</em> a memory operand without <em>reading</em> it. Compilers love it for two reasons:</p>
<ul>
  <li>Pointer arithmetic: <code>lea eax, [ebx + ecx*4]</code> is "eax = ebx + ecx*4" in one instruction.</li>
  <li>Multi-operand math: x86 GPR-to-GPR ADD is two-operand (<code>add a, b</code> = <code>a += b</code>). LEA can be three-operand effectively: <code>lea eax, [ebx + ecx + 10]</code>.</li>
</ul>

<h2>MOVZX and MOVSX — widening copies</h2>
<p>Two-byte opcodes (0F B6 / 0F BE for byte-source, 0F B7 / 0F BF for word-source) — these are the "load smaller into larger with zero/sign extension" instructions we met in Lesson 7.</p>

<h2>XCHG and the BSWAP curiosity</h2>
<p><code>XCHG</code> swaps two operands. Useful for atomic locks: <code>xchg [lock], eax</code> is implicitly LOCK-prefixed and is a single atomic operation. <code>BSWAP r32</code> reverses byte order — its purpose is little-endian to big-endian conversion for network protocols (<code>htonl</code>).</p>

<div class="box box-think">
<strong>Worth Knowing</strong>
On x86, even "register-to-register" MOV does something the CPU's microarchitecture cares about: the renamer creates a new physical-register mapping, eliminating the move entirely in some cases ("zero-latency move"). The instruction is still in the instruction stream — but it might not even take a cycle.
</div>

<h2>Where this lives in the emulator</h2>
<p>The 0x88/0x89/0x8A/0x8B/0xB0-BF cases in <code>cpu/x86/exec.go</code> are direct, almost embarrassingly simple. The MOVZX/MOVSX cases in the 0x0F block were the location of one of the bugs we fixed: writing the full 32-bit destination even with the 0x66 prefix (which should have made it 16-bit). See Lesson 19.</p>
`,

  id: 14, phase: 2,
  title: "Arithmetic and the FLAGS Register",
  subtitle: "How the CPU records what just happened",
  content: `
<h2>FLAGS: the side channel for every operation</h2>
<p>x86's EFLAGS register has 32 individual bits, each meaning something specific. Six are <strong>status flags</strong> set by arithmetic and logical operations; the rest are control flags (we'll meet IF, DF, IOPL etc. later).</p>
<table class="corr-table">
  <tr><th>Bit</th><th>Name</th><th>Meaning after an arithmetic instruction</th></tr>
  <tr><td>0</td><td>CF (Carry)</td><td>Unsigned overflow / borrow</td></tr>
  <tr><td>2</td><td>PF (Parity)</td><td>Low 8 bits of result have an even number of 1s</td></tr>
  <tr><td>4</td><td>AF (Auxiliary carry)</td><td>Carry between bit 3 and bit 4 (BCD math)</td></tr>
  <tr><td>6</td><td>ZF (Zero)</td><td>Result is zero</td></tr>
  <tr><td>7</td><td>SF (Sign)</td><td>High bit of result is set</td></tr>
  <tr><td>11</td><td>OF (Overflow)</td><td>Signed overflow</td></tr>
</table>
<p>An <code>ADD</code> sets all six. A bitwise <code>AND</code> sets ZF/SF/PF and clears OF/CF (AF is undefined). The exact behaviour for each instruction is documented in the Intel SDM under "Flags Affected."</p>

<h2>The arithmetic core</h2>
<ul>
  <li><strong>ADD</strong>, <strong>SUB</strong>, <strong>ADC</strong> (add with carry), <strong>SBB</strong> (subtract with borrow): two-operand. Set all six status flags.</li>
  <li><strong>INC</strong>, <strong>DEC</strong>: one-operand +1 / −1. <em>Do not</em> set CF (this is by design — useful in loops that need to preserve carry).</li>
  <li><strong>NEG</strong>: two's-complement negate. Sets CF=1 iff operand is nonzero.</li>
  <li><strong>CMP</strong>: same as SUB but discards the result, keeping only the flags. The standard "compare two things, then branch" idiom.</li>
</ul>

<h2>Multiplication and division</h2>
<p>Multiplication and division are different from the rest — they implicitly use EAX/EDX:</p>
<table class="corr-table">
  <tr><th>Instruction</th><th>What it does</th></tr>
  <tr><td>MUL r/m32</td><td>EDX:EAX = EAX × r/m32 (unsigned, 64-bit product split into two registers)</td></tr>
  <tr><td>IMUL r/m32</td><td>signed version of MUL</td></tr>
  <tr><td>IMUL r32, r/m32</td><td>two-operand: r32 *= r/m32 (sign-extended)</td></tr>
  <tr><td>IMUL r32, r/m32, imm</td><td>three-operand: r32 = r/m32 × imm</td></tr>
  <tr><td>DIV r/m32</td><td>EAX = EDX:EAX / r/m32 ;  EDX = remainder (unsigned)</td></tr>
  <tr><td>IDIV r/m32</td><td>signed version</td></tr>
</table>
<p>DIV is the one common x86 instruction that <em>faults</em>. Dividing by zero, or producing a quotient that doesn't fit in 32 bits, raises exception #DE (Divide Error). Compilers don't generate <code>div 0</code> intentionally, but a buggy program can. We'll cover #DE in Lesson 40.</p>

<h2>The compare-and-branch idiom</h2>
<p>x86 doesn't have a single "branch if a > b" instruction. Instead, you do the comparison, then branch on the resulting flag pattern:</p>
<pre><span class="kw">cmp</span>  <span class="rg">eax</span>, <span class="rg">ebx</span>       <span class="cm">; flags now reflect EAX - EBX</span>
<span class="kw">jg</span>   greater_label    <span class="cm">; signed: jump if EAX > EBX</span>
<span class="lang-tag">x86</span></pre>
<p><code>JG</code> jumps when ZF=0 ∧ (SF=OF). Each Jcc tests a specific combination. See next lesson.</p>

<h2>The "test" instruction</h2>
<p><code>TEST</code> is to <code>AND</code> what <code>CMP</code> is to <code>SUB</code>: same computation, only the flags are kept. <code>test eax, eax</code> is the standard way to check "is EAX zero?" — it sets ZF=1 iff EAX=0.</p>

<div class="box box-warn">
<strong>Common bug class</strong>
Many emulator and compiler bugs come from getting the flag semantics slightly wrong. The 16-bit operand-size variant of TEST (Lesson 19) silently testing the full 32 bits broke busybox in our emulator. Two's-complement subtlety in OF for INC/DEC has tripped up more than one toy CPU.
</div>

<h2>In the emulator</h2>
<p>Look at <code>cpu/x86/arith.go</code>. Each of <code>add8/16/32</code>, <code>sub8/16/32</code>, etc. computes the result and sets all the affected flags using helpers (<code>setCF</code>, <code>setOF</code>, …). The OF logic is the trickiest — it's the only flag that depends on the <em>signs</em> of inputs and output, not just the bits.</p>
`,

    "Hand-execute <code>ADD AL, AL</code> with AL=0x80. What is AL afterwards? What are CF, OF, SF, ZF?",
    "Why does INC not set CF? When would that be useful? (Hint: think about a loop that adds 64-bit values 32 bits at a time.)",
    "Implement signed comparison (JG) using only the unsigned comparison (JA), CMP, and bit operations. Why would you bother? (Hint: think about what JG actually checks.)"
  ]

  id: 15, phase: 2,
  title: "Logical and Bitwise Operations",
  subtitle: "AND, OR, XOR, NOT — and their idiomatic uses",
  content: `
<h2>The fundamental four</h2>
<table class="corr-table">
  <tr><th>Instruction</th><th>Operation</th><th>Flag side effect</th></tr>
  <tr><td>AND</td><td>bitwise AND</td><td>CF=0, OF=0; SF, ZF, PF from result</td></tr>
  <tr><td>OR</td><td>bitwise OR</td><td>same</td></tr>
  <tr><td>XOR</td><td>bitwise XOR</td><td>same</td></tr>
  <tr><td>NOT</td><td>bitwise complement (one operand)</td><td>no flags affected (!)</td></tr>
</table>
<p>Note that AND/OR/XOR <em>always</em> clear CF and OF — they're not arithmetic, so those flags would be meaningless. NOT touches no flags at all, which is occasionally exploited.</p>

<h2>Idioms you will see constantly</h2>
<h3>1. Zero a register: <code>XOR EAX, EAX</code></h3>
<p>This is the canonical "set EAX to 0." Two bytes (31 C0) — shorter than <code>MOV EAX, 0</code> (5 bytes: B8 00 00 00 00). It also doesn't read EAX as an input on modern microarchitectures (the renamer recognises it as a "zeroing idiom"). Compilers emit this thousands of times in any non-trivial program.</p>

<h3>2. Test if zero: <code>TEST EAX, EAX</code></h3>
<p>Sets ZF=1 iff EAX=0; sets SF=1 iff EAX's high bit is set. Three bytes — same as TEST against an immediate, but no immediate field needed.</p>

<h3>3. Mask a value: <code>AND EAX, 0xFF</code></h3>
<p>Keep only the low byte; clear the rest. Used everywhere a function needs to look at one byte of a register.</p>

<h3>4. Set/clear/test a single bit</h3>
<pre><span class="kw">or</span>  <span class="rg">eax</span>, <span class="nm">0x100</span>    <span class="cm">; set bit 8</span>
<span class="kw">and</span> <span class="rg">eax</span>, <span class="op">~</span><span class="nm">0x100</span>   <span class="cm">; clear bit 8 (the assembler computes ~0x100 = 0xFFFFFEFF)</span>
<span class="kw">test</span> <span class="rg">eax</span>, <span class="nm">0x100</span>   <span class="cm">; ZF=0 iff bit 8 was set</span>
<span class="lang-tag">x86</span></pre>
<p>x86 has dedicated bit-manipulation instructions too — BT, BTS, BTR, BTC — covered in Lesson 21.</p>

<h3>5. Round down to a power-of-2 boundary</h3>
<pre><span class="kw">and</span> <span class="rg">eax</span>, <span class="op">~</span><span class="nm">0xFFF</span>   <span class="cm">; round EAX down to a 4-KiB page boundary</span>
<span class="lang-tag">x86</span></pre>

<h3>6. Toggle</h3>
<pre><span class="kw">xor</span> <span class="rg">eax</span>, <span class="nm">0x80</span>     <span class="cm">; flip bit 7</span>
<span class="lang-tag">x86</span></pre>
<p>And the famous XOR-swap (don't use it in real code, but recognise it):</p>
<pre><span class="kw">xor</span> <span class="rg">eax</span>, <span class="rg">ebx</span>
<span class="kw">xor</span> <span class="rg">ebx</span>, <span class="rg">eax</span>
<span class="kw">xor</span> <span class="rg">eax</span>, <span class="rg">ebx</span>     <span class="cm">; eax and ebx are now swapped, no temporary</span>
<span class="lang-tag">old trick</span></pre>

<h2>Operands are the same as ADD/SUB</h2>
<p>The same r/m + register + immediate encoding family as ADD — opcodes 0x20-0x35 for register forms, 0x80-0x83 group encodings for immediates.</p>

<h2>What does this look like in real code?</h2>
<p>Look at any C bit-field operation:</p>
<pre><span class="kw">flags</span> |= <span class="ct">FLAG_READABLE</span>;
<span class="kw">flags</span> &amp;= <span class="op">~</span><span class="ct">FLAG_DIRTY</span>;
<span class="kw">if</span> (<span class="kw">flags</span> &amp; <span class="ct">FLAG_PRESENT</span>) { <span class="cm">/* ... */</span> }<span class="lang-tag">C</span></pre>
<p>Each of these is one or two x86 instructions: OR/AND/TEST plus an immediate. Page-table-entry manipulation, capability bitmasks, file-mode bits, register-bank selection — all of it is bitwise ops on integers.</p>

<div class="box box-key">
<strong>Key Insight</strong>

  subtitle: "Multiplying, dividing, packing, and unpacking",
  content: `
<h2>Shifts: multiplication and division by powers of 2</h2>
<table class="corr-table">
  <tr><th>Instruction</th><th>What it does</th><th>Use</th></tr>
  <tr><td>SHL / SAL</td><td>Shift left (zero-fill on right)</td><td>multiply by 2ⁿ</td></tr>
  <tr><td>SHR</td><td>Shift right, zero-fill on left (logical)</td><td>unsigned divide by 2ⁿ</td></tr>
  <tr><td>SAR</td><td>Shift right, sign-bit-fill on left (arithmetic)</td><td>signed divide by 2ⁿ</td></tr>
</table>
<p>SHL and SAL share an opcode — they're the same operation. They're named separately because semantically only the signed version (SAR) needs to differ from its unsigned twin (SHR).</p>

<h2>The count operand</h2>
<p>Shifts take a count: 1 (implicit form), <code>imm8</code>, or CL. The count is masked to the low 5 bits on 32-bit shifts (so a shift of 32 wraps to 0 — the operand is unchanged). This is a CPU quirk you must respect when implementing shifts; getting it wrong is a classic emulator bug.</p>

<h2>Flag effects</h2>
<p>Shifts touch CF (the last bit shifted out) and update SF/ZF/PF based on the result. OF is defined only for 1-bit shifts; for any other count, OF is undefined.</p>

<h2>Rotates: no bits lost</h2>
<table class="corr-table">
  <tr><th>Instruction</th><th>What it does</th></tr>
  <tr><td>ROL</td><td>Rotate left (bits leaving on the left re-enter on the right)</td></tr>
  <tr><td>ROR</td><td>Rotate right</td></tr>
  <tr><td>RCL</td><td>Rotate left through CF (CF participates as a 33rd bit)</td></tr>
  <tr><td>RCR</td><td>Rotate right through CF</td></tr>
</table>
<p>Plain rotates are used for circular bit operations (checksums, ciphers). Rotate-through-CF is used for multi-word arithmetic — extending a shift across more registers.</p>

<h2>SHLD and SHRD — double-precision shifts</h2>
<p>Two-byte opcodes (0F A4/A5, 0F AC/AD): they shift one register but bring bits in from another. Used for 64-bit shifts in 32-bit code:</p>
<pre><span class="kw">shrd</span> <span class="rg">eax</span>, <span class="rg">edx</span>, <span class="nm">4</span>    <span class="cm">; eax = eax >> 4, with the new high 4 bits coming from edx's low 4</span>
<span class="lang-tag">x86</span></pre>

<h2>Practical shift patterns</h2>
<ul>
  <li><code>shl eax, 2</code> = multiply by 4 (faster than IMUL for power-of-2 constants)</li>
  <li><code>shr eax, 12</code> = "which page is this address in?" (drops the 12-bit offset)</li>
  <li><code>sar eax, 31</code> = sign-extend the sign bit across all 32 bits (becomes 0 or 0xFFFFFFFF — branchless absolute value)</li>
</ul>

<div class="box box-warn">
<strong>Trap</strong>
The "count mod 32" rule means <code>shl eax, 32</code> does nothing (count becomes 0, EAX unchanged). Hand-written code that wanted "clear EAX" reaches for the wrong instruction. Compilers know; humans sometimes don't.
</div>

<h2>In the emulator</h2>
<p><code>cpu/x86/shift.go</code> contains the implementations. The "wrap count to low 5 bits" is the first line of each function — getting it wrong gives subtly different results when the count is large.</p>
`,

  content: `
<h2>How a conditional branch works</h2>
<p>x86 has no "branch if A &lt; B" instruction. The sequence is always:</p>
<ol>
  <li>An instruction that sets the flags (typically <code>CMP</code> or <code>TEST</code>, but any arithmetic will do).</li>
  <li>A conditional branch (<code>Jcc</code>) that tests a flag combination.</li>
</ol>
<pre><span class="kw">cmp</span>  <span class="rg">eax</span>, <span class="rg">ebx</span>     <span class="cm">; flags reflect EAX - EBX</span>
<span class="kw">jge</span>  done           <span class="cm">; jump if eax >= ebx (signed)</span>
<span class="lang-tag">x86</span></pre>

<h2>The full Jcc family</h2>
<table class="corr-table">
  <tr><th>Mnemonic</th><th>Tests</th><th>Use after CMP a, b</th></tr>
  <tr><td>JE / JZ</td><td>ZF=1</td><td>a == b</td></tr>
  <tr><td>JNE / JNZ</td><td>ZF=0</td><td>a != b</td></tr>
  <tr><td>JS</td><td>SF=1</td><td>(a-b) is negative</td></tr>
  <tr><td>JNS</td><td>SF=0</td><td>(a-b) is non-negative</td></tr>
  <tr><td>JC / JB / JNAE</td><td>CF=1</td><td>unsigned: a &lt; b</td></tr>
  <tr><td>JNC / JNB / JAE</td><td>CF=0</td><td>unsigned: a &gt;= b</td></tr>
  <tr><td>JBE / JNA</td><td>CF=1 ∨ ZF=1</td><td>unsigned: a &lt;= b</td></tr>
  <tr><td>JA / JNBE</td><td>CF=0 ∧ ZF=0</td><td>unsigned: a &gt; b</td></tr>
  <tr><td>JL / JNGE</td><td>SF ≠ OF</td><td>signed: a &lt; b</td></tr>
  <tr><td>JGE / JNL</td><td>SF = OF</td><td>signed: a &gt;= b</td></tr>
  <tr><td>JLE / JNG</td><td>ZF=1 ∨ SF ≠ OF</td><td>signed: a &lt;= b</td></tr>
  <tr><td>JG / JNLE</td><td>ZF=0 ∧ SF = OF</td><td>signed: a &gt; b</td></tr>
</table>
<p>The mnemonic system: <strong>A/AE/B/BE</strong> = Above/Below — <em>unsigned</em>; <strong>G/GE/L/LE</strong> = Greater/Less — <em>signed</em>; <strong>E/NE, Z/NZ, S/NS, C/NC, O/NO</strong> = direct flag tests.</p>

<h2>SETcc and CMOVcc — condition as a value or move</h2>
<p>For each Jcc there's a matching <code>SETcc</code> (sets a byte 0 or 1) and <code>CMOVcc</code> (move only if condition holds). Both enable branchless code:</p>
<pre><span class="kw">cmp</span>   <span class="rg">eax</span>, <span class="rg">ebx</span>
<span class="kw">cmovl</span> <span class="rg">eax</span>, <span class="rg">ebx</span>     <span class="cm">; eax = max(eax, ebx)   — in 3 instructions, no branch</span>
<span class="lang-tag">x86</span></pre>

<h2>The LOOP instruction</h2>
<p>x86 has a dedicated <code>LOOP</code> instruction: decrement ECX and branch if ECX ≠ 0. It's 2 bytes (very compact), but slow on modern CPUs — every recent compiler uses <code>DEC ECX; JNZ</code> instead, same size, much faster.</p>

<h2>Why branch prediction matters</h2>
<p>Conditional branches make up 15-20% of executed instructions. Branch predictors are one of the most important features of modern CPUs — a misprediction costs ~15 cycles of pipeline flush. Tight inner loops with data-dependent branches are where performance falls off a cliff; predictable branches are nearly free.</p>

<div class="box box-key">
<strong>Key Insight</strong>
The split between "set flags" and "branch on flag pattern" decouples them: any flag-setting instruction can be a branch's condition. That's why <code>add eax, 1; jz overflow</code> works just as well as a dedicated "increment-and-test."
</div>

<h2>In the emulator</h2>
<p>The Jcc near opcodes (0x70-0x7F for rel8, 0x0F 0x80-0x8F for rel32) and SETcc (0x0F 0x90-0x9F) share a single condition-test helper. CMOVcc (0x0F 0x40-0x4F) is in <code>cpu/x86/modrm.go:handleCMOVcc</code>. All read the same six flags.</p>
`,

{
  id: 18, phase: 2,
  title: "Calling Conventions and the Function Prologue",
  subtitle: "The contract between caller and callee",
  content: `
<h2>What a calling convention specifies</h2>
<p>When function A calls function B, both sides have to agree on:</p>
<ol>
  <li>How arguments are passed (which register, or which stack slot).</li>
  <li>Where the return value goes.</li>
  <li>Which registers B can clobber freely vs which it must restore.</li>
  <li>Who cleans up the stack — caller or callee.</li>
  <li>Stack alignment at the call site.</li>
</ol>
<p>On 32-bit Linux it's <strong>cdecl</strong>. On 64-bit Linux/macOS it's <strong>System V AMD64</strong>. On 64-bit Windows it's <strong>Microsoft x64</strong>. They differ in ways that matter when calling across language boundaries.</p>

<h2>cdecl (32-bit Linux)</h2>
<table class="corr-table">
  <tr><th>Item</th><th>Rule</th></tr>
  <tr><td>Arguments</td><td>Pushed on the stack, rightmost first</td></tr>
  <tr><td>Return value</td><td>EAX (for 64-bit returns: EDX:EAX)</td></tr>
  <tr><td>Caller-saved (volatile)</td><td>EAX, ECX, EDX, EFLAGS</td></tr>
  <tr><td>Callee-saved (preserved)</td><td>EBX, ESI, EDI, EBP, ESP</td></tr>
  <tr><td>Stack cleanup</td><td>Caller (ADD ESP, n after the call)</td></tr>
  <tr><td>Stack alignment at call</td><td>16-byte (modern)</td></tr>
</table>

<h2>Standard prologue and epilogue</h2>
<pre><span class="fn">my_function</span>:
    <span class="kw">push</span>  <span class="rg">ebp</span>             <span class="cm">; save caller's frame pointer</span>
    <span class="kw">mov</span>   <span class="rg">ebp</span>, <span class="rg">esp</span>        <span class="cm">; establish own frame</span>
    <span class="kw">sub</span>   <span class="rg">esp</span>, <span class="nm">N</span>          <span class="cm">; reserve N bytes for locals</span>
    <span class="kw">push</span>  <span class="rg">ebx</span>             <span class="cm">; save callee-saved registers if used</span>
    <span class="kw">push</span>  <span class="rg">esi</span>
    <span class="kw">push</span>  <span class="rg">edi</span>
    <span class="cm">; ... body ...</span>
    <span class="kw">pop</span>   <span class="rg">edi</span>             <span class="cm">; epilogue: reverse order</span>
    <span class="kw">pop</span>   <span class="rg">esi</span>
    <span class="kw">pop</span>   <span class="rg">ebx</span>
    <span class="kw">leave</span>                  <span class="cm">; mov esp, ebp ; pop ebp</span>
    <span class="kw">ret</span>
<span class="lang-tag">x86 cdecl</span></pre>

<h2>The stack frame</h2>
<pre>+----------------------+  higher addresses
| arg2        [ebp+12] |
| arg1        [ebp+ 8] |
| return addr [ebp+ 4] |  <- pushed by CALL
| saved EBP   [ebp+ 0] |  <- saved at entry; EBP points here
| local 1     [ebp- 4] |
| local 2     [ebp- 8] |
| saved EBX            |
| saved ESI            |  <- ESP points here during body
+----------------------+  lower addresses
<span class="lang-tag">stack frame</span></pre>

<h2>System calls — a different convention</h2>
<p>System calls have their own convention. On Linux i386, <code>INT 0x80</code> is the gate, and:</p>
<ul>
  <li>EAX = system call number</li>
  <li>EBX, ECX, EDX, ESI, EDI, EBP = up to six arguments</li>
  <li>EAX on return = result, or -errno on error</li>
</ul>
<p>Note arguments go in <em>registers</em>, not on the stack — different from cdecl. Userspace wraps this in <code>syscall(3)</code> or per-syscall libc stubs.</p>

<h2>Position-independent code: the GOT trick</h2>
<p>When code is built as PIC (for shared libraries or PIE), it can't use absolute addresses for globals. The convention is to keep a "Global Offset Table (GOT)" pointer in EBX. Each PIC function bootstraps it with a tiny call-pop trick:</p>
<pre><span class="kw">call</span> <span class="ct">__x86.get_pc_thunk.bx</span>     <span class="cm">; the thunk just MOVs [esp] into ebx and RETs</span>
<span class="kw">add</span>  <span class="rg">ebx</span>, _GLOBAL_OFFSET_TABLE_   <span class="cm">; assembler computes the right offset</span>
<span class="lang-tag">PIC i386 prologue</span></pre>
<p>You'll see this exact sequence at the start of every glibc/musl function — and in the busybox function whose bug we hit in Lesson 19.</p>

<div class="box box-note">
<strong>Note</strong>
On 64-bit x86, RIP-relative addressing eliminates the GOT-pointer trick. 32-bit doesn't have RIP-relative addressing, so the GOT dance persists.
</div>
`,
  exercises: [
    "Disassemble a small C function on your machine. Identify the prologue, the epilogue, and the offsets of each local variable from EBP.",
    "Why does cdecl have the caller clean up the stack? What's the alternative (Windows stdcall) and what does it let you do?",
    "If a PIC function does <code>call __x86.get_pc_thunk.bx</code>, what does the called thunk do in one instruction? Why does it set EBX to the right value?"
  ]
