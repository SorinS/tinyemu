{
  id: 36, phase: 4,
  title: "The IDT — Gate Descriptors",
  subtitle: "The kernel's vector table",
  content: `
<h2>The IDT in one paragraph</h2>
<p>The IDT (Interrupt Descriptor Table) is an array of 256 eight-byte <strong>gate descriptors</strong>. Each entry describes one vector's handler: CS, EIP, gate type, DPL, P. The CPU's IDTR register holds the IDT's base address and length; <code>LIDT</code> loads it. On every interrupt, the CPU reads IDT[vector] to find the handler.</p>

<h2>The gate descriptor format</h2>
<pre>byte 7   byte 6   byte 5    byte 4   byte 3   byte 2   byte 1   byte 0
┌────────┬────────┬─────────┬────────┬────────┬────────┬────────┬────────┐
│ offset │ offset │P│DPL│0│ │  type  │     0           │   CS   │ offset │
│31..24  │23..16  │ │   │ │ │        │  (reserved)     │selector│ 15.. 0 │
└────────┴────────┴─────────┴────────┴────────┴────────┴────────┴────────┘
<span class="lang-tag">IDT gate (32-bit)</span></pre>
<p>The handler's address is split into two halves (high 16 bits and low 16 bits), separated by the type/CS fields.</p>

<h2>Three gate types you'll see</h2>
<table class="corr-table">
  <tr><th>Type</th><th>Mnemonic</th><th>Effect</th></tr>
  <tr><td>0xE</td><td>Interrupt gate</td><td>Like trap gate, but also clears EFLAGS.IF (so the handler runs with IRQs disabled)</td></tr>
  <tr><td>0xF</td><td>Trap gate</td><td>Run handler at the gate's DPL, leave EFLAGS.IF unchanged</td></tr>
  <tr><td>0x5</td><td>Task gate</td><td>Switch to a hardware-defined task (legacy; Linux uses this only for #DF, if at all)</td></tr>
</table>
<p>Linux uses interrupt gates for hardware IRQs (so they don't nest by default) and trap gates for exceptions like #PF (so the handler can be interrupted by higher-priority work).</p>

<h2>DPL — who is allowed to invoke this vector?</h2>
<p>The gate's DPL controls software invocation. For <code>INT 0x80</code> (Linux's system call), the gate has DPL=3 — userspace can invoke it. For <code>INT 0x0E</code> (page fault — though no one uses INT for that), the gate has DPL=0, so user code can't manufacture a fake page fault.</p>
<p>Hardware interrupts bypass the DPL check (they're truly asynchronous). Exceptions ignore it too.</p>

<h2>Stack-switch on privilege change</h2>
<p>If the interrupt is delivered while CPL=3 and the handler runs at CPL=0 (which is what happens for every Linux kernel entry point):</p>
<ol>
  <li>CPU reads SS0 and ESP0 from the TSS.</li>
  <li>Loads them as the new SS:ESP.</li>
  <li>Pushes onto the new (kernel) stack: old SS, old ESP, EFLAGS, CS, EIP, (error code if applicable).</li>
</ol>
<p>If the handler runs at the same privilege as the interrupted code (e.g., kernel-mode interrupt), no stack switch — the frame is pushed onto the existing stack.</p>

<h2>Error codes — pushed only for some vectors</h2>
<p>Vectors 8, 10, 11, 12, 13, 14, 17 push an error code; everything else does not. The handler must know whether to pop an error code before IRET. The kernel handles this with a dispatch macro that pushes a dummy zero for vectors that don't get one, so all handlers see the same stack shape.</p>

<h2>What the IDT looks like in practice</h2>
<p>Linux i386 builds an IDT with 256 entries. Most of the early ones (0-31) are exception handlers; 32-47 are remapped PIC IRQs (timer, keyboard, etc.); 0x80 is the system call gate; the rest are filled with a "spurious interrupt" stub. The IDT itself lives at <code>0xFF800000</code> in modern Linux (in the "cpu_entry_area").</p>

<div class="box box-note">
<strong>In the emulator</strong>
<code>cpu/x86/exec.go:handleInterruptCore</code> reads the gate descriptor from IDT[vector*8], parses out CS/offset/DPL/type, validates the gate, performs the stack switch if needed, pushes the frame, loads the new CS:EIP. The reads use <code>readMemSV*</code> — supervisor reads, so they don't fault even from user mode (the CPU acts as a privileged agent during gate dispatch). Forgetting this was the cause of the "triple-fault on first user-mode page fault" bug.
</div>
`,

    "What is the byte offset of vector 0x0E (page fault) in the IDT?",
    "Why does <code>INT 0x80</code> have DPL=3 while <code>INT 0x0E</code> (if you tried it) would fail from user mode?",
    "If you wanted to make the kernel re-entrant for a specific exception, would you use an interrupt gate or a trap gate? Why?"
  ]
},

{
  id: 37, phase: 4,
  title: "The 8259 Programmable Interrupt Controller",
  subtitle: "Where hardware IRQs come from",
  content: `
<h2>The historical chip</h2>
<p>The original IBM PC used the Intel 8259A — a small 8-input interrupt controller. The 8086 had one INTR line; the 8259 multiplexed 8 device sources onto it, told the CPU which one fired (by sending the vector number), and let the CPU mask any subset. The AT introduced a <em>second</em> 8259 chained to the first, giving 15 usable IRQ lines (one cascade slot).</p>
<p>Every modern PC <em>still</em> has this controller, either as real hardware or emulated by the chipset. Modern OSes prefer the APIC (LAPIC + IOAPIC), but the 8259 is the universal fallback — and what Linux uses on our emulator.</p>

<h2>The IRQ → vector mapping</h2>
<table class="corr-table">
  <tr><th>IRQ</th><th>Vector (Linux remap)</th><th>Typical device</th></tr>
  <tr><td>0</td><td>32</td><td>System timer (PIT)</td></tr>
  <tr><td>1</td><td>33</td><td>Keyboard (i8042)</td></tr>
  <tr><td>2</td><td>(cascade)</td><td>Cascade to second PIC</td></tr>
  <tr><td>3</td><td>35</td><td>Serial port 2 / COM2</td></tr>
  <tr><td>4</td><td>36</td><td>Serial port 1 / COM1 — the UART we use</td></tr>
  <tr><td>5</td><td>37</td><td>Sound card / LPT2</td></tr>
  <tr><td>6</td><td>38</td><td>Floppy</td></tr>
  <tr><td>7</td><td>39</td><td>LPT1 / spurious</td></tr>
  <tr><td>8-15</td><td>40-47</td><td>Second PIC: RTC, mouse, math coprocessor, disks</td></tr>
</table>
<p>The kernel programs the 8259 at boot to remap IRQ 0-7 to vectors 32-39 (avoiding the first 32 vectors which Intel reserves for exceptions).</p>

<h2>Programming model</h2>
<p>Each 8259 has two I/O ports: a "command" port and a "data" port. Master at 0x20/0x21; slave at 0xA0/0xA1. The OS:</p>
<ol>
  <li>Sends Initialization Command Words (ICW1-ICW4) to configure mode, base vector, cascading.</li>
  <li>Sets the Interrupt Mask Register (IMR) via the data port — bit n masks IRQ n.</li>
  <li>On every interrupt, sends an End-Of-Interrupt (EOI) byte (0x20) to the command port so the PIC will deliver the next pending IRQ.</li>
</ol>
<p>Failing to EOI is a classic mistake: the PIC keeps the line "in service" and won't deliver further interrupts on lower-priority lines.</p>

<h2>The flow of a hardware interrupt</h2>
<ol>
  <li>Device asserts IRQ n.</li>
  <li>PIC checks: is IRQ n masked? If yes, queue. If no:</li>
  <li>PIC asserts the CPU's INTR line and remembers "IRQ n in service."</li>
  <li>CPU, with IF=1, acknowledges by reading the vector from the PIC.</li>
  <li>CPU dispatches IDT[vector].</li>
  <li>Handler runs. At the end, sends EOI to the PIC.</li>
  <li>PIC clears in-service bit; delivers next pending IRQ if any.</li>
</ol>

<div class="box box-note">
<strong>In the emulator</strong>
<code>machine/pc/pic.go</code> implements both 8259s, including the cascade. When a device (UART, PIT) calls <code>pic.RaiseIRQ(n)</code>, the PIC checks the mask and either queues or directly asserts the CPU INTR line by calling <code>cpu.SetINTR(1)</code>. When the kernel sends EOI, the PIC re-evaluates and either keeps INTR high (more pending) or clears it.
</div>

<h2>Spurious interrupts</h2>
<p>If IRQ 7 fires but is then dropped before the CPU acknowledges, the PIC reports vector 0x27 (the IRQ 7 vector) without setting any in-service bit. The kernel must distinguish this "spurious" interrupt from a real one — usually by reading the In-Service Register and ignoring if it's not set. Mostly harmless, but easy to get wrong.</p>
`,

    "If the kernel forgets to send EOI after handling IRQ 4 (UART), what happens to subsequent IRQ 4 events?",

    "The PIC has both an IRR (Interrupt Request Register) and an ISR (In-Service Register). What's the difference, and when does each get set/cleared?"
  ]
},

{
  id: 38, phase: 4,
  title: "The PIT — The Heartbeat of the System",
  subtitle: "Why your kernel needs a clock tick",
  content: `
<h2>One chip, three counters</h2>
<p>The Intel 8253/8254 Programmable Interval Timer is a 1980s chip with three 16-bit counters, each driven by a 1.193182 MHz clock. The OS programs each counter with a divisor; when the counter reaches zero, it can either pulse, generate a one-shot, or reload — depending on the mode. The three channels are wired as:</p>
<table class="corr-table">
  <tr><th>Channel</th><th>Output goes to</th><th>Use</th></tr>
  <tr><td>0</td><td>IRQ 0</td><td>System timer — the OS's clock tick</td></tr>
  <tr><td>1</td><td>DRAM refresh (originally)</td><td>Modern systems: unused</td></tr>
  <tr><td>2</td><td>PC speaker</td><td>Beeping</td></tr>
</table>

<h2>Linux's use: channel 0</h2>
<p>The kernel programs channel 0 to interrupt at HZ Hz (configurable; 100, 250, 1000 are common). Each tick is the kernel's chance to:</p>
<ul>
  <li>Account for elapsed CPU time (jiffies counter).</li>
  <li>Decide whether to preempt the running process.</li>
  <li>Fire timers that scheduled wakeups.</li>
  <li>Run RCU callbacks, deferred work, and similar housekeeping.</li>
</ul>
<p>Modern kernels use "tickless" mode (NOHZ) where the tick is dynamic — the kernel only schedules a wake-up when something needs attention. But the PIT is still there as the fallback.</p>

<h2>Calibration</h2>
<p>At boot, Linux uses the PIT to calibrate other timers. It measures how many TSC cycles elapse during a known PIT interval (say 50 ms), then converts TSC ticks to nanoseconds for the rest of the boot. This is why "tsc=reliable" in our cmdline is important — it tells the kernel "trust the TSC, don't fall back to PIT for high-resolution timekeeping."</p>

<h2>I/O ports</h2>
<p>The PIT lives at I/O ports 0x40-0x43:</p>
<ul>
  <li>0x40 = channel 0 data</li>
  <li>0x41 = channel 1 data</li>
  <li>0x42 = channel 2 data</li>
  <li>0x43 = mode/command register</li>
</ul>
<p>To program a counter, write a mode byte to 0x43, then write the 16-bit divisor (low byte then high byte) to the channel's data port. To read the current count, send a "latch" command then read the data port twice.</p>

<div class="box box-note">
<strong>In the emulator</strong>
<code>machine/pc/pit.go</code> models channel 0 as a counter that decrements based on CPU cycles elapsed since the last tick. When the counter reaches zero, the PIT raises IRQ 0 on the PIC. The "Phase 0.2: Couple PIT advance to CPU cycles" task in our task list was about making this driven by emulated cycles rather than wall-clock — so deterministic, replayable booting works.
</div>

<h2>Tickless and the death of HZ</h2>
<p>Most modern Linux distributions build with NOHZ_FULL or NOHZ_IDLE: the kernel cancels the periodic timer when the CPU is idle (or, with NOHZ_FULL, when running a single user task). Power savings — and tickless gives ~30% reduction in idle wakeups on a typical laptop.</p>
<p>For our emulator the PIT is the universal timer interrupt source; Linux uses it without complaint.</p>
`,

{
  id: 39, phase: 4,
  title: "Software Interrupts and the Linux System-Call ABI",
  subtitle: "INT 0x80 and its modern replacements",
  content: `
<h2>Software interrupts</h2>
<p>The <code>INT n</code> instruction (opcode 0xCD, then a byte for n) is the program-initiated way to invoke a vector. The CPU dispatches as for any interrupt — through the IDT, possibly with stack switch, possibly downgrading privilege. The gate's DPL controls who can use it: gates with DPL=3 are callable from userspace, DPL=0 only from kernel.</p>
<p>This is the original mechanism for kernel entry on i386 Linux. The kernel installs a gate at IDT[0x80] with DPL=3. Userspace executes <code>INT 0x80</code> and enters the kernel.</p>

<h2>The i386 Linux system-call ABI</h2>
<table class="corr-table">
  <tr><th>Register</th><th>Role</th></tr>
  <tr><td>EAX</td><td>Syscall number (1 = exit, 3 = read, 4 = write, 5 = open, 11 = execve, …)</td></tr>
  <tr><td>EBX, ECX, EDX, ESI, EDI, EBP</td><td>Arguments 1 through 6</td></tr>
  <tr><td>EAX (after)</td><td>Return value (or −errno on error)</td></tr>
</table>
<p>Note all arguments go in registers. The kernel's INT 0x80 handler saves all GPRs onto the kernel stack (via the SAVE_ALL macro), then dispatches based on EAX. The full kernel-entry sequence on Linux looks like (in pseudo-assembly):</p>
<pre>entry_INT80_32:
    <span class="kw">push</span> <span class="rg">eax</span>             <span class="cm">; orig_eax = syscall number (for restart)</span>
    SAVE_ALL              <span class="cm">; push all GPRs onto kernel stack</span>
    <span class="kw">call</span> <span class="fn">do_syscall_32</span>
    <span class="kw">jmp</span>  ret_to_user      <span class="cm">; restore regs, IRET</span>
<span class="lang-tag">arch/x86/entry/entry_32.S</span></pre>

<h2>The fast path: SYSENTER</h2>
<p>INT 0x80 is robust but slow: the CPU has to look up the IDT entry, possibly switch stacks via TSS, push 6 dwords, jump. The Pentium II added SYSENTER (and AMD added SYSCALL on x86-64) as a fast alternative — straight-line privilege transfer with no IDT involved.</p>
<p>SYSENTER reads its target from three MSRs (IA32_SYSENTER_CS / EIP / ESP); the OS programs them once at boot. The instruction transitions to CPL=0 by loading CS = MSR_CS, SS = MSR_CS + 8, EIP = MSR_EIP, ESP = MSR_ESP. No stack switch via TSS, no IDT lookup.</p>
<p>Linux x86-64 uses SYSCALL. Modern i386 prefers SYSENTER but always keeps INT 0x80 as a fallback (and for old binaries). Both end up calling the same C-language syscall handler.</p>

<h2>The vDSO trick</h2>
<p>Userspace doesn't usually call <code>INT 0x80</code> directly. The kernel maps a small "vDSO" (virtual dynamic shared object) into every process. The vDSO has stubs like <code>__kernel_vsyscall</code> that pick the best instruction (SYSENTER, INT 0x80, SYSCALL) based on the CPU. Libc dispatches through this stub for portability.</p>

<h2>Why this matters for our emulator</h2>
<p>We don't implement SYSENTER. Our CPUID hides the SEP (SYSENTER Enable Present) bit, so Linux never tries to use it and falls back to INT 0x80. This is fine — slow, but Linux runs perfectly well over the fallback path. Every syscall in our boot is an INT 0x80.</p>

<div class="box box-note">
<strong>Kernel entry latency</strong>
On real hardware, INT 0x80 takes ~100 cycles; SYSENTER takes ~70; SYSCALL on x86-64 takes ~50. Multiplied across millions of syscalls per second, the difference matters. For our emulator running at "however fast Go can simulate it," all paths are equally slow.
</div>
`,

  ]

  <tr><td>7</td><td>#NM Device Not Available</td><td>FPU instruction with CR0.TS=1 (lazy FPU restore)</td><td>No</td></tr>
  <tr><td>8</td><td>#DF Double Fault</td><td>Exception during exception delivery</td><td>Always 0</td></tr>
  <tr><td>10</td><td>#TS Invalid TSS</td><td>Bogus TSS during task switch</td><td>Yes (selector)</td></tr>
  <tr><td>11</td><td>#NP Segment Not Present</td><td>Loading a selector whose descriptor has P=0</td><td>Yes (selector)</td></tr>
  <tr><td>12</td><td>#SS Stack Fault</td><td>Stack segment error (limit violation, etc.)</td><td>Yes</td></tr>
  <tr><td>13</td><td>#GP General Protection</td><td>Any privilege/segment-validation/general violation</td><td>Yes (sometimes the offending selector)</td></tr>
  <tr><td>14</td><td>#PF Page Fault</td><td>MMU walk failed or permission violation</td><td>Yes (the bits from Lesson 33)</td></tr>
  <tr><td>16</td><td>#MF x87 FP</td><td>x87 floating-point error (when CR0.NE=1)</td><td>No</td></tr>
  <tr><td>17</td><td>#AC Alignment Check</td><td>Misaligned access with AC=1 and CPL=3</td><td>Yes (zero)</td></tr>
  <tr><td>18</td><td>#MC Machine Check</td><td>Hardware reported a fatal error</td><td>No</td></tr>
  <tr><td>19</td><td>#XF SIMD FP</td><td>SSE/AVX error</td><td>No</td></tr>
</table>

<h2>The four you'll see constantly</h2>
<h3>#PF — Page Fault (vector 14)</h3>
<p>Already covered in Lesson 33. By volume, this is the most common exception in a running system — every fresh-mmap'd page, every COW write, every demand-paged executable section.</p>

<h3>#GP — General Protection (vector 13)</h3>
<p>The catch-all "you violated some protection rule." Causes:</p>
<ul>
  <li>Privileged instruction from CPL>0 (CLI, STI when CPL>IOPL, MOV CRx, LGDT, …)</li>
  <li>Loading a selector that's invalid</li>
  <li>Memory access past a segment limit</li>
  <li>Reserved bit set in CR0 or CR4</li>
  <li>Returning to a CS that's the wrong privilege</li>
</ul>
<p>The error code is sometimes the offending selector (with E, TI, RPL fields), sometimes 0. The kernel's #GP handler decides whether it's a "user did something illegal" (deliver SIGSEGV) or a "kernel bug" (OOPS).</p>

<h3>#UD — Invalid Opcode (vector 6)</h3>
<p>"I don't know this instruction." The kernel uses this <em>deliberately</em>: <code>BUG()</code> emits a UD2, the #UD handler looks up the EIP in a table to find the file/line, prints them, and panics. So most #UDs in a Linux dmesg are kernel-bug reports, not "random invalid byte."</p>

<h3>#DF — Double Fault (vector 8)</h3>
<p>If an exception fires while the CPU is trying to deliver another exception (e.g., the kernel stack page is unmapped, so the push for the original fault itself faults), the CPU raises #DF. If #DF itself can't be delivered, you get a triple fault — the CPU resets. Real hardware reboots; emulators panic. Avoiding #DF is a big part of the emulator's correctness work; we wired up a #DF handler explicitly.</p>

<h2>What Linux does with each</h2>
<table class="corr-table">
  <tr><th>Exception</th><th>From user mode</th><th>From kernel mode</th></tr>
  <tr><td>#DE</td><td>SIGFPE</td><td>OOPS</td></tr>
  <tr><td>#UD</td><td>SIGILL</td><td>BUG/WARN handler or OOPS</td></tr>
  <tr><td>#GP</td><td>SIGSEGV</td><td>OOPS (or exception table lookup for "expected" faults)</td></tr>
  <tr><td>#PF</td><td>Demand-page, COW, or SIGSEGV</td><td>Demand-page kernel mapping, or OOPS</td></tr>
</table>

<div class="box box-note">
<strong>In the emulator</strong>
<code>cpu/x86/mmu.go</code> defines panic types <code>pageFaultError</code>, <code>generalProtectionFaultError</code>, <code>stackFaultError</code>, <code>invalidOpcodeError</code>, <code>divideError</code>. Each instruction handler raises these when needed; <code>Step()</code>'s defer catches them and calls <code>handleInterrupt(vector, true, errorCode)</code> to dispatch through the IDT. The pattern is "abort the current instruction via panic, restart it after delivery."
</div>
`,

{
  id: 41, phase: 4,
  title: "Stack Switching on Privilege Change",
  subtitle: "TSS.ESP0 and the kernel-stack ritual",
  content: `
<h2>Why a separate kernel stack?</h2>
<p>If the kernel handled interrupts on the user's stack, two things would go wrong:</p>
<ol>
  <li>A malicious user could put garbage on the stack to confuse the kernel.</li>
  <li>Page faults during interrupt delivery would loop forever (the kernel's first action — push a register — would fault if the user stack's page is paged out).</li>
</ol>
<p>So the CPU switches to a kernel-owned stack on every privilege upgrade. The stack pointer comes from the TSS.</p>

<h2>The TSS fields that matter</h2>
<table class="corr-table">
  <tr><th>Offset</th><th>Field</th><th>Used when entering CPL</th></tr>
  <tr><td>0x04</td><td>ESP0 — kernel ESP</td><td>0</td></tr>
  <tr><td>0x08</td><td>SS0 — kernel SS</td><td>0</td></tr>
  <tr><td>0x0C</td><td>ESP1</td><td>1 (unused)</td></tr>
  <tr><td>0x10</td><td>SS1</td><td>1</td></tr>
  <tr><td>0x14</td><td>ESP2</td><td>2 (unused)</td></tr>
  <tr><td>0x18</td><td>SS2</td><td>2</td></tr>
</table>
<p>Linux only uses ESP0/SS0 — there is one TSS per CPU, and Linux updates ESP0 at every context switch to point at the current task's per-thread kernel stack.</p>

<h2>The push sequence on user → kernel</h2>
<p>When the CPU enters CPL=0 from CPL=3, this is what gets pushed onto the new (kernel) stack:</p>
<pre>top of kernel stack (high addr):
   user SS         ← pushed last from the bottom
   user ESP
   EFLAGS
   user CS
   user EIP
   error code      ← pushed only for some exceptions
bottom (low addr) ← new ESP
<span class="lang-tag">interrupt-frame layout (CPL change)</span></pre>
<p>If the interrupt fires while already at CPL=0, no stack switch — the frame is pushed onto the existing kernel stack, and there's no saved user SS:ESP:</p>
<pre>top:
   EFLAGS
   kernel CS
   kernel EIP
   error code       ← if applicable
bottom ← new ESP
<span class="lang-tag">interrupt-frame layout (no CPL change)</span></pre>

<h2>The kernel handler's first job: SAVE_ALL</h2>
<p>The CPU saved just enough (CS, EIP, EFLAGS, SS:ESP if needed) for IRET to work. Everything else — EAX, EBX, ECX, EDX, ESI, EDI, EBP — is the kernel's responsibility. So every kernel entry point starts with a PUSH-everything macro:</p>
<pre>SAVE_ALL:
    <span class="kw">push</span> <span class="rg">ds</span>; <span class="kw">push</span> <span class="rg">es</span>; <span class="kw">push</span> <span class="rg">fs</span>; <span class="kw">push</span> <span class="rg">gs</span>
    <span class="kw">pushad</span>          <span class="cm">; push all 8 GPRs in one instruction</span>
    <span class="kw">mov</span>  <span class="rg">eax</span>, <span class="ct">__USER_DS</span>
    <span class="kw">mov</span>  <span class="rg">ds</span>,  <span class="rg">ax</span>
    <span class="kw">mov</span>  <span class="rg">es</span>,  <span class="rg">ax</span>      <span class="cm">; reset DS/ES to known good values</span>
<span class="lang-tag">SAVE_ALL macro</span></pre>
<p>After SAVE_ALL the kernel's C code can run freely; on the way out, RESTORE_ALL undoes the same operations in reverse before IRET.</p>

<h2>Per-CPU stacks and ESP0 maintenance</h2>
<p>The kernel allocates a per-CPU TSS at boot. <code>switch_to(prev, next)</code> updates <code>this_cpu_tss.x86_tss.sp0</code> to point at <code>next-&gt;thread.sp0</code> — the top of the new task's kernel stack. The next entry from user mode will land on that stack. Each task thus has its own kernel stack that survives across syscalls.</p>

<h2>What goes wrong</h2>
<p>If TSS.ESP0 points at an unmapped page, the first push during interrupt entry faults. The kernel can't even start handling the fault. Result: #DF, then triple fault, then "machine reset." This is why <em>every</em> stack switch must end with a known-good ESP0; the kernel checks invariants aggressively.</p>

<div class="box box-note">
<strong>In the emulator</strong>
<code>cpu/x86/exec.go:handleInterruptCore</code> does the stack switch when <code>oldCPL > newCPL</code>: reads <code>esp0Offset</code> and <code>ss0Offset</code> from the TSS, validates the new SS, loads them, then pushes the frame. The TSS reads go through <code>readMemSV*</code> (Lesson 25) so the CPU acts as a privileged agent during this delicate moment.
</div>
`,

    "If Linux failed to update TSS.ESP0 at context-switch time, what would the first interrupt that happens during the new task look like?"
  ]

{
  id: 42, phase: 4,
  title: "IRET — The Return-to-Userspace Dance",
  subtitle: "The atomic pop that bit us",
  content: `
<h2>What IRET does, formally</h2>
<p>IRET is the inverse of interrupt entry. From the kernel stack it pops, in order:</p>
<ol>
  <li>EIP</li>
  <li>CS (16 bits but stored as a 32-bit value)</li>
  <li>EFLAGS</li>
  <li>If new CPL > old CPL (i.e., returning to less privilege): ESP and SS too</li>
</ol>
<p>After the pops, the CPU loads the new CS:EIP, the new EFLAGS (with the right masking for privilege), and (if changed) the new SS:ESP — all atomically. The next instruction fetched is from the new context.</p>

<h2>The atomicity invariant</h2>
<p>This is the part that bit us. On real hardware, IRET is <em>indivisible</em> from a CPL perspective: either it completes entirely (you're in the new context with all the right state) or it faults <em>before</em> any of the new state is loaded. The pops themselves all happen at the <strong>old</strong> CPL.</p>
<p>That property is essential. Consider: the kernel is at CPL=0, returning to user (CPL=3). The pops read from the kernel stack — which is supervisor-only. If the CPU updated CPL to 3 between popping CS and popping EFLAGS, the remaining pops would happen at CPL=3 and immediately page-fault on the kernel-only stack page.</p>

<h2>Our bug</h2>
<p>Our emulator's IRET was almost-correct but not quite. The flow was:</p>
<pre><span class="cm">// BUGGY: pops interleaved with state updates</span>
c.eip = c.<span class="fn">pop32</span>()                                  <span class="cm">// pops at old CPL — OK</span>
cs := c.<span class="fn">pop32</span>()                                     <span class="cm">// pops at old CPL — OK</span>
c.<span class="fn">LoadSegmentProtected</span>(CS, <span class="kw">uint16</span>(cs))            <span class="cm">// SIDE EFFECT: updates c.cpl from CS's RPL</span>
c.<span class="fn">setEFlagsFromPop</span>(c.<span class="fn">pop32</span>(), c.cpl)               <span class="cm">// POP EFLAGS AT NEW CPL — BUG</span>

<span class="kw">if</span> c.cpl > oldCPL {
    newESP := c.<span class="fn">pop32</span>()                              <span class="cm">// POP ESP AT NEW CPL — BUG</span>
    newSS := c.<span class="fn">pop32</span>()                               <span class="cm">// POP SS AT NEW CPL — BUG</span>
    ...
}<span class="lang-tag">cpu/x86/exec.go (pre-fix)</span></pre>
<p>From user mode, the first page-fault returning to user faulted on the EFLAGS pop. The kernel saw "supervisor read at user-only access level" — its handler oopsed.</p>

<h2>The fix</h2>
<p>Pop everything first using the old CPL, <em>then</em> install the new state:</p>
<pre><span class="cm">// FIXED: all pops at old CPL, all loads at the end</span>
oldCPL := c.cpl
newEIP := c.<span class="fn">pop32</span>()                                  <span class="cm">// pop at old CPL</span>
newCS := <span class="kw">uint16</span>(c.<span class="fn">pop32</span>())                         <span class="cm">// pop at old CPL</span>
newFlags := c.<span class="fn">pop32</span>()                               <span class="cm">// pop at old CPL</span>
crossPriv := c.<span class="fn">IsProtectedMode</span>() &amp;&amp; <span class="kw">int</span>(newCS &amp; <span class="nm">3</span>) > oldCPL
<span class="kw">var</span> newESP <span class="kw">uint32</span>; <span class="kw">var</span> newSS <span class="kw">uint16</span>
<span class="kw">if</span> crossPriv {
    newESP = c.<span class="fn">pop32</span>()                              <span class="cm">// pop at old CPL</span>
    newSS = <span class="kw">uint16</span>(c.<span class="fn">pop32</span>())                     <span class="cm">// pop at old CPL</span>
}

<span class="cm">// Now install: from here on the CPL changes</span>
c.eip = newEIP
c.<span class="fn">LoadSegmentProtected</span>(CS, newCS)
c.<span class="fn">setEFlagsFromPop</span>(newFlags, c.cpl)
<span class="kw">if</span> crossPriv {
    c.<span class="fn">LoadSegmentProtected</span>(SS, newSS)
    c.<span class="fn">SetReg32</span>(ESP, newESP)
}<span class="lang-tag">cpu/x86/exec.go (after fix)</span></pre>

<h2>The regression test</h2>
<p>The test in <code>cpu/x86/interrupt_test.go:TestIRET32PrivilegeDowngradePagedSupervisorStack</code> sets up paging where the kernel stack page is supervisor-only, places a valid IRET frame on it, and runs IRET at CPL=0 returning to CPL=3. Without the fix, IRET would page-fault during EFLAGS pop. With the fix, it completes cleanly and the CPU lands at the user EIP. That test now lives forever in the suite.</p>

<h2>The general lesson</h2>
<p>Any state transition that's "atomic" on real hardware needs to be atomic in the emulator too. The temptation to interleave reads with state changes — natural when writing one expression at a time — is exactly the wrong pattern. Pull all the inputs first, validate, then update.</p>

<div class="box box-key">
<strong>End of Phase IV</strong>
You now understand the full CPU state machine: instructions, memory translation, privilege transitions, asynchronous events. Phase V puts it together — what does the CPU look like from boot, how does Linux configure all of this, and what is the actual end-to-end story from reset to a shell prompt?
</div>
`,
  exercises: [
    "Why does IRET pop EFLAGS <em>after</em> CS and EIP, not before? Trace a real-hardware IRET to see the order on the stack.",
    "Could you fix this bug by leaving the original code structure but using a <code>readMemSV*</code> helper for the pop? Why would that be a hack rather than a real fix?",
    "Look at <code>cpu/x86/interrupt_test.go:TestIRET32PrivilegeDowngradePagedSupervisorStack</code>. Trace by hand what the test sets up and what it verifies."
  ]
},

{
  id: 43, phase: 5,
  title: "From Reset to BIOS to Bootloader to Kernel",
  subtitle: "The first ten thousand instructions",
  content: `
<h2>Power-on state</h2>
<p>When the CPU is reset (power-on or RESET pin), it starts in a very specific state:</p>
<ul>
  <li><strong>Real mode</strong> — 16-bit, no paging, no protection.</li>
  <li><strong>EIP = 0xFFFFFFF0</strong>. Just below the 4 GB boundary.</li>
  <li><strong>CS = F000:F000</strong> with a hidden base of 0xFFFF_0000 — so CS:EIP starts at physical 0xFFFF_FFF0.</li>
  <li>Most other registers are 0; EFLAGS has its reserved bit set.</li>
</ul>
<p>The first 16 bytes the CPU executes live in the BIOS / firmware ROM mapped at the top of the 4 GB physical address space. Typically those 16 bytes are a far JMP to the BIOS's real initialization code lower in memory.</p>

<h2>The BIOS / UEFI era</h2>
<p>The BIOS runs for several hundred milliseconds — initialising memory, the chipset, video, USB, networking. It then performs the "POST" (Power-On Self Test) and reads the first sector of a boot device (the MBR — Master Boot Record, 512 bytes at sector 0).</p>
<p>UEFI is the modern replacement: more capable, signed, with a filesystem-aware boot manager. On UEFI machines the boot device's first sector still exists (in GPT-protective form), but UEFI loads a full executable from a FAT partition. Either way, by the time the kernel runs, firmware has handed off control.</p>

<h2>The bootloader (GRUB, etc.)</h2>
<p>The bootloader's job:</p>
<ol>
  <li>Read the kernel image from disk into memory.</li>
  <li>Read the initial RAM disk (initrd / initramfs) into memory.</li>
  <li>Set up the kernel's expected boot parameters (memory map, command line, framebuffer info).</li>
  <li>Switch to protected mode (or long mode).</li>
  <li>Jump to the kernel's entry point.</li>
</ol>
<p>For a Linux kernel, the boot protocol is defined in <code>Documentation/x86/boot.txt</code>. The kernel starts in 32-bit protected mode with a bunch of state guarantees: a flat GDT installed, paging off, interrupts off, and a specific structure of boot parameters at a known address.</p>

<h2>The shortcut our emulator takes</h2>
<p>We skip the BIOS entirely. <code>machine/pc</code> in tinyemu-go directly loads the kernel into memory at the expected physical address (typically 0x100000 = 1 MB), constructs the boot parameters, sets up a minimal GDT, and starts the CPU in 32-bit protected mode at the kernel's entry point. From the kernel's perspective this is indistinguishable from being launched by a real bootloader — Linux doesn't know or care about the BIOS, only about what it sees in memory at boot.</p>

<h2>The kernel's first instructions</h2>
<p>Linux i386 starts at <code>startup_32</code> in <code>arch/x86/kernel/head_32.S</code>. The first thing it does is:</p>
<ol>
  <li>Set up a temporary stack.</li>
  <li>Reload the GDT with a kernel-owned one.</li>
  <li>Clear BSS, set up an initial page directory.</li>
  <li>Turn on paging (CR0.PG = 1).</li>
  <li>Jump to <code>start_kernel</code> (in C) — the big mainline boot function.</li>
</ol>
<p><code>start_kernel</code> initialises subsystems in a careful order: the early console (so it can print), the page allocator, the slab allocator, the scheduler, then drivers, then mounts the rootfs, then forks PID 1 (init). When init runs userspace code, the system is "booted."</p>

<div class="box box-note">
<strong>What the emulator skips and what it must provide</strong>
We skip: BIOS POST, MBR reading, disk bootloader code, A20 dance, real-mode → protected-mode transition. We provide: the kernel image, the initrd, the cmdline, a fake e820 memory map, an entry-time GDT. The kernel's boot proceeds normally from there.
</div>
`,
  exercises: [
    "Why does the CPU start in real mode in 2026 instead of just starting in protected mode? Hint: hardware backward compatibility.",
    "What's the difference between BIOS and UEFI boot? Which is your laptop using?",
    "Read <code>machine/pc</code> in the repo: find the line where it sets CR0.PE before jumping to the kernel."
  ]

  id: 44, phase: 5,
  title: "The Kernel's Initial Setup",
  subtitle: "GDT, IDT, paging, allocators — in that order",
  content: `
<h2>The setup pipeline</h2>
<p>Once the kernel's entry assembly hands off to C in <code>start_kernel</code>, a fixed sequence of subsystem initialisations runs. Each depends on the previous:</p>
<ol>
  <li><strong>Early console.</strong> Print to a serial port or VGA without dynamic allocation. Lets the rest of boot say what it's doing.</li>
  <li><strong>setup_arch.</strong> Detect CPU features (CPUID), set up the IDT, parse e820 memory map, build the kernel's permanent GDT, enable paging properly (the entry-assembly used a tiny temporary PD; now we install the full one).</li>
  <li><strong>mm_init / mem_init.</strong> Initialise the buddy allocator (page-frame allocator). At this point <code>__get_free_page</code> works.</li>
  <li><strong>kmem_cache_init.</strong> Bring up the slab allocator. <code>kmalloc</code> works.</li>
  <li><strong>setup_per_cpu_areas.</strong> Each CPU gets its own area for per-CPU variables.</li>
  <li><strong>sched_init, timekeeping_init, time_init, init_IRQ, softirq_init.</strong> Scheduler, timers, IRQ subsystem.</li>
  <li><strong>console_init / VFS init / driver probing.</strong> Bring up devices.</li>
  <li><strong>rest_init → kernel_init.</strong> Mount the rootfs (or unpack initramfs), exec /init (or /sbin/init).</li>
</ol>
<p>From kernel-banner to <code>Run /init as init process</code> is hundreds of millions of cycles' worth of work — most of it allocator and driver init.</p>

<h2>The IDT install</h2>
<p>Done before paging is fully enabled (CR0.PG=1 was set in the entry asm, but the kernel switches to a permanent IDT in C). The kernel fills 256 entries: vectors 0-31 are exception handlers (each is a tiny assembly stub that pushes a vector number and a possibly-zero error code, then jumps to a common dispatcher), 32-47 are remapped IRQs, 0x80 is the syscall gate.</p>

<h2>The GDT install</h2>
<p>Linux's GDT has the entries shown in Lesson 24: kernel CS/DS, user CS/DS, TLS, TSS. It's built per-CPU; with N CPUs you have N GDTs and N TSSes. The boot CPU sets up its own GDT first; subsequent CPUs do the same as they come online.</p>

<h2>Paging in full</h2>
<p>The entry-assembly used a "boot page table" — a small mapping that covered just the kernel image. The C-level <code>mem_init</code> builds the full mapping for all of memory: identity-map for the kernel half, leaves the user half empty.</p>
<p>The page tables themselves are <em>part of</em> the data they manage — the kernel allocates pages from the buddy allocator to hold them. Bootstrapping is delicate: the early-boot allocator (bootmem) uses statically reserved pages until the buddy allocator can take over.</p>

<h2>The console: console=ttyS0</h2>
<p>Our cmdline includes <code>console=ttyS0</code>, which tells the kernel "use the first serial port for console output." Without this, the kernel would default to a VGA framebuffer console — which doesn't exist on our emulator. The serial console works because we model a UART16550 (Lesson 48); the kernel pokes its registers and bytes come out as our emulator's stdout.</p>

<div class="box box-note">
<strong>Things we don't do</strong>
Real boot includes: device-tree parsing (irrelevant on x86), ACPI table parsing (we pass <code>acpi=off</code>), PCI enumeration (we don't have a PCI bus — see Lesson 47), SMP CPU bringup (we pass <code>nosmp</code>). Each of these would be a substantial chunk of emulator work, none of it on the critical path to "shell prompt."
</div>
`,

<h2>The whole syscall, end to end</h2>
<p>From a userspace call to <code>write(fd, buf, n)</code>, here's everything that happens.</p>

<h3>1. Libc dispatch</h3>
<p>The C function <code>write</code> in glibc/musl is a thin wrapper. On i386 with INT 0x80:</p>
<pre>write:
    <span class="kw">mov</span>  <span class="rg">eax</span>, <span class="nm">4</span>            <span class="cm">; syscall number for write</span>
    <span class="kw">mov</span>  <span class="rg">ebx</span>, [<span class="rg">esp</span><span class="op">+</span><span class="nm">4</span>]      <span class="cm">; fd</span>
    <span class="kw">mov</span>  <span class="rg">ecx</span>, [<span class="rg">esp</span><span class="op">+</span><span class="nm">8</span>]      <span class="cm">; buf</span>
    <span class="kw">mov</span>  <span class="rg">edx</span>, [<span class="rg">esp</span><span class="op">+</span><span class="nm">12</span>]     <span class="cm">; n</span>
    <span class="kw">int</span>  <span class="nm">0x80</span>             <span class="cm">; trap into kernel</span>
    <span class="kw">cmp</span>  <span class="rg">eax</span>, <span class="op">-</span><span class="nm">4096</span>        <span class="cm">; range check: errno is in 1..4095</span>
    <span class="kw">jbe</span>  ok
    <span class="kw">neg</span>  <span class="rg">eax</span>                <span class="cm">; -errno → errno</span>
    <span class="kw">mov</span>  [errno_loc], <span class="rg">eax</span>
    <span class="kw">mov</span>  <span class="rg">eax</span>, <span class="op">-</span><span class="nm">1</span>           <span class="cm">; standard "error" return</span>
ok:
    <span class="kw">ret</span>
<span class="lang-tag">i386 libc write</span></pre>

<h3>2. CPU dispatch</h3>
<p>The <code>INT 0x80</code> instruction looks up IDT[0x80], finds a trap gate with DPL=3 pointing at <code>entry_INT80_32</code> in CS=__KERNEL_CS, switches stack (using TSS.ESP0), pushes user SS/ESP/EFLAGS/CS/EIP, and jumps to the entry point.</p>

<h3>3. Kernel entry assembly</h3>
<p><code>entry_INT80_32</code> pushes the syscall number (saved EAX) as <code>orig_eax</code>, runs SAVE_ALL to push every other GPR, then calls the C function <code>do_int80_syscall_32</code>.</p>

<h3>4. C-level dispatch</h3>
<p><code>do_int80_syscall_32</code> validates the syscall number, indexes into the syscall table (<code>sys_call_table[]</code>), and calls the registered function (<code>sys_write</code>).</p>

<h3>5. The actual work</h3>
<p><code>sys_write</code> validates the user pointer, copies bytes from the user buffer to a kernel buffer (<code>copy_from_user</code> — which may #PF if the user page is paged out), eventually walks the file system or device driver to actually emit the bytes.</p>

<h3>6. Return path</h3>
<p>The C function returns. The kernel-entry assembly puts the return value (an <code>ssize_t</code>) in EAX, runs RESTORE_ALL to pop all the GPRs and segment registers, then does IRET. IRET pops the saved EFLAGS/CS/EIP/SS/ESP, atomically transitioning back to CPL=3 at the instruction after INT 0x80.</p>

<h3>7. Libc continues</h3>
<p>Userspace looks at EAX, decides errno-vs-success, and returns from the C function to its caller.</p>

<h2>copy_from_user / copy_to_user</h2>
<p>The kernel can read and write user memory <em>directly</em> via the same MMU mapping — there's no "user address space" that's separately accessible from the kernel. But it must do so carefully:</p>
<ul>
  <li>Check the address is in the user half of the address space.</li>
  <li>Disable SMAP (Supervisor Mode Access Prevention) if active.</li>
  <li>Wrap the access in an "exception table" entry so that if the user page is paged out, the kernel handles the #PF gracefully (demand-paging) instead of OOPSing.</li>
</ul>
<p>The exception table maps "if a fault happens at this kernel EIP, jump to that recovery EIP" — typically a -EFAULT return. This is why a user passing a bogus pointer to write() gets <code>errno=EFAULT</code> instead of crashing the kernel.</p>

<h2>The SAVE_ALL/RESTORE_ALL macro pair</h2>
<p>The single most important assembly in the kernel. Every kernel entry begins with SAVE_ALL, every exit ends with RESTORE_ALL. The macros must:</p>
<ul>
  <li>Push GPRs in a fixed order.</li>
  <li>Reset segment registers to known kernel values (because user code may have set them to garbage).</li>
  <li>Establish kernel GS_BASE / FS_BASE for per-CPU access.</li>
</ul>
<p>The full file is <code>arch/x86/entry/entry_32.S</code>. It's about 700 lines of carefully-commented assembly — and it's the only kernel file you really need to understand to know what happens at every syscall.</p>

<div class="box box-key">
<strong>Key Insight</strong>
A syscall is not magical. It's a privilege transition + a function call. The entire mechanism — registers, IDT, stack switch, IRET — exists to do this one thing safely and quickly. Every other CPU feature you've studied serves this transition (or its mirror, the page-fault path).
</div>
`,
  exercises: [

    "If a user passes a NULL pointer to <code>write()</code>, where does the fault happen, and what's the path back to userspace getting EFAULT?",
    "Why must the kernel reset DS and ES at SAVE_ALL? What could go wrong if it didn't?"
  ]

{
  id: 46, phase: 5,
  title: "Memory Allocators — Buddy and Slab",
  subtitle: "How the kernel manages its own RAM",
  content: `
<h2>Layered allocators</h2>
<p>The kernel has three main memory allocators, each layered on the previous:</p>
<ol>
  <li><strong>Buddy allocator</strong> — gives out whole pages (or power-of-2 multiples). Used directly for "I need 4 KB or 8 KB." Underlies everything else.</li>
  <li><strong>Slab/SLUB allocator</strong> — gives out small objects of fixed sizes (32 bytes, 256 bytes, etc.). Built on top of the buddy allocator, which provides the underlying pages.</li>
  <li><strong>kmalloc</strong> — the general-purpose "give me N bytes" API. Implemented as a fan-out: small requests route to one of ~13 size-classed slab caches; large ones go directly to the buddy allocator.</li>
</ol>

<h2>The buddy allocator</h2>
<p>For each power of 2 from 4 KB up to 4 MB (orders 0 through 10), the kernel keeps a free list. To allocate a block of size 2^k pages:</p>
<ol>
  <li>If the order-k free list is non-empty, pop one and return it.</li>
  <li>Otherwise, split a block from order k+1 (which itself may recursively split from k+2, k+3, …). Each split produces two "buddies"; return one, free the other.</li>
</ol>
<p>On <code>free</code>, check if the buddy is also free; if so, merge them into a larger block. This keeps fragmentation bounded.</p>

<h2>The slab/SLUB allocator</h2>
<p>"Slabs" predate Linux — they're a 1994 idea from Solaris. The motivation: many kernel objects are small (16-256 bytes) and frequently allocated/freed. A general-purpose allocator (like kmalloc) wastes time and memory on a 32-byte object.</p>
<p>A slab cache is a pool of fixed-size objects backed by one or more buddy-allocator pages. Per cache: a freelist of available objects, a counter, and some bookkeeping. Allocation = pop from freelist. Free = push back. Both are O(1) and don't touch the buddy allocator.</p>
<p>SLUB is Linux's modern slab implementation: simpler than the older SLAB, generally faster on most workloads.</p>

<h2>The kmalloc fan-out</h2>
<p>For each common size, the kernel creates a slab cache at boot: <code>kmalloc-8</code>, <code>kmalloc-16</code>, <code>kmalloc-32</code>, …, <code>kmalloc-4096</code>. A <code>kmalloc(50)</code> rounds up to 64, hits <code>kmalloc-64</code>, gets one object. Requests larger than 4096 go straight to the buddy allocator.</p>

<h2>The early debug story</h2>
<p>One of the trickiest bugs in our emulator was traced to slab internals. The kernel was allocating a <code>struct pool_workqueue</code> via the slab; the next pwq in the freelist hadn't been initialised yet; somehow the un-allocated object was being installed into a per-CPU pointer table. Tracking it required physical-memory watchpoints in the emulator (the <code>TINYEMU_X86_PHYSWATCH</code> environment variable, see <code>cpu/x86/mmu.go</code>). The actual cause turned out to be an emulator bug elsewhere — but the journey through slab internals was instructive.</p>

<h2>Other allocators in the kernel</h2>
<ul>
  <li><strong>vmalloc / vfree</strong> — allocates virtually contiguous (but possibly physically fragmented) memory. Used for large structures that need to be contiguous in virtual memory but where you can't get a big physical block.</li>
  <li><strong>page_pool</strong> — for network drivers; specialised page caching to keep DMA addresses fixed.</li>
  <li><strong>per_cpu_alloc</strong> — for per-CPU variables; each CPU gets its own copy at a fixed per-CPU offset.</li>
</ul>

<div class="box box-key">
<strong>Key Insight</strong>
Allocators are a kernel's biggest correctness-and-performance battlefield. Linux's allocators are decades of accumulated thought, and they're built on a remarkably small set of primitives (buddy + slab + the buddy-friendly NUMA-aware page reclaim). You won't write a kernel allocator, but understanding them is necessary to read kernel code and to diagnose kernel memory bugs.
</div>
`,
  exercises: [
    "If kmalloc(50) returns an object, how much memory was actually allocated? How much was 'wasted'?",
    "What's the failure mode if a kmalloc-N cache's slab runs out? Trace what the allocator does next.",
    "Look up <code>cpu/x86/mmu.go:physWatchHook</code>. What environment variable enables it, and what range did we watch when investigating the pwq bug?"
  ]
},

{
  id: 47, phase: 5,
  title: "Drivers and Memory-Mapped I/O",
  subtitle: "How the kernel talks to hardware",
  content: `
<h2>Two ways to talk to devices</h2>
<p>x86 has two distinct address spaces for hardware:</p>
<ol>
  <li><strong>I/O ports</strong> — a separate 16-bit address space (64K ports), accessed by <code>IN</code> and <code>OUT</code> instructions. Originated with the 8086. Used for legacy devices: PIT, PIC, UART, keyboard, IDE, VGA registers.</li>
  <li><strong>Memory-mapped I/O (MMIO)</strong> — devices appear as memory regions in the regular physical address space. Reads and writes use ordinary load/store instructions. Used for everything modern: PCI devices, framebuffers, the LAPIC.</li>
</ol>
<p>The kernel and device drivers use the appropriate one. <code>inb / outb / inw / outw / inl / outl</code> for ports; <code>readl(ptr) / writel(val, ptr)</code> with an iomem-marked pointer for MMIO.</p>

<h2>The IN/OUT instructions</h2>
<p>Privileged: CPL must be ≤ IOPL (set in EFLAGS). Linux runs the kernel at CPL=0 with IOPL=0, so kernel code can do IN/OUT; user code cannot unless the TSS's IOPB grants port-specific permission.</p>
<pre><span class="kw">in</span>   <span class="rg">al</span>, <span class="rg">dx</span>      <span class="cm">; read 1 byte from port DX into AL</span>
<span class="kw">in</span>   <span class="rg">eax</span>, <span class="rg">dx</span>     <span class="cm">; read 4 bytes</span>
<span class="kw">out</span>  <span class="rg">dx</span>, <span class="rg">al</span>      <span class="cm">; write 1 byte to port DX</span>
<span class="lang-tag">port I/O</span></pre>
<p>You can also use 8-bit immediate forms: <code>in al, 0x60</code> for the keyboard port. Linux mostly uses register-indirect forms for flexibility.</p>

<h2>The MMIO model</h2>
<p>MMIO regions look like normal memory but the underlying "RAM" is the device's registers and FIFOs. Reads and writes have side effects: reading a UART RX register dequeues a byte; writing the UART TX register transmits.</p>
<p>Drivers must declare MMIO regions specifically — using <code>ioremap</code> — so the kernel can:</p>
<ul>
  <li>Mark the pages as uncached (PCD=1 in PTE) — caching would break devices that have register reads with side effects.</li>
  <li>Use volatile-style accesses that don't get reordered or eliminated by the compiler.</li>
  <li>Insert memory barriers where needed to ensure ordering between MMIO and regular memory.</li>
</ul>

<h2>The 1 MB legacy region</h2>
<p>Physical addresses 0-1 MB contain legacy stuff on a PC:</p>
<table class="corr-table">
  <tr><th>Range</th><th>Use</th></tr>
  <tr><td>0x00000 - 0x9FFFF</td><td>RAM (640 KB conventional memory)</td></tr>
  <tr><td>0xA0000 - 0xBFFFF</td><td>VGA framebuffer / 0xB8000 = text mode</td></tr>
  <tr><td>0xC0000 - 0xFFFFF</td><td>BIOS / option ROMs</td></tr>
</table>
<p>The kernel's e820 map declares these ranges; the kernel respects them.</p>

<h2>PCI devices</h2>
<p>PCI is the universal device-discovery and -configuration protocol on a PC since the mid-1990s. Each PCI device has a 256-byte (PCIe: 4 KB) configuration space at a known location; the kernel enumerates devices by reading these. Each device exposes "BARs" (Base Address Registers) describing its MMIO regions.</p>
<p>Our emulator has no PCI bus. The kernel notices ("PCI: Fatal: No config space access function found") and disables PCI; the boot proceeds without it. Anything PCI-attached — disks, network cards, modern graphics — simply doesn't exist. We use only the legacy ISA-era devices that live at well-known fixed addresses.</p>

<div class="box box-note">
<strong>In the emulator</strong>
<code>machine/pc/pc.go</code> contains the I/O port dispatch: a switch by port number that routes <code>IN</code> and <code>OUT</code> to the appropriate device handler (PIC, PIT, UART). MMIO is handled via the physical-memory map — registering callbacks for specific address ranges. Adding a new device is a matter of registering ports/MMIO and implementing its protocol.
</div>
`,
  exercises: [
    "Why is IN/OUT privileged? What could a user-mode process do if it had free access to all ports?",
    "Why do MMIO regions need to be uncached (PCD=1)? Give a concrete example where caching would break a device.",
    "PCI was added to x86 in the early 90s — but the older IN/OUT mechanism still exists. Why? Could PCs drop port I/O?"
  ]
},

{
  id: 48, phase: 5,
  title: "Console I/O — The UART 16550",
  subtitle: "Bytes in, bytes out, one chip from 1987",
  content: `
<h2>The chip you boot through</h2>
<p>The 16550 UART (Universal Asynchronous Receiver/Transmitter) is the serial-port chip standard on every PC. It does one thing: turn bytes into a serial bit stream and vice versa, with FIFO buffering and interrupt generation. Linux's <code>console=ttyS0</code> in our cmdline directs all kernel printk output to this chip's TX register.</p>

<h2>The 8 ports</h2>
<p>COM1 sits at I/O port base 0x3F8; eight consecutive ports:</p>
<table class="corr-table">
  <tr><th>Offset</th><th>Read</th><th>Write</th></tr>
  <tr><td>0</td><td>RBR — receive buffer</td><td>THR — transmit holding</td></tr>
  <tr><td>0 (DLAB=1)</td><td>DLL — divisor LSB</td><td>DLL</td></tr>
  <tr><td>1</td><td>IER — interrupt enable</td><td>IER</td></tr>
  <tr><td>1 (DLAB=1)</td><td>DLM — divisor MSB</td><td>DLM</td></tr>
  <tr><td>2</td><td>IIR — interrupt id</td><td>FCR — FIFO control</td></tr>
  <tr><td>3</td><td>LCR — line control (includes DLAB)</td><td>LCR</td></tr>
  <tr><td>4</td><td>MCR — modem control</td><td>MCR</td></tr>
  <tr><td>5</td><td>LSR — line status</td><td>(scratch)</td></tr>
  <tr><td>6</td><td>MSR — modem status</td><td>(scratch)</td></tr>
  <tr><td>7</td><td>SCR — scratch</td><td>SCR</td></tr>
</table>
<p>Drivers configure the chip by writing LCR/IER/FCR, then write bytes to THR. To know when the chip can accept the next byte, they poll LSR bit 5 ("THR empty").</p>

<h2>RX path: getting characters from the user</h2>
<p>Our emulator wires stdin → UART RX FIFO. When the user types a key, the bytes are pushed onto the FIFO; if interrupts are enabled (IER bit 0), the UART raises IRQ 4 (vector 36 after PIC remap). Linux's serial driver runs, reads RBR, dequeues from the FIFO, hands the byte to the line discipline, which eventually hands it to the running shell. This is what makes <code>cmd/temu</code> interactive.</p>

<h2>Printk output</h2>
<p>Linux's <code>printk</code> buffers messages in a ring buffer. The serial console drains the buffer: for each character, it polls LSR.THRE (wait for THR empty), writes the byte to THR. Slow but reliable. The output appears one character at a time on the host stdout.</p>

<h2>The VGA text console</h2>
<p>If our machine had a VGA framebuffer at physical address 0xB8000, Linux would use it as a console: each pair of bytes is (character, attribute), and writing them paints text on the screen. We don't model VGA — our cmdline forces ttyS0.</p>

<h2>The 16550A FIFOs</h2>
<p>The original 8250 had no FIFO — one byte buffer, easy to overrun. The 16450 was equally bad. The 16550A added 16-byte FIFOs for both RX and TX. Modern Linux assumes 16550A or better. The FCR register controls the FIFOs (enable, threshold for triggering an IRQ).</p>

<div class="box box-note">
<strong>In the emulator</strong>
<code>machine/pc/uart.go</code> implements the chip. The RX FIFO is a goroutine-safe byte slice; the <code>Push</code> method adds bytes (called from stdin reader); reads from RBR dequeue. LSR/IIR/IER all reflect the FIFO state. IRQ 4 is raised when RX FIFO is non-empty and IER.RXrEN is set, or when TX FIFO is empty and IER.THRE is set.
</div>

<h2>Why this chip and not something modern</h2>
<p>The 16550 protocol is incredibly simple, well-documented, and supported by every UART driver in every OS. For an emulator, it's the lowest-effort path to a working serial console. Modern hardware uses PCIe-attached UARTs with different register layouts — but we don't need them, and Linux happily uses the legacy interface.</p>
`,

    "What's the difference between RBR and THR? Why does the chip return one or the other based on read vs write?",
    "When does the UART raise an IRQ? List the conditions in terms of LSR/IER bits.",
    "How does the kernel know whether it's a 16450 or 16550A? Hint: the FCR register has a probe sequence."
  ]
},

  id: 49, phase: 5,
  title: "Block Devices — ATA, IDE, and Disk-Based Boot",
  subtitle: "What it would take to boot from a real disk",
  content: `
<h2>What we're missing</h2>
<p>Our emulator boots from a kernel image plus an initramfs — both loaded into memory by the harness. No block device. If we wanted to boot a "real distro" (TinyCore, Puppy, an Alpine LiveCD) we'd need a disk emulation.</p>

<h2>The IDE/ATA protocol</h2>
<p>IDE (Integrated Drive Electronics) — also called ATA (AT Attachment) — is the venerable disk-controller protocol. Every Linux kernel has built-in support; no driver to compile. The primary IDE channel lives at I/O ports:</p>
<table class="corr-table">
  <tr><th>Port</th><th>Read</th><th>Write</th></tr>
  <tr><td>0x1F0</td><td>data (16 bits)</td><td>data</td></tr>
  <tr><td>0x1F1</td><td>error</td><td>features</td></tr>
  <tr><td>0x1F2</td><td>sector count</td><td>sector count</td></tr>
  <tr><td>0x1F3</td><td>LBA[7:0]</td><td>LBA[7:0]</td></tr>
  <tr><td>0x1F4</td><td>LBA[15:8]</td><td>LBA[15:8]</td></tr>
  <tr><td>0x1F5</td><td>LBA[23:16]</td><td>LBA[23:16]</td></tr>
  <tr><td>0x1F6</td><td>drive/head + LBA[27:24]</td><td>drive/head</td></tr>
  <tr><td>0x1F7</td><td>status</td><td>command</td></tr>
  <tr><td>0x3F6</td><td>alt status</td><td>device control</td></tr>
</table>

<h2>PIO read protocol</h2>
<p>Programmed I/O (PIO) mode 0 — slow but universal:</p>
<ol>
  <li>Write LBA bytes to 0x1F3-0x1F6.</li>
  <li>Write sector count (in 512-byte sectors) to 0x1F2.</li>
  <li>Write command READ SECTORS (0x20) to 0x1F7.</li>
  <li>Poll 0x1F7 until BSY=0 and DRQ=1 (data request).</li>
  <li>Read 256 16-bit words from 0x1F0 — that's one sector.</li>
  <li>Repeat for more sectors.</li>
</ol>
<p>An interrupt fires (IRQ 14, vector 46 in Linux remap) at the end of the operation if enabled. PIO is slow because the CPU does all the data transfer; DMA modes (UDMA) would be needed for performance, but PIO is what the boot path uses.</p>

<h2>What would it take to add this to our emulator?</h2>
<p>About 400-700 lines of Go in <code>machine/pc/ata.go</code>:</p>
<ul>
  <li>An I/O port handler at base 0x1F0 (and 0x3F6 for control).</li>
  <li>State machine: idle, awaiting command, transferring data.</li>
  <li>A backing file (passed via <code>cmd/temu -drive</code>) where reads/writes map to file offsets.</li>
  <li>An IRQ 14 line tied to PIC.</li>
</ul>
<p>For CD-ROM, the ATAPI extension adds another protocol layer (SCSI-like commands embedded in ATA packets) — another 200-300 lines.</p>

<h2>The boot story with a disk</h2>
<p>If we had ATA/ATAPI, we could:</p>
<ol>
  <li>Skip the in-memory initramfs.</li>
  <li>Boot a kernel from disk (or just kernel + initramfs from memory, then mount the disk as root).</li>
  <li>Use a normal Linux distribution's ISO without modification.</li>
</ol>
<p>The kernel would discover the disk via ATA probe at boot, mount root from <code>/dev/sda1</code> (or <code>/dev/sr0</code> for CD-ROM), and proceed to launch userspace from the disk's filesystem.</p>

<h2>The alternative: virtio-blk</h2>
<p>Modern para-virtualised disk: simpler than ATA, but requires the guest kernel to be compiled with virtio support. Linux usually has it; the kernel ours boots probably does too. The protocol uses a ring buffer in shared memory plus an MMIO doorbell — much faster than PIO.</p>

<div class="box box-note">
<strong>What's in our task list</strong>
"Add ATA (PIO mode) in <code>machine/pc/ata.go</code>; wire <code>cmd/temu -drive</code> through; add CMOS/RTC for the wall-clock; consider virtio-net for package installs" — these are the steps to graduate from "kernel + initramfs" to "fully functional disk-based system."
</div>
`,

    "Read <code>machine/pc/pc.go</code> and figure out where port I/O is dispatched. What would you add to register a new device at ports 0x1F0-0x1F7?"
  ]

{
  id: 50, phase: 5,
  title: "Putting It All Together",
  subtitle: "How Linux actually boots in tinyemu-go",
  content: `
<h2>The complete trace</h2>
<p>You've now seen every piece. Let's narrate one complete boot, step by step.</p>

<h3>0. The harness starts</h3>
<p><code>cmd/temu -machine x86 -kernel bzImage -initrd initramfs.cpio -append "console=ttyS0 ... rdinit=/myshell"</code>. The Go program parses flags, allocates 512 MB of physical RAM (a <code>[]byte</code>), creates a <code>cpu.CPU</code>, a <code>pc.PC</code> machine (wiring PIC, PIT, UART, CPU together), and a load process.</p>

<h3>1. Load the kernel</h3>
<p>The kernel image is a bzImage — a Linux-specific format that includes 16-bit real-mode setup code followed by the compressed kernel. Our loader extracts the protected-mode kernel (skipping the real-mode setup), decompresses it (gzip / xz), and places it at physical address 0x100000 (1 MB). The initramfs goes higher up. Boot params (e820 memory map, command line, initrd address/size) get placed at a known offset.</p>

<h3>2. Hand off to the kernel</h3>
<p>The harness sets up: CR0.PE=1 (protected mode), a minimal GDT with flat 32-bit code and data, EIP at the kernel entry point, EBX pointing at boot params. Starts the CPU loop.</p>

<h3>3. Early kernel</h3>
<p>The kernel's <code>startup_32</code> sets up a temporary stack, sanity-checks features (CPUID — finds our advertised feature bits), zeroes BSS, builds an initial page directory mapping the kernel's PA range. Sets CR3, CR0.PG=1. Jumps into the C-level <code>start_kernel</code>.</p>

<h3>4. start_kernel</h3>
<p>For ~290 simulated seconds, the kernel:</p>
<ul>
  <li>Parses cmdline.</li>
  <li>Detects CPU features (CPUID, MSRs — our whitelist provides what's needed).</li>
  <li>Initialises the IDT (256 entries).</li>
  <li>Initialises the buddy allocator (parses e820 → page frames).</li>
  <li>Initialises the slab/SLUB allocator.</li>
  <li>Initialises the scheduler.</li>
  <li>Initialises the IRQ subsystem (programs the 8259 PIC, the PIT).</li>
  <li>Probes drivers — discovers our UART16550 by checking ports.</li>
  <li>Unpacks the initramfs into a tmpfs.</li>
  <li>Mounts root as the in-memory tmpfs.</li>
  <li>Forks PID 1, execs <code>/myshell</code>.</li>
</ul>

<h3>5. The first user-mode instruction</h3>
<p>The kernel calls IRET to transition from CPL=0 to CPL=3 at <code>/myshell</code>'s entry point. IRET pops user EIP, CS=0x73, EFLAGS, ESP, SS=0x7B. Suddenly the CPU is at CPL=3, executing user code from a virtual address in the 0x4XXXXXX range (where the dynamic loader is). The first instruction fetch immediately raises #PF — the user code page hasn't been demand-paged in yet.</p>

<h3>6. Demand paging the first user page</h3>
<p>#PF fires. CR2 = the faulting EIP, error code = 0x14 (not-present + user + fetch). CPU dispatches IDT[14]. Stack switches via TSS.ESP0. The kernel's #PF handler reads CR2, looks up the VMA, finds the file-backed mapping for the executable, calls <code>handle_mm_fault</code>, which allocates a physical page, fills it from the initramfs file, installs the PTE. Returns to user via IRET — the same instruction restarts, this time succeeds.</p>

<h3>7. Userspace running</h3>
<p><code>/myshell</code> is a tiny shell script: it mounts /proc /sys /dev, then execs <code>busybox sh</code>. busybox sh prints "<code>~ #</code>" via INT 0x80 → write syscall → UART. The bytes come out our emulator's stdout.</p>

<h3>8. The shell is interactive</h3>
<p>The harness reads stdin in a goroutine, pushes bytes to the UART RX FIFO. The UART raises IRQ 4. Linux's serial driver picks up the byte, hands it to the line discipline, which sends it to the shell's stdin via the pipe Linux set up. The shell parses, executes, prints the result.</p>

<h2>What broke along the way</h2>
<p>Five emulator bugs blocked this path. In rough order of discovery:</p>
<ol>
  <li><strong>LOCK BTR memory-operand bit-index extension</strong>. Linux's <code>setup_clear_cpu_cap</code> was silently clearing the wrong feature bits, including FPU. Boot panicked with "Giving up, no FPU found." (Lesson 21.)</li>
  <li><strong>#PF error code missing U/S bit</strong>. Every user demand-paging fault arrived at Linux looking like a kernel bug. The kernel oopsed instead of paging in libc. (Lesson 30.)</li>
  <li><strong>IDT/GDT/TSS reads inherited CPL=3</strong>. After fix 2, the first user-mode #PF tried to read the IDT at CPL=3, faulted, triple-faulted. Supervisor-helper accesses fixed it. (Lesson 25.)</li>
  <li><strong>IRET CPL update mid-pop</strong>. After fix 3, return-to-user faulted on the EFLAGS pop because CPL had already changed. Atomic-pop fix in Lesson 42.</li>
  <li><strong>16-bit TEST against full EAX</strong>. After fix 4, init finally ran — and busybox crashed in a wide-string scan because <code>test ax, ax</code> was actually testing EAX. Lesson 19.</li>
</ol>
<p>Each one's regression test now lives in <code>cpu/x86/*_test.go</code>.</p>

<h2>What you can do now</h2>
<p>You can:</p>
<ul>
  <li>Read an x86 register dump and reconstruct what the program was doing.</li>
  <li>Decode arbitrary x86 instructions from raw bytes.</li>
  <li>Trace a system call from libc to kernel and back.</li>
  <li>Read a kernel oops and identify which page-table walk failed.</li>
  <li>Reason about why the OS arranges memory the way it does.</li>
  <li>Recognise the patterns that go wrong in emulators or hypervisors.</li>
</ul>
<p>That's a complete foundation for systems-level work. Specific topics not covered — SSE/AVX, virtualisation (VMX), x86-64 in detail, SMP and memory ordering — all extend from here without needing new fundamentals.</p>

<div class="box box-key">
<strong>The end</strong>
You've walked from "what is a register" to "how Linux boots." The same path could be re-walked for ARM, RISC-V, or any other architecture and most of the concepts transfer — the differences are mostly in encoding and which "knobs" are exposed. The fundamental shape of a computer doesn't change much across architectures.
</div>

  title: "MMX — the SIMD that wasn't going away",
  subtitle: "Why even your minimal libc needs 64-bit packed moves",
  content: `
<h2>The setup</h2>
<p>You've built a complete 32-bit x86 emulator that boots a busybox shell. You try to boot Alpine 3.19 — same kernel family, "just" a different userspace. The Alpine init script starts, prints a banner, then crashes inside <code>ld-musl-i386.so</code> with a segfault you can't explain.</p>

<p>The error in your emulator is more revealing than the kernel panic that follows:</p>
<pre>ERROR in Run: unimplemented 0F opcode: 6E at EIP=B7E5F0B2</pre>

<p><code>0F 6E</code> is <strong>MOVD</strong>: "move doubleword to an MMX register." musl libc's <code>memcpy</code> and <code>strlen</code> implementations were compiled with MMX as the baseline. Even though we cleared the MMX bit in CPUID, musl was built unconditionally with <code>-mmmx</code>, so it uses the instructions anyway. CPUID is advisory; the binary doesn't actually check.</p>

<h2>What MMX actually is</h2>
<p>MMX was Intel's 1997 attempt at SIMD before SSE existed. The big constraint was that introducing new architectural state would have broken every OS context-switch routine on the planet. Their workaround: <strong>alias the eight MMX registers onto the mantissa fields of the eight x87 floating-point registers.</strong> Same physical bits, two interpretations:</p>
<ul>
  <li>x87 sees <code>ST(0..7)</code>: 80 bits each, structured as sign + exponent + 64-bit mantissa.</li>
  <li>MMX sees <code>MM0..MM7</code>: 64-bit integers — the mantissa half of <code>ST(0..7)</code>.</li>
</ul>
<p>Writing to MM0 stamps the low 64 bits of ST(0). Writing to ST(0) clobbers MM0. To prevent code from confusing itself, Intel added an opcode <code>EMMS</code> (Empty MMX State, <code>0F 77</code>) which marks all FPU registers as "empty" in the FPU's tag word. MMX-using code is expected to call EMMS before returning to any FPU-using caller.</p>

<p>For our emulator, we don't have x87 (we stubbed it). So we just maintain <code>mm[8] uint64</code> as a standalone register file. EMMS becomes a no-op.</p>

<h2>The 5-opcode spike</h2>
<p>Faced with a multi-day implementation of the full MMX integer set, we asked: what is musl libc actually <em>doing</em> with MMX? Looking at the asm, musl's <code>memcpy</code> hot loop is essentially:</p>
<pre>movq mm0, [esi]      ; 0F 6F 06   load 8 bytes
movq [edi], mm0      ; 0F 7F 07   store 8 bytes
add esi, 8
add edi, 8
loop ...</pre>
<p>It treats MMX as a 64-bit move primitive — like a 32-bit GPR but twice as wide. No actual SIMD math. So you only need <em>five</em> opcodes to unblock musl:</p>
<ul>
  <li><code>0F 6E</code> MOVD &nbsp;mm, r/m32 &nbsp;— load 32 bits, zero-extend</li>
  <li><code>0F 7E</code> MOVD &nbsp;r/m32, mm &nbsp;— store low 32 bits</li>
  <li><code>0F 6F</code> MOVQ &nbsp;mm, mm/m64 &nbsp;— load 64 bits</li>
  <li><code>0F 7F</code> MOVQ &nbsp;mm/m64, mm &nbsp;— store 64 bits</li>
  <li><code>0F 77</code> EMMS &nbsp;— mark FPU empty (no-op for us)</li>
</ul>
<p>An hour's work. Alpine boots past musl and runs Alpine's <code>/init</code> script — Alpine Init 3.9.1-r0 prints to the console, loads the squashfs and loop drivers, gets all the way to "Mounting boot media…" before the next bug.</p>

<h2>The next bug — packed integer math</h2>
<p>The Yocto kernel uses MMX too, but differently — for checksum loops, integer comparisons, and so on. It hits <code>0F EF</code>: <strong>PXOR</strong> — packed XOR of two MMX registers. That's bitwise; just <code>mm[reg] ^= src</code>. Then <code>0F FC</code>: <strong>PADDB</strong> — packed byte add, where eight independent bytes get added in parallel <em>without</em> carrying between lanes.</p>

<p>The "no carry between lanes" is the entire point of SIMD. A regular ADD on a 64-bit value would propagate carries from bit 7 to bit 8, corrupting the high byte. Packed add does each byte separately:</p>
<pre>func packedAdd(a, b uint64, elemSize int) uint64 {
    var out uint64
    for i := 0; i &lt; 8; i++ {
        s := byte(a >> (uint(i)*8)) + byte(b >> (uint(i)*8))
        out |= uint64(s) &lt;&lt; (uint(i)*8)
    }
    return out
}</pre>
<p>Plus PSUB (subtract), PCMPEQ (compare-equal, returns all-1s per matching lane), PCMPGT (signed greater-than). And PAND / POR / PXOR / PANDN — bitwise on the full 64 bits, no per-lane semantics needed.</p>

<p>Once those land, the Yocto kernel boots through to userspace where it loads <em>all</em> the virtio modules: virtio_pci, virtio_pci_modern_dev, virtio_pci_legacy_dev, virtio_blk, virtio_net, net_failover, failover, virtio_ring. Suddenly your emulator looks like a real VM.</p>

<h2>What's still missing</h2>
<p>The integer subset (move + arith + compare + logical + a few packs/unpacks) covers ~30 of MMX's ~50 instructions. The rest are mostly things modern code doesn't use:</p>
<ul>
  <li>Saturating arith (PADDS/PADDUS/PSUBS/PSUBUS) — clamps to min/max instead of wrapping. Used in audio/video codecs.</li>
  <li>Multiplies (PMULLW / PMULHW / PMULHUW / PMADDWD).</li>
  <li>Pack/unpack between byte/word/dword granularities (PACKSSWB, PUNPCKLBW, …).</li>
  <li>Variable-count shifts (PSLL/PSRA/PSRL on word/dword/qword lanes).</li>
</ul>
<p>SSE (1999) and SSE2 (2001) added 128-bit XMM registers and floating-point packed ops. AVX (2011) widened to 256/512 bits with YMM/ZMM. Each is its own register file — no more aliasing tricks. If you wanted to boot a glibc-i686 distribution today, you'd probably need at least SSE2 because glibc is built with it as the baseline.</p>

<div class="box box-key">
<strong>Takeaway</strong>
You don't have to implement everything to make progress. Real binaries use a long-tail distribution of instructions — most of the work in any module is done by 10 % of the opcode space. Find which opcodes a binary uses by letting it crash, add those, watch how much further it gets, repeat. The five MOVD/MOVQ opcodes unlocked all of Alpine's musl libc; eight more opcodes (packed XOR/add/sub/compare/and/or/andn) unlocked the Yocto kernel's optimised checksum and zero-init paths.
</div>
`,

let currentLesson = null;
let completed = JSON.parse(localStorage.getItem('x86tut_done') || '[]');

function isComplete(id) { return completed.includes(id); }
function markComplete(id) {
  if (!completed.includes(id)) completed.push(id);
  localStorage.setItem('x86tut_done', JSON.stringify(completed));
  updateProgress(); renderNav();
}
function unmarkComplete(id) {
  completed = completed.filter(x => x !== id);
  localStorage.setItem('x86tut_done', JSON.stringify(completed));
  updateProgress(); renderNav();
}
function updateProgress() {
  const pct = LESSONS.length ? Math.round(completed.length / LESSONS.length * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${completed.length} / ${LESSONS.length}`;
}

let collapsedPhases = new Set(JSON.parse(localStorage.getItem('x86tut_collapsed') || '[]'));

function renderNav(filter = '') {
  const nav = document.getElementById('lesson-nav');
  nav.innerHTML = '';
  const f = filter.toLowerCase();
  for (let ph = 1; ph <= 5; ph++) {
    const meta = PHASE_META[ph];
    const lessons = LESSONS.filter(l => l.phase === ph && (
      !f || l.title.toLowerCase().includes(f) || l.subtitle.toLowerCase().includes(f)
    ));
    if (lessons.length === 0) continue;
    const collapsed = collapsedPhases.has(ph);
    const group = document.createElement('div');
    group.className = 'phase-group';
    group.innerHTML = `
      <div class="phase-header ${collapsed ? 'collapsed' : ''}" data-phase="${ph}"
           style="color:${meta.color}">

      <div class="phase-lessons" ${collapsed ? 'style="display:none"' : ''}>

          <div class="nav-item ${currentLesson === l.id ? 'active' : ''} ${isComplete(l.id) ? 'done' : ''}"
               data-id="${l.id}"
               style="${currentLesson === l.id ? `border-left-color:${meta.color}` : ''}">
            <span class="nav-check">${isComplete(l.id) ? '✓' : ''}</span>
            <span class="nav-num">${l.id}</span>
            ${l.title}
          </div>
        `).join('')}
      </div>
    `;
    nav.appendChild(group);
  }
  nav.querySelectorAll('.phase-header').forEach(h => {
    h.addEventListener('click', () => {
      const ph = parseInt(h.dataset.phase);
      const lessons = h.nextElementSibling;
      if (collapsedPhases.has(ph)) {
        collapsedPhases.delete(ph);
        h.classList.remove('collapsed');

        collapsedPhases.add(ph);

  });
  nav.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => showLesson(parseInt(item.dataset.id)));
  });
}
