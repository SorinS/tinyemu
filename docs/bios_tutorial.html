{
  id: 17, phase: 5,
  title: "virtio-blk Init and the Queue",
  subtitle: "How SeaBIOS sets up a paravirtual disk",
  content: `
<h2>The virtio-blk init sequence</h2>
<p>SeaBIOS finds our virtio-blk device on the PCI bus (vendor 0x1AF4, device 0x1001, subsystem ID 0x0002 = block). It then walks the legacy virtio init flow:</p>
<ol>
  <li>Reset the device: write 0 to the status register at port-offset 0x12.</li>
  <li>Set ACKNOWLEDGE: status = 0x01.</li>
  <li>Set DRIVER: status = 0x03.</li>
  <li>Read host features from port-offset 0x00. We return 0 (no fancy features).</li>
  <li>Write guest features to port-offset 0x04 (subset of host features the driver accepts).</li>
  <li>Set FEATURES_OK: ... actually legacy skips this; goes straight to queue setup.</li>
  <li>Select virtqueue 0 (port-offset 0x0E).</li>
  <li>Read queue size (port-offset 0x0C). We return 256.</li>
  <li>Allocate descriptor/avail/used ring memory in low RAM. Write the PFN (physical &gt;&gt; 12) to port-offset 0x08.</li>
  <li>Read virtio-blk-specific config: capacity (8 bytes), size_max, seg_max, geometry, blk_size, ...</li>
  <li>Set DRIVER_OK: status = 0x07.</li>
</ol>

<h2>The queue size trap</h2>
<p>If our virtio device offers a queue size that's larger than SeaBIOS supports (MAX_QUEUE_NUM = 256), SeaBIOS prints "ERROR: queue size N &gt; 256" and gives up. We return exactly 256 from <code>pciQueueSize</code> in <code>virtio/pci.go</code> — and that's exactly the SeaBIOS limit, by coincidence.</p>

<p>If our device offers <em>too few</em> entries (say, 16), SeaBIOS quietly uses that — but the kernel might not, because Linux's virtio-net needs num_free ≥ 2 + MAX_SKB_FRAGS = 19, and refuses to bring the device up with a smaller queue. 256 is the right number for both BIOS and kernel.</p>

<h2>The disk read path</h2>
<p>Once initialised, a single disk read is:</p>
<ol>
  <li>SeaBIOS builds a virtio request: a header struct (request type, sector LBA) followed by a data buffer (where the read goes) followed by a 1-byte status.</li>
  <li>Three descriptors in the desc ring: one for each of those three regions. They're chained.</li>
  <li>SeaBIOS writes the head descriptor's index to the avail ring.</li>
  <li>Bumps the avail ring's idx counter.</li>
  <li>Writes the queue notify port (port-offset 0x10) to kick the device.</li>
</ol>
<p>Our device's <code>queueNotify</code> handler walks the avail ring, processes the request (reads the LBA from the backing store, writes to the data buffer in guest memory), sets the status byte to VIRTIO_BLK_S_OK, writes the used ring entry, bumps the used idx, and optionally raises an interrupt.</p>

<p>SeaBIOS polls the used ring (it doesn't wait for interrupts during boot — it uses a busy-loop with <code>usleep</code> to throttle). Once used.idx changes, it reads the request status from the status byte. Done.</p>

<h2>Why the read silently failed at first</h2>
<p>SeaBIOS reassigned our BAR from 0xC100 to 0xC000. Our I/O port handlers stayed at 0xC100. The init reads/writes saw 0xFFFF everywhere → "queue size 65535 > 256". The fix: <code>SetBARChangeHandler</code>. See Lesson 11.</p>

<p>After fixing the BAR, init succeeded but the read still silently failed. SeaBIOS's <code>process_op_32</code> tested <code>op-&gt;drive_fl-&gt;type</code> and got 0 — not DTYPE_VIRTIO_BLK. The drive lookup returned NULL because in 32-bit mode DS had a stale base. The fix: GDT walk on protected-mode segment loads. See Lesson 6.</p>

<div class="box box-key">
<strong>Two layers of bug</strong>
The BAR-relocation bug was visible from the BIOS log ("queue size 65535"). The GDT-cache bug was silent — SeaBIOS reported "Booting from Hard Disk..." and then "could not read the boot disk", with no I/O ever reaching the device. The DUMPCYCLE + watchpoint chain in DEBUG.md is what eventually exposed it.
</div>
`,
  exercises: [
    "What's a virtqueue \"descriptor chain\" and why does virtio use it instead of separate (header, data, status) ports?",
    "Why does SeaBIOS poll instead of waiting for an interrupt during boot?",
    "Read <code>queueNotify</code> in our virtio code. How does it know how many requests to process?"
  ],
  answers: [
    "A descriptor chain is a set of ring entries linked by their <code>next</code> field, each pointing at one guest-memory buffer with read/write flags. A virtio-blk request uses three chained descriptors — the request header (read-only by the device), the data buffer (write for a read op), and the 1-byte status (device-written). Virtio uses a chain instead of separate ports because it is a shared-memory transport: one notify kick describes an entire scatter-gather request whose buffers can be anywhere in RAM, with no need for the guest to stream bytes through fixed I/O ports, which is far more efficient and avoids per-byte traps.",
    "Because during boot SeaBIOS runs with interrupts effectively unavailable for this path (it is in a tightly controlled BIOS context, often with IF managed around the call32 transition) and it only needs the result of one request before continuing. Polling the used-ring index in a busy-loop (throttled by <code>usleep</code>) is simpler and avoids depending on correct PIC/IRQ wiring for the virtio device at boot time. Interrupt-driven completion is a runtime-OS optimisation, not something the one-shot BIOS read path needs.",
    "<code>queueNotify</code> reads the avail ring's <code>idx</code> field and compares it to the index it last processed (its <code>lastAvailIdx</code>): the difference is the number of newly-published head descriptors to handle. It loops over those entries — for each, following the descriptor chain, performing the I/O, writing the status byte, and posting a used-ring entry — until its consumed index catches up to avail.idx. So the avail.idx delta, not a count passed in the notify write, tells it how many requests are pending."
  ]
},

{
  id: 18, phase: 5,
  title: "INT 13h Through Three Layers",
  subtitle: "The 16-to-32 transition for a disk read",
  content: `
<h2>The three layers</h2>
<p>A virtio-blk disk read invoked via INT 13h passes through three SeaBIOS layers:</p>
<ol>
  <li><strong>The 16-bit interrupt-vector stub.</strong> IVT[0x13] points at SeaBIOS code in BIOS ROM. The stub pushes the BIOS function pointer and jumps to a common entry trampoline.</li>
  <li><strong>The 16-bit common entry (<code>irqentry_arg_extrastack</code>).</strong> Switches stacks (because INT 13h has caller register-pressure constraints), saves the caller's registers into a bregs struct, calls the C handler in 16-bit mode.</li>
  <li><strong>The C handler (<code>handle_13</code> in <code>disk.c</code>).</strong> Looks up the drive struct, builds a disk_op_s, calls <code>process_op</code>. For drives that need 32-bit mode (virtio-blk does), <code>process_op_both</code>'s default case calls <code>call32(process_op_32, ...)</code>, transitioning to 32-bit mode for the actual virtio request.</li>
</ol>

<h2>The call32 mechanism</h2>
<p>SeaBIOS's <code>__call32</code> in <code>romlayout.S</code> does an in-line mode transition:</p>
<pre>; entering: %eax = arg, %edx = function ptr
mov  %ss, %0          ; save SS for later restore
mov  %esp, %1         ; save ESP
shl  $4, %0
add  %0, %esp         ; flatten ESP for 32-bit
shr  $4, %0
mov  $(BIOS+1f), %edx
jmp  transition32_nmi_off
[in pm32]:
1:  call *%3          ; call the 32-bit function
    mov  $2f, %edx
    jmp  transition16big
[back in 16-bit]:
2:  mov %0, %ds       ; restore segments
    mov %0, %ss
    mov %1, %esp</pre>

<p>The key thing: after the jump to <code>transition32_nmi_off</code>, the CPU executes a few instructions that reload DS/SS/ES/etc. with flat 32-bit selectors from the 32-bit GDT. This is where our GDT-walk-on-MOV-to-Sreg comes in. If we skip the GDT walk, DS keeps its real-mode-cached base (0xda800 if we just switched to the zonelow stack), and the C function's first dereference of <code>op-&gt;drive_fl</code> lands 0xda800 bytes high.</p>

<h2>How we identified the bug</h2>
<p>Step 1: confirm where the failure point is. We captured a per-cycle RIP sample, found the INT 13h delivery cycle (with <code>TINYEMU_X64_INTR=1</code>: <code>cycle=20272304 vec=19 -&gt; 0xf000:0xe3fe</code>), then did a step trace from there.</p>

<p>Step 2: notice that pm32 IS entered (3334 instructions in pm32 within the INT 13h window). So <code>call32</code> works. But no virtqueue notify happens. So we reach <code>process_op_32</code> but don't reach <code>virtio_blk_op</code>.</p>

<p>Step 3: figure out where <code>process_op_32</code> branches away. The pm32 code starts at the call32 landing pad (in BIOS ROM), then calls <code>process_op_32</code> in the relocated init code. Disassemble there and look at the switch on <code>op-&gt;drive_fl-&gt;type</code>.</p>

<p>Step 4: dump <code>[DS:EAX]</code> at the cycle where the switch executes. The dump shows <code>DS=0x10:0xda800</code> — DS selector 0x10 (the flat data segment, expected) but DS base 0xda800 (the stale zonelow base). That's wrong; flat should have base 0. The drive type read from this stale-base address is 0.</p>

<p>That's the bug. The fix is one function (<code>loadProtSegment</code>) and one call from <code>opMOVtoSreg</code>.</p>

<h2>How the boot looks after the fix</h2>
<pre>SeaBIOS (version rel-1.17.0-...)
...
Booting from Hard Disk...
Booting from 0000:7c00</pre>
<p>The sector successfully reads to 0x7C00, and the boot sector starts executing.</p>

<div class="box box-key">
<strong>The methodology in 4 steps</strong>
(1) Find the failure cycle. (2) Confirm the mode transition succeeded. (3) Identify the branch that goes wrong. (4) Dump the data that the branch reads. The diagnostic toolkit makes each step a 30-second operation; the bug surrendered in an afternoon.
</div>
`,
  exercises: [
    "Why does SeaBIOS run INT 13h on a different stack from the caller? What stack is it on?",
    "Could the GDT-walk bug have been caught by Linux? Why didn't it surface there?",
    "Read <code>loadProtSegment</code>. What happens if the GDT entry has a non-flat base (e.g. for a legacy 32-bit segmented OS)?"
  ],
  answers: [
    "Because INT 13h is invoked from arbitrary real-mode callers (bootloaders, DOS) whose stacks may be tiny or nearly full, and the 32-bit C handler plus its call32 excursion needs more stack than the caller can guarantee. SeaBIOS switches to its own known-good stack — the EBDA/zonelow \"extra stack\" (the <code>extrastack</code> in the EBDA at segment base ~0xda800) — so it has room to save registers and run the C code safely, then restores the caller's SS:SP on the way out.",
    "No — Linux would not have caught it, because Linux never reloads DS across the specific 16-bit→32-bit transition that triggers the bug. The stale-cache fault only appears when a segment whose hidden base was set in one context (the 0xda800 zonelow stack) is reloaded via a selector that should resolve to a flat (base 0) descriptor, which is exactly what SeaBIOS's <code>call32</code> thunk does and a long-mode Linux boot does not. Linux loads its flat selectors once during early setup and runs flat thereafter, so the missing GDT walk never produced a wrong base for it.",
    "<code>loadProtSegment</code> parses the 8-byte descriptor and copies its <code>base</code>, <code>limit</code>, and access bits into the segment's hidden cache verbatim. If the GDT entry has a non-flat base (a real segmented 32-bit OS), the cache gets that non-zero base, and subsequent accesses through the segment are correctly offset by it and bounded by its limit. The function is not flat-specific — it honours whatever base/limit the descriptor specifies, which is precisely why doing the walk (rather than assuming base 0) is required for correctness across all guests."
  ]
},

{
  id: 19, phase: 5,
  title: "Option ROMs and Why We Don't Need One",
  subtitle: "The 0xC0000 scan region",
  content: `
<h2>The scan</h2>
<p>After PCI init, SeaBIOS walks the address range 0xC0000–0xEFFFF looking for option ROMs:</p>
<ol>
  <li>At each 2 KB boundary, check the first two bytes. <code>55 AA</code> = option ROM present.</li>
  <li>The third byte is the ROM size in 512-byte units.</li>
  <li>If a valid ROM is found, set up the segment, call the ROM's init entry at offset 3.</li>
  <li>The init code is expected to (a) install any IVT hooks it wants, (b) return.</li>
</ol>
<p>Common option ROM contents:</p>
<ul>
  <li>VGA BIOS (vgabios.bin): hooks INT 10h.</li>
  <li>Network boot ROMs (iPXE, gPXE): hook INT 19h to redirect boot to TFTP.</li>
  <li>Disk-controller ROMs: pre-init or expose extended INT 13h.</li>
</ul>

<h2>What we ship</h2>
<p>Nothing. The 0xC0000–0xEFFFF region in our emulator is plain RAM with no preloaded ROMs. SeaBIOS scans it, finds nothing, and continues without any extensions.</p>

<p>That's why:</p>
<ul>
  <li>INT 10h returns SeaBIOS's stub responses — basic teletype works, VBE doesn't.</li>
  <li>There's no network-boot option in SeaBIOS's boot menu.</li>
  <li>The IDE handler exists but offers only the basic functions SeaBIOS built in.</li>
</ul>

<h2>How to add a VGA BIOS</h2>
<p>If we wanted MenuetOS to get past the VBE check, the sequence would be:</p>
<ol>
  <li>Acquire vgabios.bin (the SeaBIOS-side VGA BIOS, ~32 KB).</li>
  <li>At boot, copy it into RAM at 0xC0000. SeaBIOS scans, finds the signature, calls its init.</li>
  <li>The VGA BIOS init expects a VGA device on a known set of I/O ports + a linear framebuffer. We'd need to model both.</li>
  <li>VBE mode-set calls (INT 10h AX=4F02) ask for a specific mode. The VGA BIOS programs the device's mode registers. The framebuffer becomes available at a known MMIO base.</li>
  <li>Render the framebuffer somewhere a human can see it.</li>
</ol>
<p>Step 4 is what makes this expensive: it's a substantial new device with state machines for CRTC programming, attribute controller, sequencer, plus VBE mode tables. Step 5 is what makes it impossible <em>in a terminal emulator</em>.</p>

<div class="box box-key">
<strong>The scan region is just RAM with bytes</strong>
The whole option-ROM mechanism is "BIOS scans a region for magic bytes". You can do anything you want with it as long as the bytes follow the format. That's how iPXE replaces INT 19h — its init code writes a new vector into IVT[0x19].
</div>
`,
  exercises: [
    "What's the maximum total option-ROM size that fits in the scan region?",
    "If you wrote a tiny option ROM that printed \"hello\" via INT 10h teletype, what would it look like? (Three lines of asm.)",
    "Read SeaBIOS's option-ROM scan code (<code>src/optionroms.c</code>). What does it do if the size byte is 0?"
  ],
  answers: [
    "The scan region is 0xC0000-0xEFFFF, which is <code>0xEFFFF - 0xC0000 + 1 = 0x30000 = 192 KiB</code>. That is the maximum total option-ROM space; individual ROMs are aligned to 2 KiB boundaries and each declares its own size in 512-byte units (so up to 255 * 512 = ~128 KiB for a single ROM), but the sum across all option ROMs cannot exceed the 192 KiB window.",
    "An option ROM starts with the signature and a size byte, then the init entry at offset 3. A trivial \"hello\" ROM: <code>db 0x55, 0xAA, 0x01</code> (signature + 1*512-byte size), then at offset 3 the init code — load DS, loop calling INT 10h AH=0x0E (teletype) for each character of \"hello\", then <code>retf</code>. In practice you pad the image to 512 bytes and set the last byte so the whole ROM checksums to zero, since SeaBIOS verifies the checksum before calling init.",
    "If the size byte (the third byte) is 0, the ROM declares a length of zero. SeaBIOS treats this as an invalid/empty option ROM: it cannot compute or verify the image, so it skips the candidate and continues the scan at the next 2 KiB boundary rather than calling an init entry. A zero size therefore means \"no usable ROM here.\""
  ]

=== PCI device probing ===
Found 2 PCI devices (max PCI bus is 00)</pre>
<p>PCI enumeration starts. Found 2 = host bridge + ISA bridge. With <code>-drive</code>, 3 = host + ISA + virtio-blk.</p>

<pre>=== PCI new allocation pass #1 ===
=== PCI new allocation pass #2 ===
PCI: IO: c000 - bfff
PCI: 32: 0000000080000000 - 00000000fec00000</pre>
<p>Two-pass BAR assignment. The first I/O address allocated is 0xC000 (above the PIIX3's hardcoded BMDMA at 0xC000 — wait, there's no conflict on x86_64 because we skip the PIIX3 IDE on x86_64). I/O space allocator is empty (c000 &gt; bfff). MMIO ranges programmed for the host bridge.</p>

<pre>PCI: map device bdf=00:03.0  bar 0, addr 0000c000, size 00000040 [io]</pre>
<p>SeaBIOS assigned BAR 0 of our virtio-blk device to I/O 0xC000, size 64 bytes. This triggered <code>SetBARChangeHandler</code> in our PCI device, which re-registered the virtio I/O handlers at 0xC000.</p>

<pre>PCI: init bdf=00:00.0 id=8086:1237
PCI: init bdf=00:01.0 id=8086:7000
PIIX3/PIIX4 init: elcr=00 0c
PCI: init bdf=00:03.0 id=1af4:1001</pre>
<p>Per-device init. The PIIX3 init prints its ELCR (Edge/Level Control Register) state.</p>

<pre>No apic - only the main cpu is present.
Copying PIR from 0x0027fd40 to 0x000f55a0
Copying MPTABLE from 0x00006de4/263ed0 to 0x000f54c0
Copying SMBIOS from 0x00006de4 to 0x000f5390
ACPI tables for qemu 1.6 and older are not supported any more.
CPU Mhz=0</pre>
<p>SeaBIOS copies the PIR (PCI IRQ routing), MPTABLE (Intel MultiProcessor spec), SMBIOS (system management BIOS) tables into the F-segment so the OS can find them at fixed locations. ACPI is skipped because our fw_cfg doesn't speak the format SeaBIOS expects from QEMU. CPU MHz=0 because our PIT calibration produces 0 (the toggles aren't paced).</p>

<pre>Scan for VGA option rom
No VGA found, scan for other display
Turning on vga text mode console</pre>
<p>Scans 0xC0000–0xEFFFF for option ROMs with 55 AA signatures. Finds none. Falls back to the text-mode VGA console.</p>

<pre>Space available for UMB: c0000-e9800, f4e20-f5390
Returned 249856 bytes of ZoneHigh
e820 map has 6 items:
  0: 0000000000000000 - 000000000009fc00 = 1 RAM
  ...</pre>
<p>Finalising the memory map. UMB (upper memory blocks) are claimed; ZoneHigh (SeaBIOS's high allocator) gives some back. The e820 map is the OS-facing memory map.</p>

<pre>found virtio-blk at 00:03.0
pci dev 00:03.0 using legacy (0.9.5) virtio mode
Searching bootorder for: /pci@i0cf8/*@3
Searching bios-geometry for: /pci@i0cf8/*@3
drive 0x000e9910: PCHS=65535/255/255 translation=lba LCHS=2/16/63 s=2880</pre>
<p>virtio-blk init succeeds. SeaBIOS picks legacy mode (we don't advertise modern virtio). Finds the drive in the boot order. Computes geometry: 2880 sectors = 1.44 MiB.</p>

<pre>Press ESC for boot menu.

Searching bootorder for: HALT
Booting from Hard Disk...
Booting from 0000:7c00</pre>
<p>2.5-second boot-menu timeout. Then INT 13h reads sector 0, validates the boot signature, jumps to 0x7C00. The bootloader has the CPU now.</p>

<h2>Diagnostic patterns</h2>
<p>Reading this log over and over reveals patterns. "Found N PCI devices" gives you a quick sanity check that all your -drive and -net flags wired through. "queue size N &gt; 256" jumps out from across the screen. "could not read the boot disk" tells you the bug is in your INT 13h path. Once you've debugged five SeaBIOS hangs, you can guess the bug from a 5-line excerpt.</p>

<div class="box box-key">
<strong>The cheap diagnostic</strong>
<code>TINYEMU_BIOS_DEBUG=stderr</code> costs nothing and is the first thing you should run when a boot misbehaves. Treat the BIOS log as your test oracle.
</div>

<h2>The instruments</h2>
<p>Every tool is gated on an env var and writes structured lines to stderr. The pattern is "instrument once, use forever."</p>

<table class="corr-table">

  <tr><td><code>TINYEMU_X64_RIPSAMPLE=N</code></td><td>Hung; need to know where RIP is spinning.</td></tr>

  <tr><td><code>TINYEMU_X64_RIPTRACE=lo-hi</code></td><td>Want full trace whenever RIP enters a function range.</td></tr>
  <tr><td><code>TINYEMU_X64_PHYSWATCH=lo-hi</code></td><td>A value at memory is wrong; want every write to it.</td></tr>
  <tr><td><code>TINYEMU_X64_DUMPCYCLE=N</code></td><td>Want a one-shot register + memory snapshot at cycle N.</td></tr>
  <tr><td><code>TINYEMU_X64_INTR=1</code></td><td>Suspect an interrupt path is wrong.</td></tr>
  <tr><td><code>TINYEMU_X86_IO_DEBUG=1</code></td><td>Device isn't responding; want every I/O port access.</td></tr>
  <tr><td><code>TINYEMU_VIRTIO_PCI_DEBUG=1</code></td><td>Virtio device misbehaving; want register-level access trace.</td></tr>
  <tr><td><code>TINYEMU_BIOS_DEBUG=path/stderr</code></td><td>Always.</td></tr>
  <tr><td><code>TINYEMU_FDC_DEBUG=1</code></td><td>Floppy reads aren't reaching the device.</td></tr>
  <tr><td><code>TINYEMU_X86_PERF=1</code></td><td>Cycle count is suspicious (HLT loop spin, etc.).</td></tr>
</table>

<h2>How they compose</h2>
<p>A typical session uses 2–3 at once. The MenuetOS disk-read diagnosis used:</p>
<ul>
  <li><code>BIOS_DEBUG</code> to confirm SeaBIOS reported "could not read the boot disk".</li>
  <li><code>X64_INTR</code> to find the cycle of the INT 13h delivery.</li>
  <li><code>X64_TRACE_CYCLES</code> over the INT 13h window to see the instruction stream.</li>
  <li><code>X64_DUMPCYCLE</code> at one specific instruction to see the EAX value and what [DS:EAX] contained.</li>
</ul>
<p>The DUMPCYCLE output gave us the answer: <code>DS=0x10:0xda800</code> when it should be <code>DS=0x10:0x0</code>.</p>

<h2>Adding a new instrument</h2>
<p>The pattern in our codebase:</p>
<pre>// cpu/x86_64/exec.go
var traceCycleLo, traceCycleHi uint64 = func() (uint64, uint64) {
    s := os.Getenv("TINYEMU_X64_TRACE_CYCLES")
    if s == "" { return 0, 0 }
    ... parse "lo-hi" ...
}()

// inside Step():
if traceCycleLo < traceCycleHi && c.cycles >= traceCycleLo && c.cycles < traceCycleHi {
    ... print step ...
}</pre>
<p>Three properties:</p>
<ol>

  <li>Print structured lines starting with a tag (<code>[step]</code>, <code>[intr]</code>, <code>[fdc]</code>) so grep works.</li>
  <li>Include the cycle counter in every line so you can correlate across instruments.</li>
</ol>

<h2>The "cycle" anchor</h2>
<p>Every line from every instrument includes the cycle count. That's the universal join key. When you have INTR output and STEP output and a PHYSWATCH output, you can sort all three by cycle and read the unified narrative. The bug surrenders.</p>

<div class="box box-key">
<strong>Build instruments before you need them</strong>
The day you debug a hard bug, you'd rather have the right tool than spend two hours building one. Add a new env-var-gated trace whenever you find yourself doing the same grep/awk three times.
</div>

<h2>Phase 1: minimum viable boot</h2>
<p>You have a new guest image. What you do in the first 30 minutes:</p>

<ol>
  <li><strong>Decide the target.</strong> What do you want the guest to do? "Print to UART", "show login prompt", "run /init"?</li>
  <li><strong>Run it.</strong> Pick the right machine type, the right device. <code>-drive</code> for HDD-bootable, <code>-fda</code> for floppy, <code>-cdrom</code> for ISO, <code>-kernel</code> for direct bzImage load.</li>
  <li><strong>Enable BIOS debug.</strong> <code>TINYEMU_BIOS_DEBUG=stderr</code>. Read what SeaBIOS thinks is happening.</li>
  <li><strong>Look at the first failure.</strong> Is it an <code>ErrNotImplemented</code> opcode? A device timeout? A hang?</li>
</ol>

<h2>Phase 2: classify the failure</h2>
<table class="corr-table">
  <tr><th>What you see</th><th>What it usually is</th></tr>
  <tr><td>"Boot failed: could not read the boot disk"</td><td>SeaBIOS's INT 13h path failed — drive lookup, geometry, or transition.</td></tr>
  <tr><td>"queue size N &gt; 256"</td><td>BAR relocation; the virtio device isn't being reached.</td></tr>
  <tr><td>Boot menu wait never times out</td><td>Timer ticks not firing (PIT bug).</td></tr>
  <tr><td>"ERROR in Run: decoder feature not implemented yet: opcode 0xNN"</td><td>Missing opcode; either implement it or check why this code path is reached.</td></tr>
  <tr><td>Boot succeeds, then halt at <code>eb fe</code></td><td>Guest detected a missing feature (VBE, A20, ACPI table) and deliberately halted.</td></tr>
  <tr><td>"Linux version" prints but no shell</td><td>Root filesystem issue, not the emulator. Check kernel cmdline and initrd.</td></tr>
</table>

<h2>Phase 3: diagnose</h2>
<p>Pick the right tool for what you saw:</p>
<ul>
  <li>Missing opcode? Implement it directly, or batch (Lesson 14 of DEBUG.md — opcode-frequency audit).</li>
  <li>Device not reached? <code>TINYEMU_X86_IO_DEBUG=1</code>, see if the I/O writes are landing on a registered port. Check BARs.</li>
  <li>Wrong control flow? RIPSAMPLE coarse → fine → cycle-window trace. Disassemble the divergence point.</li>
  <li>Memory corruption? PHYSWATCH on the bytes that look wrong.</li>
  <li>Mode wrong? DUMPCYCLE at the suspect instruction. Check CS.access bits in the dump.</li>
</ul>

<h2>Phase 4: pin it</h2>
<p>Every non-trivial fix gets a unit test that:</p>
<ol>
  <li>Sets up the exact CPU/device state the bug needs.</li>
  <li>Lays down the failing bytes.</li>
  <li>Runs <code>Step()</code>.</li>
  <li>Asserts the corrected behavior.</li>
  <li>Verified to fail against the pre-fix code.</li>
</ol>
<p>See <code>cpu/x86_64/jmpfar_test.go</code> for the canonical example. The test has comments explaining what's being guarded and why.</p>

<h2>The 80/20</h2>
<p>For most new guests:</p>
<ul>
  <li>~10 minutes: get it to start.</li>
  <li>~30 minutes: find the first hang or crash.</li>
  <li>~2-4 hours: diagnose and fix.</li>
  <li>~30 minutes: write the regression test.</li>
</ul>
<p>For pathological guests (graphical, novel chipset, unsupported architecture), the diagnose step can be days. The toolkit shortens this; it doesn't eliminate it.</p>

<div class="box box-key">
<strong>The audit checklist</strong>
(1) Does it reach a recognizable BIOS log line? (2) Does it hit an opcode gap? (3) Does it complete device init? (4) Does it issue I/O? (5) Does it find a boot device? Anything beyond (5) is "the guest is running"; bugs there are usually the guest's, not ours.
</div>
`,

    "Pick a hobby OS image (anything pre-built) and run through Phase 1 + Phase 2. Write up what you saw.",
    "Of the failure-class table above, which would you fix first if you had to pick one? Why?",
    "What's a test setup you'd add to the toolkit to catch a new class of bug?"

  subtitle: "What's beyond this tutorial",
  content: `
<h2>In this repo</h2>
<ul>
  <li><code>docs/x86_tutorial.html</code> — what the CPU itself does. Instructions, registers, paging, GDT/IDT, syscalls.</li>
  <li><code>docs/x64_tutorial.html</code> — the long-mode extensions: 64-bit registers, 4-level paging, the new GP exception classes.</li>
  <li><code>docs/osdev_tutorial.html</code> — what a kernel does with all that. Drivers, scheduling, filesystems.</li>
  <li><code>docs/DEBUG.md</code> — the diagnostic techniques used to find every BIOS bug above.</li>
  <li><code>docs/USAGE.md</code> — running the emulator: command-line flags, env vars, machine types.</li>
  <li><code>docs/Optimization.md</code> — how we made the emulator fast enough to boot a real kernel in reasonable wall time.</li>
</ul>

<h2>The source we audited</h2>
<ul>
  <li><code>bin/seabios.git/src/</code> — the SeaBIOS source. <code>romlayout.S</code> for mode transitions; <code>disk.c</code> for INT 13h; <code>floppy.c</code>, <code>virtio-blk.c</code> for the drivers; <code>post.c</code> for the main init flow.</li>
  <li><code>bin/seabios/bios.bin</code> — the binary we boot.</li>
</ul>

<h2>Spec references</h2>
<ul>
  <li><strong>Intel SDM Vol 2</strong>: instruction reference. The spec for what each opcode does. We've cited it ~50 times.</li>
  <li><strong>Intel SDM Vol 3 §3</strong>: segmentation, GDT/LDT descriptor format. The spec for Lessons 6 and 7.</li>
  <li><strong>Intel SDM Vol 3 §6</strong>: interrupts and exceptions. The spec for Lesson 9.</li>
  <li><strong>SeaBIOS Wiki</strong>: <a href="https://www.seabios.org/SeaBIOS">seabios.org</a>. Architecture, build system, debug port details.</li>
  <li><strong>OSDev Wiki</strong>: <a href="https://wiki.osdev.org/">wiki.osdev.org</a>. The de facto reference for everything from PIC to FDC to virtio.</li>
</ul>

<h2>Things we deliberately didn't model</h2>
<p>Useful to know what's <em>not</em> in scope when reading our code:</p>
<ul>
  <li>SMP — we're single-CPU.</li>
  <li>SMM (System Management Mode) — never entered.</li>
  <li>x87 floating point arithmetic to bit-exact precision — basics are there, edge cases aren't.</li>
  <li>Cache coherency / fence semantics — single-threaded.</li>
  <li>Performance counters / PMCs — RDMSR returns 0 for performance-counter MSRs.</li>
  <li>Vector instructions beyond SSE2 — no AVX, no AVX-512.</li>
  <li>UEFI firmware — legacy BIOS only.</li>
</ul>
<p>A modern OS might assume some of these exist. When it does, we usually surface as <code>ErrNotImplemented</code>; sometimes as a wrong value that confuses the guest in obscure ways. The toolkit catches the latter cases.</p>

<h2>The closing thought</h2>
<p>The BIOS is the most "lower" piece of software running on a PC. Everything else — kernel, drivers, applications — sits on top of an ABI it published. Understanding the BIOS makes you fluent in the assumptions the entire stack inherits. Now that you've read this far you've seen them all: the IVT, the e820 map, INT 13h's DL convention, the 0x55AA boot signature, the 64-bit transition through a 32-bit ljmp. They're not arbitrary — they're forty years of accumulated compatibility constraints, frozen into the smallest layer that has to know about every disk, every interrupt, and every device class an OS expects to find.</p>

<p>Anywhere you see those assumptions in a kernel, you can now point at the BIOS line responsible.</p>

<div class="box box-key">
<strong>You now understand</strong>
What the BIOS does. Why each piece exists. How to debug it. How to write the chassis that hosts it. What its successors (UEFI) replaced. Everything that hangs off these primitives — bootloaders, hypervisors, embedded firmware — is a variant of the same machine.
</div>
`,
  exercises: [
    "Read SeaBIOS's main entry (<code>handle_post</code>). Match each phase to one of the lessons in this tutorial.",
    "Write a one-page summary of what we changed in <code>tinyemu-go</code> to host SeaBIOS, ordered by which fix unblocked the next.",
    "Pick any one BIOS function we didn't implement in detail (INT 15h AX=87h block move, INT 1Ah RTC time) and write a one-page tutorial entry on it."
  ],
  answers: [
    "<code>handle_post</code> drives, in order: POST/chipset bring-up (Phase 1 lessons), RAM detection feeding the e820 map (Lesson 4), PIC/PIT setup (Lessons 9-10, 12), PCI enumeration and BAR allocation (Lesson 11), the option-ROM scan (Lesson 19), drive discovery for floppy and virtio-blk (Lessons 14, 17), publishing the IVT handlers (INT 10h/13h/15h/16h, Lesson 13), and finally the boot-device selection and hand-off to 0x7C00 (Lesson 15). Reading the log end-to-end (Lesson 20) is essentially walking <code>handle_post</code> top to bottom.",
    "Model answer (ordered by unblocking): <strong>(1)</strong> Port 0x402 returns 0xE9 — turns on the debug log used to find everything else. <strong>(2)</strong> PIT reload-0 = 65536 — without ticks the boot-menu wait never ends, so nothing past POST runs. <strong>(3)</strong> Port 0x61 bit-4/5 toggles — lets the PIT calibration loop finish. <strong>(4)</strong> Correct push/pop widths (<code>pushPopOperandSize</code>) — keeps the stack aligned through SeaBIOS's IRQ trampolines. <strong>(5)</strong> Real-mode IP wrap on CS.D — stops POST running off the F-segment. <strong>(6)</strong> BIOS high alias at 0xFFFC0000 — makes the reset vector land in ROM. <strong>(7)</strong> PCI BAR-relocation callback — lets the virtio device follow its reassigned base. <strong>(8)</strong> GDT walk on segment loads — fixes the silent virtio disk read in 32-bit mode. <strong>(9)</strong> Real-mode interrupt delivery + the legacy opcode batch + CMPSB/W — finish the INT 13h boot path. The throughline: each fix made the <em>next</em> log line reachable.",
    "Model entry for <strong>INT 1Ah (RTC/time services)</strong>: INT 1Ah is the real-mode time-of-day and real-time-clock interrupt, selected by AH. AH=0x00 reads the BIOS tick counter (the 18.2 Hz count maintained in the BDA at 0x46C by the IRQ 0 handler), returning CX:DX = ticks since midnight and AL = midnight-rollover flag. AH=0x02 reads the wall-clock time from the CMOS RTC (CH=hours, CL=minutes, DH=seconds, all BCD); AH=0x04 reads the date. SeaBIOS implements these by sequencing the CMOS index/data ports (0x70/0x71) for the RTC registers and by reading the tick counter the timer ISR increments. A guest uses INT 1Ah AH=0x00 for coarse timing before it has its own clock, and AH=0x02/0x04 to seed the OS's notion of date/time at boot. The tie to our work: it depends on the same CMOS device (Lesson 4) and the same IRQ 0 tick path (Lesson 10) we already built, so it would be a thin handler over existing chassis."

// ============================================================
// APP STATE
// ============================================================
let currentLesson = null;
let completed = JSON.parse(localStorage.getItem('bios_done') || '[]');

function isComplete(id) { return completed.includes(id); }
function markComplete(id) {
  if (!completed.includes(id)) completed.push(id);
  localStorage.setItem('bios_done', JSON.stringify(completed));
  updateProgress(); renderNav();
}
function unmarkComplete(id) {
  completed = completed.filter(x => x !== id);
  localStorage.setItem('bios_done', JSON.stringify(completed));
  updateProgress(); renderNav();
}
function updateProgress() {
  const pct = LESSONS.length ? Math.round(completed.length / LESSONS.length * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${completed.length} / ${LESSONS.length}`;
}

let collapsedPhases = new Set(JSON.parse(localStorage.getItem('bios_collapsed') || '[]'));

function renderNav(filter = '') {
  const nav = document.getElementById('lesson-nav');
  nav.innerHTML = '';
  const f = filter.toLowerCase();
  for (let ph = 1; ph <= 6; ph++) {
    const meta = PHASE_META[ph];
    const lessons = LESSONS.filter(l => l.phase === ph && (
      !f || l.title.toLowerCase().includes(f) || l.subtitle.toLowerCase().includes(f)
    ));
    if (lessons.length === 0) continue;
    const collapsed = collapsedPhases.has(ph);
    const group = document.createElement('div');
    group.className = 'phase-group';
    group.innerHTML = `
      <div class="phase-header ${collapsed ? 'collapsed' : ''}" data-phase="${ph}"
           style="color:${meta.color}">
        <span class="phase-dot" style="background:${meta.color}"></span>
        ${meta.short}: ${meta.name}
        <span class="phase-toggle">▾</span>
      </div>
      <div class="phase-lessons" ${collapsed ? 'style="display:none"' : ''}>
        ${lessons.map(l => `
          <div class="nav-item ${currentLesson === l.id ? 'active' : ''} ${isComplete(l.id) ? 'done' : ''}"
               data-id="${l.id}"
               style="${currentLesson === l.id ? `border-left-color:${meta.color}` : ''}">
            <span class="nav-check">${isComplete(l.id) ? '✓' : ''}</span>
            <span class="nav-num">${l.id}</span>
            <span class="${l.stub ? 'nav-stub' : ''}">${l.title}</span>
          </div>
        `).join('')}
      </div>
    `;
    nav.appendChild(group);
  }
  nav.querySelectorAll('.phase-header').forEach(h => {
    h.addEventListener('click', () => {
      const ph = parseInt(h.dataset.phase);
      const lessons = h.nextElementSibling;
      if (collapsedPhases.has(ph)) {
        collapsedPhases.delete(ph);
        h.classList.remove('collapsed');
        lessons.style.display = '';
      } else {
        collapsedPhases.add(ph);
        h.classList.add('collapsed');
        lessons.style.display = 'none';
      }
      localStorage.setItem('bios_collapsed', JSON.stringify([...collapsedPhases]));
    });
  });
  nav.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => showLesson(parseInt(item.dataset.id)));
  });
}

function showLesson(id) {
  const lesson = LESSONS.find(l => l.id === id);
  if (!lesson) return;
  currentLesson = id;
  const phase = PHASE_META[lesson.phase];
  const prev = LESSONS.find(l => l.id === id - 1);
  const next = LESSONS.find(l => l.id === id + 1);

  document.getElementById('topbar-phase').textContent = `${phase.short} — ${phase.name}`;
  const prevBtn = document.getElementById('btn-prev');
  const nextBtn = document.getElementById('btn-next-top');
  prevBtn.disabled = !prev;
  nextBtn.disabled = !next;
  prevBtn.onclick = () => prev && showLesson(prev.id);
  nextBtn.onclick = () => next && showLesson(next.id);

  const done = isComplete(id);
  const stubBadge = lesson.stub ? `<span class="stub-badge">STUB</span>` : '';
  document.getElementById('content-area').innerHTML = `
    <div id="lesson-content">
      <div class="lesson-eyebrow">
        <span class="phase-badge" style="background:${phase.color}22;color:${phase.color}">${phase.short}</span>
        <span class="lesson-number">Lesson ${lesson.id} of ${LESSONS.length}</span>
        ${stubBadge}
      </div>
      <h1 class="lesson-title">${lesson.title}</h1>
      <p class="lesson-subtitle">${lesson.subtitle}</p>
      <div class="lesson-divider"></div>
      <div class="lesson-body">${lesson.content}</div>
      <div class="exercises">
        <h2>Exercises</h2>
        ${lesson.exercises.map((ex, i) => `
          <div class="exercise">
            <div class="exercise-num">Exercise ${i + 1}</div>
            <p>${ex}</p>
            ${lesson.answers && lesson.answers[i] ? `<details class="answer"><summary>Show answer</summary><div class="answer-body">${lesson.answers[i]}</div></details>` : ''}
          </div>
        `).join('')}
      </div>
      <div class="complete-wrap">
        <button class="btn-complete ${done ? 'done' : ''}" id="btn-done">
          ${done ? '✓ Completed' : 'Mark Complete'}
        </button>
        ${next ? `<button class="btn-next" id="btn-next-lesson">Next: ${next.title} →</button>` : ''}
      </div>
    </div>
  `;
  document.getElementById('btn-done').onclick = () => {
    if (isComplete(id)) unmarkComplete(id); else markComplete(id);
    renderNav();
    document.getElementById('btn-done').className = `btn-complete ${isComplete(id) ? 'done' : ''}`;
    document.getElementById('btn-done').textContent = isComplete(id) ? '✓ Completed' : 'Mark Complete';
  };
  const nl = document.getElementById('btn-next-lesson');
  if (nl) nl.onclick = () => showLesson(next.id);
  renderNav();
  document.getElementById('main').scrollTo(0, 0);
  if (window.innerWidth < 900) document.getElementById('sidebar').classList.remove('open');
}

function showWelcome() {
  currentLesson = null;
  document.getElementById('topbar-phase').textContent = 'Overview';
  document.getElementById('btn-prev').disabled = true;
  document.getElementById('btn-next-top').disabled = false;
  document.getElementById('btn-next-top').onclick = () => showLesson(1);
  const stubsCount = LESSONS.filter(l => l.stub).length;
  const filledCount = LESSONS.length - stubsCount;
  document.getElementById('content-area').innerHTML = `
    <div id="welcome">
      <h1>BIOS <em>Internals</em></h1>
      <p class="tagline">From reset vector to boot sector — what the firmware does, how SeaBIOS implements it, and how we built the chassis to host it.</p>
      <div class="welcome-body">
        <p>This course covers the smallest layer of software that runs on a PC: the legacy BIOS. It uses <strong>SeaBIOS</strong> (the open-source BIOS QEMU ships) as the concrete implementation, and <code>tinyemu-go</code> as the emulator hosting it. Every lesson cites both — a real bug in real code, with a real fix.</p>
        <p>Read this alongside <code>x86_tutorial.html</code> (what the CPU does) and <code>osdev_tutorial.html</code> (what the kernel does on top). The BIOS sits between them: it brings the CPU from reset to a state where the kernel can take over.</p>
        <p>${LESSONS.length} lessons across six phases. Progress is saved in your browser.</p>
        <div class="phase-overview">
          ${[1,2,3,4,5,6].map(ph => {
            const m = PHASE_META[ph];
            const done = LESSONS.filter(l => l.phase === ph && isComplete(l.id)).length;
            const total = LESSONS.filter(l => l.phase === ph).length;
            return `
              <div class="phase-card" onclick="showLesson(${(LESSONS.find(l=>l.phase===ph)||{id:1}).id})">
                <div class="phase-card-num" style="color:${m.color}">${m.short} — Lessons ${m.lessons}</div>
                <h3>${m.name}</h3>
                <p>${done}/${total} complete</p>
              </div>
            `;
          }).join('')}
        </div>
        <button class="btn-start" onclick="showLesson(${completed.length > 0 ? Math.max(...completed) + 1 : 1})">
          ${completed.length > 0 ? 'Continue →' : 'Start from Lesson 1 →'}
        </button>
      </div>
    </div>
  `;
  renderNav();
}

document.getElementById('search').addEventListener('input', e => renderNav(e.target.value));

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'j') {
    const next = currentLesson && LESSONS.find(l => l.id === currentLesson + 1);
    if (next) showLesson(next.id);
  }
  if (e.key === 'ArrowLeft' || e.key === 'k') {
    const prev = currentLesson && LESSONS.find(l => l.id === currentLesson - 1);
    if (prev) showLesson(prev.id);
  }
  if (e.key === 'h') showWelcome();
});

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
document.getElementById('sidebar-header').style.cursor = 'pointer';
document.getElementById('sidebar-header').onclick = showWelcome;

updateProgress();
showWelcome();
</script>
</body>
</html>
