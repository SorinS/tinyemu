const PHASE_META = {

const LESSONS = [

// ============================================================
// PHASE 1 — The Reset Vector & POST
// ============================================================
{
  id: 1, phase: 1,
  title: "Why a BIOS Exists",
  subtitle: "The smallest possible bridge from silicon to OS",
  content: `
<h2>The cold-boot problem</h2>
<p>When you press the power button, the CPU is in a defined but minimal state — no RAM controller initialised, no disk driver, no filesystem, no idea what an "operating system" is. It can only execute instructions from a fixed address (<code>0xFFFFFFF0</code> on x86) that the hardware wires to a non-volatile memory chip on the motherboard. That memory holds the <strong>firmware</strong>. The firmware's job is to take the machine from "raw CPU" to "ready to load an OS".</p>

<p>The firmware on a classic PC is the <em>BIOS</em> (Basic Input/Output System). Modern PCs use UEFI, which solves the same problem with a richer model; this tutorial focuses on the legacy BIOS because that's what we model in <code>tinyemu-go</code>, what SeaBIOS implements, and what every x86 OS bootloader still has to be compatible with.</p>

<h2>Five jobs in order</h2>
<ol>
  <li><strong>POST.</strong> Power-On Self Test. Verify the CPU is alive, RAM responds, the chipset is sane.</li>
  <li><strong>Initialise the chipset.</strong> Program the memory controller; turn on shadow RAM regions; configure PCI.</li>
  <li><strong>Probe devices.</strong> Walk PCI; identify storage, video, network, USB; load option ROMs from each one's BAR if present.</li>
  <li><strong>Publish the runtime ABI.</strong> Install <em>interrupt handlers</em> at INT 10h (video), INT 13h (disk), INT 15h (system), INT 16h (keyboard). These are the BIOS "syscalls" that real-mode OS loaders use.</li>
  <li><strong>Find a boot device and hand off.</strong> Read sector 0 of the first bootable drive into 0x7C00, set DL to the drive number, jump.</li>
</ol>

<h2>Why each of these matters</h2>
<p>A modern OS doesn't keep using the BIOS — Linux talks directly to devices through its own drivers within seconds of boot. So why does the BIOS still matter?</p>
<ul>
  <li>Because the <em>bootloader</em> (GRUB, syslinux, MenuetOS's boot sector) absolutely depends on it. The bootloader has no disk driver of its own. It reads sectors via INT 13h until it has the kernel in memory.</li>
  <li>Because the kernel learns about the machine's memory map from the BIOS. INT 15h AX=E820 returns the e820 table — what RAM exists, what's reserved.</li>
  <li>Because SMBIOS / ACPI tables, which the kernel reads to discover CPUs and PCI roots, are laid out by the BIOS in low memory.</li>
</ul>

<div class="box box-key">
<strong>The mental model</strong>
The BIOS is a small program that runs once at boot, leaves behind a few data structures (IVT, BDA, EBDA, e820 table, ACPI tables) and a few interrupt handlers in ROM, and then jumps to the boot sector. After hand-off it's mostly idle — the OS calls back into it via INT 13h / INT 10h until it doesn't need to anymore.
</div>

<h2>What we built</h2>
<p>We didn't write a BIOS from scratch — <code>tinyemu-go</code> uses the real <strong>SeaBIOS</strong> binary (the same one QEMU ships, <code>bios-256k.bin</code>). Our job was to make our emulator's CPU + chassis behave well enough that SeaBIOS can boot. That meant: correct mode transitions, correct interrupt delivery, a PCI bus, a working PIT, a floppy controller, and enough opcode coverage to run SeaBIOS's 32-bit C code. By the end of this tutorial you'll know exactly what each of those constraints means.</p>
`,
  exercises: [
    "Why does INT 13h still exist in modern firmware, even on a UEFI system? Look up 'CSM' (Compatibility Support Module).",
    "List the five BIOS jobs. Which is the only one that runs <em>after</em> the OS has started?",
    "Open <code>bin/seabios/bios.bin</code> with <code>xxd</code> and find the last 16 bytes. What do they look like, and why?"
  ],
  answers: [
    "INT 13h survives in UEFI because a huge installed base of operating systems and bootloaders only know how to read disks through it. UEFI firmware provides the <strong>CSM</strong> (Compatibility Support Module): it loads a legacy BIOS image (often SeaBIOS / CSM16) into the 0xC0000-0xFFFFF region and installs the real-mode IVT, so an old MBR boot sector can still <code>int 0x13</code> and reach storage. Without a CSM (pure UEFI / class-3 machines) INT 13h does not exist and only EFI-aware bootloaders work.",

{
  id: 2, phase: 1,
  title: "The Reset Vector",
  subtitle: "The first instruction after power-on",
  content: `
<h2>Where the CPU starts</h2>
<p>x86 power-on state is defined by the architecture. The relevant bits:</p>
<ul>
  <li>CR0 = 0x60000010 (only CD, NW, ET set — paging off, real mode).</li>
  <li>EFLAGS = 0x00000002 (only reserved bit 1).</li>
  <li>CS selector = 0xF000, CS base = 0xFFFF0000, CS limit = 0xFFFF, RIP = 0xFFF0.</li>
  <li>All other segments cleared.</li>
</ul>
<p>So the first physical address fetched is <code>CS.base + RIP = 0xFFFF0000 + 0xFFF0 = 0xFFFFFFF0</code>. The motherboard wires that address to the top of the BIOS flash chip. The very first instruction is always a far jump into the BIOS's startup code.</p>

<h2>What's at the reset vector</h2>
<p>SeaBIOS's reset vector lives at the last 16 bytes of <code>bios.bin</code>. Disassemble it:</p>
<pre>$ ndisasm -b16 -o 0xFFF0 -k 0,0x3fff0 bin/seabios/bios.bin
0000FFF0  EA5BE000F0        jmp 0xf000:0xe05b
0000FFF5  3036              ...padding/version string...</pre>
<p>That single <code>JMP FAR 0xF000:0xE05B</code> redirects execution into SeaBIOS proper at <code>0xFE05B</code> (still in BIOS ROM, since CS.base is still 0xFFFF0000 — wait, after the jump the new CS = 0xF000 so base becomes 0xF0000, and the linear address is 0xFE05B).</p>

<p>Why a far jump and not just code that runs in place? Because the reset vector's 16 bytes are too small to do anything useful. The far jump moves the CPU into the larger area of ROM where there's room for the actual POST code.</p>

<h2>The shadowed BIOS region</h2>
<p>Linear addresses 0xC0000–0xFFFFF (the top 256 KB of the first 1 MiB) are the <em>BIOS shadow window</em>. The motherboard chipset can route reads/writes here to either the flash chip (ROM) or to actual DRAM. SeaBIOS uses this: it copies parts of itself from flash into the shadow at init, then locks the shadow as read-only so its runtime data (the IVT, BDA, the drive tables) is fast RAM but still in the canonical "BIOS area".</p>

<p>In <code>tinyemu-go</code> we cheat slightly: the BIOS region is just regular RAM (<code>RegisterRAM(0xC0000, 0x40000, 0)</code> in <code>machine/pc/pc.go</code>). We don't model the chipset's PAM (Programmable Attribute Map) registers that control shadowing — but the effect is the same, because we're already letting the guest write to the region.</p>

<h2>The high alias</h2>
<p>For a 256 KB BIOS like SeaBIOS, the reset vector at 0xFFFFFFF0 must land in BIOS bytes. The trick: map the BIOS image at the <em>top</em> of the 4 GiB address space too (<code>HighBIOSAddr = 0xFFFC0000</code>). The same bytes appear at both 0xC0000–0xFFFFF (the low shadow) and 0xFFFC0000–0xFFFFFFFF (the high alias). The reset vector at 0xFFFFFFF0 reads the high alias; after the first <code>JMP 0xF000:...</code>, CS reloads to 0xF000 and subsequent fetches use the low shadow.</p>

<p>This dual mapping is exactly what real motherboards do for &gt;64 KB BIOSes, and what QEMU does for SeaBIOS. See <code>BIOSROMAddr</code> and <code>HighBIOSAddr</code> in <code>machine/pc/pc.go</code>.</p>

<div class="box box-warn">
<strong>The "0xEA in long mode" trap</strong>
That first far jump at the reset vector is encoded as 0xEA + ptr16:16. The exact same opcode (0xEA) shows up again much later in the boot — Linux's <code>startup_32</code> uses it as <code>ljmp $__KERNEL_CS, $startup_64</code> to enter 64-bit mode. Both are valid. 0xEA is only invalid when actually in 64-bit mode (CS.L=1). A bug that gated on <code>EFER.LMA</code> instead broke every Linux boot for a week.
</div>
`,

  content: `
<h2>Why POST exists</h2>
<p>POST (Power-On Self Test) is the first phase of BIOS execution after the reset vector. It runs before RAM is fully initialised, so the BIOS can't yet store much state. It checks that the CPU can execute, that the chipset responds, that memory writes round-trip. If something fails fatally, the BIOS can't even display an error — it writes a "POST code" to a fixed I/O port and halts. A diagnostic card reads that port.</p>

<h2>Port 0x80: the POST diagnostic byte</h2>
<p>Every BIOS writes a byte to port 0x80 before each major checkpoint. On real hardware a POST card sits on the ISA bus and lights up two hex digits to show the last value written. If the BIOS hangs, the last byte tells you which checkpoint it died in.</p>
<p>POST codes are not standardised — every BIOS vendor uses its own table. SeaBIOS publishes its codes in <code>src/post.c</code>.</p>

<p>In <code>tinyemu-go</code> we register port 0x80 in <code>machine/pc/pc.go</code> with a write handler that just stores the last value. <code>TINYEMU_BIOS_POST=1</code> turns on logging — useful for diagnosing where a BIOS hang stops, but spammy otherwise (BIOSes write thousands of 0xFFs to 0x80 as a microsecond delay).</p>

<h2>Port 0x402: the QEMU debug-console</h2>
<p>SeaBIOS, when built with <code>CONFIG_DEBUG_IO</code>, prints every <code>dprintf()</code> call as one byte per character to I/O port 0x402. QEMU treats 0x402 as a write-only debug console; the bytes go to QEMU's stderr. We do the same — see <code>p.io.RegisterWrite(0x402, ...)</code> in <code>machine/pc/pc.go</code>.</p>

<p>The subtlety: SeaBIOS first <em>probes</em> whether port 0x402 is present by reading from it. The expected response is <code>0xE9</code> (the magic byte QEMU returns). If the read returns anything else (e.g. our default 0xFF), SeaBIOS concludes "no debug console here", sets its global <code>DebugOutputPort = 0</code>, and every later <code>dprintf()</code> becomes a no-op. The fix is one line:</p>

<pre>p.io.RegisterRead(0x402, 0x402, func(port uint16) uint32 { return 0xE9 })</pre>

<p>This single byte — returning 0xE9 instead of 0xFF — is what unblocks SeaBIOS's entire boot log. Without it you debug blind.</p>

<h2>How to read the log</h2>
<pre>TINYEMU_BIOS_DEBUG=stderr ./bin/temu... -bios bin/seabios/bios.bin -m 128</pre>
<p>Routes the 0x402 stream to your terminal. You see exactly what SeaBIOS thinks:</p>
<pre>SeaBIOS (version rel-1.17.0-0-gb52ca86e094d-prebuilt.qemu.org)
No Xen hypervisor found.
RamSize: 0x002c0000 [cmos]
=== PCI bus &amp; bridge init ===
Found 2 PCI devices (max PCI bus is 00)
...</pre>
<p>This becomes the first thing you grep when something stops booting.</p>

<div class="box box-key">
<strong>Two diagnostic channels</strong>
Port 0x80: legacy POST byte, used by all BIOSes as a checkpoint marker. Useful when the BIOS hangs cold.<br>
Port 0x402: QEMU/SeaBIOS debug console. Used by SeaBIOS for printf-style messages. Useful for everything else.
</div>
`,

  id: 4, phase: 1,
  title: "Memory Detection & e820",
  subtitle: "How the OS learns what RAM exists",
  content: `
<h2>The bootstrap problem</h2>
<p>Before any kind of memory allocator can run, the kernel needs to know what RAM the machine has and where it lives. It can't probe — touching addresses that aren't backed by anything would fault. So the BIOS has to tell it. There are three legacy ways and one modern way:</p>
<ul>
  <li><strong>CMOS bytes 0x15/0x16</strong> — base memory in KB (≤640 KiB).</li>
  <li><strong>CMOS bytes 0x17/0x18</strong> — extended memory above 1 MiB in KB.</li>
  <li><strong>CMOS bytes 0x30/0x31</strong> — extended memory above 16 MiB in 64-KiB units.</li>
  <li><strong>INT 15h AX=E820</strong> — the modern way: a typed memory map.</li>
</ul>

<h2>E820: the canonical map</h2>
<p>An INT 15h AX=E820 call asks the BIOS "give me the next entry of the memory map". Each entry is:</p>
<pre>struct e820_entry {
    u64 base;     // physical start
    u64 length;   // bytes
    u32 type;     // 1=RAM, 2=reserved, 3=ACPI, 4=ACPI NVS, ...
};</pre>
<p>The kernel iterates calling E820 with a continuation token until the BIOS reports "no more". The kernel keeps the union of all type-1 entries as the available physical memory.</p>

<p>What you see in a typical SeaBIOS dprintf log:</p>
<pre>e820 map has 6 items:
  0: 0000000000000000 - 000000000009fc00 = 1 RAM
  1: 000000000009fc00 - 00000000000a0000 = 2 RESERVED
  2: 00000000000f0000 - 0000000000100000 = 2 RESERVED
  3: 0000000000100000 - 00000000002bd000 = 1 RAM
  4: 00000000002bd000 - 00000000002c0000 = 2 RESERVED
  5: 00000000fffc0000 - 0000000100000000 = 2 RESERVED</pre>
<p>Decoded: 640 KiB of conventional RAM, the EBDA region reserved, the F-segment (BIOS ROM shadow) reserved, then the main extended RAM from 1 MiB up to ~2.75 MiB, a small reserved region above it (allocator metadata), then the high BIOS alias.</p>

<h2>Where SeaBIOS gets the numbers</h2>
<p>From the CMOS bytes our <code>NewCMOSRTC(memSizeKB)</code> initialises in <code>machine/pc/rtc.go</code>. We compute the byte values from our <code>-m</code> RAM size; SeaBIOS reads them with the standard CMOS index/data sequence (out 0x70, in 0x71) and assembles the e820 map.</p>

<h2>Why this matters for us</h2>
<p>Two ways to break this:</p>
<ol>
  <li><strong>Wrong CMOS arithmetic.</strong> If 0x17/0x18 or 0x30/0x31 don't match the actual installed RAM, SeaBIOS publishes a wrong map and the kernel either over-uses memory (page fault on the first access past the real end) or under-uses it (loses several MiB).</li>
  <li><strong>Missing CMOS entries.</strong> The boot reaches an e820 entry whose offset isn't initialised in our <code>NewCMOSRTC</code>, returns 0, and the map has a gap or a wrong-length entry. Look at the existing CMOS init carefully when you add a new memory size.</li>
</ol>

<div class="box box-warn">
<strong>If you change the machine's RAM layout</strong>
Update <code>NewCMOSRTC</code>. If you add reserved regions (e.g. ACPI tables in a new place), the BIOS has to know — either via fw_cfg (advanced) or by patching SeaBIOS's table-construction code (we don't).
</div>
`,

    "CMOS 0x17/0x18 is the low/high byte of extended memory above 1 MiB in KiB, capped at 0xFFFF (about 64 MiB). Zeroing 0x17 while leaving 0x18 leaves only the high byte set, so SeaBIOS computes extended memory as <code>(0x18 &lt;&lt; 8) | 0</code> KiB, i.e. a multiple of 256 KiB with the low 256 KiB granularity lost. The reported size drops by whatever the low byte held, and (on a machine over 16 MiB) the 0x30/0x31 pair usually dominates anyway, so the practical effect may be a small shortfall or, if the machine is small, a noticeably wrong total.",

  ]

  subtitle: "The 1 MiB world the CPU boots into",
  content: `
<h2>What real mode actually is</h2>
<p>Real mode is the CPU's startup mode. It's 16-bit: registers are AX/BX/CX/DX/SI/DI/BP/SP (the 32-bit forms exist but addresses are 16-bit), instruction pointer is IP (16 bits), and addresses are formed by <em>segmentation</em> rather than paging.</p>

<p>The segment registers (CS/DS/ES/SS/FS/GS) are 16-bit selectors, but in real mode they don't index a descriptor table. Instead, the effective base of each segment is <code>selector × 16</code>. So:</p>
<pre>linear_address = segment.base + offset
              = (selector_value &lt;&lt; 4) + offset</pre>
<p>Maximum addressable linear address: <code>0xFFFF × 16 + 0xFFFF = 0x10FFEF</code>. That's just over 1 MiB. The bit above that — the A20 line — is what made real mode famously cap at 1 MiB (until A20 was enabled to allow access to "high memory").</p>

<h2>The descriptor cache trick</h2>
<p>Internally, each segment register is paired with a hidden <em>descriptor cache</em>: a hardware register holding the segment's base, limit, and access attributes. In protected mode these get loaded from the GDT when you write a selector. In real mode, only the base gets updated (to <code>sel&lt;&lt;4</code>) on a segment write. The cached <em>limit</em> and <em>access</em> bits are preserved from whatever the descriptor cache last held.</p>

<p>This is the foundation of <strong>big real mode</strong>: enter protected mode briefly, load CS/DS/... with descriptors whose limit is 4 GiB, then exit back to real mode. The selector values reset to 16-bit, but the cached 4-GiB limits stay. Now you're in "real mode" but can address up to 4 GiB through the segment registers. SeaBIOS uses this trick during init.</p>

<h2>IP is 16-bit. RIP is 32-bit. Both?</h2>
<p>The architectural rule: in real mode (CR0.PE=0) with CS.D=0, the instruction pointer wraps at 16 bits — after executing the instruction at offset 0xFFFF, the next fetch is from offset 0x0000 of the same segment.</p>

<p>"Big real mode" with CS.D=1 (a 32-bit code segment cached from a prior PE excursion) is different: IP can extend to 32 bits. SeaBIOS does this for parts of its boot code.</p>

<p>Our emulator gates the wrap on CS.D: <code>if c.mode == ModeReal16 && c.segAccess[CS]&amp;csDBit == 0 { c.rip &amp;= 0xFFFF }</code>. See <code>exec.go</code>. The bug it fixes: a function that ran off the end of the F-segment kept fetching into unmapped RAM at 0x100000+ because we hadn't wrapped IP.</p>

<h2>The interrupt vector table (IVT)</h2>
<p>Real-mode interrupts are vectored through the IVT at linear 0x000–0x3FF — 256 entries of 4 bytes each: <code>{ip16, cs16}</code>. The CPU pushes flags + CS + IP and jumps to the entry. <code>iret</code> pops them back. That's the entire interrupt model in real mode — no descriptor tables, no privilege levels, no error code.</p>

<p>The BIOS owns the IVT. Slots 0x10, 0x13, 0x15, 0x16 etc. get filled with pointers to the BIOS's handlers during init. Once the boot sector runs, every <code>int 0x13</code> it does vectors here.</p>

<div class="box box-key">
<strong>Big-real-mode in one sentence</strong>
Set CR0.PE = 1, load CS/DS/... with descriptors having limit = 0xFFFFFFFF, set CR0.PE = 0. The selector values revert to real-mode, but the cached limits stay 4 GiB. The CPU now thinks it's in real mode but can touch any byte of the address space.
</div>
`,

{
  id: 6, phase: 2,
  title: "Protected Mode and the GDT",
  subtitle: "Why every segment now needs a descriptor",
  content: `
<h2>The protected-mode model</h2>
<p>Protected mode is what every OS after DOS runs in. Three big changes from real mode:</p>
<ol>
  <li><strong>Segments come from a table.</strong> A segment selector is no longer the literal base &gt;&gt; 4. It's an <em>index</em> into the Global Descriptor Table (GDT, or LDT for per-task tables). The descriptor at that index has the real base, limit, and access bits.</li>
  <li><strong>Hardware enforces limits.</strong> Access past the descriptor's limit causes a general-protection fault.</li>
  <li><strong>Privilege rings.</strong> CS has a current privilege level (CPL); each segment has a descriptor privilege level (DPL); access is checked.</li>
</ol>

<h2>The descriptor</h2>
<p>A GDT/LDT entry is 8 bytes:</p>
<pre>bits  0..15  limit[15:0]
bits 16..39  base[23:0]
bits 40..47  access byte: P, DPL(2), S, type(4)
bits 48..51  limit[19:16]
bits 52..55  flags nibble: AVL, L, D/B, G
bits 56..63  base[31:24]</pre>
<p>Two flag bits matter most for what we model:</p>
<ul>
  <li><strong>L</strong> (bit 53). 1 = 64-bit code segment ("long mode"). Only valid when EFER.LMA = 1.</li>
  <li><strong>D/B</strong> (bit 54). For code segments: 0 = 16-bit default operand/address size, 1 = 32-bit. For SS: 0 = 16-bit stack, 1 = 32-bit stack.</li>
</ul>

<p>When the CPU loads a segment in protected mode, it walks the GDT, reads the descriptor, and updates the segment's hidden cache with the descriptor's <code>base</code>, <code>limit</code>, and <code>access</code> bytes. Subsequent accesses through that segment use the cached values — no GDT read per access.</p>

<h2>The GDT register</h2>
<p>GDTR is 80 bits — 64 bits of base address and 16 bits of limit. Loaded with <code>lgdt</code>; saved with <code>sgdt</code>. The base is a linear address; the limit is the size of the GDT in bytes minus one (so a 256-entry GDT has limit 0x7FF).</p>

<h2>Entering protected mode</h2>
<p>The canonical sequence:</p>
<pre>cli                      ; no interrupts during the transition
lgdt [pmode_gdt]         ; install the GDT
mov  eax, cr0
or   eax, 1              ; CR0.PE = 1
mov  cr0, eax
ljmp 0x08:1f             ; far jump to load CS = entry 1 of the GDT
1:  mov ax, 0x10         ; entry 2 = data segment
    mov ds, ax
    mov es, ax
    mov ss, ax
    ; ... now in pm32</pre>

<p>The far jump (0xEA) is mandatory: <code>mov</code>ing to CS isn't allowed. The ljmp loads CS with the index 1 selector, which the CPU resolves via the GDT, and from then on the CPU runs in pm32.</p>

<h2>The bug we hit: stale segment cache</h2>
<p>The crucial subtlety: when the CPU loads a segment in protected mode, the hardware <strong>walks the GDT and overwrites the cached base/limit/access</strong>. Our emulator's <code>opMOVtoSreg</code> originally skipped this walk in protected mode — it just updated the selector value and left the cached base alone. The comment defended it: "the cached descriptor from the prior far-jump happens to be correct for those selectors."</p>

<p>That assumption holds for SeaBIOS's POST flow (it loads each segment exactly once with a known descriptor). It breaks the moment any code reloads DS from a different segment than the one cached there. SeaBIOS's <code>call32</code> thunk does exactly that: a 16-bit INT 13h handler runs with DS = a zonelow segment (base 0xda800), transitions to 32-bit mode, and reloads DS to the flat data selector (base 0). Without the GDT walk the cached base stays 0xda800, and every "flat" pointer dereferenced in 32-bit C code lands 0xda800 bytes high — including <code>op-&gt;drive_fl</code> on the disk-read path. Symptom: SeaBIOS thinks the drive table is full of NULLs, fails the read.</p>

<p>The fix is in <code>loadProtSegment</code> in <code>cpu/x86_64/opcodes.go</code> — parse the descriptor and overwrite the cache. The regression test is <code>cpu/x86_64/jmpfar_test.go</code>.</p>

<div class="box box-warn">
<strong>The lesson</strong>
Segment register caches are not just an implementation detail — guests rely on them being refreshed from the GDT on every protected-mode load. If your emulator's MOV-to-Sreg doesn't walk the table, you'll catch the bug on the day a guest exercises a reload across mode boundaries.
</div>
`,

{
  id: 7, phase: 2,
  title: "Long Mode and Compatibility Mode",
  subtitle: "Two flavours of 64-bit",
  content: `
<h2>Three modes living together</h2>
<p>x86_64 (AMD64) added two new operating modes on top of protected mode:</p>
<ul>
  <li><strong>Long mode (64-bit)</strong>: CS.L=1, EFER.LMA=1. Native 64-bit instructions, 64-bit registers, flat segmentation (CS/DS/ES/SS bases are forced to 0). This is what a 64-bit kernel runs in.</li>
  <li><strong>Compatibility mode</strong>: CS.L=0, EFER.LMA=1. Looks and behaves like 32-bit protected mode, but is "inside" long mode. Used to run 32-bit userland under a 64-bit kernel.</li>
</ul>
<p>Plus the legacy modes: real, pm16, pm32. The CPU picks one based on three bits: CR0.PE (protected mode enabled), EFER.LMA (long mode active), CS.L (long-mode code segment).</p>

<h2>The transition into long mode</h2>
<p>It looks weird the first time you see it. Starting from pm32:</p>
<pre>; set up 4-level page tables, store CR3
mov  eax, cr4
or   eax, 1 &lt;&lt; 5       ; PAE
mov  cr4, eax
mov  ecx, 0xC0000080   ; EFER MSR
rdmsr
or   eax, 1 &lt;&lt; 8       ; LME (long mode enable)
wrmsr
mov  eax, cr0
or   eax, 1 &lt;&lt; 31      ; PG (paging)
mov  cr0, eax          ; ← LMA becomes 1 here, but CS.L is still 0
ljmp $__KERNEL_CS, $startup_64</pre>

<p>After the <code>mov cr0</code>: <strong>EFER.LMA = 1 but CS.L is still 0</strong>. This is compatibility mode. The CPU is "in long mode" in the sense that LMA is set, but the current code segment is still 32-bit. The very next instruction — the <code>ljmp</code> — is what loads CS with the 64-bit code descriptor (L=1) and finally enters 64-bit mode.</p>

<p>That ljmp is encoded as <code>EA</code> + 32-bit offset + 16-bit selector — the same opcode we already saw at the BIOS reset vector. <strong>0xEA is valid in compatibility mode</strong> — it's the instruction that performs this very transition. 0xEA is only invalid when the CPU is already running 64-bit code (CS.L=1).</p>

<div class="box box-warn">
<strong>The one-line bug</strong>
The 0xEA handler in <code>cpu/x86_64/opcodes.go</code> gated on <code>c.efer&amp;EFER_LMA != 0</code>. But LMA=1 with CS.L=0 is compat mode, where 0xEA is valid — and it's the literal next instruction Linux executes. Result: every x86_64 Linux boot died the moment the kernel tried to enter 64-bit mode. The fix: gate on <code>c.mode == ModeLong64</code>, not LMA.
</div>

<h2>What the GDT looks like in long mode</h2>
<p>The descriptor format is the same 8 bytes, but most fields are ignored:</p>
<ul>
  <li>CS/DS/ES/SS bases are forced to 0. The cached base is ignored.</li>
  <li>Limits are not enforced (segments effectively span the entire 64-bit virtual address space).</li>
  <li>The L bit on CS distinguishes 64-bit (L=1) from compat (L=0).</li>
  <li>FS/GS bases come from MSRs (FS_BASE = MSR 0xC0000100, GS_BASE = 0xC0000101), not the descriptor. WRMSR programs them.</li>
</ul>

<p>So in long mode the GDT mostly exists to hold one code descriptor per privilege level + the TSS. The bases and limits in the descriptors are mostly decorative.</p>

<h2>Three-mode arithmetic</h2>
<p>Each instruction's operand and address size depends on the current mode and any prefix bytes:</p>
<table class="corr-table">
  <tr><th>Mode</th><th>Default op size</th><th>0x66 prefix</th><th>Default addr size</th><th>0x67 prefix</th></tr>
  <tr><td>Real 16</td><td>16</td><td>→ 32</td><td>16</td><td>→ 32</td></tr>
  <tr><td>Protected 32</td><td>32</td><td>→ 16</td><td>32</td><td>→ 16</td></tr>
  <tr><td>Long 64</td><td>32 (REX.W → 64)</td><td>→ 16</td><td>64</td><td>→ 32</td></tr>
</table>
<p>Most BIOS bugs in our emulator have been caused by getting one cell of this table wrong — see Lesson 8.</p>
`,

    "Predict what <code>c.mode</code> should be after each line of the Linux transition sequence shown above.",
    "Why are segment bases forced to 0 in long mode, even though the descriptor still has a base field?",
    "Read <code>recomputeMode</code> in <code>cpu/x86_64/mode.go</code>. Trace which bits it reads and in what order."

  answers: [
    "Start: pm32. After <code>mov cr4</code> (PAE set): still pm32 (PAE alone changes nothing). After <code>wrmsr</code> setting EFER.LME: still pm32 (LME is only \"enabled\", not \"active\"; LMA is still 0 because paging is off). After <code>mov cr0</code> setting PG: the CPU latches <strong>EFER.LMA = 1</strong>, but CS.L is still 0, so the mode is <strong>compatibility mode</strong> (32-bit code inside long mode). After the <code>ljmp</code> loads a CS with L=1: <strong>ModeLong64</strong> — true 64-bit mode.",

    "<code>recomputeMode</code> derives the mode from three inputs in order: first CR0.PE — if 0, the mode is real mode (16-bit) regardless of anything else. If PE=1, it checks EFER.LMA — if 0, it is legacy protected mode and CS.D selects pm16 vs pm32. If LMA=1, it checks CS.L — L=1 gives ModeLong64, L=0 gives compatibility mode (which then behaves per CS.D as 16- or 32-bit). So the precedence is CR0.PE → EFER.LMA → CS.L (→ CS.D)."

{
  id: 8, phase: 2,
  title: "PUSH/POP/CALL/RET Width — The 0x66 Trap",
  subtitle: "Why every stack op is a potential bug",
  content: `
<h2>The rule</h2>
<p>Per Intel SDM Vol 2A, stack operations — PUSH, POP, CALL, RET, RETF, IRET, PUSHF, POPF, PUSHA, POPA — transfer bytes <strong>at operand size</strong>, not at stack-slot size. The 0x66 (operand-size override) prefix flips that. Stack-slot size (4 in pm32, 2 in pm16) is a property of the SS segment used for the stack pointer; operand size is a property of the instruction.</p>

<p>These usually match. They diverge when the 0x66 prefix is present:</p>

<table class="corr-table">
  <tr><th>Mode</th><th>Instr</th><th>Operand size</th><th>Stack-slot size</th><th>Bytes pushed/popped</th></tr>
  <tr><td>Real 16</td><td><code>push ax</code></td><td>2</td><td>2</td><td>2</td></tr>
  <tr><td>Real 16</td><td><code>66 push eax</code></td><td>4</td><td>2</td><td><strong>4</strong></td></tr>
  <tr><td>pm32</td><td><code>push eax</code></td><td>4</td><td>4</td><td>4</td></tr>
  <tr><td>pm32</td><td><code>66 push ax</code></td><td>2</td><td>4</td><td><strong>2</strong></td></tr>
  <tr><td>Long 64</td><td><code>push rax</code></td><td>(8 default)</td><td>8</td><td>8</td></tr>
  <tr><td>Long 64</td><td><code>66 push ax</code></td><td>2</td><td>8</td><td><strong>2</strong></td></tr>
</table>

<h2>The bug shape</h2>
<p>A push uses stack-slot size while the matching pop uses operand size (or vice versa), so the stack pointer ends up 2 or 4 bytes off the value the next pop expects. Common manifestation: <strong>a popped value has its low and high 16 bits swapped</strong>. That's the 2-byte misalignment fingerprint.</p>

<p>Worked example. SeaBIOS's IRQ handler entry (<code>irqentry_extrastack</code>) does:</p>
<pre>; from romlayout.S
push   0xF0FC          ; 4 bytes — the IRQ handler function pointer
jmp    irqentry_extrastack
   ; ... pushes ds, eax, then runs SAVEBREGS_POP_DSEAX ...
pop    ecx              ; 4 bytes — should retrieve 0xF0FC</pre>
<p>If our PUSH r/m32 (Group 5 /6) writes 2 bytes instead of 4, the stack is now 2 bytes "shorter" than the popper expects. The <code>pop ecx</code> reads 4 bytes starting 2 bytes too high, fetches half the next stack slot — and ECX ends up as <code>0xF0FC0000</code> instead of <code>0x0000F0FC</code>. The high and low halves are swapped because of the 2-byte misalignment.</p>
<p>Then <code>call *ecx</code> jumps to 0xF0FC0000, which is garbage RAM, and the emulator wanders off.</p>

<h2>The audit pattern</h2>
<p>The fix in our emulator was a single helper:</p>
<pre>// pushPopOperandSize maps the per-instruction operandSize to the actual
// push/pop width. Long mode has no 32-bit form: a default operandSize
// of 4 there means "push/pop 8 bytes". Real and pm32 pass through.
func (c *CPU) pushPopOperandSize(operandSize uint8) int {
    if c.mode == ModeLong64 && operandSize == 4 {
        return 8
    }
    return int(operandSize)
}</pre>
<p>Then every stack-op site was changed from <code>c.stackSlotSize()</code> to <code>c.pushPopOperandSize(operandSize)</code>. The audit list:</p>
<ul>
  <li>0xC3 RET, 0xC2 RET imm16</li>
  <li>0xCB RETF, 0xCF IRET</li>
  <li>0x50–0x57 PUSH r, 0x58–0x5F POP r</li>
  <li>0x68 PUSH imm32, 0x6A PUSH imm8</li>
  <li>0x06/0x07/0x0E/0x16/0x17/0x1E/0x1F PUSH/POP segment</li>
  <li>0x60/0x61 PUSHA/POPA, 0x9C/0x9D PUSHF/POPF, 0xC9 LEAVE</li>
  <li>0x8F /0 POP r/m (the irqentry bug above)</li>
  <li>0x9A CALL FAR PTR16:N</li>
  <li>Group 5 /2 CALL r/m, /3 CALL FAR m, /4 JMP r/m, /5 JMP FAR m, /6 PUSH r/m</li>
</ul>
<p>Same bug shape × thirteen instructions. A successful audit closes them all in one commit.</p>

<div class="box box-key">
<strong>Smell test</strong>
If you see a popped value whose halves are swapped, suspect a 2- or 4-byte stack-width mismatch. Trace back to the matching push.
</div>
`,
  exercises: [
    "What does <code>66 9C</code> do in real mode? In pm32? In long mode? Write out the bytes pushed.",
    "Why is there no 32-bit form for PUSH/POP in long mode (i.e. <code>push eax</code> is encoded but <em>means</em> <code>push rax</code>)?",
    "Find one place in our code where the comment says \"width follows operand size\" and confirm it actually uses <code>pushPopOperandSize</code>."
  ],
  answers: [
    "<code>66 9C</code> is PUSHF with an operand-size override. In <strong>real mode</strong> the default operand size is 16, so 0x66 flips it to 32: it pushes the 4-byte EFLAGS. In <strong>pm32</strong> the default is 32, so 0x66 flips it to 16: it pushes the 2-byte FLAGS. In <strong>long mode</strong> the default for PUSHF is 64, and 0x66 flips it to 16: it pushes the 2-byte FLAGS. (Stack operations transfer at operand size, not stack-slot size.)",
    "Because long mode has no 32-bit stack-operand encoding at all: for PUSH/POP the operand size is either 16 (with the 0x66 prefix) or the default 64; there is no way to express a 32-bit push/pop, and REX.W is irrelevant since 64 is already the default. So a default-operand-size of 4 from the decoder must be remapped to 8 — which is exactly what <code>pushPopOperandSize</code> does (<code>if mode==ModeLong64 &amp;&amp; operandSize==4 { return 8 }</code>).",
    "Inspect the stack-op sites listed in the audit (RET/RETF/IRET, the 0x50-0x5F PUSH/POP r, 0x68/0x6A, the segment PUSH/POP, PUSHA/POPA, PUSHF/POPF, LEAVE, 0x8F /0, 0x9A CALL FAR, and Group 5 /2-/6): each computes its transfer width via <code>c.pushPopOperandSize(operandSize)</code> rather than <code>c.stackSlotSize()</code>. Confirm by grepping for <code>pushPopOperandSize</code> in <code>cpu/x86_64/opcodes.go</code> and checking that the matched site's comment about width matches the call."
  ]

{
  id: 9, phase: 3,
  title: "The PIC and IRQ Delivery",
  subtitle: "Wiring hardware interrupts to vectors",
  content: `
<h2>What the PIC does</h2>
<p>The 8259A Programmable Interrupt Controller takes up to 8 IRQ lines from devices and turns them into a single INTR line to the CPU. When the CPU acknowledges (INTA), the PIC drives the interrupt vector number onto the data bus. On a PC, two PICs are cascaded: master handles IRQ 0–7, slave handles IRQ 8–15. The slave's INTR pin is wired to the master's IRQ 2.</p>

<p>So when IRQ 6 (the floppy) fires:</p>
<ol>
  <li>The floppy controller asserts IRQ 6 → the master PIC sets bit 6 of its IRR (Interrupt Request Register).</li>
  <li>The master raises INTR to the CPU.</li>
  <li>If EFLAGS.IF is set, the CPU acknowledges (INTA cycle).</li>
  <li>The PIC moves bit 6 from IRR to ISR (In-Service Register), clears IRR.6, and drives the vector byte (typically 0x06 + the PIC's base offset, e.g. 0x08 → vector 0x0E) onto the bus.</li>
  <li>The CPU vectors through IVT[0x0E] in real mode (or IDT[0x0E] in protected mode).</li>
  <li>The handler runs, then issues an End-Of-Interrupt (EOI) to port 0x20: <code>outb 0x20, 0x20</code>.</li>
  <li>The PIC clears bit 6 of its ISR. Now lower-priority interrupts can be delivered.</li>
</ol>

<h2>BIOS-vs-OS vector base</h2>
<p>The PIC's base offset is configurable. The BIOS programs IRQ 0–7 → INT 0x08–0x0F and IRQ 8–15 → INT 0x70–0x77. That's why the timer (IRQ 0) is INT 0x08. Linux later reprograms the PIC to put hardware IRQs at vectors 0x20+ to avoid collisions with CPU exceptions. We don't model the reprogramming; the BIOS bases are good enough.</p>

<h2>Our implementation</h2>
<p>See <code>machine/pc/pic.go</code>:</p>
<pre>type PIC8259 struct {
    imr   uint8 // Interrupt Mask Register
    irr   uint8 // Interrupt Request Register
    isr   uint8 // In-Service Register
    icw2  uint8 // base vector (programmed via ICW2)
    ...
}
func (p *PIC8259) RaiseIRQ(irq uint8) { ... }
func (p *PIC8259) Ack() int          { /* returns vector, moves IRR→ISR */ }
func (p *PIC8259) EOI()              { /* clears lowest ISR bit */ }</pre>

<p>Devices call <code>RaiseIRQ(N)</code> when they want attention. The PIC asserts INTR to the CPU via <code>cpu.SetINTR(1)</code>. The CPU's <code>Step()</code> checks INTR + IF + not-blocked at the start of every instruction and calls the ack callback to learn the vector.</p>

<h2>Real-mode vs protected-mode delivery</h2>
<p>These differ:</p>
<ul>
  <li><strong>Real mode (CR0.PE = 0):</strong> read 4-byte IVT entry, push FLAGS/CS/IP (3 × 2 bytes), clear IF and TF, load CS:IP from the IVT entry. Real-mode CS load means base = sel &lt;&lt; 4.</li>
  <li><strong>Protected mode without long:</strong> read 8-byte IDT gate, push EFLAGS/CS/EIP (3 × 4 bytes), push errorCode if applicable, clear IF/TF per gate type, load CS from GDT.</li>
  <li><strong>Long mode:</strong> read 16-byte IDT gate, push SS/RSP/RFLAGS/CS/RIP (5 × 8 bytes), TSS-based stack switch if changing CPL.</li>
</ul>
<p>Our <code>deliverInterruptLegacy</code> (in <code>cpu/x86_64/intr.go</code>) dispatches to the right path. SeaBIOS depends on the real-mode path being right for INT 13h disk reads and INT 10h video — see Lesson 13.</p>

<div class="box box-warn">
<strong>Where the timer goes silent</strong>
A common boot hang is "IRQ 0 fires once, then nothing". The PIC moves bit 0 IRR→ISR on the first delivery. If the handler never EOIs (or our PIC's EOI logic is broken), the ISR bit stays set and subsequent IRQs are blocked by priority. Watch for <code>p.pic.EOI()</code> after every handler completes.
</div>
`,
  exercises: [
    "Why are the master PIC's vectors INT 0x08–0x0F instead of starting at 0x00?",
    "Trace what happens if a guest issues two EOIs in a row with no interrupt in between.",
    "Read <code>updateINTR</code> in <code>pic.go</code>. What does it do when the IMR masks an IRQ that's already in IRR?"
  ],
  answers: [
    "Because the BIOS programs the master PIC's base vector (ICW2) to <code>0x08</code>, mapping IRQ 0-7 to INT 0x08-0x0F. They cannot start at 0x00 because INT 0x00-0x1F are reserved by the CPU for exceptions (0x00 = #DE divide error, 0x06 = #UD, 0x0E = #PF, etc.). The BIOS choice of 0x08-0x0F unfortunately overlaps several of those exception vectors, which is exactly why a protected-mode OS like Linux later reprograms the PICs to base 0x20 to get clear of the reserved range.",
    "The first EOI clears the lowest-priority set ISR bit (the in-service interrupt) and lets lower-priority interrupts through again. The second EOI, with no interrupt in service, has nothing to clear: in a typical 8259 model it finds the ISR empty and is a no-op (or, on real silicon, could spuriously clear a bit if one were set by then). A spurious extra EOI is the classic cause of \"the next device interrupt gets dropped\" bugs if an ISR bit happens to be set.",
    "<code>updateINTR</code> recomputes whether to assert INTR to the CPU from <code>IRR &amp; ~IMR</code> (and not already higher-priority in-service). If the IMR masks an IRQ that is already pending in IRR, the bit <strong>stays set in IRR</strong> but is excluded from the INTR computation, so no interrupt is delivered while it remains masked. The moment the IMR bit is cleared, <code>updateINTR</code> sees the still-pending IRR bit and asserts INTR — the interrupt is held, not lost."
  ]
},

{
  id: 10, phase: 3,
  title: "The PIT: 18.2 Hz and the Boot Wait",
  subtitle: "A reload of 0 means 65536",
  content: `
<h2>What the PIT does</h2>
<p>The 8254 PIT (Programmable Interval Timer) is three independent 16-bit countdown counters, all clocked from a 1.193182 MHz signal:</p>
<ul>
  <li><strong>Channel 0:</strong> fires IRQ 0 on counter underflow. This is "the system timer". BIOSes program it for ~18.2 Hz (1.193182 MHz / 65536); Linux later reprograms for 100 Hz or 1000 Hz.</li>
  <li><strong>Channel 1:</strong> historically used for DRAM refresh. Mostly dead.</li>
  <li><strong>Channel 2:</strong> drives the PC speaker.</li>
</ul>

<p>The CPU programs a channel by writing a control word to port 0x43, then writing the reload value to the channel's data port (0x40, 0x41, 0x42 for channels 0/1/2). The channel counts down from its reload value to 0; on underflow, it reloads (in mode 2/3) or halts (in mode 0/4) and pulses its output line. Channel 0's output is wired to the PIC's IRQ 0.</p>

<h2>The reload-0 bug</h2>
<p>The 8254's reload register is 16 bits, so it can hold values 0–65535. But: by convention, <strong>a reload of 0 means 65536</strong> — the maximum. SeaBIOS programs channel 0 with reload=0 to get the slowest possible tick rate (~18.2 Hz), the standard PC BIOS tick.</p>

<p>Our PIT originally treated reload=0 as "channel disabled". So once SeaBIOS reprogrammed channel 0, the timer went silent. Symptom: IRQ 0 fired exactly once (from the initial 0xFFFF reload at construction time), then never again. SeaBIOS's boot-menu wait, which counts IRQ 0 ticks to time out, hung forever. The CPU spun in the HLT/<code>AdvanceIdle</code> path adding cycles by the trillion without delivering interrupts.</p>

<p>The fix in <code>machine/pc/pit.go</code>: add an <code>active</code> flag (set when the channel is programmed, or pre-set for channel 0 at construction); in <code>tickLocked</code>, use a 32-bit effective reload where 0 → 65536, and reload periodic channels (mode 2/3) vs. halting one-shots (mode 0/4).</p>

<h2>The lazy-tick optimisation</h2>
<p>We don't run a goroutine that fires every microsecond. Instead:</p>
<ul>
  <li>The PIT remembers when it was last advanced (<code>lastAdvance</code> = CPU cycle count).</li>
  <li>On any PIT port read/write, OR on <code>CheckTimer()</code> from the main loop, we compute the delta since lastAdvance and tick the channels.</li>
  <li>If a channel underflowed during the elapsed cycles, we raise IRQ 0 once.</li>
</ul>

<p>This is fine because guests observe the timer either by reading the port (which triggers advance) or by waiting for the IRQ (which gets delivered on the next CheckTimer). A real 18.2 Hz tick would be ~65535 emulator cycles between IRQs.</p>

<h2>HLT and AdvanceIdle</h2>
<p>When the CPU executes HLT, we set <code>powerDown</code> and return from <code>Step()</code>. The main loop notices and calls <code>AdvanceIdle()</code>, which fast-forwards the cycle counter by 10000 cycles and re-checks the timer. After enough iterations the next IRQ fires, the CPU wakes, and execution resumes. Without this, a guest that HLT's would never see another timer tick (since cycles only advance during instruction execution).</p>

<div class="box box-key">
<strong>How we found the bug</strong>
With <code>TINYEMU_X86_PERF=1</code> we saw the cycle counter explode to 1.7 trillion cycles per 20 seconds — clearly the AdvanceIdle loop spinning. <code>TINYEMU_X64_INTR=1</code> showed exactly one vec=8 delivery despite the spin. The PIT had to be programmed-but-silent. <code>writeChannel</code> with reload=0 was the proximate cause.
</div>
`,
  exercises: [
    "Why is the BIOS tick rate 18.2 Hz specifically? Compute the exact value from 1.193182 MHz / 65536.",
    "How does Linux get 1000 Hz from the same hardware? Look up <code>HZ</code> in the kernel config.",
    "Read <code>tickLocked</code> in <code>pit.go</code>. What happens if multiple full periods elapse between calls?"

    "Our <code>tickLocked</code> computes how many input clocks elapsed since <code>lastAdvance</code> and how many full periods that covers. If several periods elapsed between calls, a periodic (mode 2/3) channel would have underflowed multiple times, but because we deliver interrupts edge-style we coalesce them: we raise IRQ 0 <strong>once</strong> rather than queuing one per missed period. That is acceptable because the guest counts ticks via the IRQ handler and our lazy-tick model only needs to guarantee progress, not exact tick multiplicity; a one-shot (mode 0/4) channel simply stays underflowed and does not reload."

<h2>What enumeration means</h2>
<p>A PCI bus has up to 32 device slots, each with up to 8 functions. Each function presents 256 bytes of <em>configuration space</em>. The BIOS walks every (bus, device, function) triple, reads the vendor ID, and if it's not 0xFFFF (= no device present), reads the rest of the header. Device class, vendor/device ID, BARs, interrupt line, etc.</p>

<p>The legacy mechanism is the "Type 1 configuration access": write the (bus, dev, fn, register) tuple to port 0xCF8, then read or write the data byte/word/dword at port 0xCFC. Modern PCIe adds memory-mapped MMCONFIG, but every chipset still supports the legacy port for backward compat.</p>

<h2>BIOS's job</h2>
<ol>
  <li>For each device: identify the vendor/device ID and class.</li>
  <li>Size each BAR: write all 1s, read back, the bits that stuck = the size mask. Allocate I/O or MMIO addresses.</li>
  <li>Program the BARs with their assigned base addresses.</li>
  <li>Program the interrupt line (which IRQ this device routes to, per the chipset's IRQ steering).</li>
  <li>Enable the device by setting the I/O space and memory space enable bits in the Command register.</li>
  <li>For devices with option ROMs (a BAR pointing to a small ROM): load the ROM at 0xC0000–0xDFFFF and execute its init entry.</li>
</ol>
<p>Our PC machine in <code>machine/pc/pci.go</code> implements the host-bridge config-space accessor. Devices register themselves at fixed (dev, fn) slots:</p>
<ul>
  <li>(0, 0, 0): 440FX host bridge.</li>
  <li>(0, 1, 0): PIIX3 ISA bridge.</li>
  <li>(0, 1, 1): PIIX3 IDE controller (x86 only; skipped on x86_64 to avoid the libata async-EH stall).</li>
  <li>(0, 3+n, 0): virtio-blk for each <code>-drive</code>.</li>
  <li>(0, 4+n, 0): virtio-net for each network device.</li>
</ul>

<h2>BAR sizing and the relocation bug</h2>
<p>A BAR is a 32-bit register. Bit 0 indicates I/O (1) or memory (0); for memory BARs, bits 1–3 indicate type. The high bits hold the assigned base address; the low bits are write-protected zero (defined by the device's required size). To learn the size, the BIOS writes 0xFFFFFFFF to the BAR, reads it back, sees which bits are zero (those are the address-mask bits), and infers the size.</p>

<p>The trap: <strong>BIOSes reassign BARs from scratch. Linux usually keeps the firmware-assigned bases.</strong> So if you statically register your virtio-blk I/O port handlers at 0xC100 (where you set the BAR at construction time), Linux is happy — but SeaBIOS will reassign BAR 0 to 0xC000 (or wherever its allocator decides), and now your handlers sit at the old address while the device's accesses go to nothing. SeaBIOS sees 0xFFFF for every register read and bails.</p>

<p>The fix in <code>machine/pc/pci.go</code>: add a <code>SetBARChangeHandler</code> callback that fires from <code>writeBAR</code> when the masked base changes (filtering the all-ones sizing probe). <code>AttachVirtioBlock</code> installs a handler that clears the old port range and re-registers the transport at the new base, with closures capturing the live base so the offset math follows the BAR.</p>

<p>Symptom of the unfixed bug: SeaBIOS reads "queue size 65535 > 256" and refuses to find a virtqueue. Zero I/O accesses ever reach the device.</p>

<div class="box box-warn">
<strong>The two-firmware reality</strong>
Your device has to behave correctly whether the firmware moves the BARs (SeaBIOS) or doesn't (Linux). Always have a BAR-change callback even if you never tested it against SeaBIOS — the day you do, it'll save you.
</div>
`,
  exercises: [

  answers: [
    "A 64-bit MMIO BAR occupies two consecutive 32-bit BAR slots, low then high. To size it the BIOS writes 0xFFFFFFFF to <em>both</em> halves, then reads both back: the returned value is the 64-bit address mask with the low size-bits cleared. It inverts the combined 64-bit read, adds 1, and that is the region size (the low BAR's type bits 1-3 = 100b mark it as 64-bit so the BIOS knows to pair them). Then it programs the assigned 64-bit base across the two slots.",
    "Neither gets 0xC000 — SeaBIOS's I/O allocator hands out one range at a time, so the first device to be sized gets 0xC000 and the second gets the next free range above it. The choice is deterministic for a fixed device set and probe order: SeaBIOS walks PCI in (bus, device, function) order and allocates BARs in that traversal order, so the same machine config yields the same assignment every boot. It is not arbitrary, just order-dependent.",
    "<code>writeBAR</code> masks the written value with the BAR's size mask to get the candidate base, and fires <code>onBARChange</code> only when that masked base actually differs from the current base. The sizing probe writes all-ones; <code>writeBAR</code> detects the all-ones (size-probe) write and stores it for read-back without committing it as a real base, so the callback is gated to fire on genuine base assignments, not on the 0xFFFFFFFF sizing write."
  ]

  id: 12, phase: 3,
  title: "PIT Calibration and Port 0x61",
  subtitle: "How the BIOS measures the CPU's speed",
  content: `
<h2>The chicken-and-egg problem</h2>
<p>How does software measure CPU speed? With a known time reference. The PIT is one — it tick at 1.193182 MHz reliably. But you can't <em>read</em> the PIT counter atomically from software; you have to latch it.</p>

<p>The classic trick: program channel 2 (which feeds the PC speaker) as a one-shot, gate it via port 0x61, and run a busy loop while sampling the counter. The number of CPU cycles per PIT tick gives you the CPU frequency.</p>

<h2>Port 0x61: System Control Port B</h2>
<p>Port 0x61 has these bits:</p>
<table class="corr-table">
  <tr><th>Bit</th><th>Read/Write</th><th>Meaning</th></tr>
  <tr><td>0</td><td>R/W</td><td>Channel 2 gate enable (gate input to PIT ch2)</td></tr>
  <tr><td>1</td><td>R/W</td><td>Speaker data</td></tr>
  <tr><td>4</td><td>R only</td><td>Refresh cycle toggle (DMA refresh, ~15 µs)</td></tr>
  <tr><td>5</td><td>R only</td><td>Channel 2 output (the PIT's OUT2 pin)</td></tr>
</table>
<p>SeaBIOS's calibrate loop reads bit 5 in a tight inner loop, counting CPU cycles between bit transitions. Each transition is ~838 ns of real time, derived from PIT channel 2's countdown.</p>

<h2>What goes wrong if 0x61 is misemulated</h2>
<p>If bit 5 never toggles, SeaBIOS's calibration loop runs forever — and you see the boot stuck somewhere in POST. We model bit 5 in <code>machine/pc/pc.go</code> by XORing it (and bit 4, the refresh toggle) into port61 on every read. That guarantees toggles, even though we don't actually run channel 2 with a real countdown:</p>
<pre>p.io.RegisterRead(0x61, 0x61, func(port uint16) uint32 {
    port61 ^= 0x30        // toggle bits 4 and 5
    return uint32(port61)
})</pre>
<p>SeaBIOS doesn't care about the wall-clock accuracy — it does the calibration, gets some number for "CPU MHz", and moves on. (Our reported MHz is 0 because we didn't bother to make the toggle rate represent a real frequency. SeaBIOS prints "CPU Mhz=0" and continues.)</p>

<h2>Linux's quick_pit_calibrate</h2>
<p>Linux uses a smarter routine: program channel 2, sample CPUID at known PIT tick boundaries, fit a line. Linux also masks port 0x61 differently (it reads it but ignores most bits). The toggle hack we have works for both — SeaBIOS sees the toggles it expects, Linux ignores the bits anyway.</p>

<div class="box box-key">
<strong>The two timing sources</strong>
The PIT is the reference clock for calibration. The TSC (Time Stamp Counter, read via RDTSC) is the per-cycle counter used by the calibrated software clock. The BIOS publishes "CPU MHz" so the OS knows how to convert TSC ticks → wall time.
</div>
`,
  exercises: [
    "Why does SeaBIOS use channel 2 instead of channel 0 (the IRQ-driving one) for calibration?",
    "What's the actual frequency of the bit 5 toggle in our emulator (in toggles per second)? Hint: <code>TINYEMU_X86_PERF=1</code>.",
    "Read the <code>port61</code> handler in <code>pc.go</code>. Why does it XOR both bits 4 and 5, not just bit 5?"
  ],
  answers: [
    "Because channel 0 is dedicated to driving IRQ 0 — using it would generate spurious timer interrupts and disturb the BIOS tick the rest of the system depends on. Channel 2 is software-controllable via port 0x61 (its gate can be enabled/disabled and its output OUT2 read back through bit 5) without raising any interrupt, so the calibration loop can gate it, busy-poll bit 5, and measure CPU cycles per known PIT interval in isolation.",
    "There is no real frequency: the handler XORs the bits on <em>every read</em>, so bit 5 toggles once per port-0x61 read, not on any wall-clock schedule. Its effective \"frequency\" is simply how often SeaBIOS reads the port, which under <code>TINYEMU_X86_PERF=1</code> you can correlate to the emulated cycle count of the calibration loop. Because it tracks reads rather than time, the calibrated \"CPU MHz\" comes out as 0 — which SeaBIOS prints and ignores.",
    "It XORs both because port 0x61 exposes two read-only status bits that real software polls: bit 5 is the channel-2 output (OUT2) used by the PIT calibration loop, and bit 4 is the DRAM refresh toggle that other timing/delay loops poll. Toggling only bit 5 would leave any code that waits on the refresh bit (bit 4) spinning forever, so the handler flips both (<code>^= 0x30</code>) to guarantee progress for either polling pattern."
  ]
},

{
  id: 13, phase: 4,
  title: "INT 13h Anatomy",
  subtitle: "The disk ABI every bootloader uses",
  content: `
<h2>What INT 13h is</h2>
<p>INT 13h is the real-mode disk-service interrupt. The BIOS installs a handler at IVT[0x13] during init. Software passes parameters in registers (AH = function code, others vary) and calls <code>int 0x13</code>. The handler does the I/O and returns with CF = error flag and AH = status.</p>

<p>The canonical functions, with the parameters they take:</p>

<table class="corr-table">
  <tr><th>AH</th><th>Name</th><th>Params</th></tr>
  <tr><td>0x00</td><td>Reset disk</td><td>DL = drive</td></tr>
  <tr><td>0x02</td><td>Read sectors (CHS)</td><td>AL = count, CH = cyl_low, CL = (cyl_high &lt;&lt; 6) | sector, DH = head, DL = drive, ES:BX = buffer</td></tr>
  <tr><td>0x03</td><td>Write sectors (CHS)</td><td>same as 02</td></tr>
  <tr><td>0x08</td><td>Get geometry</td><td>DL = drive; returns CHS limits</td></tr>
  <tr><td>0x15</td><td>Get DASD type</td><td>DL = drive</td></tr>
  <tr><td>0x41</td><td>Check LBA extensions</td><td>DL = drive</td></tr>
  <tr><td>0x42</td><td>Read sectors (LBA)</td><td>DL = drive, DS:SI = packet</td></tr>
</table>

<p>DL = 0x80 + N for hard disks, 0x00 + N for floppies. The "type bit" (bit 7 of DL) is what distinguishes "hard" from "floppy".</p>

<h2>The boot-sector contract</h2>
<p>When the BIOS finds a bootable device, it:</p>
<ol>
  <li>Reads sector 0 of the device into linear 0x7C00 (CS:IP = 0x0000:0x7C00).</li>
  <li>Sets DL to the drive number it just used.</li>
  <li>Jumps to 0x0000:0x7C00.</li>
</ol>
<p>The boot sector is then free to use INT 13h with that same DL to read more of the OS. <strong>This is the most important invariant of the legacy boot ABI.</strong> A boot sector that hardcodes <code>DL = 0x00</code> instead of using what the BIOS handed it can only boot from a floppy — that's exactly what MenuetOS's boot sector does:</p>
<pre>00007C7D  BA0001  mov dx,0x0100   ; DH=1, DL=0 (floppy drive A)
00007C80  E88E00  call 0x7D11     ; read-sector loop via INT 13h</pre>

<h2>Where the read goes</h2>
<p>SeaBIOS's INT 13h handler dispatches by drive number to the right driver:</p>
<ul>
  <li>DL &lt; 0x80: <code>floppy_13</code> → the FDC driver.</li>
  <li>0x80 ≤ DL &lt; 0xE0: <code>disk_13</code> → the hard-disk driver (ATA, virtio-blk, AHCI, ...).</li>
  <li>DL ≥ 0xE0: CD-ROM (ATAPI / virtio-scsi).</li>
</ul>
<p>For our virtio-blk: SeaBIOS in 16-bit mode notices it's not a 16-bit-friendly driver and calls into <code>process_op_32</code> via <code>call32</code>, transitioning to 32-bit, doing the virtio request, and coming back. (The <code>call32</code> mechanism is what tripped the GDT-walk bug in Lesson 6.)</p>

<h2>CHS vs LBA</h2>
<p>The CHS interface (function 0x02) takes cylinder/head/sector — limited to 10 bits of cylinder, 8 of head, 6 of sector → max ~8 GiB. The LBA extensions (0x42) take a 64-bit LBA and an arbitrary buffer count. Modern bootloaders use LBA; floppy boot sectors use CHS because the floppy geometry is small.</p>

<p>For a 1.44 MiB floppy: 80 cylinders × 2 heads × 18 sectors × 512 bytes = 1,474,560 bytes. Conversion:</p>
<pre>lba = (cyl * 2 + head) * 18 + (sector - 1)</pre>

<div class="box box-key">
<strong>The DL convention</strong>
A bootloader that uses the DL the BIOS hands it is portable across boot devices. One that hardcodes DL=0x80 (or 0x00) only boots from one device class. MenuetOS hardcodes 0x00 — so it must be presented as a floppy. That's why our boot path goes through the FDC, not virtio-blk.
</div>
`,
  exercises: [
    "Why is the boot sector loaded at 0x7C00 specifically? (Historical answer; look it up.)",
    "If the boot sector hardcodes DL=0x80, what does SeaBIOS do if there's no hard disk attached?",

{
  id: 14, phase: 4,
  title: "FDC + DMA: Booting a Floppy",
  subtitle: "Recreating the 8272 + 8237 chain",
  content: `
<h2>The two-chip dance</h2>
<p>A floppy read on a real PC involves two chips:</p>
<ul>
  <li>The <strong>FDC</strong> (8272 / 82077): the floppy controller. Receives commands like SPECIFY, SEEK, READ over its I/O ports (0x3F2–0x3F7). For data transfers, it doesn't do the bytes itself — it tells the DMA controller "I'm ready", and the DMA does the memory write.</li>
  <li>The <strong>DMA controller</strong> (8237, slave): channel 2 is wired to the FDC. The CPU programs the DMA's base address, count, and mode for channel 2. When the FDC has data, the DMA writes it to RAM.</li>
</ul>

<p>SeaBIOS issues a fixed sequence to read a sector:</p>
<ol>
  <li>SPECIFY (0x03): set step-rate and head-load timings. No IRQ, no result.</li>
  <li>RECALIBRATE (0x07): seek to cylinder 0. Raises IRQ 6.</li>
  <li>SENSE_INTERRUPT (0x08): read the result (ST0 + PCN). Clears the pending IRQ flag.</li>
  <li>SEEK (0x0F): move to the target cylinder. Raises IRQ 6.</li>
  <li>SENSE_INTERRUPT again.</li>
  <li>Program DMA channel 2: target address, byte count, mode = "write to memory, single transfer".</li>
  <li>READ (0xE6): cyl/head/sector/size/EOT. The FDC transfers via DMA, then raises IRQ 6 with 7 result bytes.</li>
</ol>

<h2>Our "synchronous-execute" shortcut</h2>
<p>We don't simulate the cycle-by-cycle FDC + DMA. When SeaBIOS writes the READ command + 8 parameter bytes to port 0x3F5, we do the whole transfer inline:</p>
<ol>
  <li>Decode CHS from the params → compute LBA.</li>
  <li>Read the DMA channel-2 state: target = (page &lt;&lt; 16) | addr, count = count register + 1.</li>
  <li>Copy <code>count</code> bytes from the floppy image to guest memory at <code>target</code>.</li>
  <li>Stuff 7 result bytes (ST0/ST1/ST2/C/H/R/N) into a result buffer.</li>
  <li>Set MSR to "result ready" (RQM | DIO | CB).</li>
  <li>Raise IRQ 6.</li>
</ol>
<p>SeaBIOS reads the result bytes via port 0x3F5, sees ST0 bits 6–7 = 0 (success), and the read is done.</p>

<p>This shortcut is invisible from SeaBIOS's perspective — the FDC's externally-visible behavior is identical. We're just not pacing the bytes through the FIFO byte-by-byte.</p>

<h2>The MSR state machine</h2>
<p>Port 0x3F4 returns the Main Status Register. Three bits matter:</p>
<ul>
  <li>RQM (0x80): controller ready to transfer a byte.</li>
  <li>DIO (0x40): direction — 1 = FDC → CPU (result phase), 0 = CPU → FDC (command phase).</li>
  <li>CB (0x10): command in progress.</li>
</ul>
<p>Our <code>readMSR()</code>:</p>
<pre>if len(f.result) > 0  { return RQM | DIO | CB }  // result phase
if f.need > 0          { return RQM | CB }        // command phase
                       { return RQM }             // idle</pre>

<h2>DMA channel 2: the minimum</h2>
<p>Just enough to satisfy SeaBIOS:</p>
<ul>
  <li>Port 0x04: ch2 base address, low then high (flip-flop sequenced).</li>
  <li>Port 0x05: ch2 count, low then high.</li>
  <li>Port 0x81: ch2 page register (the high byte beyond the 16-bit address).</li>
  <li>Port 0x0C: flip-flop reset (any write).</li>
  <li>Ports 0x0A, 0x0B: mask and mode (accepted, ignored — we transfer eagerly).</li>
</ul>
<p>Target physical address: <code>(page &lt;&lt; 16) | base</code>. Byte count: <code>count + 1</code>. That's it.</p>

<h2>The CMOS hint</h2>
<p>SeaBIOS only probes the FDC if CMOS byte 0x10 says a floppy is present. We set <code>cmos[0x10] = 0x40</code> (drive A = 1.44 MB, drive B = none) and the equipment-list byte 0x14 bit 0 in <code>SetFloppyType144</code>. Otherwise SeaBIOS skips the floppy entirely.</p>

<div class="box box-key">
<strong>Smallest-thing-that-works</strong>
You don't need a faithful 8272 byte-stream model to boot a floppy. You need: the four ports, the right MSR transitions, the right result bytes, IRQ 6, and a working DMA target. ~250 lines.
</div>
`,
  exercises: [
    "Walk through a SEEK command. What bytes get written, in what order? What does the result phase look like?",
    "Why is RECALIBRATE followed by SENSE_INTERRUPT? What does sense interrupt return?",
    "Modify <code>execRead</code> to handle a multi-track transfer (reads that span past the End Of Track). Test with a sector count > 18."

    "SEEK (0x0F) is a command-phase write of 3 bytes to port 0x3F5: the command byte <code>0x0F</code>, then a byte holding (head &lt;&lt; 2 | drive), then the target cylinder number. SEEK has <strong>no result phase</strong> — the FDC simply moves the head and, when done, raises IRQ 6. To collect the outcome you then issue SENSE_INTERRUPT (0x08), whose result phase returns 2 bytes: ST0 (with the seek-end bit and drive/head) and PCN (the present cylinder number).",
    "Because SEEK and RECALIBRATE are the two commands that move the head and have no result phase of their own — they only signal completion by raising IRQ 6. SENSE_INTERRUPT (0x08) is the command that reads back the controller's interrupt status: it returns ST0 and the present cylinder number (PCN), and crucially it <strong>clears the pending interrupt condition</strong> in the FDC. Without it the FDC stays in an \"interrupt pending\" state and rejects the next command.",
    "Currently <code>execRead</code> converts the starting CHS to one LBA and copies <code>count</code> sectors linearly. For a true multi-track read you must respect the End Of Track (EOT) parameter: when the running sector number exceeds EOT (18 on a 1.44 MiB disk), increment the head (and, after the second head, the cylinder) and reset the sector to 1 before continuing, recomputing the LBA at each track boundary. Test by issuing a READ with a sector count &gt; 18 and verifying the bytes copied span the head/cylinder rollover correctly (compare against the flat image offsets). Since our backing image is already linear by LBA, the fix is mainly to advance C/H/S properly so the returned result-phase C/H/R/N reflect where the transfer ended."

{
  id: 15, phase: 4,
  title: "Boot-Device Selection",
  subtitle: "From boot order to INT 19h",
  content: `
<h2>The boot menu and the wait</h2>
<p>After init, SeaBIOS prints "Press ESC for boot menu" and waits up to 2.5 seconds. If the user presses ESC, it shows the menu; otherwise it boots the first device in its boot order.</p>

<p>The 2.5 seconds isn't real time — it's <strong>~46 timer ticks</strong>. SeaBIOS's <code>get_keystroke(2500_ms)</code> converts the millisecond budget to ticks (at the standard 18.2 Hz) and decrements a counter on every IRQ 0. If the timer never fires, the wait never ends. (See Lesson 10 for how this hung us before the PIT fix.)</p>

<h2>The boot order</h2>
<p>SeaBIOS reads boot-order entries from fw_cfg (or a hard-coded fallback). Each entry is a device path like <code>/pci@i0cf8/*@3</code> (any device at PCI slot 3). For each entry SeaBIOS searches its discovered drive list for a match, and calls <code>boot_disk(drive)</code> on the first hit.</p>

<p>The path syntax follows OpenBoot conventions. Some examples:</p>
<ul>
  <li><code>/pci@i0cf8/*@3</code> — virtio-blk at slot 3 (this matched our drive in MenuetOS run).</li>
  <li><code>/pci@i0cf8/isa@1/fdc@03f0/floppy@0</code> — the FDC's floppy drive 0.</li>
  <li><code>HALT</code> — a sentinel for "no more options, halt".</li>
</ul>

<h2>boot_disk's contract</h2>
<p>For each candidate drive:</p>
<ol>
  <li>Read sector 0 via INT 13h AH=2 to 0x7C00.</li>
  <li>If the read fails: print "Boot failed: could not read the boot disk" and try the next.</li>
  <li>Check the boot signature: bytes 510–511 of the sector = 0x55, 0xAA. If not: print "not a bootable disk" and try the next.</li>
  <li>If both pass: print "Booting from 0000:7c00", set DL to the drive number, jump to 0x0000:0x7C00.</li>
</ol>

<h2>INT 19h: the reboot vector</h2>
<p>If no boot device works, SeaBIOS doesn't quit — it calls INT 19h, the "reboot" vector. The INT 19h handler restarts the entire boot process from scratch (re-probe devices, re-walk boot order, retry). On real hardware this lets you swap a floppy and have the BIOS pick it up. We don't model media changes, so INT 19h just loops forever.</p>

<p>If the kernel later wants to reboot the machine, it can also call INT 19h. But modern OSes use the ACPI reset register or a triple-fault instead.</p>

<h2>What the user sees</h2>
<p>For our MenuetOS run with <code>-fda</code>:</p>
<pre>Press ESC for boot menu.
Searching bootorder for: HALT
Booting from Floppy...
Booting from 0000:7c00</pre>
<p>"Booting from Floppy..." means SeaBIOS picked the floppy device, read its sector 0 (FDC READ chs=0/0/1), verified the 55 AA signature, set DL=0, and jumped to 0x7C00. From here on, the floppy boot sector owns the CPU. Whether MenuetOS can actually use it depends on what the boot sector does next — and as we saw, MenuetOS's needs VBE which we don't model.</p>

<div class="box box-key">
<strong>The boot-sector handoff</strong>
At <code>jmp 0x0000:0x7C00</code>, SeaBIOS's responsibilities are paused. From the boot sector's perspective: registers are mostly garbage <em>except</em> DL = the drive number, the IVT is populated with BIOS handlers, the BDA at 0x400+ has system info. Everything else is up to the boot sector.
</div>
`,

<h2>What MenuetOS does after boot</h2>
<p>MenuetOS is a graphical, 64-bit hobby OS. Its 1.44 MB floppy boot sector reads more sectors via INT 13h, loads a second-stage loader to 0x10000, and jumps to it. The loader does:</p>
<ol>
  <li>Enable A20 (so addresses above 1 MiB work).</li>
  <li>Probe memory.</li>
  <li>Probe video — INT 10h AX=4F00 to query VBE (VESA BIOS Extensions).</li>
  <li>If VBE is available, pick a 1024×768 mode and enter it.</li>
  <li>Set up 64-bit page tables, enter long mode, jump to the kernel.</li>

<h2>What it would take to go further</h2>
<p>Three things, in increasing order of effort:</p>
