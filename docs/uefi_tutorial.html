const PHASE_META = {
  1: { name: "UEFI vs the BIOS",          short: "Phase I",   color: "var(--p1)", lessons: "1–3"   },
  2: { name: "The Boot-Time Environment", short: "Phase II",  color: "var(--p2)", lessons: "4–7"   },

const LESSONS = [

// ============================================================
// PHASE 1 — UEFI vs the BIOS
// ============================================================
{
  id: 1, phase: 1,
  title: "Why UEFI Replaced the BIOS",
  subtitle: "The same cold-boot problem, solved with a richer model",
  content: `
<h2>The cold-boot problem, again</h2>
<p>UEFI solves exactly the problem the legacy BIOS solves: take a machine from "raw CPU at the reset vector" to "an operating system is running." What changed is <em>how</em>. The BIOS is a pile of 16-bit real-mode interrupt handlers (<code>INT 10h</code>, <code>INT 13h</code>…) that a bootloader pokes from the first 1&nbsp;MiB of memory. UEFI is a small, structured, mostly-64-bit operating environment with a typed API, a driver model, a filesystem, and a boot manager — all before your OS loads.</p>

<h2>What the BIOS couldn't do</h2>
<ul>
  <li><strong>16-bit real mode.</strong> Bootloaders run in real mode with a 1&nbsp;MiB ceiling; reaching protected/long mode is the loader's problem.</li>
  <li><strong>MBR partitioning.</strong> 32-bit LBA in the partition table caps disks at 2&nbsp;TiB.</li>
  <li><strong>512-byte boot sector.</strong> All the loader's first-stage code must fit in one sector at <code>0x7C00</code>.</li>
  <li><strong>No standard API past boot.</strong> Once the OS takes over, the BIOS services are gone.</li>
</ul>

<h2>What UEFI brings</h2>
<ul>
  <li><strong>Native 32/64-bit.</strong> Firmware and applications run in flat protected or long mode — no real-mode gymnastics.</li>
  <li><strong>GPT.</strong> 64-bit LBA, many partitions, redundant headers.</li>
  <li><strong>A driver + protocol model.</strong> Functionality is discovered at runtime by GUID, not hard-wired interrupt numbers.</li>
  <li><strong>A boot manager + variables.</strong> Non-volatile <code>BootOrder</code>/<code>Boot####</code> entries decide what to launch; an EFI app on a FAT partition is the boot target.</li>
  <li><strong>Runtime services.</strong> A handful of calls (variables, time, reset) survive into the running OS.</li>
</ul>

<div class="box box-note"><strong>Where this fits</strong>Read this alongside <code>bios_tutorial.html</code> (the legacy path) and <code>x64_tutorial.html</code> (what the CPU does). UEFI sits between silicon and the OS loader, just like the BIOS — but it hands the OS a far richer starting state.</div>

<p>In <code>tinyemu-go</code> the UEFI firmware is <strong>OVMF</strong> (the edk2 build for virtual machines) on x86_64 and <strong>edk2 AArch64</strong> on arm64. The emulator's job is to host that firmware faithfully enough that it reaches its boot manager and launches a guest — which, as Phase IV shows, surfaced a string of real device bugs.</p>
`,
  exercises: [
    "List three things a UEFI application can do that a legacy boot sector cannot, and tie each to a concrete UEFI facility (mode, partitioning, API).",
    "The BIOS hands off with a single jump to 0x7C00 and DL set. Describe, at a high level, how UEFI's handoff differs — what does the firmware give the OS loader instead?",
  ],
},
{
  id: 2, phase: 1,
  title: "The Firmware Image & Boot Phases",
  subtitle: "SEC → PEI → DXE → BDS, and where the code lives",
  content: `
<h2>One flash image, several phases</h2>
<p>UEFI firmware is a single image in NOR flash mapped just below 4&nbsp;GiB. The CPU still starts at the reset vector (<code>0xFFFFFFF0</code> on x86); the very first code (<strong>SEC</strong>, the security phase) sets up a temporary stack and finds the main firmware volume. From there the phases run in order:</p>
<ol>
  <li><strong>SEC</strong> — Security. Reset-vector code; establishes a call stack (often in cache-as-RAM) and locates the boot firmware volume.</li>
  <li><strong>PEI</strong> — Pre-EFI Initialization. Tiny modules (PEIMs) that initialize just enough RAM and chipset to proceed, then describe the platform via HOBs (hand-off blocks).</li>
  <li><strong>DXE</strong> — Driver Execution Environment. The bulk of the firmware: the DXE core publishes Boot Services, then dispatches drivers that produce <em>protocols</em> (disk, console, network, the FAT driver…).</li>
  <li><strong>BDS</strong> — Boot Device Selection. Reads the boot variables, connects the devices each entry needs, and launches the boot target (an OS loader or the UEFI shell).</li>
</ol>

<h2>Firmware volumes</h2>
<p>The image is a set of <strong>firmware volumes</strong> (FVs) containing <strong>files</strong> (FFS), each holding sections (PE32 executables, raw data, compressed sub-volumes). The DXE dispatcher walks the FV, finds drivers whose dependencies are satisfied, and runs them. This is why UEFI is "modular": adding a capability is adding a driver file, not patching a monolith.</p>

<div class="box box-key"><strong>The mental model</strong>SEC/PEI get you to RAM + a platform description. DXE turns that into a world of protocols. BDS uses those protocols to find and launch an OS. Your guest only ever sees the tail end of DXE + BDS.</div>

<p>OVMF collapses some of this for virtual machines (memory is already there; PEI is thin), but the DXE→BDS structure is exactly what you watch on temu's serial console: a stream of driver-connect messages, then the boot manager.</p>
`,

    "Match each phase (SEC/PEI/DXE/BDS) to its one-sentence job. Which phase publishes Boot Services?",

  ],
},

  subtitle: "UEFI's runtime object model",
  content: `
<h2>Everything is a handle with protocols</h2>
<p>UEFI has no fixed interrupt numbers. Instead it keeps a <strong>handle database</strong>: each device or service is a <em>handle</em>, and on each handle sit one or more <strong>protocols</strong> — interface structs identified by a 128-bit <strong>GUID</strong>. A protocol is just a vtable of function pointers plus data.</p>

<pre><span class="lang-tag">c</span><span class="cm">// Find the Graphics Output Protocol on any handle</span>
<span class="ty">EFI_GRAPHICS_OUTPUT_PROTOCOL</span> *gop;
<span class="ty">EFI_STATUS</span> s = BS-&gt;<span class="fn">LocateProtocol</span>(
    &amp;gEfiGraphicsOutputProtocolGuid, <span class="kw">NULL</span>, (<span class="ty">void</span>**)&amp;gop);
<span class="kw">if</span> (s == <span class="dc">EFI_SUCCESS</span>)
    gop-&gt;<span class="fn">SetMode</span>(gop, mode);   <span class="cm">// call through the protocol's vtable</span></pre>

<h2>How you reach a capability</h2>
<ul>
  <li><strong>LocateProtocol</strong> — give me any handle that exposes this GUID (e.g. "a graphics output").</li>
  <li><strong>HandleProtocol / OpenProtocol</strong> — give me this GUID <em>on this specific handle</em> (e.g. the block I/O on <em>that</em> disk).</li>
  <li><strong>LocateHandleBuffer</strong> — give me every handle exposing this GUID, so I can iterate (all disks, all NICs).</li>
</ul>

<h2>Device paths</h2>
<p>Handles are also addressable by a <strong>device path</strong> — a binary breadcrumb like <code>PciRoot(0x0)/Pci(0x1,0x0)/Sata(0,0,0)/HD(1,GPT,…)/\\EFI\\BOOT\\BOOTX64.EFI</code>. Boot variables store device paths so the firmware can re-find the same boot file across reboots.</p>

<div class="box box-think"><strong>Why GUIDs?</strong>A GUID-keyed registry lets independent vendors add interfaces without colliding and lets the OS loader ask "is there a console? a disk? a network?" without knowing the hardware. It's late binding instead of the BIOS's hard-coded INT numbers.</div>
`,
  exercises: [
    "You want to read a file from the first FAT volume. Which protocol GUIDs do you need, and would you LocateProtocol or LocateHandleBuffer + OpenProtocol? Why?",
    "Explain a device path in one sentence and say why boot variables store them rather than a drive number.",
  ],
},

<h2>The pre-OS API</h2>
<p>Boot Services are the functions available <em>only</em> while the firmware still owns the machine. The big groups:</p>
<ul>
  <li><strong>Memory.</strong> <code>AllocatePages</code> / <code>FreePages</code> (page-granular, typed), <code>AllocatePool</code> / <code>FreePool</code> (byte-granular). Every allocation has an <em>EFI memory type</em> (e.g. <code>EfiLoaderData</code>, <code>EfiBootServicesCode</code>) that tells the OS what it can reclaim later.</li>
  <li><strong>Memory map.</strong> <code>GetMemoryMap</code> returns the descriptor array the OS will inherit — and the <em>map key</em> you must pass to <code>ExitBootServices</code>.</li>
  <li><strong>Protocols.</strong> <code>InstallProtocolInterface</code>, <code>LocateProtocol</code>, <code>OpenProtocol</code> — the handle-database operations from Lesson 3.</li>
  <li><strong>Events &amp; timers.</strong> <code>CreateEvent</code>, <code>SetTimer</code>, <code>WaitForEvent</code> — a cooperative, single-threaded event model (the timer tick drives polling).</li>
  <li><strong>Images.</strong> <code>LoadImage</code> (parse a PE/COFF from a buffer or device path), <code>StartImage</code> (run it), <code>Exit</code>.</li>
</ul>

<pre><span class="lang-tag">c</span><span class="ty">UINTN</span> mapSize = 0, mapKey, descSize; <span class="ty">UINT32</span> descVer;
BS-&gt;<span class="fn">GetMemoryMap</span>(&amp;mapSize, <span class="kw">NULL</span>, &amp;mapKey, &amp;descSize, &amp;descVer); <span class="cm">// size probe</span>

BS-&gt;<span class="fn">GetMemoryMap</span>(&amp;mapSize, map, &amp;mapKey, &amp;descSize, &amp;descVer);   <span class="cm">// real read</span></pre>

<div class="box box-warn"><strong>The map-key dance</strong>Allocating the buffer for the map can <em>change</em> the map, invalidating the key. Loaders call GetMemoryMap immediately before ExitBootServices, and retry if the key is stale. Get this wrong and ExitBootServices returns <code>EFI_INVALID_PARAMETER</code>.</div>

<h2>The services that don't go away</h2>
<p>After <code>ExitBootServices</code>, Boot Services are gone — but Runtime Services remain callable by the OS (the OS even maps them into its own address space via <code>SetVirtualAddressMap</code>). The set is deliberately tiny:</p>

<h2>Text first</h2>
<p>The simplest console is <strong>Simple Text Output</strong> (<code>ConOut</code>) and <strong>Simple Text Input</strong> (<code>ConIn</code>) — Unicode strings out, keystrokes in. On a virtual machine the firmware usually mirrors this to a serial port, which is exactly what you watch scroll by on temu's console.</p>

<h2>Graphics: the GOP</h2>
<p>For pixels, UEFI publishes the <strong>Graphics Output Protocol</strong> (GOP). You query available modes, set one, and get back a linear framebuffer base address + pitch + pixel format. The OS loader can keep using that same framebuffer after ExitBootServices (no driver needed) — this is how a UEFI OS shows a splash before its real GPU driver loads.</p>

<pre><span class="lang-tag">c</span>gop-&gt;<span class="fn">QueryMode</span>(gop, modeNum, &amp;sizeOfInfo, &amp;info);

<h2>The EFI System Partition</h2>
<p>UEFI reads boot files from a <strong>FAT</strong> filesystem — the <em>EFI System Partition</em> (ESP), a GPT partition with a known type GUID. The firmware ships a FAT driver, so any ESP is readable without OS help.</p>

<h2>How the firmware decides what to launch</h2>
<ol>
  <li>BDS reads <code>BootOrder</code> (an ordered list of <code>Boot####</code> ids).</li>

<h2>EFI apps are PE/COFF</h2>
<p>A UEFI executable is a PE32+ image (the same container as a Windows <code>.exe</code>), subsystem type <em>EFI Application</em>. The firmware's loader maps the sections, applies relocations, and calls the entry point with <code>(ImageHandle, SystemTable)</code>.</p>

<h2>The launch flow</h2>
<ol>
  <li><code>LoadImage</code> — read the PE from a device path or memory buffer, map + relocate it, create a handle for it that carries the <strong>Loaded Image Protocol</strong> (image base, size, the device it came from, the command line).</li>
  <li><code>StartImage</code> — transfer control to the entry point. The image runs until it returns or calls <code>Exit</code>.</li>
  <li>An OS loader (GRUB, systemd-boot, or a kernel's own EFI stub) is itself just such an image; it then loads the kernel and ultimately calls <code>ExitBootServices</code>.</li>
</ol>

<div class="box box-note"><strong>The EFI stub</strong>Linux/arm64, FreeBSD's loader, and many kernels are themselves valid EFI applications — the firmware <code>StartImage</code>s the kernel directly, no separate bootloader required. That's why <code>-bios OVMF</code> + a kernel-on-an-ESP is a complete boot.</div>

<p>Because images are PE/COFF with relocations, they're position-independent: the firmware can place them anywhere in the memory it allocated. (Contrast the BIOS, which jumps to a fixed <code>0x7C00</code>.)</p>

<h2>The point of no return</h2>
<p><code>ExitBootServices</code> is the moment the OS takes ownership. The loader:</p>

  <li>Calls <code>GetMemoryMap</code> one last time to get the current map + its key.</li>
  <li>Calls <code>BS-&gt;ExitBootServices(ImageHandle, mapKey)</code>.</li>
  <li>On success, <strong>Boot Services no longer exist</strong> — no allocations, no protocols, no timer events. The firmware's drivers stop. Only Runtime Services remain.</li>

  subtitle: "Why a RAM stub wasn't enough",
  content: `
<h2>Flash is not RAM</h2>
<p>The UEFI variable store lives in NOR flash, and edk2's flash driver (<code>VirtNorFlashDxe</code>) talks to it with a <strong>CFI command set</strong>, not plain loads/stores: to write, it issues an Intel command sequence and then <em>polls a status bit</em> (bit 7, the ready/busy flag) until the program/erase completes.</p>

<div class="box box-warn"><strong>The bug</strong>temu originally mapped the variable bank (<code>0x04000000</code>) as ordinary RAM. edk2 wrote a CFI command, then spun forever waiting for a status bit that plain RAM never produced — BDS hung. The fix was a real flash model: <code>devices/cfiflash.go</code> implements the Intel/<code>pflash_cfi01</code> command set (read-array, program, block-erase, status register). That unblocked edk2's BDS and is what lets FreeBSD/arm64 reach its loader.</div>

<h2>What the model has to do</h2>
<ul>
  <li>Default to <strong>read-array</strong> mode: reads return the stored bytes.</li>
  <li>On a <strong>program</strong>/<strong>erase</strong> command, perform the write and flip the <strong>status register</strong> to "ready" so the driver's poll terminates.</li>
  <li>Persist writes to the variable bank so <code>SetVariable</code> survives a warm reset.</li>
</ul>

<div class="box box-key"><strong>The general lesson</strong>Firmware drives flash as a state machine. An emulator that treats it as memory passes reads but deadlocks on the first write's status poll — a class of "silent hang" bugs that only a faithful device model fixes.</div>
`,
  exercises: [
    "Trace what edk2 does on a variable write and pinpoint exactly where a RAM-backed flash bank deadlocks.",
    "List the minimum CFI states a flash model must implement to satisfy a status-polling driver.",
  ],
},

<h2>Firmware has to discover RAM, ACPI, the clock…</h2>
<p>OVMF doesn't hard-code the VM's memory size or device list — it asks the platform. On QEMU-style machines that channel is <strong>fw_cfg</strong>: a tiny port/DMA interface the firmware reads to learn RAM size, the e820 map, ACPI tables, kernel/initrd blobs, and more. The firmware also publishes the <strong>ACPI RSDP</strong> into the UEFI configuration table so the OS can find ACPI without scanning memory.</p>

<div class="box box-warn"><strong>The bring-up wall</strong>During OVMF bring-up on temu, OVMF read <em>neither</em> the CMOS memory registers <em>nor</em> fw_cfg the way it expected, and ended up believing in a phantom 4&nbsp;GiB memory region — stalling DXE. Getting memory discovery right (CMOS/fw_cfg + the e820/memory map the firmware consumes) is what lets DXE complete and BDS run.</div>

<h2>Pieces temu provides</h2>
<ul>
  <li><strong>fw_cfg</strong> (port + DMA) — debuggable with <code>TINYEMU_FWCFG_DEBUG=1</code> / <code>TINYEMU_FWCFG_DMA</code>.</li>

function markComplete(id) {
  if (!completed.includes(id)) completed.push(id);
  localStorage.setItem('uefi_done', JSON.stringify(completed));
  updateProgress(); renderNav();
}
function unmarkComplete(id) {
  completed = completed.filter(x => x !== id);
  localStorage.setItem('uefi_done', JSON.stringify(completed));
  updateProgress(); renderNav();
}
function updateProgress() {
  const pct = LESSONS.length ? Math.round(completed.length / LESSONS.length * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${completed.length} / ${LESSONS.length}`;
}

let collapsedPhases = new Set(JSON.parse(localStorage.getItem('uefi_collapsed') || '[]'));

function renderNav(filter = '') {
  const nav = document.getElementById('lesson-nav');
  nav.innerHTML = '';
  const f = filter.toLowerCase();
  for (let ph = 1; ph <= 6; ph++) {
    const meta = PHASE_META[ph];
    const lessons = LESSONS.filter(l => l.phase === ph && (
      !f || l.title.toLowerCase().includes(f) || l.subtitle.toLowerCase().includes(f)
    ));
    if (lessons.length === 0) continue;
    const collapsed = collapsedPhases.has(ph);
    const group = document.createElement('div');
    group.className = 'phase-group';
    group.innerHTML = `
      <div class="phase-header ${collapsed ? 'collapsed' : ''}" data-phase="${ph}"
           style="color:${meta.color}">
        <span class="phase-dot" style="background:${meta.color}"></span>
        ${meta.short}: ${meta.name}
        <span class="phase-toggle">▾</span>
      </div>
      <div class="phase-lessons" ${collapsed ? 'style="display:none"' : ''}>
        ${lessons.map(l => `
          <div class="nav-item ${currentLesson === l.id ? 'active' : ''} ${isComplete(l.id) ? 'done' : ''}"
               data-id="${l.id}"
               style="${currentLesson === l.id ? `border-left-color:${meta.color}` : ''}">
            <span class="nav-check">${isComplete(l.id) ? '✓' : ''}</span>
            <span class="nav-num">${l.id}</span>
            <span class="${l.stub ? 'nav-stub' : ''}">${l.title}</span>
          </div>
        `).join('')}
      </div>
    `;
    nav.appendChild(group);
  }
  nav.querySelectorAll('.phase-header').forEach(h => {
    h.addEventListener('click', () => {
      const ph = parseInt(h.dataset.phase);
      const lessons = h.nextElementSibling;
      if (collapsedPhases.has(ph)) {
        collapsedPhases.delete(ph);
        h.classList.remove('collapsed');
        lessons.style.display = '';
      } else {
        collapsedPhases.add(ph);
        h.classList.add('collapsed');
        lessons.style.display = 'none';
      }
      localStorage.setItem('uefi_collapsed', JSON.stringify([...collapsedPhases]));
    });
  });
  nav.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => showLesson(parseInt(item.dataset.id)));
  });
}

function showLesson(id) {
  const lesson = LESSONS.find(l => l.id === id);
  if (!lesson) return;
  currentLesson = id;
  const phase = PHASE_META[lesson.phase];
  const prev = LESSONS.find(l => l.id === id - 1);
  const next = LESSONS.find(l => l.id === id + 1);

  document.getElementById('topbar-phase').textContent = `${phase.short} — ${phase.name}`;
  const prevBtn = document.getElementById('btn-prev');
  const nextBtn = document.getElementById('btn-next-top');
  prevBtn.disabled = !prev;
  nextBtn.disabled = !next;
  prevBtn.onclick = () => prev && showLesson(prev.id);
  nextBtn.onclick = () => next && showLesson(next.id);

  const done = isComplete(id);
  const stubBadge = lesson.stub ? `<span class="stub-badge">STUB</span>` : '';
  document.getElementById('content-area').innerHTML = `
    <div id="lesson-content">
      <div class="lesson-eyebrow">
        <span class="phase-badge" style="background:${phase.color}22;color:${phase.color}">${phase.short}</span>
        <span class="lesson-number">Lesson ${lesson.id} of ${LESSONS.length}</span>
        ${stubBadge}
      </div>
      <h1 class="lesson-title">${lesson.title}</h1>
      <p class="lesson-subtitle">${lesson.subtitle}</p>
      <div class="lesson-divider"></div>
      <div class="lesson-body">${lesson.content}</div>
      <div class="exercises">
        <h2>Exercises</h2>
        ${lesson.exercises.map((ex, i) => `
          <div class="exercise">
            <div class="exercise-num">Exercise ${i + 1}</div>
            <p>${ex}</p>
          </div>
        `).join('')}
      </div>
      <div class="complete-wrap">
        <button class="btn-complete ${done ? 'done' : ''}" id="btn-done">
          ${done ? '✓ Completed' : 'Mark Complete'}
        </button>
        ${next ? `<button class="btn-next" id="btn-next-lesson">Next: ${next.title} →</button>` : ''}
      </div>
    </div>
  `;
  document.getElementById('btn-done').onclick = () => {
    if (isComplete(id)) unmarkComplete(id); else markComplete(id);
    renderNav();
    document.getElementById('btn-done').className = `btn-complete ${isComplete(id) ? 'done' : ''}`;
    document.getElementById('btn-done').textContent = isComplete(id) ? '✓ Completed' : 'Mark Complete';
  };
  const nl = document.getElementById('btn-next-lesson');
  if (nl) nl.onclick = () => showLesson(next.id);
  renderNav();
  document.getElementById('main').scrollTo(0, 0);
  if (window.innerWidth < 900) document.getElementById('sidebar').classList.remove('open');
}

function showWelcome() {
  currentLesson = null;
  document.getElementById('topbar-phase').textContent = 'Overview';
  document.getElementById('btn-prev').disabled = true;
  document.getElementById('btn-next-top').disabled = false;
  document.getElementById('btn-next-top').onclick = () => showLesson(1);
  const stubsCount = LESSONS.filter(l => l.stub).length;
  const filledCount = LESSONS.length - stubsCount;
  document.getElementById('content-area').innerHTML = `
    <div id="welcome">
      <h1>UEFI <em>Internals</em></h1>
      <p class="tagline">From firmware volume to ExitBootServices — what UEFI does before your OS, how OVMF/edk2 implements it, and how we host it in tinyemu-go.</p>
      <div class="welcome-body">
        <p>This course covers the small operating environment that runs <em>before</em> your OS on a modern machine: UEFI. It uses <strong>OVMF / edk2</strong> (the open-source firmware) as the concrete implementation and <code>tinyemu-go</code> as the emulator hosting it. The final phase is a string of real device bugs — flash, framebuffer, timer, discovery — each surfaced by a real UEFI guest, with a real fix.</p>
        <p>Read this alongside <code>bios_tutorial.html</code> (the legacy path it replaced) and <code>x64_tutorial.html</code> (what the CPU does). UEFI sits between silicon and the OS loader — like the BIOS, but it hands the OS a far richer starting state.</p>
        <p>${LESSONS.length} lessons across four phases. Progress is saved in your browser.</p>
        <div class="phase-overview">
          ${[1,2,3,4].map(ph => {
            const m = PHASE_META[ph];
            const done = LESSONS.filter(l => l.phase === ph && isComplete(l.id)).length;
            const total = LESSONS.filter(l => l.phase === ph).length;
            return `
              <div class="phase-card" onclick="showLesson(${(LESSONS.find(l=>l.phase===ph)||{id:1}).id})">
                <div class="phase-card-num" style="color:${m.color}">${m.short} — Lessons ${m.lessons}</div>
                <h3>${m.name}</h3>
                <p>${done}/${total} complete</p>
              </div>
            `;
          }).join('')}
        </div>
        <button class="btn-start" onclick="showLesson(${completed.length > 0 ? Math.max(...completed) + 1 : 1})">
          ${completed.length > 0 ? 'Continue →' : 'Start from Lesson 1 →'}
        </button>
      </div>
    </div>
  `;
  renderNav();
}

document.getElementById('search').addEventListener('input', e => renderNav(e.target.value));

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'j') {
    const next = currentLesson && LESSONS.find(l => l.id === currentLesson + 1);
    if (next) showLesson(next.id);
  }
  if (e.key === 'ArrowLeft' || e.key === 'k') {
    const prev = currentLesson && LESSONS.find(l => l.id === currentLesson - 1);
    if (prev) showLesson(prev.id);
  }
  if (e.key === 'h') showWelcome();
});

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
document.getElementById('sidebar-header').style.cursor = 'pointer';
document.getElementById('sidebar-header').onclick = showWelcome;

updateProgress();
showWelcome();
</script>
</body>
</html>
