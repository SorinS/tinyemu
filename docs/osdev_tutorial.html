  id: 27, phase: 5,
  title: "virtqueues and Descriptors",
  subtitle: "The shared-memory ring at the heart of virtio",
  content: `
<h2>What a virtqueue is</h2>
<p>A virtqueue is a ring buffer in shared memory consisting of three components:</p>
<ol>
  <li><strong>The descriptor table.</strong> An array of entries; each entry describes one memory range (address, length, flags). Forms chains for scatter-gather.</li>
  <li><strong>The available ring (driver → device).</strong> The driver writes here when it has work. Each entry is the index of the head of a descriptor chain.</li>
  <li><strong>The used ring (device → driver).</strong> The device writes here when work is done. Each entry is the head index plus a "bytes written" count.</li>
</ol>
<p>The three areas are placed in shared guest memory; both guest and hypervisor can read and write them. Doorbell MMIO registers signal "new available entries" (kick) and "new used entries" (interrupt).</p>

<h2>A read request, end to end</h2>
<p>Imagine the guest issues a virtio-blk READ:</p>
<ol>
  <li>Guest driver allocates 3 buffers: a request header (16 bytes), a data buffer (4096 bytes), a status byte.</li>
  <li>Driver fills 3 descriptors pointing at those buffers; chains them via the NEXT flag.</li>
  <li>Driver writes the head index into the available ring; bumps the ring's index field.</li>
  <li>Driver writes to the doorbell MMIO register — this notifies the hypervisor.</li>
  <li>Hypervisor reads available ring, walks the descriptor chain, performs the read, fills the data buffer, writes the status byte.</li>
  <li>Hypervisor writes head index into the used ring; bumps the index.</li>
  <li>Hypervisor raises an interrupt.</li>
  <li>Guest's IRQ handler reads the used ring, finds the completed request, wakes whoever was waiting.</li>
</ol>

<h2>Why this is fast</h2>
<p>One doorbell write per batch of requests. The hypervisor can process multiple in-flight requests with one syscall to its real backend. The guest can submit multiple before sleeping. No per-instruction trap-and-emulate; the only "expensive" step is the doorbell + IRQ pair.</p>

<h2>Indirect descriptors</h2>
<p>For large requests with many scatter-gather elements, virtio supports "indirect" descriptors: one entry in the table points to <em>another</em> descriptor table in guest memory. The hypervisor walks the inner table to find the real buffers. Lets a single ring entry describe arbitrarily many segments.</p>

<h2>tinyemu-go's virtqueue</h2>
<p>Our implementation in <code>virtio/queue.go</code> models a single queue: descriptor table + avail ring + used ring, all backed by guest-physical memory. When the guest writes the doorbell, the hypervisor (us) reads avail, walks descriptors, calls into the device-specific backend (e.g. virtio-blk handler that calls <code>BlockDevice.ReadSectors</code>), then writes back to used and raises IRQ.</p>

<div class="box box-note">
<strong>Note</strong>
The exact wire format of the rings is fixed by the spec (and slightly different in virtio 1.0 vs 1.1 — the "packed virtqueue" in 1.1 collapses the three rings into one, sacrificing a bit of complexity for memory locality). We implement the 1.0 (split) format.
</div>
`,

<h2>The device class</h2>
<p>virtio-blk is one of the simplest virtio devices. The device exposes a single virtqueue; each request on the queue is one block operation (read or write).</p>

<h2>The request format</h2>
<p>Each virtio-blk request is a 3-descriptor chain:</p>
<table class="corr-table">
  <tr><th>Descriptor</th><th>Direction</th><th>Contents</th></tr>
  <tr><td>Header (16 bytes)</td><td>Driver → device</td><td>type (READ/WRITE/FLUSH), priority (unused), sector (LBA)</td></tr>
  <tr><td>Data buffer (N×512 bytes)</td><td>Both</td><td>Either source bytes (write) or destination (read)</td></tr>
  <tr><td>Status (1 byte)</td><td>Device → driver</td><td>0 = OK, 1 = IO error, 2 = unsupported</td></tr>
</table>
<p>So a 4 KB block read is one ring entry with 3 descriptors: an outbound header, an inbound 4 KB buffer, an inbound status byte.</p>

<h2>The device side</h2>
<p>The hypervisor's backend:</p>
<ol>
  <li>Pulls an avail-ring entry.</li>
  <li>Walks the descriptor chain to find header, data, status.</li>
  <li>Reads the header to learn type, sector.</li>
  <li>For READ: calls the host's actual storage backend; copies bytes into the guest's data buffer; writes 0 to status.</li>
  <li>For WRITE: copies bytes from the guest buffer to the storage backend; writes 0 to status.</li>
  <li>Writes a used-ring entry, raises an IRQ.</li>
</ol>

<h2>tinyemu-go implementation</h2>
<p>Our virtio-blk is in <code>virtio/block.go</code>. It implements the spec's wire format on top of our generic <code>devices.BlockDevice</code> interface. The same BlockDevice (file-backed, memory-backed, etc.) can serve via ATA OR via virtio-blk depending on which transport the board uses — the device-level interface is identical, only the transport differs.</p>
<p>Today's wiring:</p>
<ul>
  <li>RISC-V virt board: virtio-blk over virtio-mmio (the existing path).</li>
  <li>PC board: ATA via legacy ports (just built last session).</li>
  <li>Future ARM virt board: virtio-blk over virtio-mmio (would just work).</li>
  <li>Future PC board with virtio-pci: same virtio-blk, different transport — pending PCI host bridge.</li>
</ul>

<div class="box box-key">
<strong>Key Insight</strong>
virtio-blk shows the strength of the layered design: one wire format works over MMIO, PCI, or even channel I/O on s390. The same kernel driver handles all of them via a transport adapter. This is the dream every standards committee chases; virtio achieved it.
</div>

  content: `
<h2>The shape of a virtio-net device</h2>
<p>virtio-net is the simplest virtio class for which the protocol's tradeoffs are most visible. The device has two virtqueues by default:</p>
<table class="corr-table">
  <tr><th>Queue</th><th>Index</th><th>Direction</th><th>Driver puts in</th></tr>
  <tr><td>RX</td><td>0</td><td>device → driver</td><td>Empty buffers ready to receive a frame</td></tr>
  <tr><td>TX</td><td>1</td><td>driver → device</td><td>Frames to transmit</td></tr>
</table>
<p>(Control queue at index 2 is optional, used for setting MAC, multicast filter, link-status query, MQ enable; we don't model it.)</p>

<p>Each buffer is a list of descriptors that, glued together, hold:</p>
<pre>┌──────────────────────────┐
│ virtio_net_hdr  (12 B)   │   <span class="cm">// per-packet metadata</span>
├──────────────────────────┤
│ Ethernet frame           │   <span class="cm">// dest MAC, src MAC, ethertype, payload, no FCS</span>
└──────────────────────────┘<span class="lang-tag">layout</span></pre>

<h2>The virtio_net_hdr</h2>
<pre><span class="kw">struct</span> virtio_net_hdr_v1 {
    uint8_t  flags;          <span class="cm">// VIRTIO_NET_HDR_F_NEEDS_CSUM, …</span>
    uint8_t  gso_type;       <span class="cm">// VIRTIO_NET_HDR_GSO_TCPV4, …</span>
    uint16_t hdr_len;        <span class="cm">// header bytes (L2 + L3 + L4)</span>
    uint16_t gso_size;       <span class="cm">// MSS for segmentation</span>
    uint16_t csum_start;     <span class="cm">// offset of byte to checksum</span>
    uint16_t csum_offset;    <span class="cm">// offset of where csum goes</span>
    uint16_t num_buffers;    <span class="cm">// ONLY if VIRTIO_NET_F_MRG_RXBUF negotiated</span>
};<span class="lang-tag">c</span></pre>
<p>That trailing <code>num_buffers</code> field is what the rest of this lesson is about.</p>

<h2>The 10 vs 12 byte trap (a real tinyemu-go bug)</h2>
<p>The header is <strong>10 bytes if VIRTIO_NET_F_MRG_RXBUF is not negotiated</strong>, and <strong>12 bytes if it is</strong>. The feature is independent of every other feature; it determines, by itself, whether the trailing two bytes exist. The header size is fixed at feature-negotiation time and applies to every queue, every direction, forever.</p>
<p>Our virtio-net implementation originally hardcoded a 12-byte header on TX and only advertised VIRTIO_NET_F_MAC. Linux's driver, seeing no MRG_RXBUF bit, used 10 bytes. Result: every TX frame from the guest was 2 bytes longer than the host believed, and every RX frame the host queued was 2 bytes shorter than the driver expected. The driver saw 0 packets received, the host saw mangled Ethernet headers on TX, and apk reported <code>BAD signature</code> on every package — because the network "worked enough" to negotiate TLS but corrupted the body.</p>
<p>Fix (commit referenced in <a href="#" data-jump="32">L32</a>): advertise <code>VIRTIO_NET_F_MRG_RXBUF</code> in the device-features bitmap and write <code>num_buffers = 1</code> into every RX header. One line each, both sides agree, network packets flow.</p>

<div class="box box-key">
<strong>Why MRG_RXBUF exists</strong>
A jumbo frame (~64 KB after TCP segmentation offload) doesn't fit in a single guest page. Without MRG_RXBUF, the driver has to pre-allocate one descriptor per packet sized for the largest possible frame — 64 KB per RX slot, mostly wasted. With MRG_RXBUF, the device chains N descriptors per packet and writes <code>num_buffers = N</code> into the header. RX rings can use 1500-byte (or smaller) buffers and the device merges. Worth the 2 bytes.
</div>

<h2>Queue-size and the wake threshold</h2>
<p>Linux's virtio_net.c maintains a TX free-slot threshold of <code>2 + MAX_SKB_FRAGS</code> — currently 19. If the queue's free slot count drops below that, the driver stops adding packets and waits for a TX-complete interrupt to free slots.</p>
<p>If the device's queue is too small, the driver hits the threshold immediately and never wakes. tinyemu-go's first virtio-net had <code>MaxQueueNum = 16</code> — copy-pasted from virtio-blk where it works fine because Linux's blk driver has different sizing. virtio-net froze after the very first packet. Boosted to 256 and the queue runs steady.</p>
<p>The lesson is generic: <strong>queue sizes are device-specific contracts</strong>. Each device class has its own driver-side assumptions; the spec gives a minimum but the practical minimum is whatever Linux's driver actually demands.</p>

<h2>Offload features</h2>
<p>virtio-net's full feature list goes deep: VIRTIO_NET_F_CSUM, GUEST_CSUM, GUEST_TSO4, HOST_TSO4, HOST_UFO, MAC, GUEST_HDR_LEN, etc. Each one lets the driver and device skip work — checksum compute, segmentation, header rewriting — by delegating it to the other side. The net effect is enormous (10× throughput is normal). For an emulator that talks to a user-mode TCP stack (see <a href="#" data-jump="25">L25</a>) most of these are no-ops; you just want MAC and MRG_RXBUF.</p>

<h2>TX path (driver → device)</h2>
<ol>
  <li>Driver allocates an skb, prepends a zeroed virtio_net_hdr.</li>
  <li>Driver adds it as a descriptor chain on virtqueue 1 (TX).</li>
  <li>Driver writes the queue notify register; device wakes.</li>
  <li>Device strips the virtio_net_hdr, hands the Ethernet frame to its backend (slirp, TAP, or a raw socket).</li>
  <li>Device puts the buffer onto the used ring, raises interrupt or sets a used-event bit.</li>
  <li>Driver sees used-ring movement, frees the skb.</li>
</ol>

<h2>RX path (device → driver)</h2>
<ol>
  <li>Driver pre-fills the RX queue with empty descriptors big enough for a frame + header.</li>
  <li>A packet arrives at the device's backend.</li>
  <li>Device pulls an available descriptor (or several, with MRG_RXBUF), writes header + frame into them, sets <code>num_buffers</code>, marks them used.</li>
  <li>Device raises RX interrupt.</li>
  <li>Driver dequeues, hands the frame up the stack, recycles the buffer.</li>
</ol>
`,

<h2>Why two transports</h2>
<p>The virtio protocol defines a set of registers (status, feature bitmap, queue notify, queue size, queue address, …) and rules for talking to them. <em>How</em> the driver reaches those registers is the transport's job. There are two mainstream choices:</p>
<table class="corr-table">
  <tr><th></th><th>virtio-mmio</th><th>virtio-pci</th></tr>
  <tr><td>Discovery</td><td>Device-tree node (RISC-V/ARM) or a hardcoded base address</td><td>PCI enumeration (vendor 0x1AF4, device 0x1000-0x107F)</td></tr>
  <tr><td>Register access</td><td>Memory-mapped at a fixed base; one device per 4 KiB region</td><td>PCI BARs; capabilities for modern, IOspace for legacy</td></tr>
  <tr><td>Where used</td><td>Embedded SoCs, RISC-V virt, ARM virt</td><td>PCs (i440FX, q35), cloud VMs (AWS, GCE)</td></tr>

0x024  DriverFeaturesSel
0x030  QueueSel
0x034  QueueNumMax
0x038  QueueNum
0x040  QueueReady       <span class="cm">// modern only</span>
0x050  QueueNotify
0x060  InterruptStatus
0x064  InterruptACK
0x070  Status
0x080  QueueDescLow     <span class="cm">// modern: descriptor area phys addr</span>
0x084  QueueDescHigh
0x090  QueueDriverLow   <span class="cm">// modern: available ring phys addr</span>
0x094  QueueDriverHigh
0x0A0  QueueDeviceLow   <span class="cm">// modern: used ring phys addr</span>
0x0A4  QueueDeviceHigh
0x100+ Device-class-specific config<span class="lang-tag">virtio-mmio</span></pre>
<p>Legacy mode (Version=1) collapses the three queue-address registers into a single <code>QueuePFN</code> that holds a page-aligned address for the whole ring as one contiguous block. Modern mode lets the rings be in separate physical pages — useful when the host wants the used-ring to be in host-shared memory while the available ring is in guest-only memory.</p>

<h2>virtio-pci layout</h2>
<p>A modern virtio-pci device is a PCI function whose configuration is exposed through PCI <em>capabilities</em>. The driver walks the capability list, finds entries of type VIRTIO_PCI_CAP_*, and learns where in some BAR the register block lives. Five mandatory cap types:</p>
<table class="corr-table">
  <tr><th>Cap type</th><th>Holds</th></tr>
  <tr><td>COMMON_CFG</td><td>Generic registers — Status, DeviceFeatures, QueueSelect, etc.</td></tr>
  <tr><td>NOTIFY_CFG</td><td>Queue-notify register (one per queue; multiplied by NotifyOffMultiplier)</td></tr>
  <tr><td>ISR_CFG</td><td>InterruptStatus byte; cleared on read (latched-clear semantics)</td></tr>
  <tr><td>DEVICE_CFG</td><td>Device-class-specific registers</td></tr>
  <tr><td>PCI_CFG</td><td>Tunnel that lets a driver poke at the others through PCI cfg space (for very old paths)</td></tr>
</table>
<p>Each cap entry says "block of type T lives in BAR N at offset O, length L." The driver mmap's that range, reads/writes registers through the resulting pointer.</p>
<p>Legacy virtio-pci (the pre-1.0 design that QEMU's <code>-device virtio-blk-pci-non-transitional</code> avoids) uses I/O space — port reads/writes — and a fixed register layout. It works but is constrained to the I/O space's 64 KB and to physical addresses below 4 GB.</p>

<h2>BAR relocation: the gotcha</h2>
<p>PCI BARs are programmable. The PC firmware (SeaBIOS) assigns initial BAR values, but the OS can rewrite them — Linux often does, to pack devices more tightly or move them out of low memory. Our virtio-blk-pci had a subtle bug for years: on the SeaBIOS path, the firmware reassigned the BAR before handing control to the kernel, and we kept dispatching I/O on the original BAR. Result: every disk read went into a void.</p>
<p>Fix: when a write to PCI cfg-space BAR registers lands, recompute the I/O / MMIO routing immediately so the next access goes to the new home. <code>machine/pc/pit.go</code>+<code>virtio-blk-pci.go</code> sees the BAR write and re-registers its port handlers in the new range.</p>

<h2>The unified driver</h2>
<p>Linux's virtio core (<code>drivers/virtio/virtio.c</code>) doesn't know which transport it's on. Each transport (virtio_mmio.c, virtio_pci.c) exposes a <code>struct virtio_config_ops</code> with a few methods: <code>get_features</code>, <code>set_features</code>, <code>set_status</code>, <code>find_vqs</code>, <code>config_get</code>, <code>config_set</code>. The class-specific drivers (virtio_net.c, virtio_blk.c) call these methods. Transport swap is one config-ops vtable away.</p>
<p>tinyemu-go mirrors this. <code>devices/virtio/</code> contains the protocol layer (queues, descriptors, status state machine); <code>devices/virtio/mmio.go</code> and <code>machine/pc/virtio_pci.go</code> are the two transports. Each device type (block.go, net.go) is transport-agnostic.</p>

<div class="box box-key">
<strong>One protocol, two homes</strong>
The reason a virtio-net driver works unchanged on RISC-V virt, AWS, and a PC is that the transport split is real: the driver speaks "virtio protocol" and the transport translates to whatever the underlying bus understands. Adding ARM virtio support to tinyemu-go would mean writing one more transport — the device classes stay put.
</div>
`,

  id: 31, phase: 5,
  title: "Features Negotiation and Versioning",
  subtitle: "How drivers and devices agree on what they can do",
  content: `
<h2>Feature bits</h2>
<p>Every virtio device advertises a bitmap of <strong>device features</strong> — capabilities it can perform. The driver picks a subset it understands and writes back a bitmap of <strong>driver features</strong> — capabilities it wants to use. The intersection is what the session actually uses.</p>
<p>Bits are split into ranges by the spec:</p>
<table class="corr-table">
  <tr><th>Bits</th><th>Owner</th></tr>
  <tr><td>0–23</td><td>Device-type specific (virtio-blk's BLK_SIZE = bit 6, virtio-net's MAC = bit 5, …)</td></tr>
  <tr><td>24–37</td><td>Reserved for queue / feature-bit / vring extensions</td></tr>
  <tr><td>38–63</td><td>Device-independent (VERSION_1 = bit 32, ACCESS_PLATFORM = bit 33, RING_PACKED = bit 34, …)</td></tr>
  <tr><td>64+</td><td>Reserved for future use (modern transports support 128 bits)</td></tr>
</table>
<p>The bitmap is read 32 bits at a time through a "select index" + "value" register pair (see <a href="#" data-jump="30">L30</a>). The driver reads index 0 (low 32), index 1 (high 32), assembles, masks down to what it knows, writes back.</p>

<h2>The state machine</h2>
<p>A virtio device transitions through a sequence of status bits the driver writes one at a time. The hypervisor watches the writes and refuses transitions that violate ordering.</p>
<pre>0
└── ACKNOWLEDGE (bit 0)     <span class="cm">// driver saw the device exists</span>
    └── DRIVER (bit 1)      <span class="cm">// driver has a matching driver loaded</span>
        └── FEATURES_OK (bit 3)  <span class="cm">// post features-write, driver says "I accepted the subset"</span>
            └── DRIVER_OK (bit 2)  <span class="cm">// driver finished setup, queues are live</span>
                  ↓
                FAILED (bit 7) — set by either side on giving up
                NEEDS_RESET (bit 6) — device says "reset me, please"<span class="lang-tag">state</span></pre>
<p>The FEATURES_OK step is the one to know: after the driver writes its feature bitmap, it sets FEATURES_OK and reads the status back. If the device cleared FEATURES_OK, the driver requested an unsupported combination and must give up or try a smaller subset. The two sides are pinned at that moment — no later feature changes.</p>

<h2>The MRG_RXBUF moment (per-class consequence)</h2>
<p>In L29 we saw how VIRTIO_NET_F_MRG_RXBUF (bit 15, virtio-net specific) changes header size from 10 to 12 bytes. The driver decides at FEATURES_OK time whether to push 10 or 12; the device must agree. If the bitmap-negotiation phase is buggy or the device lies about its features, the size mismatch silently corrupts every packet — no error, no log, the device just stops working.</p>
<p>This pattern recurs across virtio classes:</p>
<table class="corr-table">
  <tr><th>Class</th><th>Feature</th><th>Effect of negotiating it</th></tr>
  <tr><td>blk</td><td>BLK_F_SIZE_MAX</td><td>Device promises max single-descriptor size; driver uses larger requests</td></tr>
  <tr><td>blk</td><td>BLK_F_MQ</td><td>Multiple queues; per-CPU steering</td></tr>
  <tr><td>blk</td><td>BLK_F_RO</td><td>Driver mounts read-only, refuses writes</td></tr>
  <tr><td>net</td><td>NET_F_MAC</td><td>Driver reads MAC from config space; otherwise random</td></tr>
  <tr><td>net</td><td>NET_F_CSUM</td><td>Driver skips L4 checksum compute on TX</td></tr>
  <tr><td>net</td><td>NET_F_HOST_TSO4</td><td>Driver hands oversized frames to device; device segments</td></tr>
  <tr><td>(generic)</td><td>F_VERSION_1</td><td>Modern virtio; if absent, "transitional" legacy mode</td></tr>
  <tr><td>(generic)</td><td>F_RING_PACKED</td><td>Single-ring layout instead of separate avail/used</td></tr>
</table>

<h2>VERSION_1 and "transitional" devices</h2>
<p>virtio 1.0 (2014) cleaned up endianness (little-endian everywhere, not "guest-endian") and added the status state machine. To stay compatible with Linux 3.x drivers, the spec defined <em>transitional</em> devices: they support both the legacy and modern modes, selected by whether the driver negotiates F_VERSION_1. If yes, modern; if not, legacy.</p>
<p>tinyemu-go's virtio-mmio is transitional. The big difference visible to the driver is the legacy queue-pfn (Page Frame Number) register vs the modern queue-addr split (descriptor / driver / device area separately). Legacy mode treats the rings as one contiguous block; modern mode lets you allocate the three rings independently. Modern Linux always negotiates VERSION_1 if offered.</p>

<h2>The lifecycle in code</h2>
<pre><span class="cm">// Driver-side, simplified.</span>
write_status(0)                    <span class="cm">// reset</span>
write_status(ACK)
write_status(ACK | DRIVER)
features = read_device_features()
features &amp;= my_supported_features  <span class="cm">// subset we want</span>
write_driver_features(features)
write_status(ACK | DRIVER | FEATURES_OK)
<span class="kw">if</span> (read_status() &amp; FEATURES_OK == 0)
    <span class="kw">return</span> -ENODEV;       <span class="cm">// device rejected our subset</span>
setup_queues();
write_status(ACK | DRIVER | FEATURES_OK | DRIVER_OK)<span class="lang-tag">driver flow</span></pre>

<div class="box box-key">
<strong>Why the handshake matters</strong>
The pre-virtio model was "device offers X, driver uses X." Negotiation lets a single device serve drivers of different vintages without breaking either, and lets drivers tune for what they can actually parse. The cost is a half-dozen extra register pokes at startup — paid once, never again.
</div>
`,
  exercises: [

    "Read <code>devices/virtio/mmio.go</code>: where does it gate writes to <code>queue_pfn</code> on the legacy-vs-modern feature bits?",

    "F_RING_PACKED is a major restructuring. Why does the spec leave it as a feature bit instead of just versioning to virtio 2.0?"
  ]

<h2>The architectural split</h2>
<p>tinyemu-go's source is laid out so that hardware abstractions are reusable across CPU architectures:</p>
<table class="corr-table">
  <tr><th>Package</th><th>Purpose</th><th>CPU-agnostic?</th></tr>
  <tr><td><code>cpu/x86/</code></td><td>x86-32 decoder/executor</td><td>No (per arch)</td></tr>
  <tr><td><code>cpu/riscv/</code></td><td>RISC-V decoder/executor</td><td>No</td></tr>
  <tr><td><code>mem/</code></td><td>Physical memory map, device-MMIO registry</td><td>Yes</td></tr>
  <tr><td><code>devices/</code></td><td>BlockDevice, EthernetDevice, FIFO, etc.</td><td>Yes</td></tr>
  <tr><td><code>virtio/</code></td><td>virtio protocol over MMIO; class drivers (blk, net, p9)</td><td>Yes (transport-agnostic at the protocol level)</td></tr>
  <tr><td><code>machine/</code></td><td>RISC-V virt board (legacy "Machine" name)</td><td>No (board)</td></tr>
  <tr><td><code>machine/pc/</code></td><td>x86 PC board: PIC, PIT, RTC, UART, ATA, …</td><td>No</td></tr>
  <tr><td><code>cmd/temu/</code></td><td>The CLI; picks a board and wires drives/nets to it</td><td>Yes (branches via interface assertions)</td></tr>
</table>

<h2>The BlockDevice interface</h2>
<p>In <code>devices/block.go</code>:</p>
<pre><span class="kw">type</span> <span class="ty">BlockDevice</span> <span class="kw">interface</span> {
    <span class="fn">GetSectorCount</span>() <span class="kw">int64</span>
    <span class="fn">ReadSectors</span>(sectorNum <span class="kw">uint64</span>, buf []<span class="kw">byte</span>, n <span class="kw">int</span>) (<span class="kw">int</span>, <span class="kw">error</span>)
    <span class="fn">WriteSectors</span>(sectorNum <span class="kw">uint64</span>, buf []<span class="kw">byte</span>, n <span class="kw">int</span>) (<span class="kw">int</span>, <span class="kw">error</span>)
    <span class="fn">Flush</span>() <span class="kw">error</span>
    <span class="fn">Close</span>() <span class="kw">error</span>
}<span class="lang-tag">devices/block.go</span></pre>
<p>This single interface is used by all backends:</p>
<ul>
  <li><code>devices.MemoryBlockDevice</code> — for tests</li>
  <li>cmd/temu's file-backed implementation (with ReadOnly / Snapshot modes)</li>
  <li>Hypothetical: a CoW overlay implementation, an iSCSI client implementation, etc.</li>
</ul>
<p>And consumed by:</p>
<ul>
  <li><code>virtio.BlockDevice</code> — virtio-blk protocol layer</li>
  <li><code>pc.ATAController</code> — IDE/ATA protocol layer</li>
  <li><code>pc.ATAController</code> in CD-ROM mode — ATAPI layer</li>
</ul>

<h2>The dispatch in cmd/temu</h2>
<p>cmd/temu opens drives generically (via <code>openBlockDevice</code>) and asks the board "how do you want me to attach this?" The board implements a capability interface:</p>
<pre><span class="kw">type</span> <span class="ty">BlockDeviceAttacher</span> <span class="kw">interface</span> {
    <span class="fn">AttachBlockDevice</span>(bd devices.<span class="ty">BlockDevice</span>) <span class="kw">error</span>
}<span class="lang-tag">machine/board.go</span></pre>
<p>PC implements it via ATA. A future ARM-virt board would implement it via virtio-blk-mmio. RISC-V doesn't implement it (today) — cmd/temu falls back to virtio-blk for that board. No cmd/temu code branches on a specific board type; it just asks "do you support this capability?"</p>

<div class="box box-key">
<strong>Architectural Discipline</strong>
The single most important rule in this codebase: anything in <code>devices/</code> or <code>virtio/</code> must not import <code>cpu/x86</code> or <code>machine/pc</code>. Devices know about their protocol and the BlockDevice interface; nothing else. That discipline is what will let us add ARM and x86-64 without re-doing storage and networking.

  id: 33, phase: 6,

  subtitle: "machine/pc/ata.go, line by line",
  content: `
<h2>The full picture</h2>
<p>The ATA controller in <code>machine/pc/ata.go</code> is one struct with two modes (disk + ATAPI CD-ROM), one method per I/O port, plus command/data handlers. Around 700 lines total.</p>

<h2>The state machine</h2>
<p>The controller's life cycle, from the kernel's perspective:</p>
<ol>
  <li><strong>Idle.</strong> Status = DRDY | DSC. Kernel can issue any command.</li>
  <li><strong>Command received.</strong> Controller validates; if invalid, sets ERR + ABRT, raises IRQ. If valid, proceeds.</li>
  <li><strong>Preparing data.</strong> (Status briefly BSY in real hardware; we skip this and go directly to ready.)</li>
  <li><strong>Data ready.</strong> Status = DRDY | DSC | DRQ. IRQ raised. Kernel must drain (or fill) the data buffer.</li>
  <li><strong>Data drained.</strong> If more sectors, loop back to step 4 with next sector. If done, status returns to DRDY | DSC; final IRQ raised.</li>
  <li><strong>Idle.</strong> Repeat.</li>
</ol>

<h2>Key methods</h2>
<ul>
  <li><code>NewATAController(pic, bd)</code> — disk variant.</li>
  <li><code>NewCDROMController(pic, bd)</code> — ATAPI variant; sets the signature.</li>
  <li><code>Register(io)</code> — wires the controller into the I/O dispatcher. 8 task-file ports + control port. The data port also gets a 16-bit-specific handler (Lesson 14).</li>
  <li><code>writeCommand(cmd)</code> — the giant switch on what command was issued. Branches on isCDROM.</li>
  <li><code>readDataByte/readDataWord</code> — fetches bytes from the in-flight buffer (or ATAPI data slice).</li>
  <li><code>writeDataByte/writeDataWord</code> — drains incoming bytes. In ATAPI's PACKET-command phase, these consume the 12-byte SCSI command.</li>
  <li><code>raiseIRQ/readStatusAndClearIRQ</code> — IRQ 14 lifecycle.</li>
  <li><code>fillIdentifyBuffer/fillIdentifyPacketBuffer</code> — the 256-word identify responses (Lesson 14).</li>
  <li><code>dispatchPacketCommand</code> — the SCSI command parser for ATAPI (Lesson 15).</li>
</ul>

<h2>The IRQ lifecycle subtlety</h2>
<p>An IRQ is asserted on each "data ready" boundary and on command completion. The kernel acknowledges by reading the status register at 0x1F7 — which also returns the status value. Reading the <em>alternate</em> status at 0x3F6 returns the same byte but does NOT clear the IRQ. This is so polling loops can read status without side effects.</p>
<p>Our implementation: <code>readStatusAndClearIRQ</code> is bound to 0x1F7 reads; the alternate-status handler at 0x3F6 just returns the byte.</p>

<h2>What's intentionally missing</h2>
<ul>
  <li>Slave drive (drive 1). Single-drive is enough for boot.</li>
  <li>LBA48 (large disks). LBA28 covers up to 128 GiB.</li>
  <li>UDMA modes. PIO is universally supported; UDMA is a performance optimisation.</li>
  <li>Cylinder/Head/Sector (CHS) addressing. Linux uses LBA exclusively for modern disks.</li>
  <li>Secondary IDE channel (0x170-0x177 + 0x376). Same shape; would be a second controller instance.</li>
</ul>

<div class="box box-key">
<strong>Reading order</strong>
Open <code>machine/pc/ata.go</code> alongside <code>machine/pc/ata_test.go</code>. Read each command handler; then read the matching test. The tests are the executable spec for what each port operation does.
</div>

<h2>The minimal addition</h2>
<p>ATAPI is one flag and a parallel set of handlers, sharing the underlying state machine with plain ATA. The struct grew by ~5 fields; the constructor became <code>NewCDROMController</code>; <code>writeCommand</code> grew an <code>if isCDROM</code> branch; we added <code>dispatchPacketCommand</code> for SCSI parsing.</p>

<h2>The control-flow shape</h2>
<pre>writeCommand(cmd):
  if cdrom:
    switch cmd:
      IDENTIFY      → abort with ATAPI signature
      IDENTIFY_PKT  → return ATAPI identify data
      PACKET        → enter "awaiting 12-byte SCSI command" state
      …
  else:
    [original ATA disk path]

writeDataByte/Word(b):
  if awaitingPacket:
    append to 12-byte packet command buffer
    if full → dispatchPacketCommand()
  else if cdrom and have atapiData:
    [unused; ATAPI writes go to packet command phase]
  else:
    [original sector-write path]<span class="lang-tag">control flow</span></pre>

<h2>The MMC subset</h2>
<p>Twelve SCSI commands implemented (see Lesson 15 for the full list). Each one builds a small response buffer and hands it to <code>startATAPIDataIn</code>, which sets the byte-count registers (lba_mid / lba_high) and asserts DRQ. The host drains; we advance.</p>

<h2>The 2048-byte sector wrinkle</h2>
<p>CD-ROM sectors are 2048 bytes. Our <code>BlockDevice</code> interface uses 512-byte sectors. For READ(10), each CD-sector translates to 4 underlying-sector reads:</p>
<pre><span class="kw">func</span> (a *<span class="ty">ATAController</span>) <span class="fn">loadNextATAPISector</span>() {
    buf := <span class="fn">make</span>([]<span class="kw">byte</span>, cdSectorSize)        <span class="cm">// 2048</span>
    baseLBA := <span class="kw">uint64</span>(a.atapiCurrentLBA) * <span class="nm">4</span>  <span class="cm">// underlying 512-byte LBA</span>
    a.device.<span class="fn">ReadSectors</span>(baseLBA, buf, <span class="nm">4</span>)
    <span class="cm">// ... hand buf to startATAPIDataIn ...</span>
}<span class="lang-tag">machine/pc/ata.go</span></pre>

<h2>What ATAPI doesn't do (yet)</h2>

  <li>Multi-session discs.</li>

  id: 35, phase: 6,
  title: "The PCI Host Bridge",
  subtitle: "machine/pc/pci.go, line by line",
  content: `
<h2>The two halves</h2>
<p>Our PCI implementation has two layers:</p>
<ol>
  <li><strong>The host bridge</strong> (<code>PCIHost</code>) — the chip that translates I/O port accesses at 0xCF8/0xCFC into reads and writes against device config space.</li>
  <li><strong>The bus and devices</strong> (<code>PCIBus</code>, <code>PCIDevice</code>) — the data: a 32×8 grid of devices, each carrying 256 bytes of config space.</li>
</ol>

<h2>PCIDevice</h2>
<pre><span class="kw">type</span> <span class="ty">PCIDevice</span> <span class="kw">struct</span> {
    name   <span class="kw">string</span>
    config [<span class="nm">256</span>]<span class="kw">byte</span>
    onWrite <span class="kw">func</span>(d *<span class="ty">PCIDevice</span>, off <span class="kw">uint32</span>, val <span class="kw">uint32</span>, size <span class="kw">int</span>)
}<span class="lang-tag">machine/pc/pci.go</span></pre>
<p>The <code>config</code> array is the whole device-visible state. <code>NewPCIDevice(name, vendor, device, classCode, headerType)</code> fills in the mandatory fields at construction time. <code>SetIRQLine(line, pin)</code> sets the interrupt fields. Devices needing custom write semantics (e.g. BAR size-detection) install <code>onWrite</code>; our two simple devices don't.</p>

<h2>The address-latch</h2>
<p>The 32-bit value the kernel writes to 0xCF8 is decoded in <code>PCIHost.lookup</code>:</p>
<pre>bit31:  must be 1 (enable)
bits 23:16: bus number
bits 15:11: device number (0-31)
bits 10:8:  function number (0-7)
bits 7:2:   register offset (dword-aligned)
bits 1:0:   reserved (zero)<span class="lang-tag">0xCF8 layout</span></pre>
<p>The host extracts these, looks up <code>bus.devices[dev][fn]</code>, and returns the device + offset, or signals "no device."</p>

<h2>The data window</h2>
<p>Reads and writes through 0xCFC, 0xCFD, 0xCFE, 0xCFF (one-byte resolution) all go to the same backing config space, indexed by <code>(latched_register | port&amp;3)</code>. 16-bit accesses at 0xCFC or 0xCFE use width-aware handlers we added to the I/O dispatcher specifically for ATA's data port (Lesson 14, same mechanism).</p>
<p>The CPU's 32-bit-OUT splits into two Write16s; my host bridge handles both halves correctly because the 0xCFE handler ORs in port&amp;3 = 2, fetching the upper 16 bits of the targeted dword.</p>

<h2>What's writable</h2>
<p><code>defaultWrite</code> implements the PCI spec's default rules for "what's writable when the device doesn't override":</p>
<ul>
  <li>Command (0x04) and Cache Line / Latency Timer (0x0C, 0x0D) → writable.</li>
  <li>BARs (0x10-0x27) → writable (devices without resources read back 0 anyway).</li>
  <li>Expansion ROM base (0x30-0x33) and IRQ line (0x3C) → writable.</li>
  <li>Vendor / Device / Revision / Class / Header Type → silently discarded (read-only).</li>
</ul>
<p>Devices needing different rules (e.g. a real PCI NIC with a BAR that returns the size mask on a 0xFFFFFFFF write) install an <code>onWrite</code> callback.</p>

<h2>The two devices we add today</h2>
<p>In <code>pc.New</code>:</p>
<table class="corr-table">
  <tr><th>Slot</th><th>Device</th><th>Vendor:Device</th><th>Class</th></tr>
  <tr><td>(0, 0, 0)</td><td>Intel 440FX Host Bridge</td><td>8086:1237</td><td>0x060000 (Host bridge)</td></tr>
  <tr><td>(0, 1, 0)</td><td>PIIX3 ISA Bridge (multi-fn)</td><td>8086:7000</td><td>0x060100 (ISA bridge)</td></tr>
  <tr><td>(0, 1, 1)</td><td>PIIX3 IDE Controller</td><td>8086:7010</td><td>0x010180 (IDE, ProgIF 0x80)</td></tr>
</table>
<p>These three are the canonical "QEMU/i440FX" topology that Linux has known by name since the late 1990s. Our IDE PCI device is paired with the actual ATA controller already living at port 0x1F0 — the PCI device is the "announcement," the ATA controller is the actual port-I/O behaviour.</p>

<h2>What changes from Linux's perspective</h2>
<p>Before this change, the kernel emitted:</p>
<pre>PCI: Fatal: No config space access function found
PCI: Probing PCI hardware<span class="lang-tag">old dmesg</span></pre>
<p>and PCI was disabled. After: the kernel walks the bus, sees the three devices, registers them with their drivers (or ignores them gracefully if no driver is built in). The IDE controller is discoverable via PCI now in addition to legacy port-scanning.</p>

<h2>What's not yet here</h2>
<ul>
  <li>MMCONFIG (the PCIe MMIO config-space mechanism)</li>
  <li>BAR size-detection masking (we don't need it for the IDE-in-compatibility-mode case)</li>
  <li>The capabilities list (no MSI, no PCIe, no power management)</li>
  <li>Bridge enumeration (we only model bus 0)</li>
  <li>Hotplug</li>
</ul>
<p>None block real distros from booting; they're features that matter for performance or for unusual hardware. The standard "small i386 PC with IDE + serial + maybe VGA" target is fully covered by what we have.</p>

<div class="box box-key">
<strong>Reading order</strong>
Open <code>machine/pc/pci.go</code> + <code>machine/pc/pci_test.go</code> side by side. Start with the host's <code>Register</code> method to see all the port-I/O wiring; then <code>lookup</code> for address decoding; then <code>readData</code>/<code>writeData</code> for the dispatch. The tests walk through every register Linux's <code>pci_scan_root_bus</code> reads during enumeration.
</div>
`,

{
  id: 36, phase: 6,
  title: "VGA Text Mode",
  subtitle: "machine/pc/vga.go, line by line",
  content: `
<h2>The two halves of a VGA emulation</h2>
<p>To make a PC's VGA work for the boot console, we need two things:</p>
<ol>
  <li><strong>Stop the kernel from page-faulting</strong> when it writes to the 128 KB aperture at 0xA0000-0xBFFFF, where the text-mode framebuffer at 0xB8000 lives. We register that region as a device.</li>
  <li><strong>Accept the legacy register writes</strong> the kernel makes to ports 0x3C0-0x3CF and 0x3D4-0x3DF — CRTC, sequencer, attribute controller, graphics controller, miscellaneous-output, input-status-1.</li>
</ol>
<p>Optionally — and this is where it becomes useful for development — render the 80×25 text-mode buffer to a developer-visible terminal as ANSI escape codes.</p>

<h2>The text-mode framebuffer</h2>
<p>Text mode is 80 columns × 25 rows. Each cell is 2 bytes:</p>
<table class="corr-table">
  <tr><th>Byte</th><th>Field</th><th>Range</th></tr>
  <tr><td>0</td><td>Character (code page 437)</td><td>0-255</td></tr>
  <tr><td>1</td><td>Attribute: low nibble = fg, high nibble = bg (top bit = blink)</td><td>0-255</td></tr>
</table>
<p>So row 5, column 10 lives at offset <code>(5*80 + 10) * 2 = 820</code> from the framebuffer base. The kernel's <code>vga_con</code> driver just writes characters directly there.</p>

<h2>The CRTC registers</h2>
<p>The CRT Controller has ~25 registers, accessed via a 2-port indirect interface:</p>
<ul>
  <li><strong>0x3D4</strong> — index register. Write the register number you want to access.</li>
  <li><strong>0x3D5</strong> — data register. Reads or writes the register selected by 0x3D4.</li>
</ul>
<p>Of these registers, the only ones the kernel touches per character output are:</p>
<ul>
  <li><strong>0x0E</strong> — Cursor Position high byte</li>
  <li><strong>0x0F</strong> — Cursor Position low byte</li>
</ul>
<p>Cursor position is a 16-bit linear offset into the text buffer. Programming it moves the hardware cursor. After writing a chunk of text, the kernel updates these — which makes them the natural trigger for "render the framebuffer now."</p>

<h2>The other register groups</h2>
<table class="corr-table">
  <tr><th>Ports</th><th>Group</th><th>What it controls</th></tr>
  <tr><td>0x3C4 / 0x3C5</td><td>Sequencer</td><td>Clock, character mode, plane masks</td></tr>
  <tr><td>0x3CE / 0x3CF</td><td>Graphics Controller</td><td>Plane selection, write masks (matters for graphics, not text)</td></tr>
  <tr><td>0x3C0 / 0x3C1</td><td>Attribute Controller</td><td>Palette mapping, blink/overscan</td></tr>
  <tr><td>0x3C2 / 0x3CC</td><td>Misc Output</td><td>I/O address select, clock select</td></tr>
  <tr><td>0x3DA</td><td>Input Status 1 (read)</td><td>Vertical retrace + AC flip-flop reset</td></tr>
</table>
<p>For a serial-console boot, the kernel programs all of these once at vga_con's init, then leaves them alone. Our emulation accepts every write, stores it, returns it on read. Mode-setting doesn't affect our rendering since we always render the text-mode buffer at 0xB8000 regardless of what the kernel's mode bits say.</p>

<h2>The AC flip-flop quirk</h2>
<p>The Attribute Controller is the strangest of the VGA registers. Index <em>and</em> data go through the same port (0x3C0), and an internal flip-flop decides which is which: first write is the index, second is the data, third is the next index, etc. Reading port 0x3DA resets the flip-flop to "index" mode — which is what every well-behaved VGA driver does before each AC access.</p>

<h2>The rendering trick</h2>
<p>Our <code>Render(w io.Writer)</code> method walks the 80×25 buffer and emits ANSI escape sequences:</p>
<ol>
  <li><code>\x1b[H</code> at the start — move cursor to home (top-left).</li>
  <li>For each cell, emit a colour change (<code>\x1b[3Nm</code> for foreground, <code>\x1b[4Nm</code> for background) only if the colour differs from the previous cell.</li>
  <li>Output the character (or a space if it's outside printable ASCII).</li>
  <li>At end of row, <code>\x1b[0m</code> reset + newline.</li>
</ol>
<p>Non-blocking: the framebuffer is snapshotted into a local buffer under the lock, then the lock is released before writing to the sink. So a slow stderr doesn't stall the emulator.</p>

<h2>The VGA-vs-ANSI colour-order quirk</h2>
<p>VGA and ANSI both have 16 colours but they're <em>indexed differently</em>:</p>
<table class="corr-table">
  <tr><th>Index</th><th>VGA</th><th>ANSI</th></tr>
  <tr><td>1</td><td>Blue</td><td>Red</td></tr>
  <tr><td>3</td><td>Cyan</td><td>Yellow</td></tr>
  <tr><td>4</td><td>Red</td><td>Blue</td></tr>
  <tr><td>6</td><td>Brown</td><td>Cyan</td></tr>
</table>
<p>Without remapping, a VGA "red" message would appear blue on your terminal. We have a <code>vgaColorMap</code> array that translates: VGA index → ANSI index. The test <code>TestVGAFgAnsiColors</code> locks down a few key mappings (VGA blue → ANSI 4, VGA red → ANSI 1).</p>

<h2>The rendering trigger</h2>
<p>When does <code>Render</code> get called? Two paths:</p>
<ul>
  <li><strong>Automatic:</strong> on every write to CRTC register 0x0F (cursor low byte). Linux's vga_con drains a chunk of buffered output, ends with a cursor update — so this catches every meaningful screen refresh without flooding stderr.</li>
  <li><strong>Manual:</strong> external code can call <code>vga.Render(&buf)</code> at any time to snapshot the current state.</li>
</ul>
<p>Rendering is opt-in: set <code>TINYEMU_X86_VGA_RENDER=1</code> in the environment and the auto-render path activates. Off by default — when we already have <code>console=ttyS0</code> producing serial output to stdout, also rendering VGA to stderr would just duplicate the noise. The env-var switch keeps it quiet unless you specifically want it.</p>

<h2>Scope deliberately excluded</h2>
<ul>
  <li><strong>VGA graphics modes</strong> (the 4-plane / chained 256-color layouts). Linux only uses these for framebuffer console (<code>fbcon</code>), which we don't model.</li>
  <li><strong>Mode programming via CRTC.</strong> The actual display timing the CRTC describes is irrelevant when we render in software.</li>
  <li><strong>Palette programming via the DAC</strong> (ports 0x3C6-0x3C9). We accept the writes but ignore the values; rendering uses our fixed VGA→ANSI mapping.</li>
  <li><strong>VBE / VESA BIOS Extensions.</strong> Used by Linux's fbcon for high-resolution console; out of scope.</li>
</ul>

<div class="box box-key">
<strong>Reading order</strong>
Open <code>machine/pc/vga.go</code> + <code>machine/pc/vga_test.go</code>. Start with the struct fields to see all the register state we maintain; then <code>Register</code> for the port wiring; then <code>readMem</code>/<code>writeMem</code> for the framebuffer; finally <code>Render</code> + <code>vgaColorMap</code> for the rendering. Each test exercises one register group.
</div>
`,

  id: 38, phase: 6,
  title: "The IRQ 14 Cascade",
  subtitle: "How ATA's interrupts reach the kernel",
  content: `
<h2>The PIC-of-two-PICs</h2>
<p>The 8259 PIC has 8 IRQ lines. The PC architecture wants 15. The fix in 1984 was to chain two 8259s: master at I/O 0x20-0x21 with IRQs 0-7, slave at 0xA0-0xA1 with IRQs 8-15. The slave's INT line is wired to master's IRQ 2 — when any slave IRQ fires, master sees IRQ 2 asserted.</p>
<p>This is why "IRQ 2" is reserved as the cascade input and effectively unusable for devices.</p>

<h2>The chain in our emulator</h2>
<p>Originally our PIC only supported IRQs 0-7. ATA uses IRQ 14, which lives on the slave. We had to extend the PIC to model the cascade:</p>
<pre><span class="kw">type</span> <span class="ty">PIC8259</span> <span class="kw">struct</span> {
    <span class="cm">// ... task-file registers ...</span>
    slave  *<span class="ty">PIC8259</span>   <span class="cm">// master holds slave</span>
    master *<span class="ty">PIC8259</span>   <span class="cm">// slave holds back-ref</span>
}

<span class="kw">func</span> <span class="fn">NewPIC8259Cascaded</span>(cpu *x86.<span class="ty">CPU</span>, masterBase, slaveBase <span class="kw">uint16</span>) *<span class="ty">PIC8259</span> {
    master := <span class="fn">NewPIC8259</span>(cpu, masterBase)
    slave := <span class="fn">NewPIC8259</span>(<span class="kw">nil</span>, slaveBase)
    master.slave = slave
    slave.master = master
    <span class="kw">return</span> master
}<span class="lang-tag">machine/pc/pic.go</span></pre>

<h2>The routing logic</h2>
<p>When something calls <code>master.RaiseIRQ(14)</code>:</p>
<ol>
  <li>Master sees IRQ ≥ 8; routes to <code>slave.RaiseIRQ(6)</code> (= 14 - 8).</li>
  <li>Slave sets bit 6 of its IRR.</li>
  <li>Slave's <code>updateINTR()</code> checks: any pending unmasked? Yes (bit 6). Asserts the cascade line — which means setting bit 2 of master's IRR.</li>
  <li>Master's <code>updateINTR()</code>: bit 2 pending unmasked. Asserts the CPU's INTR line.</li>
</ol>
<p>The CPU acknowledges; <code>master.DeliverInterrupt()</code> sees IRQ 2 is highest priority, recognises the cascade, asks the slave for the actual vector. Slave returns its <code>icw2 + 6</code> (= 0x28 + 6 = 0x2E = vector 46) and updates its own IRR/ISR. Master marks its IRQ 2 in-service.</p>

<h2>EOI propagation</h2>
<p>On end-of-interrupt: kernel writes EOI to slave AND master (in that order). The slave clears its in-service bit; master clears bit 2.</p>

<h2>The result</h2>
<p>From the device's point of view, "RaiseIRQ(14)" just works. The cascade machinery is invisible. From the kernel's point of view, the standard "two PICs chained" arrangement Linux has known about since 1991 works correctly.</p>

<div class="box box-key">
<strong>Reading order</strong>
Open <code>machine/pc/pic.go</code>. Read <code>NewPIC8259Cascaded</code>, then <code>RaiseIRQ</code> (the route-to-slave branch), then <code>updateINTR</code> (the slave's back-pressure), then <code>DeliverInterrupt</code> (the cascade resolution). The tests in <code>pic_test.go</code> exercise both single-PIC and cascaded behaviour.
</div>
`,

  nextBtn.onclick = () => next && showLesson(next.id);

  const done = isComplete(id);
  const stubBadge = lesson.stub ? `<span class="stub-badge">STUB</span>` : '';
  document.getElementById('content-area').innerHTML = `
    <div id="lesson-content">
      <div class="lesson-eyebrow">
        <span class="phase-badge" style="background:${phase.color}22;color:${phase.color}">${phase.short}</span>
        <span class="lesson-number">Lesson ${lesson.id} of ${LESSONS.length}</span>
        ${stubBadge}
      </div>
      <h1 class="lesson-title">${lesson.title}</h1>
      <p class="lesson-subtitle">${lesson.subtitle}</p>
      <div class="lesson-divider"></div>
      <div class="lesson-body">${lesson.content}</div>
      <div class="exercises">
        <h2>Exercises</h2>
        ${lesson.exercises.map((ex, i) => `
          <div class="exercise">
            <div class="exercise-num">Exercise ${i + 1}</div>
            <p>${ex}</p>
          </div>
        `).join('')}
      </div>
      <div class="complete-wrap">
        <button class="btn-complete ${done ? 'done' : ''}" id="btn-done">
          ${done ? '✓ Completed' : 'Mark Complete'}
        </button>
        ${next ? `<button class="btn-next" id="btn-next-lesson">Next: ${next.title} →</button>` : ''}
      </div>
    </div>
  `;
  document.getElementById('btn-done').onclick = () => {
    if (isComplete(id)) unmarkComplete(id); else markComplete(id);
    renderNav();
    document.getElementById('btn-done').className = `btn-complete ${isComplete(id) ? 'done' : ''}`;
    document.getElementById('btn-done').textContent = isComplete(id) ? '✓ Completed' : 'Mark Complete';
  };
  const nl = document.getElementById('btn-next-lesson');
  if (nl) nl.onclick = () => showLesson(next.id);
  renderNav();
  document.getElementById('main').scrollTo(0, 0);
  if (window.innerWidth < 900) document.getElementById('sidebar').classList.remove('open');
}

function showWelcome() {
  currentLesson = null;
  document.getElementById('topbar-phase').textContent = 'Overview';
  document.getElementById('btn-prev').disabled = true;
  document.getElementById('btn-next-top').disabled = false;
  document.getElementById('btn-next-top').onclick = () => showLesson(1);
  const stubsCount = LESSONS.filter(l => l.stub).length;
  const filledCount = LESSONS.length - stubsCount;
  document.getElementById('content-area').innerHTML = `
    <div id="welcome">
      <h1>OS <em>Development</em></h1>
      <p class="tagline">From bytes to filesystems — a hands-on tour of what an operating system does and how its drivers work.</p>
      <div class="welcome-body">
        <p>This course is the companion to <code>x86_tutorial.html</code> (what the CPU does), <code>x64_tutorial.html</code> (long-mode extensions), and <code>bios_tutorial.html</code> (what the firmware does before the kernel runs). Where they focus on the CPU and firmware, this one focuses on what the kernel does with those primitives: drivers, buses, storage, networking, virtualisation.</p>
        <p>Every concept anchors to working code in the <code>tinyemu-go</code> emulator that lives alongside this file. Pages on already-implemented features (IDE/ATA, ATAPI, virtio-blk, the PIC cascade) walk you through the actual source. Pages on features still in flight (PCI, VGA, virtio-net on PC, AHCI, NVMe) are <strong>stubs</strong> that get expanded as the implementation lands. For diagnostic techniques — RIP sampling, watchpoints, cycle-window traces, the bug shapes we keep catching — see <code>DEBUG.md</code>.</p>
        <p>${LESSONS.length} lessons across six phases (${filledCount} filled, ${stubsCount} stubs). Progress is saved in your browser.</p>
        <div class="phase-overview">
          ${[1,2,3,4,5,6].map(ph => {
            const m = PHASE_META[ph];
            const done = LESSONS.filter(l => l.phase === ph && isComplete(l.id)).length;
            const total = LESSONS.filter(l => l.phase === ph).length;
            return `
              <div class="phase-card" onclick="showLesson(${(LESSONS.find(l=>l.phase===ph)||{id:1}).id})">
                <div class="phase-card-num" style="color:${m.color}">${m.short} — Lessons ${m.lessons}</div>
                <h3>${m.name}</h3>
                <p>${done}/${total} complete</p>
              </div>
            `;
          }).join('')}
        </div>
        <button class="btn-start" onclick="showLesson(${completed.length > 0 ? Math.max(...completed) + 1 : 1})">
          ${completed.length > 0 ? 'Continue →' : 'Start from Lesson 1 →'}
        </button>
      </div>
    </div>
  `;
  renderNav();
}

document.getElementById('search').addEventListener('input', e => renderNav(e.target.value));

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'j') {
    const next = currentLesson && LESSONS.find(l => l.id === currentLesson + 1);
    if (next) showLesson(next.id);
  }
  if (e.key === 'ArrowLeft' || e.key === 'k') {
    const prev = currentLesson && LESSONS.find(l => l.id === currentLesson - 1);
    if (prev) showLesson(prev.id);
  }
  if (e.key === 'h') showWelcome();
});

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
document.getElementById('sidebar-header').style.cursor = 'pointer';
document.getElementById('sidebar-header').onclick = showWelcome;

updateProgress();
showWelcome();
</script>
</body>
</html>
